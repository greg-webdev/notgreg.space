<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greg's Projects</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font for a modern look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light gray background */
        }
        /* Liquid Glass Button Styles */
        .btn-custom-blue {
            background: linear-gradient(135deg, rgba(42, 111, 139, 0.3) 0%, rgba(42, 111, 139, 0.15) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(42, 111, 139, 0.3);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(42, 111, 139, 0.2);
        }
        .btn-custom-blue:hover {
            background: linear-gradient(135deg, rgba(42, 111, 139, 0.4) 0%, rgba(42, 111, 139, 0.2) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 111, 139, 0.3);
        }
        .btn-custom-blue:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(42, 111, 139, 0.15);
        }

        /* Glass Enabled State */
        .btn-custom-blue.glass-enabled {
            background: linear-gradient(135deg, rgba(42, 111, 139, 0.5) 0%, rgba(42, 111, 139, 0.3) 100%) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 2px solid rgba(42, 111, 139, 0.4) !important;
            box-shadow: 0 8px 32px 0 rgba(42, 111, 139, 0.3), inset 1px 1px 0 rgba(255, 255, 255, 0.2);
        }
        .btn-custom-blue.glass-enabled:hover {
            background: linear-gradient(135deg, rgba(42, 111, 139, 0.6) 0%, rgba(42, 111, 139, 0.4) 100%) !important;
            box-shadow: 0 12px 48px 0 rgba(42, 111, 139, 0.4), inset 1px 1px 0 rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Toggle Button */
        .glass-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(42, 111, 139, 0.3);
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .glass-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .glass-toggle.active {
            background: linear-gradient(135deg, rgba(42, 111, 139, 0.3) 0%, rgba(42, 111, 139, 0.15) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(42, 111, 139, 0.4);
            color: white;
            box-shadow: 0 8px 32px 0 rgba(42, 111, 139, 0.25);
        }
    </style>
</head>
<body class="h-full p-0">

    <!-- 
        Main Container - Now full width and top-aligned. 
    -->
    <div class="w-full bg-white shadow-md p-6">
        <button 
            class="glass-toggle"
            id="glassToggle"
            onclick="toggleGlass()"
        >
            🔵 Glass OFF
        </button>
        
        <h1 class="text-3xl font-extrabold text-gray-800 mb-6 text-center">
            Greg's Projects
        </h1>
        
        <!-- Button List Container - Constrained to a max width for desktop view -->
        <div id="button-list" class="max-w-2xl mx-auto space-y-3">

            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                WebPc for TouchScreen
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                ANciEnt ChiNa CiViLliSAtIoN
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                Minecraft 1.0 release
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                links (4 features)
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                minecraft (2 features)
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                chess
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                FPS test
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                random software
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                nice slideshow
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                Opticals
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                Chat
            </button>
            <button class="menu-btn w-full py-4 rounded-xl text-white font-semibold uppercase tracking-wide transition duration-150 btn-custom-blue" onclick="handleClick(this)">
                FileTransfer
            </button>
            
        </div>
        
    </div>

    <script>
        let glassEnabled = false;

        // Base URL for redirection
        const BASE_URL = "https://greg-webdev.github.io/";

        // Map button text (keys) to the corresponding sitename (values)
        const featureMap = {
            "WebPc for TouchScreen": "webpctouch",
            "ANciEnt ChiNa CiViLliSAtIoN": "infos",
            "Minecraft 1.0 release": "infos/tominecon.7z", 
            "links (4 features)": "links",
            "minecraft (2 features)": "minecraft",
            "chess": "chess",
            "FPS test": "fpstest",
            "random software": "software",
            "nice slideshow": "superpccrasher",
            "Opticals": "opticals",
            "chat": "chat",
            "FileTransfer": "ftp"
        };
        
        function toggleGlass() {
            glassEnabled = !glassEnabled;
            const toggle = document.getElementById('glassToggle');
            const buttons = document.querySelectorAll('.menu-btn');
            
            toggle.classList.toggle('active');
            toggle.textContent = glassEnabled ? '✨ Glass ON' : '🔵 Glass OFF';
            
            buttons.forEach(btn => {
                btn.classList.toggle('glass-enabled');
            });
        }

        function handleClick(button) {
            const buttonText = button.textContent.trim();
            const sitename = featureMap[buttonText];

            if (!sitename) {
                console.error(`Error: No destination defined for button: ${buttonText}`);
                return; 
            }
            
            const url = BASE_URL + sitename;
            window.location.href = url;
        }
    </script>
</body>
</html>
