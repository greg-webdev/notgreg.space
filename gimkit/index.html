<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Tower Multiplayer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: auto;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            z-index: 10;
            transform: translateX(0);
            animation: slideInLeft 0.45s ease-out forwards;
            padding: 8px;
            background: rgba(0,0,0,0.28);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.04);
            backdrop-filter: blur(6px);
        }
        @keyframes slideInLeft {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 8px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(3px);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            transition: transform 200ms cubic-bezier(.2,.9,.2,1), opacity 200ms;
        }
        .touch-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 6%;
            pointer-events: none;
            z-index: 50;
            transform: translateY(100%);
            animation: slideInBottom 0.5s ease-out forwards;
        }
        @keyframes slideInBottom {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .coin-bounce {
            animation: bounce 1s infinite;
        }

        /* Smooth UI animations */
        .stat-card { transition: transform 220ms cubic-bezier(.2,.9,.2,1), opacity 220ms; }
        .menu-card { transform-origin: center; transition: transform 300ms ease, opacity 300ms; }
        .primary-btn { transition: transform 160ms ease, box-shadow 160ms ease; }
        input { transition: box-shadow 160ms ease, transform 160ms ease; }
        .touch-btn { transition: transform 120ms ease, background 120ms ease; }
        #portal-overlay { transition: left 220ms linear, top 220ms linear, width 220ms linear, height 220ms linear, opacity 220ms; opacity: 0.9; }
        #gameCanvas { transition: filter 300ms ease; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .portal-pulse {
            animation: pulse 2s infinite;
        }
        .touch-btn {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            color: white;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.18s ease;
        }
        .touch-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.14); }
        #home-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(45, 27, 78, 0.8) 0%, rgba(26, 26, 26, 0.9) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .menu-card {
            background: rgba(0,0,0,0.5);
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            text-align: center;
            max-width: 420px;
            width: 92%;
            transition: transform 220ms ease, opacity 220ms;
        }
        .primary-btn {
            background: linear-gradient(180deg,#5561f7,#4650ff);
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms;
            display: block;
            width: 100%;
            margin-top: 10px;
            border: none;
            box-shadow: 0 6px 18px rgba(20,28,80,0.16);
            pointer-events: auto;
        }
        .primary-btn:hover { transform: translateY(-4px); opacity: 0.98; }
        input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 10px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin-bottom: 10px;
            transition: box-shadow 140ms ease, transform 140ms ease;
        }
        input:focus {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
        }
        #debug-log {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #9ef0a6;
            font-family: monospace;
            font-size: 10px;
            padding: 6px 8px;
            border-radius: 10px;
            pointer-events: none;
            z-index: 200;
            opacity: 0.9;
        }
    </style>
</head>

                    const parts = [cpu, mem, gpu].filter(Boolean);

                } else {
                    log('Firebase init failed — running in online mode without server.');
                    return;

            }
            
            // Attempt to initialize the alternate project (so both projects can be used simultaneously in test mode)
            try {

                    if (_usingBackup && firebaseConfig) {
                        try {
                            const primaryApp = initializeApp(firebaseConfig, 'gimkit0');
                            dbGimkit0 = getFirestore(primaryApp);
                        } catch (e) { /* ignore */ }
                    } else if (!_usingBackup && firebaseBackupConfig) {

                        } catch (e) { /* ignore */ }

                }

            onAuthStateChanged(auth, u => {

                            // Fall back to anonymous sign-in immediately if custom token fails
                            await signInAnonymously(auth);
                        }
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    log('Auth attempt ' + attempts + ' failed: ' + (e && e.message ? e.message : e));
                    if (attempts < maxAttempts) {
                        setTimeout(tryAuth, 2000 * attempts);
                    } else {
                        log('Authentication failed after multiple attempts — but connected anyway.');
                        const el = document.getElementById('loading-text'); if (el) el.innerText = "Server Status: Connected";
                        // Keep db/auth to allow joining
                    }
                }
            };

            tryAuth();
        };

// Network status handling: if offline, run purely local; when online, try reconnecting services
window.addEventListener('offline', () => {
    log('Network: offline');
    const el = document.getElementById('loading-text'); if (el) el.innerText = "Server Status: Offline";
    disableMultiplayer('offline');
});

window.addEventListener('online', () => {
    log('Network: online — attempting reconnect');
    const el = document.getElementById('loading-text'); if (el) el.innerText = "Server Status: Reconnecting...";
    // Re-init Firebase and WS when we come back online
    try { initFirebase(); } catch(e) { console.error('initFirebase on online error', e); }
    try { connectWS(); } catch(e) { console.error('connectWS on online error', e); }
});

// --- Minimal WebSocket client (prefers WS over Firestore for frequent heartbeats)
let wsSocket = null;
let wsConnected = false;
let firestoreSetupDone = false;
let wsConnectTimer = null;
let wsReconnectAttempts = 0;
// Server status tracking
const serverStatus = {
    ws: { online: false, load: 0 },
    gimkit0: { online: false, load: 0 },
    gimkit01: { online: false, load: 0 }
};

function renderServerStatusUI() {
    const container = document.getElementById('server-status');
    if (!container) return;
    container.innerHTML = '';
    const makeItem = (key, label) => {
        const s = serverStatus[key];
        const el = document.createElement('div');
        el.style.padding = '6px 10px';
        el.style.borderRadius = '8px';
        el.style.background = s.online ? 'rgba(16,185,129,0.12)' : 'rgba(220,38,38,0.08)';
        el.style.color = s.online ? '#10b981' : '#dc2626';
        el.style.fontSize = '12px';
        el.style.border = '1px solid ' + (s.online ? 'rgba(16,185,129,0.2)' : 'rgba(220,38,38,0.12)');
        el.innerText = `${label}: ${s.online ? 'online' : 'offline'}${(typeof s.load === 'number' && s.load > 0) ? ' ('+s.load+')' : ''}`;
        return el;
    };
    container.appendChild(makeItem('ws', 'WS'));
    container.appendChild(makeItem('gimkit0', 'gimkit0'));
    container.appendChild(makeItem('gimkit01', 'gimkit01'));
}
function connectWS() {
    // choose secure ws scheme when page is loaded over https
    const proto = (window.location.protocol === 'https:') ? 'wss://' : 'ws://';
    const defaultServer = proto + '165.173.23.252:2343';
    const url = (typeof __multiplayer_server !== 'undefined' && __multiplayer_server) ? __multiplayer_server : defaultServer;
    if (!url) return;
    try { if (wsSocket) { wsSocket.onclose = null; wsSocket.close(); } } catch(e){}
    wsSocket = new WebSocket(url);

    // If WS doesn't open quickly, fall back to Firestore (if available)
    if (wsConnectTimer) clearTimeout(wsConnectTimer);
    wsConnectTimer = setTimeout(() => {
        if (!wsSocket || wsSocket.readyState !== 1) {
            console.warn('WS: server not available; falling back to Firestore');
            if (db && !firestoreSetupDone) setupMultiplayer();
        }
    }, 1500);

    wsSocket.onopen = () => {
        wsConnected = true;
        wsReconnectAttempts = 0;
        if (wsConnectTimer) { clearTimeout(wsConnectTimer); wsConnectTimer = null; }
        log('WS: connected');
        serverStatus.ws.online = true; serverStatus.ws.metrics = null; currentServerLabel = 'ws'; updateUserAgentBox(); renderServerStatusUI();
        try { wsSocket.send(JSON.stringify({ type: 'join', lobby: activeLobby, id: player.id, x: Math.round(player.x), y: Math.round(player.y), ts: Date.now() })); } catch(e){}
    };
    wsSocket.onmessage = (evt) => {
        try {
                const data = JSON.parse(evt.data);
                if (data && data.type === 'snapshot' && data.lobbies) {
                const players = data.lobbies[activeLobby] || [];
                serverStatus.ws.load = Array.isArray(players) ? players.length : 0;
                if (data.server) serverStatus.ws.metrics = data.server;
                renderServerStatusUI();
                // show metrics in user-agent box too
                updateUserAgentBox();
            }
            if (data && data.type === 'snapshot' && data.lobbies) {
                const players = data.lobbies[activeLobby];
                if (Array.isArray(players)) {
                    players.forEach(([pid, p]) => {
                        if (pid === player.id) return;
                        const existing = otherPlayers[pid];
                        if (existing) {
                            existing.targetX = (p && typeof p.x === 'number') ? p.x : existing.targetX;
                            existing.targetY = (p && typeof p.y === 'number') ? p.y : existing.targetY;
                            existing.color = (p && p.color) || existing.color;
                            existing.name = (p && p.name) || existing.name;
                            existing.level = (p && p.level) || existing.level;
                            existing.ts = (p && p.ts) || existing.ts;
                        } else {
                            otherPlayers[pid] = {
                                renderX: (p && p.x) || 0,
                                renderY: (p && p.y) || 0,
                                targetX: (p && p.x) || 0,
                                targetY: (p && p.y) || 0,
                                color: (p && p.color) || '#fff',
                                name: (p && p.name) || ('player-' + pid.slice(0,6)),
                                level: (p && p.level) || 1,
                                ts: (p && p.ts) || Date.now()
                            };
                        }
                    });
                }
            }
            else if (data && data.type === 'kicked') {
                try { log('Server: kicked ' + (data.target || '')); } catch(e){}
            }
            else if (data && data.type === 'reset') {
                try {
                    const rl = data.lobby;
                    const newLevel = data.level || 1;
                    if (!rl || rl === activeLobby) {
                        lobbyLevel = newLevel;
                        generateLevel(lobbyLevel);
                        log('Server reset: set level ' + lobbyLevel);
                    }
                } catch(e) {}
            }
        } catch (e) { /* ignore parse errors */ }
    };
    wsSocket.onclose = () => {
        wsConnected = false;
        log('WS: disconnected');
        wsSocket = null;
        serverStatus.ws.online = false; serverStatus.ws.load = 0; renderServerStatusUI();
        wsReconnectAttempts++;
        if (wsReconnectAttempts <= 3) {
            setTimeout(connectWS, 500 * wsReconnectAttempts);
        } else {
            if (db && !firestoreSetupDone) setupMultiplayer();
        }
    };
    wsSocket.onerror = (e) => { console.error('WS error', e); };
}

        const GRAVITY = 0.45;
        const JUMP_FORCE = -14; // stronger upward impulse (more negative => higher jump)
        const DOUBLE_JUMP_FORCE = -13; // stronger double-jump
        // camera smoothing (0.0 = instant, 1.0 = locked)
        const CAMERA_LERP = 0.12;
        // player corner radius for rounded rendering
        const PLAYER_RADIUS = 8;

        window.enterGame = () => {
            const input = document.getElementById('lobby-code').value.trim();
            if (input) activeLobby = input.toLowerCase();
            // If user typed 'test' — show server selection overlay and do not enter the game yet
            if (input === 'test') {
                showServerSelectOverlay();
                return;
            }
            inMenu = false;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('user-agent-box').style.display = 'block';
            if ("ontouchstart" in window) {
                document.getElementById('touch-ui').style.display = 'flex';
                const b = document.getElementById('btn-fly-noclip'); if (b) b.style.display = 'flex';
            }
            document.getElementById('connection-status').innerText = "Lobby: " + activeLobby.toUpperCase();
            if (db) setupMultiplayer(); else generateLevel(1);
        };

            function joinTestMode() {
                // Show server selection overlay — do not join game automatically
                showServerSelectOverlay();
            }

        function setupMultiplayer() {
            if (typeof firestoreSetupDone !== 'undefined' && firestoreSetupDone) return;
            firestoreSetupDone = true;
                    // Path following mandatory Rule 1
            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby);

            onSnapshot(lobbyRef, (s) => {
                if (s.exists()) {
                    const d = s.data();
                    if (d.level !== lobbyLevel) {
                        lobbyLevel = d.level;
                        generateLevel(lobbyLevel);
                    }
                } else {
                    setDoc(lobbyRef, { level: 1 }).catch(e => log("Lobby Init Failed: " + e.code));
                }
            }, (err) => log("Lobby Snapshot Error: " + err.code));

            const pCol = collection(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby, 'players');
            onSnapshot(pCol, (s) => {
                s.docChanges().forEach(c => {
                    if (c.doc.id === player.id) return;
                    if (c.type === "removed") {
                        delete otherPlayers[c.doc.id];
                    } else {
                        const d = c.doc.data();
                        const existing = otherPlayers[c.doc.id];
                        if (existing) {
                            existing.targetX = d.x || existing.targetX;
                            existing.targetY = d.y || existing.targetY;
                            existing.color = d.color || existing.color;
                            existing.name = d.name || existing.name;
                            existing.level = d.level || existing.level;
                            existing.ts = d.ts || existing.ts;
                        } else {
                            otherPlayers[c.doc.id] = {
                                renderX: d.x || 0,
                                renderY: d.y || 0,
                                targetX: d.x || 0,
                                targetY: d.y || 0,
                                color: d.color || '#fff',
                                name: d.name || ('player-' + c.doc.id.substring(0,6)),
                                level: d.level || 1,
                                ts: d.ts || Date.now()
                            };
                        }
                    }
                });
            }, (err) => log("Player Sync Error: " + (err && err.code ? err.code : err)));

            // Heartbeat is started separately by startHeartbeat(); this keeps setup idempotent
            startHeartbeat();
        }

        // Attach listeners for a specific Firestore instance and merge players into the shared `otherPlayers`
        function setupFirestoreListeners(dbInstance, label) {
            if (!dbInstance) return;
            try {
                const lobbyRefLocal = doc(dbInstance, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby);
                onSnapshot(lobbyRefLocal, (s) => {
                    if (s.exists()) {
                        const d = s.data();
                        if (d.level !== lobbyLevel) {
                            lobbyLevel = d.level;
                            generateLevel(lobbyLevel);
                        }
                    } else {
                        setDoc(lobbyRefLocal, { level: 1 }).catch(e => log("Lobby Init Failed: " + e.code));
                    }
                }, (err) => log(label + " Lobby Snapshot Error: " + (err && err.code ? err.code : err)));

                const pColLocal = collection(dbInstance, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby, 'players');
                onSnapshot(pColLocal, (s) => {
                    s.docChanges().forEach(c => {
                        if (c.doc.id === player.id) return;
                        if (c.type === "removed") {
                            delete otherPlayers[c.doc.id];
                        } else {
                            const d = c.doc.data();
                            const existing = otherPlayers[c.doc.id];
                            if (existing) {
                                existing.targetX = d.x || existing.targetX;
                                existing.targetY = d.y || existing.targetY;
                                existing.color = d.color || existing.color;
                                existing.level = d.level || existing.level;
                                existing.ts = d.ts || existing.ts;
                            } else {
                                otherPlayers[c.doc.id] = {
                                    renderX: d.x || 0,
                                    renderY: d.y || 0,
                                    targetX: d.x || 0,
                                    targetY: d.y || 0,
                                    color: d.color || '#fff',
                                    level: d.level || 1,
                                    ts: d.ts || Date.now()
                                };
                            }
                        }
                    });
                }, (err) => log(label + " Player Sync Error: " + (err && err.code ? err.code : err)));
            } catch(e) { console.error('setupFirestoreListeners error', e); }
        }

        function setupMultiServerTest() {
            // ensure we connect WS and attach Firestore listeners to both projects (if present)
            try { connectWS(); } catch(e){}
            if (dbGimkit0) setupFirestoreListeners(dbGimkit0, 'gimkit0');
            if (dbGimkit01) setupFirestoreListeners(dbGimkit01, 'gimkit01');
            // also attach regular setupMultiplayer for compatibility (it will short-circuit if already done)
            if (db && !firestoreSetupDone) setupMultiplayer();
            firestoreSetupDone = true;
            updateUserAgentBox();
        }

        // Heartbeat timer handle
        let heartbeatTimer = null;

        // Start the heartbeat loop (idempotent)
        function startHeartbeat() {
            if (heartbeatTimer) return;
            let lastUpdate = { x: 0, y: 0, level: 1 };
            try { connectWS(); } catch(e){}
            heartbeatTimer = setInterval(async () => {
                if (inMenu) return;
                const currentX = Math.round(player.x);
                const currentY = Math.round(player.y);
                if (Math.abs(currentX - lastUpdate.x) < 5 && Math.abs(currentY - lastUpdate.y) < 5 && lobbyLevel === lastUpdate.level) return;

                // If WS available, send heartbeat over WS (much cheaper than Firestore)
                if (wsSocket && wsSocket.readyState === 1) {
                    try {
                        wsSocket.send(JSON.stringify({ type: 'heartbeat', lobby: activeLobby, id: player.id, name: player.name, x: currentX, y: currentY, ts: Date.now(), color: player.color, level: lobbyLevel, email: (user && user.email) ? user.email : undefined }));
                        lastUpdate = { x: currentX, y: currentY, level: lobbyLevel };
                        return;
                    } catch (e) { /* fall back to Firestore below */ }
                }

                // Fallback to Firestore when no WS
                const writeToFirestore = async (dbInstance) => {
                    if (!dbInstance) return;
                    try {
                        const ref = doc(dbInstance, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby, 'players', player.id);
                        await setDoc(ref, {
                            x: currentX,
                            y: currentY,
                            name: player.name,
                            color: player.color,
                            level: lobbyLevel,
                            ts: Date.now()
                        }, { merge: true });
                    } catch (e) { log("Heartbeat Error: " + (e && e.code ? e.code : e)); }
                };

                try {
                    if (testMode) {
                        await writeToFirestore(dbGimkit0);
                        await writeToFirestore(dbGimkit01);
                    } else {
                        if (db) await writeToFirestore(db);
                    }
                    lastUpdate = { x: currentX, y: currentY, level: lobbyLevel };
                } catch(e) { log("Heartbeat Error: " + (e && e.code ? e.code : e)); }
            }, 250);
        }

        // Remove the heartbeat loop if needed
        function stopHeartbeat() {
            if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
        }

        // Show a small overlay to let user pick which server to join for TEST
        function showServerSelectOverlay() {
            if (document.getElementById('server-select-overlay')) return;
            const overlay = document.createElement('div');
            overlay.id = 'server-select-overlay';
            overlay.style.position = 'fixed';

        function joinServer(server) {
            const overlay = document.getElementById('server-select-overlay');
            if (overlay) overlay.remove();
            if (server === 'gimkit0') {
                if (!dbGimkit0) { log('gimkit0 not available'); return; }
                db = dbGimkit0;
                firestoreSetupDone = false;
                currentServerLabel = 'gimkit0';
                updateUserAgentBox();
                inMenu = false;
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                document.getElementById('user-agent-box').style.display = 'block';
                if ("ontouchstart" in window) document.getElementById('touch-ui').style.display = 'flex';
                document.getElementById('connection-status').innerText = "Lobby: " + activeLobby.toUpperCase();
                setupMultiplayer();
            } else if (server === 'gimkit01') {
                if (!dbGimkit01) { log('gimkit01 not available'); return; }
                db = dbGimkit01;
                firestoreSetupDone = false;
                currentServerLabel = 'gimkit01';
                updateUserAgentBox();
                inMenu = false;
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                document.getElementById('user-agent-box').style.display = 'block';
                if ("ontouchstart" in window) document.getElementById('touch-ui').style.display = 'flex';
                document.getElementById('connection-status').innerText = "Lobby: " + activeLobby.toUpperCase();
                setupMultiplayer();
            } else if (server === 'ws') {
                testMode = false;
                currentServerLabel = 'ws';
                updateUserAgentBox();
                inMenu = false;
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                document.getElementById('user-agent-box').style.display = 'block';
                if ("ontouchstart" in window) document.getElementById('touch-ui').style.display = 'flex';
                document.getElementById('connection-status').innerText = "Lobby: " + activeLobby.toUpperCase();
                try { connectWS(); } catch(e){}
                startHeartbeat();
                generateLevel(1);
            }
        }

        function generateLevel(lvl) {
            const rng = new SeededRandom(lvl * 999);
            gameState.platforms = []; gameState.coins = [];
            const T = 64, W = 15;
            // make very tall levels less punishing for higher levels (especially level 3)
            let H = 20 + Math.max(0, (lvl - 1)) * 3; // slower growth
            // increase platform spawn probability for harder levels so they remain reachable
            const spawnProb = lvl >= 3 ? 0.35 : 0.45;
            for (let r = 0; r < H; r++) {
                // collect columns added for this row so we can guarantee at least one gap
                const addedCols = [];
                for (let c = 0; c < W; c++) {
                    if (c === 0 || c === W - 1 || r === H - 1) {
                        gameState.platforms.push({ x: c * T, y: r * T, w: T, h: T });
                    } else if (r < H - 2 && r % 3 === 0 && rng.next() > spawnProb) {
                        gameState.platforms.push({ x: c * T, y: r * T, w: T, h: T });
                        addedCols.push(c);
                        if (rng.next() > 0.7) gameState.coins.push({ x: c * T + 20, y: r * T - 40, collected: false });
                    }
                }
                // avoid creating a solid bar: if every interior column was filled, remove one column at center
                const interiorCount = W - 2;
                if (addedCols.length >= interiorCount) {
                    const center = Math.floor(W/2);
                    // remove platform at center column if present
                    for (let i = gameState.platforms.length - 1; i >= 0; i--) {
                        const p = gameState.platforms[i];
                        if (p.y === r * T && p.x === center * T) { gameState.platforms.splice(i,1); break; }
                    }
                }
            }
            gameState.portal = { x: (W/2) * T - 32, y: T * 2 };
            player.x = (W/2) * T; player.y = (H-2) * T; player.velX = player.velY = 0;
            document.getElementById('level-display').innerText = lvl;
        }

        const handleJump = () => {
            if (player.noclip && player.canFly) { player.velY = JUMP_FORCE; return; }
            if (player.onGround) { player.velY = JUMP_FORCE; player.jumpCount = 1; player.onGround = false; }
            else if (player.jumpCount < 2) { player.velY = DOUBLE_JUMP_FORCE; player.jumpCount++; }
        };

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' || e.code === 'ArrowUp') handleJump();
            if (e.code === 'KeyF') {
                // toggle both fly and noclip together
                player.canFly = !player.canFly;
                player.noclip = !player.noclip;
                const b = document.getElementById('btn-fly-noclip');
                if (b) b.style.background = (player.canFly && player.noclip) ? 'rgba(80,200,120,0.25)' : 'rgba(255,255,255,0.12)';
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        const touchBind = (id, key, act) => {
            const el = document.getElementById(id);
            if(!el) return;
            el.addEventListener('touchstart', e => { e.preventDefault(); if(act) act(); else touchState[key] = true; });
            el.addEventListener('touchend', e => { e.preventDefault(); touchState[key] = false; });
        };
        touchBind('btn-left', 'left'); touchBind('btn-right', 'right'); touchBind('btn-jump', null, handleJump);

        // Combined fly + noclip touch toggle button
        const flyNocBtn = document.createElement('div');
        flyNocBtn.id = 'btn-fly-noclip';
        flyNocBtn.className = 'touch-btn';
        flyNocBtn.style.position = 'absolute';
        flyNocBtn.style.bottom = '120px';
        flyNocBtn.style.right = '20px';
        flyNocBtn.style.width = '64px';
        flyNocBtn.style.height = '64px';
        flyNocBtn.style.fontSize = '12px';
        flyNocBtn.style.display = 'none';
        flyNocBtn.style.cursor = 'pointer';
        flyNocBtn.innerText = 'FL/NOC';
        const updateFlyNocBtn = () => {
            flyNocBtn.style.background = (player.canFly && player.noclip) ? 'rgba(80,200,120,0.25)' : 'rgba(255,255,255,0.12)';
        };
        const toggleFlyNoclip = () => {
            player.canFly = !player.canFly;
            player.noclip = !player.noclip;
            updateFlyNocBtn();
            log('Fly: ' + player.canFly + ' Noclip: ' + player.noclip);
        };
        flyNocBtn.addEventListener('touchstart', e => { e.preventDefault(); toggleFlyNoclip(); });
        document.body.appendChild(flyNocBtn);
        updateFlyNocBtn();

        function update() {
            if (inMenu) return;
            if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) player.velX = Math.max(player.velX - 0.7, -6);
            else if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) player.velX = Math.min(player.velX + 0.7, 6);
            else {
                // stronger friction when on the ground; lighter air resistance when airborne
                if (player.onGround) player.velX *= 0.5; // high ground friction
                else player.velX *= 0.92; // mild air drag
            }

            player.velY += GRAVITY;
            player.x += player.velX; collide('h');
            player.y += player.velY; collide('v');

            gameState.coins.forEach(c => {
                if (!c.collected && Math.abs(player.x - c.x) < 32 && Math.abs(player.y - c.y) < 32) {
                    c.collected = true; gameState.balance += 10; document.getElementById('balance').innerText = gameState.balance;
                }
            });

            if (Math.hypot(player.x - gameState.portal.x, player.y - gameState.portal.y) < 50) {
                if (!db || !user) { lobbyLevel++; generateLevel(lobbyLevel); }
                else {
                    const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby);
                    updateDoc(lobbyRef, { level: lobbyLevel + 1 }).catch(()=>{});
                }
            }

            // smooth camera with slight lookahead based on player velocity
            const targetCamX = player.x - (canvas.width / (2 * gameState.zoom)) + (player.velX * 6);
            const targetCamY = player.y - (canvas.height / (2 * gameState.zoom)) + (player.velY * 2);
            gameState.camera.x += (targetCamX - gameState.camera.x) * CAMERA_LERP;
            gameState.camera.y += (targetCamY - gameState.camera.y) * CAMERA_LERP;
        }

        function collide(dir) {
            if (player.noclip) return; // ignore collisions when noclip enabled
            if (dir === 'v') player.onGround = false;
            gameState.platforms.forEach(p => {
                if (player.x < p.x+p.w && player.x+player.w > p.x && player.y < p.y+p.h && player.y+player.h > p.y) {
                    if (dir === 'h') { player.x = player.velX > 0 ? p.x-player.w : p.x+p.w; player.velX = 0; }
                    else { if (player.velY > 0) { player.y = p.y-player.h; player.onGround = true; } else player.y = p.y+p.h; player.velY = 0; }
                }
            });
        }

        function draw() {
            update(); ctx.fillStyle = '#14141a'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.scale(gameState.zoom, gameState.zoom); ctx.translate(-gameState.camera.x, -gameState.camera.y);
            ctx.fillStyle = '#7c4dff'; ctx.beginPath(); ctx.ellipse(gameState.portal.x+32, gameState.portal.y+32, 40, 50, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2c2c38'; gameState.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
            ctx.fillStyle = '#ffd700'; gameState.coins.forEach(c => { if(!c.collected) { ctx.beginPath(); ctx.arc(c.x+16, c.y+16, 10, 0, Math.PI*2); ctx.fill(); }});

            // helper: rounded rect
            function drawRoundedRect(ctx, x, y, w, h, r) {
                const radius = Math.min(r, w/2, h/2);
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.arcTo(x + w, y, x + w, y + h, radius);
                ctx.arcTo(x + w, y + h, x, y + h, radius);
                ctx.arcTo(x, y + h, x, y, radius);
                ctx.arcTo(x, y, x + w, y, radius);
                ctx.closePath();
                ctx.fill();
            }

            // Smoothly interpolate and draw other players
            const smoothing = 0.2;
            Object.values(otherPlayers).forEach(p => {
                if (p.level !== lobbyLevel) return;
                if (typeof p.renderX === 'undefined') {
                    // support legacy payloads
                    p.renderX = (p.x !== undefined) ? p.x : (p.targetX || 0);
                    p.renderY = (p.y !== undefined) ? p.y : (p.targetY || 0);
                    p.targetX = (p.x !== undefined) ? p.x : (p.targetX || p.renderX);
                    p.targetY = (p.y !== undefined) ? p.y : (p.targetY || p.renderY);
                }
                p.renderX += (p.targetX - p.renderX) * smoothing;
                p.renderY += (p.targetY - p.renderY) * smoothing;
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = p.color || '#fff';
                drawRoundedRect(ctx, p.renderX, p.renderY, 32, 32, 8);
                // draw eyes that look toward movement direction
                try {
                    const lx = (p.targetX - p.renderX);
                    const ly = (p.targetY - p.renderY);
                    let len = Math.hypot(lx, ly);
                    let nx = 0, ny = 0;
                    if (len > 0.001) { nx = lx / len; ny = ly / len; } else { nx = 1; ny = 0; }
                    const pupilMax = 3;
                    const ex1 = p.renderX + 8, ey1 = p.renderY + 9;
                    const ex2 = p.renderX + 24, ey2 = p.renderY + 9;
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(ex1, ey1, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(ex1 + nx * pupilMax, ey1 + ny * (pupilMax*0.6), 1.6, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2 + nx * pupilMax, ey2 + ny * (pupilMax*0.6), 1.6, 0, Math.PI*2); ctx.fill();
                } catch(e) {}
                // draw player name above
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#fff';
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'center';
                const displayName = p.name || ('player-' + Math.random().toString(36).slice(2,6));
                ctx.fillText(displayName, p.renderX + 16, p.renderY - 8);
            });

            // Draw local player with a subtle bob when airborne
            ctx.globalAlpha = 1;
            ctx.save();
            const bob = player.onGround ? 0 : Math.sin(Date.now()/120) * 2;
            ctx.translate(0, bob);
            ctx.fillStyle = player.color;
            drawRoundedRect(ctx, player.x, player.y, player.w, player.h, PLAYER_RADIUS);
            // eyes for local player (look toward velocity)
            try {
                const lvx = player.velX || 0, lvy = player.velY || 0;
                let llen = Math.hypot(lvx, lvy);
                let lnx = 0, lny = 0;
                if (llen > 0.001) { lnx = lvx / llen; lny = lvy / llen; } else { lnx = 1; lny = 0; }
                const pMax = 3;
                const lx1 = player.x + 8, ly1 = player.y + 9;
                const lx2 = player.x + 24, ly2 = player.y + 9;
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(lx1, ly1, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lx2, ly2, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(lx1 + lnx * pMax, ly1 + lny * (pMax*0.6), 1.6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lx2 + lnx * pMax, ly2 + lny * (pMax*0.6), 1.6, 0, Math.PI*2); ctx.fill();
            } catch(e) {}
                // draw local player's name
                ctx.fillStyle = '#fff';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(player.name || 'You', player.x + (player.w/2), player.y - 8);
            ctx.restore();
            ctx.restore();

            // Position portal overlay
            if (!inMenu) {
                const portalOverlay = document.getElementById('portal-overlay');
                portalOverlay.style.left = ((gameState.portal.x - gameState.camera.x) * gameState.zoom) + 'px';
                portalOverlay.style.top = ((gameState.portal.y - gameState.camera.y) * gameState.zoom) + 'px';
                portalOverlay.style.width = (64 * gameState.zoom) + 'px';
                portalOverlay.style.height = (64 * gameState.zoom) + 'px';
                portalOverlay.style.display = 'block';
            } else {
                document.getElementById('portal-overlay').style.display = 'none';
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // Set user agent
        updateUserAgentBox();
        document.getElementById('user-agent-box').addEventListener('click', () => {
            gameState.zoom = gameState.zoom === 1 ? 0.5 : 1;
        });

        // Hook up Google sign-in and delete account buttons
        document.getElementById('google-signin').addEventListener('click', async () => {
            if (!auth) {
                log('Auth not initialized yet');
                return;
            }
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                user = result.user;
                player.id = user.uid;
                log('Signed in: ' + (user.email || user.uid));
                // special admin: grant noclip and fly
                if (user.email === 'gregbloxd@gmail.com') {
                    player.noclip = true;
                    player.canFly = true;
                    log('Admin mode enabled: noclip & fly');
                }
                currentServerLabel = currentServerLabel || 'auth'; updateUserAgentBox();
            } catch (e) {
                console.error('Google sign-in failed', e);
                log('Google sign-in failed');
            }
        });

        document.getElementById('delete-account').addEventListener('click', async () => {
            if (!confirm('Delete account and reset progress? This will remove your player data.')) return;
            // remove player docs from any available Firestore projects
            const removePlayerFrom = async (dbInstance) => {
                if (!dbInstance) return;
                try {
                    const ref = doc(dbInstance, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby, 'players', player.id);
                    await deleteDoc(ref);
                } catch (e) { /* ignore */ }
            };
            try {
                await removePlayerFrom(db);
                await removePlayerFrom(dbGimkit0);
                await removePlayerFrom(dbGimkit01);
            } catch(e) {}

            // reset local progress
            gameState.balance = 0; document.getElementById('balance').innerText = 0;
            lobbyLevel = 1; generateLevel(1);

            // attempt to delete Firebase auth user if available
            try {
                if (auth && auth.currentUser) {
                    await deleteUser(auth.currentUser);
                }
            } catch (e) {
                // likely requires recent login; sign out instead
                try { if (auth) await signOut(auth); } catch(e){}
            }

            // regenerate a local id
            player.id = 'local-' + Date.now();
            log('Account deleted / reset locally');
        });

        // set username button
        document.getElementById('set-username').addEventListener('click', () => {
            const v = document.getElementById('username-input').value.trim();
            if (!v) return;
            player.name = v.slice(0,20);
            log('Name set: ' + player.name);
            updateUserAgentBox();
        });

        // Priority: try WS first; if WS doesn't connect quickly, initialize Firebase (gimkit0/gimkit01)
        try { connectWS(); } catch(e){}
        // wait briefly for WS to connect; otherwise init Firebase
        setTimeout(() => {
            if (!wsConnected) {
                initFirebase();
            } else {
                // WS connected; still attach status listeners for Firestore if available
                initFirebase();
            }
        }, 1200);
        generateLevel(1);
        // after firebase init resolves, attach status listeners (they will no-op if DBs not present)
        setTimeout(() => { setupStatusListeners(); renderServerStatusUI(); }, 1800);
        requestAnimationFrame(draw);
    </script>
</body>
</html>
