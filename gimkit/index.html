<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Tower Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            transform: translateX(-100%);
            animation: slideInLeft 0.5s ease-out forwards;
        }
        @keyframes slideInLeft {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        .touch-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            pointer-events: none;
            z-index: 50;
            transform: translateY(100%);
            animation: slideInBottom 0.5s ease-out forwards;
        }
        @keyframes slideInBottom {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .coin-bounce {
            animation: bounce 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .portal-pulse {
            animation: pulse 2s infinite;
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            color: white;
            font-weight: bold;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }
        #home-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(45, 27, 78, 0.8) 0%, rgba(26, 26, 26, 0.9) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .menu-card {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 32px;
            border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }
        .primary-btn {
            background: #3d5afe;
            color: white;
            padding: 12px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            margin-top: 10px;
            border: none;
        }
        .primary-btn:hover {
            background: #536dfe;
            transform: translateY(-2px);
        }
        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 16px;
            color: white;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
        }
        #debug-log {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            border-radius: 12px;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div id="debug-log">System: Initializing...</div>

    <div id="home-screen">
        <div class="menu-card">
            <h1 class="text-5xl font-black mb-2 tracking-tighter italic text-blue-400">SYNC TOWER</h1>
            <p class="opacity-50 mb-8" id="loading-text">Server Status: Authenticating...</p>
            
            <button id="join-btn" class="primary-btn text-lg" onclick="enterGame()">JOIN GLOBAL LOBBY</button>
            
            <div class="mt-8 border-t border-white/10 pt-6">
                <p class="text-xs opacity-40 mb-2">JOIN SPECIFIC SERVER</p>
                <input type="text" id="lobby-code" placeholder="Enter Code (e.g. 123456)" maxlength="10">
            </div>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div>
            <div class="stat-card">
                <div class="w-6 h-6 bg-green-500 rounded-full"></div>
                <div class="text-2xl font-bold">Balance: <span id="balance">0</span></div>
            </div>
            <div class="stat-card">
                <div class="w-6 h-6 bg-blue-500 rounded-full"></div>
                <div class="text-lg">Level: <span id="level-display">1</span></div>
            </div>
            <div id="connection-status" class="text-xs opacity-50 mt-1">Lobby: global</div>
        </div>
    </div>

    <div id="user-agent-box" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px; color: white; font-size: 10px; cursor: pointer; backdrop-filter: blur(4px); display: none; z-index: 100;"></div>

    <div class="touch-controls hidden" id="touch-ui">
        <div class="flex gap-4">
            <div class="touch-btn" id="btn-left">←</div>
            <div class="touch-btn" id="btn-right">→</div>
        </div>
        <div class="touch-btn" id="btn-jump">JUMP</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="portal-overlay" style="position: absolute; pointer-events: none; z-index: 20;"></div>

    <script>
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyCyZymZUXSf-5JKT30sVX5DoAUgU6QlieY",
            authDomain: "gimkit1.firebaseapp.com",
            projectId: "gimkit1",
            storageBucket: "gimkit1.firebasestorage.app",
            messagingSenderId: "552582099200",
            appId: "1:552582099200:web:c1d44b8028e662c88403e5"
        });
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        class SeededRandom {
            constructor(seed) { this.seed = seed; }
            next() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }
        }

        const log = (msg) => { document.getElementById('debug-log').innerText = "System: " + msg; };

        let db, auth, user;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gimkit-tower-v2';
        let activeLobby = "global";
        let lobbyLevel = 1;
        let inMenu = true;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;

        const initFirebase = async () => {
            if (!firebaseConfig) {
                log('No Firebase config provided — running in online mode.');
                const el = document.getElementById('loading-text'); if (el) el.innerText = "Server Status: Online";
                return;
            }

            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, u => {
                if (u) {
                    user = u;
                    player.id = u.uid;
                    const el = document.getElementById('loading-text'); if (el) el.innerText = "Server Status: Connected";
                    log("Connected as " + u.uid);
                }
            });

            let attempts = 0;
            const maxAttempts = 6;

            const tryAuth = async () => {
                attempts++;
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } catch (customErr) {
                            log('Custom token auth failed: ' + (customErr && customErr.message ? customErr.message : customErr));
                            // Fall back to anonymous sign-in immediately if custom token fails
                            await signInAnonymously(auth);
                        }
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    log('Auth attempt ' + attempts + ' failed: ' + (e && e.message ? e.message : e));
                    if (attempts < maxAttempts) {
                        setTimeout(tryAuth, 2000 * attempts);
                    } else {
                        log('Authentication failed after multiple attempts — but connected anyway.');
                        const el = document.getElementById('loading-text'); if (el) el.innerText = "Server Status: Connected";
                        // Keep db/auth to allow joining
                    }
                }
            };

            tryAuth();
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const player = { id: 'local-' + Date.now(), x: 0, y: 0, w: 32, h: 32, velX: 0, velY: 0, color: `hsl(${Math.random() * 360}, 70%, 60%)`, onGround: false, jumpCount: 0 };
        const otherPlayers = {};
        const gameState = { camera: { x: 0, y: 0 }, platforms: [], coins: [], portal: { x: 0, y: 0 }, balance: 0, zoom: 1 };
        const keys = {};
        const touchState = { left: false, right: false };

        const GRAVITY = 0.45;
        const JUMP_FORCE = -11;
        const DOUBLE_JUMP_FORCE = -10;

        window.enterGame = () => {
            const input = document.getElementById('lobby-code').value.trim();
            if (input) activeLobby = input.toLowerCase();
            inMenu = false;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('user-agent-box').style.display = 'block';
            if ("ontouchstart" in window) document.getElementById('touch-ui').style.display = 'flex';
            document.getElementById('connection-status').innerText = "Lobby: " + activeLobby.toUpperCase();
            if (db) setupMultiplayer(); else generateLevel(1);
        };

        function setupMultiplayer() {
            // Path following mandatory Rule 1
            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby);

            onSnapshot(lobbyRef, (s) => {
                if (s.exists()) {
                    const d = s.data();
                    if (d.level !== lobbyLevel) {
                        lobbyLevel = d.level;
                        generateLevel(lobbyLevel);
                    }
                } else {
                    setDoc(lobbyRef, { level: 1 }).catch(e => log("Lobby Init Failed: " + e.code));
                }
            }, (err) => log("Lobby Snapshot Error: " + err.code));

            const pCol = collection(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby, 'players');
            onSnapshot(pCol, (s) => {
                s.docChanges().forEach(c => {
                    if (c.doc.id !== player.id) {
                        if (c.type === "removed") delete otherPlayers[c.doc.id];
                        else otherPlayers[c.doc.id] = c.doc.data();
                    }
                });
            }, (err) => log("Player Sync Error: " + err.code));

            // Heartbeat update - reduced frequency to avoid quota limits
            let lastUpdate = { x: 0, y: 0, level: 1 };
            setInterval(async () => {
                if (inMenu) return;
                // Only update if position changed significantly or level changed
                const currentX = Math.round(player.x);
                const currentY = Math.round(player.y);
                if (Math.abs(currentX - lastUpdate.x) < 5 && Math.abs(currentY - lastUpdate.y) < 5 && lobbyLevel === lastUpdate.level) return;

                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby, 'players', player.id);
                try {
                    await setDoc(ref, {
                        x: currentX,
                        y: currentY,
                        color: player.color,
                        level: lobbyLevel,
                        ts: Date.now()
                    }, { merge: true });
                    lastUpdate = { x: currentX, y: currentY, level: lobbyLevel };
                } catch(e) { log("Heartbeat Error: " + e.code); }
            }, 500);
        }

        function generateLevel(lvl) {
            const rng = new SeededRandom(lvl * 999);
            gameState.platforms = []; gameState.coins = [];
            const T = 64, W = 15, H = 20 + (lvl * 5);
            for (let r = 0; r < H; r++) {
                for (let c = 0; c < W; c++) {
                    if (c === 0 || c === W - 1 || r === H - 1) gameState.platforms.push({ x: c * T, y: r * T, w: T, h: T });
                    else if (r < H - 2 && r % 3 === 0 && rng.next() > 0.45) {
                        gameState.platforms.push({ x: c * T, y: r * T, w: T, h: T });
                        if (rng.next() > 0.7) gameState.coins.push({ x: c * T + 20, y: r * T - 40, collected: false });
                    }
                }
            }
            gameState.portal = { x: (W/2) * T - 32, y: T * 2 };
            player.x = (W/2) * T; player.y = (H-2) * T; player.velX = player.velY = 0;
            document.getElementById('level-display').innerText = lvl;
        }

        const handleJump = () => {
            if (player.onGround) { player.velY = JUMP_FORCE; player.jumpCount = 1; player.onGround = false; }
            else if (player.jumpCount < 2) { player.velY = DOUBLE_JUMP_FORCE; player.jumpCount++; }
        };

        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space' || e.code === 'ArrowUp') handleJump(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        const touchBind = (id, key, act) => {
            const el = document.getElementById(id);
            if(!el) return;
            el.addEventListener('touchstart', e => { e.preventDefault(); if(act) act(); else touchState[key] = true; });
            el.addEventListener('touchend', e => { e.preventDefault(); touchState[key] = false; });
        };
        touchBind('btn-left', 'left'); touchBind('btn-right', 'right'); touchBind('btn-jump', null, handleJump);

        function update() {
            if (inMenu) return;
            if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) player.velX = Math.max(player.velX - 0.7, -6);
            else if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) player.velX = Math.min(player.velX + 0.7, 6);
            else player.velX *= 0.85;

            player.velY += GRAVITY;
            player.x += player.velX; collide('h');
            player.y += player.velY; collide('v');

            gameState.coins.forEach(c => {
                if (!c.collected && Math.abs(player.x - c.x) < 32 && Math.abs(player.y - c.y) < 32) {
                    c.collected = true; gameState.balance += 10; document.getElementById('balance').innerText = gameState.balance;
                }
            });

            if (Math.hypot(player.x - gameState.portal.x, player.y - gameState.portal.y) < 50) {
                if (!db || !user) { lobbyLevel++; generateLevel(lobbyLevel); }
                else {
                    const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', activeLobby);
                    updateDoc(lobbyRef, { level: lobbyLevel + 1 }).catch(()=>{});
                }
            }

            gameState.camera.x += (player.x - (canvas.width/(2*gameState.zoom)) - gameState.camera.x) * 1;
            gameState.camera.y += (player.y - (canvas.height/(2*gameState.zoom)) - gameState.camera.y) * 1;
        }

        function collide(dir) {
            if (dir === 'v') player.onGround = false;
            gameState.platforms.forEach(p => {
                if (player.x < p.x+p.w && player.x+player.w > p.x && player.y < p.y+p.h && player.y+player.h > p.y) {
                    if (dir === 'h') { player.x = player.velX > 0 ? p.x-player.w : p.x+p.w; player.velX = 0; }
                    else { if (player.velY > 0) { player.y = p.y-player.h; player.onGround = true; } else player.y = p.y+p.h; player.velY = 0; }
                }
            });
        }

        function draw() {
            update(); ctx.fillStyle = '#14141a'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.scale(gameState.zoom, gameState.zoom); ctx.translate(-gameState.camera.x, -gameState.camera.y);
            ctx.fillStyle = '#7c4dff'; ctx.beginPath(); ctx.ellipse(gameState.portal.x+32, gameState.portal.y+32, 40, 50, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2c2c38'; gameState.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
            ctx.fillStyle = '#ffd700'; gameState.coins.forEach(c => { if(!c.collected) { ctx.beginPath(); ctx.arc(c.x+16, c.y+16, 10, 0, Math.PI*2); ctx.fill(); }});
            Object.values(otherPlayers).forEach(p => { if(p.level === lobbyLevel) { ctx.globalAlpha = 0.5; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 32, 32); }});
            ctx.globalAlpha = 1; ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.restore();

            // Position portal overlay
            if (!inMenu) {
                const portalOverlay = document.getElementById('portal-overlay');
                portalOverlay.style.left = ((gameState.portal.x - gameState.camera.x) * gameState.zoom) + 'px';
                portalOverlay.style.top = ((gameState.portal.y - gameState.camera.y) * gameState.zoom) + 'px';
                portalOverlay.style.width = (64 * gameState.zoom) + 'px';
                portalOverlay.style.height = (64 * gameState.zoom) + 'px';
                portalOverlay.style.display = 'block';
            } else {
                document.getElementById('portal-overlay').style.display = 'none';
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // Set user agent
        document.getElementById('user-agent-box').innerText = navigator.userAgent;
        document.getElementById('user-agent-box').addEventListener('click', () => {
            gameState.zoom = gameState.zoom === 1 ? 0.5 : 1;
        });

        initFirebase();
        generateLevel(1);
        requestAnimationFrame(draw);
    </script>
</body>
</html>
