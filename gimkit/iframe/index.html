<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gimkit (iframe)</title>
  <style>
    html,body{height:100%;margin:0;background:#000}
    .frame{position:fixed;inset:0;width:100%;height:100%;border:0}
    .fallback{position:fixed;left:12px;top:12px;z-index:999;color:#fff;background:rgba(0,0,0,0.5);padding:8px 10px;border-radius:8px;font-family:sans-serif}
    .open-btn{background:#2d89ff;color:#fff;padding:6px 10px;border-radius:6px;border:none;cursor:pointer}
  </style>
</head>
<body>
  <div class="fallback">
    If it fails to load, <a href="https://notgreg.space/gimkit/iframe.html" style="color:#9fe">reload</a>.
  </div>
  <iframe id="gimkit-frame" class="frame" src="https://notgreg.space/gimkit" allow="fullscreen; geolocation; microphone; camera; autoplay; clipboard-write"></iframe>
</body>
</html>
