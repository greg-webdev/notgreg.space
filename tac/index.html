<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 95 Style Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
      background: radial-gradient(circle at top, #224970, #1b2d4b 55%, #101a31);
      color: #eef4ff;
    }

    .launcher {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .panel {
      width: min(92vw, 480px);
      border: 2px solid #dde6ff;
      background: rgba(10, 18, 41, 0.9);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0.03em;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.45;
      color: #ced6ff;
    }

    button {
      font: inherit;
      font-weight: 700;
      border: 2px solid #f3f6ff;
      background: #2d63e6;
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
    }

    button:hover {
      background: #4374ef;
    }

    .error {
      margin-top: 12px;
      color: #ffb3b3;
    }
  </style>
</head>
<body>
  <main class="launcher">
    <section class="panel">
      <h1>Open Custom Windows Mock</h1>
      <p>Click to open an about:blank page styled like a classic Windows desktop.</p>
      <button id="launchBtn" type="button">Launch about:blank Windows Mock</button>
      <div id="error" class="error" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const launchBtn = document.getElementById("launchBtn");
    const errorEl = document.getElementById("error");

    launchBtn.addEventListener("click", () => {
      const win = window.open("about:blank", "_blank");

      if (!win) {
        errorEl.textContent = "Popup was blocked. Allow popups and try again.";
        return;
      }

      const bootHtml = "<!DOCTYPE html>" +
        "<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>" +
        "<title>Windows Mock</title><style>" +
        "html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'MS Sans Serif',Tahoma,sans-serif;cursor:default;}" +
        "#desktop{position:fixed;inset:0;background:#58a7a7;}" +
        "#icons{position:absolute;top:16px;left:12px;display:flex;flex-direction:column;gap:18px;}" +
        ".icon{width:90px;text-align:center;color:#fff;text-shadow:1px 1px 0 #3a6262;font-size:16px;line-height:1.1;}" +
        ".iconGlyph{width:42px;height:34px;margin:0 auto 7px;border:2px solid #d6d6d6;border-right-color:#555;border-bottom-color:#555;background:linear-gradient(145deg,#f5f5f5,#9fa7ab);box-sizing:border-box;}" +
        "#taskbar{position:absolute;left:0;right:0;bottom:0;height:42px;background:#b7bbc1;border-top:2px solid #f3f3f3;display:flex;align-items:center;padding:0 4px;box-sizing:border-box;}" +
        "#startBtn{height:34px;padding:0 10px;border:2px solid #fff;border-right-color:#545454;border-bottom-color:#545454;background:#c0c0c0;color:#000;font-size:34px;font-weight:700;line-height:1;display:flex;align-items:center;gap:8px;}" +
        "#flag{width:18px;height:14px;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);border:1px solid #222;}" +
        "#flag span:nth-child(1){background:#e31d1d;}#flag span:nth-child(2){background:#30d92a;}#flag span:nth-child(3){background:#1d67ff;}#flag span:nth-child(4){background:#f4da00;}" +
        "#menu{position:absolute;left:0;bottom:42px;width:260px;height:380px;background:#babec4;border:2px solid #fff;border-right-color:#555;border-bottom-color:#555;display:flex;}" +
        "#menuStrip{width:34px;background:#8f9399;color:#dfdfdf;display:flex;align-items:flex-end;justify-content:center;font-size:40px;font-weight:700;padding-bottom:10px;writing-mode:vertical-rl;transform:rotate(180deg);}" +
        "#menuMain{flex:1;padding:10px 10px 6px;}" +
        ".menuItem{height:44px;display:flex;align-items:center;font-size:38px;color:#0a0a0a;padding:0 6px;}" +
        ".menuItem .arrow{margin-left:auto;font-size:30px;}" +
        ".menuIcon{width:28px;height:22px;margin-right:12px;border:2px solid #d8d8d8;border-right-color:#666;border-bottom-color:#666;background:#f2f2f2;}" +
        "#menuDivider{height:2px;background:#9da1a8;border-top:1px solid #e8e8e8;margin:6px 0;}" +
        "#clock{margin-left:auto;height:30px;display:flex;align-items:center;padding:0 10px;border:2px solid #8f8f8f;border-top-color:#f1f1f1;border-left-color:#f1f1f1;background:#c7c9cd;font-size:30px;}" +
        "@media (max-width:760px){.menuItem{font-size:28px;}#menu{height:330px;width:220px;}#menuStrip{font-size:30px;}#startBtn{font-size:28px;}#clock{font-size:24px;}}" +
        "</style></head><body>" +
        "<section id='desktop'>" +
        "<div id='icons'>" +
        "<div class='icon'><div class='iconGlyph'></div>My Computer</div>" +
        "<div class='icon'><div class='iconGlyph'></div>Inbox</div>" +
        "<div class='icon'><div class='iconGlyph'></div>Recycle Bin</div>" +
        "</div>" +
        "<div id='menu'>" +
        "<div id='menuStrip'>Windows 95</div>" +
        "<div id='menuMain'>" +
        "<div class='menuItem'><div class='menuIcon'></div>Programs<div class='arrow'>▶</div></div>" +
        "<div class='menuItem'><div class='menuIcon'></div>Documents<div class='arrow'>▶</div></div>" +
        "<div class='menuItem'><div class='menuIcon'></div>Settings<div class='arrow'>▶</div></div>" +
        "<div class='menuItem'><div class='menuIcon'></div>Find<div class='arrow'>▶</div></div>" +
        "<div class='menuItem'><div class='menuIcon'></div>Help</div>" +
        "<div class='menuItem'><div class='menuIcon'></div>Run...</div>" +
        "<div id='menuDivider'></div>" +
        "<div class='menuItem'><div class='menuIcon'></div>Shut Down...</div>" +
        "</div></div>" +
        "<div id='taskbar'><div id='startBtn'><div id='flag'><span></span><span></span><span></span><span></span></div>Start</div><div id='clock'>4:55 PM</div></div>" +
        "</section>" +
        "<script>" +
        "const clock = document.getElementById('clock');" +
        "function pad(v){ return String(v).padStart(2,'0'); }" +
        "function renderClock(){" +
        "const d = new Date();" +
        "let h = d.getHours();" +
        "const m = pad(d.getMinutes());" +
        "const ap = h >= 12 ? 'PM' : 'AM';" +
        "h = h % 12 || 12;" +
        "clock.textContent = h + ':' + m + ' ' + ap;" +
        "}" +
        "renderClock();" +
        "setInterval(renderClock, 1000);" +
        "<\/script></body></html>";

      win.document.open();
      win.document.write(bootHtml);
      win.document.close();
      errorEl.textContent = "";
    });
  </script>
</body>
</html>
