<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows Browser Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
      background: radial-gradient(circle at top, #224970, #1b2d4b 55%, #101a31);
      color: #eef4ff;
    }

    .launcher {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .panel {
      width: min(92vw, 480px);
      border: 2px solid #dde6ff;
      background: rgba(10, 18, 41, 0.9);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0.03em;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.45;
      color: #ced6ff;
    }

    button {
      font: inherit;
      font-weight: 700;
      border: 2px solid #f3f6ff;
      background: #2d63e6;
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
    }

    button:hover {
      background: #4374ef;
    }

    .error {
      margin-top: 12px;
      color: #ffb3b3;
    }
  </style>
</head>
<body>
  <main class="launcher">
    <section class="panel">
      <h1>Open Retro Browser Mock</h1>
      <p>Click to open an about:blank desktop with a classic browser on a vintage Google-style page.</p>
      <button id="launchBtn" type="button">Launch about:blank Browser</button>
      <div id="error" class="error" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const launchBtn = document.getElementById("launchBtn");
    const errorEl = document.getElementById("error");

    launchBtn.addEventListener("click", () => {
      const win = window.open("about:blank", "_blank");

      if (!win) {
        errorEl.textContent = "Popup was blocked. Allow popups and try again.";
        return;
      }

      const retroGoogleHtml = "<!DOCTYPE html><html><head><meta charset='UTF-8'><style>" +
        "html,body{margin:0;padding:0;background:#e6e6e6;font-family:'Times New Roman',Times,serif;}" +
        "#page{max-width:760px;margin:18px auto 0;text-align:center;color:#000;}" +
        "#logo{font-size:98px;line-height:0.9;font-weight:700;letter-spacing:-3px;text-shadow:2px 2px 4px rgba(0,0,0,0.3);}" +
        "#logo .g1{color:#1f57cc;}#logo .o1{color:#d62015;}#logo .o2{color:#efbf00;}#logo .g2{color:#1f57cc;}#logo .l{color:#35a334;}#logo .e{color:#d62015;}" +
        "#beta{display:block;font-size:48px;letter-spacing:6px;color:#666;margin-top:-8px;}" +
        "#tag{font-size:42px;margin:28px 0 10px;}" +
        "#search{width:min(90%,460px);height:42px;border:4px solid #e5c57a;box-sizing:border-box;font-size:26px;padding:0 8px;background:#fff;}" +
        "#buttons{margin-top:8px;}" +
        "button{font-size:24px;border:none;background:transparent;padding:6px 14px;cursor:pointer;}" +
        "#more{display:block;margin:24px 0 0;font-size:38px;color:#0a2c9c;}" +
        "#copy{margin-top:24px;font-size:34px;}" +
        "@media (max-width:900px){#logo{font-size:64px;}#beta{font-size:30px;}#tag{font-size:28px;}#search{height:34px;font-size:20px;}button{font-size:18px;}#more{font-size:24px;}#copy{font-size:22px;}}" +
        "</style></head><body><div id='page'>" +
        "<div id='logo'><span class='g1'>G</span><span class='o1'>o</span><span class='o2'>o</span><span class='g2'>g</span><span class='l'>l</span><span class='e'>e</span>!<span id='beta'>BETA</span></div>" +
        "<div id='tag'>Search the web using Google</div>" +
        "<input id='search' type='text'/>" +
        "<div id='buttons'><button id='searchBtn' type='button'>Google Search</button><button id='luckyBtn' type='button'>I'm feeling lucky</button></div>" +
        "<a id='more' href='https://www.google.com/' target='_blank' rel='noopener noreferrer'>More Google!</a>" +
        "<div id='copy'>Copyright &copy;1999 Google Inc.</div>" +
        "</div><script>" +
        "const q=document.getElementById('search');" +
        "document.getElementById('searchBtn').addEventListener('click',()=>{window.open('https://www.google.com/search?q='+encodeURIComponent(q.value),'_blank');});" +
        "document.getElementById('luckyBtn').addEventListener('click',()=>{window.open('https://www.google.com/','_blank');});" +
        "q.addEventListener('keydown',(e)=>{if(e.key==='Enter'){window.open('https://www.google.com/search?q='+encodeURIComponent(q.value),'_blank');}});" +
        "<\/script></body></html>";

      const bootHtml = "<!DOCTYPE html>" +
        "<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>" +
        "<title>Windows Browser Mock</title><style>" +
        "html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'MS Sans Serif',Tahoma,sans-serif;cursor:default;}" +
        "#desktop{position:fixed;inset:0;background:#58a7a7;}" +
        "#browser{position:absolute;left:140px;top:50px;width:min(76vw,920px);height:min(76vh,620px);background:#c0c0c0;border:2px solid #fff;border-right-color:#555;border-bottom-color:#555;display:flex;flex-direction:column;}" +
        "#titlebar{height:34px;background:linear-gradient(90deg,#1a479f,#3b67c8);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-size:20px;font-weight:700;}" +
        "#winBtns{display:flex;gap:4px;}" +
        ".wbtn{width:18px;height:16px;background:#c0c0c0;border:1px solid #fff;border-right-color:#444;border-bottom-color:#444;}" +
        "#toolbar{display:flex;align-items:center;gap:8px;padding:6px;background:#d4d4d4;border-top:2px solid #fff;border-bottom:2px solid #8f8f8f;font-size:18px;}" +
        "#toolbar button{height:28px;padding:0 10px;border:2px solid #fff;border-right-color:#555;border-bottom-color:#555;background:#c0c0c0;font-size:15px;}" +
        "#addr{flex:1;height:28px;border:2px inset #bbb;padding:0 8px;font-size:15px;}" +
        "#viewport{flex:1;border-top:2px solid #fff;background:#fff;}" +
        "#viewport iframe{width:100%;height:100%;border:none;}" +
        "#taskbar{position:absolute;left:0;right:0;bottom:0;height:40px;background:#b7bbc1;border-top:2px solid #f3f3f3;display:flex;align-items:center;padding:0 4px;box-sizing:border-box;}" +
        "#startBtn{height:31px;padding:0 10px;border:2px solid #fff;border-right-color:#545454;border-bottom-color:#545454;background:#c0c0c0;color:#000;font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;}" +
        "#flag{width:16px;height:12px;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);border:1px solid #222;}" +
        "#flag span:nth-child(1){background:#e31d1d;}#flag span:nth-child(2){background:#30d92a;}#flag span:nth-child(3){background:#1d67ff;}#flag span:nth-child(4){background:#f4da00;}" +
        "#clock{margin-left:auto;height:28px;display:flex;align-items:center;padding:0 10px;border:2px solid #8f8f8f;border-top-color:#f1f1f1;border-left-color:#f1f1f1;background:#c7c9cd;font-size:15px;}" +
        "@media (max-width:900px){#browser{left:2vw;top:2vh;width:96vw;height:80vh;}#toolbar{font-size:14px;}#toolbar button{font-size:12px;}}" +
        "</style></head><body>" +
        "<section id='desktop'>" +
        "<div id='browser'>" +
        "<div id='titlebar'><span>Internet Browser</span><div id='winBtns'><div class='wbtn'></div><div class='wbtn'></div><div class='wbtn'></div></div></div>" +
        "<div id='toolbar'><button type='button' disabled>Back</button><button type='button' disabled>Forward</button><input id='addr' type='text' value='https://www.google.com/'/><button id='goBtn' type='button'>Go</button></div>" +
        "<div id='viewport'><iframe id='pageFrame' title='Browser content'></iframe></div>" +
        "</div>" +
        "<div id='taskbar'><div id='startBtn'><div id='flag'><span></span><span></span><span></span><span></span></div>Start</div><div id='clock'>4:55 PM</div></div>" +
        "</section>" +
        "<script>" +
        "const pageFrame=document.getElementById('pageFrame');" +
        "const addr=document.getElementById('addr');" +
        "const goBtn=document.getElementById('goBtn');" +
        "const clock=document.getElementById('clock');" +
        "const retroHtml=" + JSON.stringify(retroGoogleHtml) + ";" +
        "pageFrame.srcdoc=retroHtml;" +
        "function navigate(){" +
        "const value=addr.value.trim();" +
        "if(!value){pageFrame.srcdoc=retroHtml;return;}" +
        "if(value.toLowerCase().includes('google')){pageFrame.srcdoc=retroHtml;return;}" +
        "let target=value;" +
        "if(!/^https?:\\/\\//i.test(target)){target='https://'+target;}" +
        "pageFrame.removeAttribute('srcdoc');" +
        "pageFrame.src=target;" +
        "}" +
        "goBtn.addEventListener('click',navigate);" +
        "addr.addEventListener('keydown',(e)=>{if(e.key==='Enter'){navigate();}});" +
        "function pad(v){return String(v).padStart(2,'0');}" +
        "function renderClock(){const d=new Date();let h=d.getHours();const m=pad(d.getMinutes());const ap=h>=12?'PM':'AM';h=h%12||12;clock.textContent=h+':' + m + ' ' + ap;}" +
        "renderClock();" +
        "setInterval(renderClock,1000);" +
        "<\/script></body></html>";

      win.document.open();
      win.document.write(bootHtml);
      win.document.close();
      errorEl.textContent = "";
    });
  </script>
</body>
</html>
