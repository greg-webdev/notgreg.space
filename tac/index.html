<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>macOS Style Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "SF Pro Text", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 30% 12%, #3d6198, #1a2b4b 48%, #0f172a 100%);
      color: #eff6ff;
    }

    .launcher {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .panel {
      width: min(92vw, 480px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: linear-gradient(145deg, rgba(14, 29, 54, 0.68), rgba(13, 24, 43, 0.56));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(6px);
      padding: 24px;
      border-radius: 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.45;
      color: #d5e2ff;
    }

    button {
      font: inherit;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: linear-gradient(180deg, #6ba3ff, #4d7ef3);
      color: #fff;
      padding: 11px 18px;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(26, 66, 155, 0.5);
    }

    button:hover {
      background: linear-gradient(180deg, #7cb0ff, #5a89f5);
    }

    .error {
      margin-top: 12px;
      color: #ffb3b3;
    }
  </style>
</head>
<body>
  <main class="launcher">
    <section class="panel">
      <h1>Open macOS Mock</h1>
      <p>Click to open an about:blank page styled like modern macOS with a Safari-like browser.</p>
      <button id="launchBtn" type="button">Launch about:blank macOS</button>
      <div id="error" class="error" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const launchBtn = document.getElementById("launchBtn");
    const errorEl = document.getElementById("error");

    launchBtn.addEventListener("click", () => {
      const win = window.open("about:blank", "_blank");

      if (!win) {
        errorEl.textContent = "Popup was blocked. Allow popups and try again.";
        return;
      }

    });

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        window.open(chip.dataset.url, "_blank");
      });
    });
  <\/script>

      <div id="viewport">
        <iframe id="frame" title="Browser content"></iframe>
      </div>
    </section>

    <div id="dock-wrap">
      <div id="dock">
        <div><div class="dock-icon" style="background: linear-gradient(145deg, #5eb4ff, #2c7ff2);"></div><div class="dot"></div></div>
        <div><div class="dock-icon" style="background: linear-gradient(145deg, #ffb56c, #ff7c5b);"></div><div class="dot"></div></div>
        <div><div class="dock-icon" style="background: linear-gradient(145deg, #8bf5af, #45c58a);"></div><div class="dot"></div></div>
        <div><div class="dock-icon" style="background: linear-gradient(145deg, #d7b1ff, #9e84ff);"></div><div class="dot"></div></div>

  <script>
    const frame = document.getElementById("frame");
    const addr = document.getElementById("addr");
    const go = document.getElementById("go");
    const windowTitle = document.getElementById("window-title");
    const clock = document.getElementById("clock");
    const startPage = "__START_PAGE_PAYLOAD__";

    function setStartPage() {
      frame.srcdoc = startPage;
      windowTitle.textContent = "Start Page";
      addr.value = "startpage://home";
    }

    function navigate() {
      const value = addr.value.trim();
      if (!value || value === "startpage://home") {
        setStartPage();
        return;
      }

      let target = value;
      if (!/^https?:\/\//i.test(target)) {
        target = "https://" + target;
      }

      frame.removeAttribute("srcdoc");
      frame.src = target;
      windowTitle.textContent = target;
    }

    go.addEventListener("click", navigate);
    addr.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        navigate();
      }
    });

    function pad(v) {
      return String(v).padStart(2, "0");
    }

    function renderClock() {
      const d = new Date();
      let h = d.getHours();
      const m = pad(d.getMinutes());
      const ap = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      clock.textContent = h + ":" + m + " " + ap;
    }

    setStartPage();
    renderClock();
    setInterval(renderClock, 1000);
  <\/script>
</body>
