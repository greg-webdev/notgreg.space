<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open they are coming in about:blank</title>
  <style>
    :root {
      --bg-a: #081018;
      --bg-b: #122033;
      --panel: #111a28;
      --panel-border: #2a3f59;
      --text: #e8f1fb;
      --muted: #9db2c9;
      --action: #19c37d;
      --action-hover: #17ad6f;
      --danger: #ffb4b4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 20% 0%, var(--bg-b), var(--bg-a) 58%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .panel {
      width: min(680px, 100%);
      padding: 24px;
      border-radius: 14px;
      background: linear-gradient(180deg, #15243a 0%, var(--panel) 100%);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 2.3vw, 1.8rem);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.5;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      background: var(--action);
      color: #042212;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 150ms ease;
    }

    button:hover {
      background: var(--action-hover);
    }

    button:focus-visible {
      outline: 3px solid #73ffd2;
      outline-offset: 2px;
    }

    #status {
      margin-top: 14px;
      min-height: 1.2em;
      color: var(--danger);
      font-size: 0.95rem;
    }

    code {
      color: #b0fff5;
      background: rgba(255, 255, 255, 0.06);
      padding: 1px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>they are coming in about:blank</h1>
    <p>Open they are coming inside a clean <code>about:blank</code> tab.</p>
    <div class="actions">
      <button id="openBtn" type="button">Open in about:blank</button>
    </div>
    <div id="status" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      const openBtn = document.getElementById("openBtn");
      const status = document.getElementById("status");
      const targetUrl = "https://script.google.com/macros/s/AKfycbzFgyO_45-IB8xSm3aznm-U6NwkuCxr8guuZuCUNwr9kbyHXBGJFRRyNqKHNOwuHwGn/exec";

      openBtn.addEventListener("click", function () {
        const win = window.open("about:blank", "_blank");
        if (!win) {
          status.textContent = "Popup blocked. Allow popups and try again.";
          return;
        }

        const escapedUrl = targetUrl
          .replace(/&/g, "&amp;")
          .replace(/\"/g, "&quot;");

        win.document.open();
        win.document.write("<!DOCTYPE html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>TAC</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;}iframe{border:0;width:100%;height:100%;}</style></head><body><iframe referrerpolicy=\"no-referrer\" allow=\"fullscreen\" src=\"" + escapedUrl + "\"></iframe></body></html>");
        win.document.close();

        status.style.color = "#9cffd6";
        status.textContent = "Opened TAC in about:blank.";
      });
    })();
  </script>
</body>
</html>
