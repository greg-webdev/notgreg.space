<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r/pixelplace2</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent: #00ff41;
            --border: #444;
            --text: #ffffff;
        }

        body { 
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #side-panel {
            width: 320px;
            background: var(--panel-bg);
            border-right: 4px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        h2 { font-size: 14px; color: var(--accent); margin-bottom: 20px; text-align: center; }

        .control-group { margin-bottom: 25px; }
        .label { font-size: 8px; margin-bottom: 10px; display: block; color: #888; }

        #colorPicker {
            width: 100%;
            height: 50px;
            border: 3px solid var(--border);
            background: none;
            cursor: pointer;
        }

        #chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 3px solid var(--border);
            background: #000;
            padding: 10px;
            overflow: hidden;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 8px;
            line-height: 1.5;
            margin-bottom: 10px;
            scrollbar-width: thin;
        }

        .msg { margin-bottom: 8px; word-break: break-all; }
        .msg-user { color: var(--accent); }

        #chat-input {
            background: #222;
            border: 2px solid var(--border);
            color: #fff;
            padding: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            outline: none;
        }

        #viewport {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #000;
            cursor: crosshair;
        }
        
        #viewport.grabbing { cursor: grabbing; }

        #canvas-container {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        canvas {
            background: #fff;
            image-rendering: pixelated;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: block;
        }

        #status-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            font-size: 8px;
            border: 2px solid var(--border);
            pointer-events: none;
        }

        #coords { color: var(--accent); }

        #pixel-outline {
            position: absolute;
            width: 1px;
            height: 1px;
            background: rgba(0, 255, 65, 0.3);
            border: 1px solid var(--accent);
            pointer-events: none;
            display: none;
            z-index: 5;
            box-sizing: border-box;
        }

        #uploadBtn {
            width: 100%;
            padding: 8px;
            background: #1e5194;
            border: 2px solid var(--border);
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #uploadBtn:hover {
            background: #2a6bb8;
        }

        #uploadModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #uploadModal.active {
            display: flex;
        }

        #modalContent {
            background: var(--panel-bg);
            border: 3px solid var(--accent);
            padding: 20px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-section {
            margin-bottom: 15px;
        }

        .modal-label {
            font-size: 8px;
            color: #888;
            margin-bottom: 8px;
            display: block;
        }

        #qualitySlider {
            width: 100%;
            margin-bottom: 5px;
        }

        #qualityValue {
            font-size: 8px;
            color: var(--accent);
            display: block;
            margin-bottom: 10px;
        }

        #previewContainer {
            background: #000;
            border: 2px solid var(--border);
            padding: 10px;
            text-align: center;
            margin-bottom: 10px;
            max-height: 300px;
            overflow: auto;
        }

        #pixelatedPreview {
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 280px;
            border: 1px solid var(--border);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 8px;
            background: var(--accent);
            border: 2px solid var(--border);
            color: var(--bg-dark);
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            cursor: pointer;
        }

        .modal-buttons button:hover {
            opacity: 0.8;
        }
    </style>

</head>
<body>

    <div id="side-panel">
        <h2>PIXELPLACE2</h2>
        
        <div class="control-group">
            <button id="uploadBtn">UPLOAD IMAGE</button>
        </div>

        <div class="control-group">
            <span class="label">COLOR SELECTION</span>
            <input type="color" id="colorPicker" value="#00ff41">
        </div>

        <div class="control-group">
            <span class="label">WORLD CHAT</span>
            <div id="chat-container">
                <div id="chat-messages"></div>
                <input type="text" id="chat-input" placeholder="TYPE MSG..." maxlength="50">
            </div>
        </div>

        <div style="font-size: 6px; margin-top: 15px; color: #666; line-height: 1.6;">
            CLICK TO PLACE<br>SPACE+DRAG TO PAINT<br>DRAG TO MOVE<br>SCROLL TO ZOOM
        </div>
    </div>

    <div id="uploadModal">
        <div id="modalContent">
            <div class="modal-title">PIXELATE IMAGE</div>
            
            <div class="modal-section">
                <span class="modal-label">QUALITY (pixel size)</span>
                <input type="range" id="qualitySlider" min="1" max="50" value="10">
                <span id="qualityValue">10 pixels</span>
            </div>

            <div class="modal-section">
                <span class="modal-label">PREVIEW</span>
                <div id="previewContainer">
                    <canvas id="pixelatedPreview" width="300" height="300"></canvas>
                </div>
            </div>

            <div class="modal-buttons">
                <button onclick="confirmImagePlacement()">PLACE</button>
                <button onclick="cancelUpload()">CANCEL</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">

    <div id="viewport">
        <div id="pixel-outline"></div>
        <div id="canvas-container">
            <canvas id="pixelCanvas" width="2000" height="2000"></canvas>
        </div>
        <div id="status-bar">
            STATUS: <span id="status">INIT...</span><br>
            POS: <span id="coords">0,0</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCC0xW-iSvy64UNZrfkJbvyehYv5bBm5rY",
            authDomain: "canvas-amigos.firebaseapp.com",
            projectId: "canvas-amigos",
            storageBucket: "canvas-amigos.firebasestorage.app",
            messagingSenderId: "133627763894",
            appId: "1:133627763894:web:3e246f2765761613145a17",
            databaseURL: "https://canvas-amigos-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.getElementById('viewport');
        const container = document.getElementById('canvas-container');
        const status = document.getElementById('status');
        const coordsDisplay = document.getElementById('coords');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const pixelOutline = document.getElementById('pixel-outline');

        const CANVAS_SIZE = 2000;
        let currentUser = null;
        let isSpacebarPressed = false;
        let placedPixels = new Set();
        let imageToPlace = null;
        let imagePlacementMode = false;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C'))) {
                e.preventDefault();
                location.reload();
            }
        });

        const devtoolsCheck = setInterval(() => {
            const before = performance.now();
            debugger;
            const after = performance.now();
            if (after - before > 100) {
                clearInterval(devtoolsCheck);
                location.reload();
            }
        }, 1000);

        document.addEventListener('contextmenu', (e) => {
            const isBottomLeftCorner = e.clientX < 10 && e.clientY > window.innerHeight - 10;
            if (!isBottomLeftCorner) {
                e.preventDefault();
            }
        });

        signInAnonymously(auth).catch((error) => {
            console.error("Auth failed:", error);
            status.innerText = "AUTH ERR";
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                status.innerText = "READY";
                status.style.color = "#00ff41";
            }
        });

        window.cc = () => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            set(ref(db, 'pixels'), {});
            console.log("Canvas cleared with white!");
        };

        let scale = 0.4;
        let originX = 0;
        let originY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let grabTimeout = null;

        function spamTheCanvasVroom() {
            container.style.transform = `translate(${originX}px, ${originY}px) scale(${scale})`;
        }

        window.onload = () => {
            const vRect = viewport.getBoundingClientRect();
            originX = (vRect.width - (CANVAS_SIZE * scale)) / 2;
            originY = (vRect.height - (CANVAS_SIZE * scale)) / 2;
            spamTheCanvasVroom();
        };

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const oldScale = scale;
            const delta = -e.deltaY * 0.01;
            scale = Math.min(Math.max(0.1, scale + delta), 250);

            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            originX = mouseX - (mouseX - originX) * (scale / oldScale);
            originY = mouseY - (mouseY - originY) * (scale / oldScale);
            
            spamTheCanvasVroom();
        }, { passive: false });

        viewport.addEventListener('mousedown', (e) => {
            if (e.button === 0 || e.button === 2) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                
                grabTimeout = setTimeout(() => {
                    if (isDragging) {
                        viewport.classList.add('grabbing');
                    }
                }, 100);
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                originX += dx;
                originY += dy;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                spamTheCanvasVroom();
            }

            const rect = canvas.getBoundingClientRect();
            if (rect.width > 0) {
                const x = Math.floor((e.clientX - rect.left) * (CANVAS_SIZE / rect.width));
                const y = Math.floor((e.clientY - rect.top) * (CANVAS_SIZE / rect.height));
                if (x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
                    coordsDisplay.innerText = `${x},${y}`;
                    const viewportRect = viewport.getBoundingClientRect();
                    const pixelSize = rect.width / CANVAS_SIZE;
                    const outlineX = (rect.left - viewportRect.left) + (x / CANVAS_SIZE) * rect.width;
                    const outlineY = (rect.top - viewportRect.top) + (y / CANVAS_SIZE) * rect.height;
                    pixelOutline.style.width = pixelSize + 'px';
                    pixelOutline.style.height = pixelSize + 'px';
                    pixelOutline.style.left = outlineX + 'px';
                    pixelOutline.style.top = outlineY + 'px';
                    pixelOutline.style.display = 'block';
                    
                    if (isSpacebarPressed && !isDragging && currentUser) {
                        const pixelKey = `${x}_${y}`;
                        if (!placedPixels.has(pixelKey)) {
                            placedPixels.add(pixelKey);
                            const color = document.getElementById('colorPicker').value;
                            set(ref(db, `pixels/${x}_${y}`), { x, y, color })
                            .catch(err => console.error("Write error:", err));
                        }
                    }
                } else {
                    pixelOutline.style.display = 'none';
                }
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            if (grabTimeout) clearTimeout(grabTimeout);
            viewport.classList.remove('grabbing');
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isSpacebarPressed = true;
                placedPixels.clear();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isSpacebarPressed = false;
                placedPixels.clear();
            }
        });

        let uploadedImageData = null;

        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });

        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    uploadedImageData = img;
                    document.getElementById('uploadModal').classList.add('active');
                    updatePixelatedPreview();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('qualitySlider').addEventListener('input', (e) => {
            const quality = parseInt(e.target.value);
            document.getElementById('qualityValue').innerText = quality + ' pixels';
            updatePixelatedPreview();
        });

        function updatePixelatedPreview() {
            if (!uploadedImageData) return;
            const quality = parseInt(document.getElementById('qualitySlider').value);
            const previewCanvas = document.getElementById('pixelatedPreview');
            const previewCtx = previewCanvas.getContext('2d');
            
            const aspectRatio = uploadedImageData.width / uploadedImageData.height;
            let previewWidth = 300;
            let previewHeight = 300 / aspectRatio;
            if (previewHeight > 300) {
                previewHeight = 300;
                previewWidth = 300 * aspectRatio;
            }

            previewCanvas.width = previewWidth;
            previewCanvas.height = previewHeight;

            const pixelWidth = previewWidth / quality;
            const pixelHeight = previewHeight / quality;

            previewCtx.drawImage(uploadedImageData, 0, 0, previewWidth, previewHeight);

            const imageData = previewCtx.getImageData(0, 0, previewWidth, previewHeight);
            const data = imageData.data;

            for (let y = 0; y < pixelHeight; y++) {
                for (let x = 0; x < pixelWidth; x++) {
                    const pixelX = Math.floor(x * quality);
                    const pixelY = Math.floor(y * quality);
                    const index = (pixelY * previewWidth + pixelX) * 4;

                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];

                    for (let py = 0; py < quality && pixelY + py < previewHeight; py++) {
                        for (let px = 0; px < quality && pixelX + px < previewWidth; px++) {
                            const pixelIndex = ((pixelY + py) * previewWidth + (pixelX + px)) * 4;
                            data[pixelIndex] = r;
                            data[pixelIndex + 1] = g;
                            data[pixelIndex + 2] = b;
                        }
                    }
                }
            }

            previewCtx.putImageData(imageData, 0, 0);
        }

        window.confirmImagePlacement = () => {
            if (!uploadedImageData || !currentUser) return;

            const quality = parseInt(document.getElementById('qualitySlider').value);
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');

            tempCanvas.width = uploadedImageData.width / quality;
            tempCanvas.height = uploadedImageData.height / quality;

            tempCtx.drawImage(uploadedImageData, 0, 0, tempCanvas.width, tempCanvas.height);
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;

            imageToPlace = [];

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');

                const pixelIndex = i / 4;
                const px = pixelIndex % tempCanvas.width;
                const py = Math.floor(pixelIndex / tempCanvas.width);

                imageToPlace.push({ x: px, y: py, color: hex });
            }

            document.getElementById('uploadModal').classList.remove('active');
            uploadedImageData = null;
            document.getElementById('imageInput').value = '';
            imagePlacementMode = true;
            status.innerText = "CLICK TO PLACE";
            status.style.color = "#00ff41";
        };

        window.cancelUpload = () => {
            document.getElementById('uploadModal').classList.remove('active');
            uploadedImageData = null;
            document.getElementById('imageInput').value = '';
        };

        canvas.addEventListener('click', (e) => {
            if (!currentUser) return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) * (CANVAS_SIZE / rect.width));
            const y = Math.floor((e.clientY - rect.top) * (CANVAS_SIZE / rect.height));

            if (x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
                if (imagePlacementMode && imageToPlace) {
                    imageToPlace.forEach(pixel => {
                        const placeX = x + pixel.x;
                        const placeY = y + pixel.y;
                        if (placeX >= 0 && placeX < CANVAS_SIZE && placeY >= 0 && placeY < CANVAS_SIZE) {
                            set(ref(db, `pixels/${placeX}_${placeY}`), { x: placeX, y: placeY, color: pixel.color })
                            .catch(err => console.error(err));
                        }
                    });
                    imagePlacementMode = false;
                    imageToPlace = null;
                    status.innerText = "IMAGE PLACED";
                    status.style.color = "#00ff41";
                } else {
                    const color = document.getElementById('colorPicker').value;
                    set(ref(db, `pixels/${x}_${y}`), { x, y, color })
                    .then(() => {
                        status.innerText = "PLACED";
                        status.style.color = "#00ff41";
                    }).catch(err => {
                        console.error("Write error:", err);
                        status.innerText = "DENIED";
                        status.style.color = "#ff4444";
                    });
                }
            }
        });

        onChildAdded(ref(db, 'pixels'), (snap) => {
            const p = snap.val();
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 1, 1);
        });

        onChildChanged(ref(db, 'pixels'), (snap) => {
            const p = snap.val();
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 1, 1);
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && chatInput.value.trim() && currentUser) {
                const msg = chatInput.value.trim();
                push(ref(db, 'messages'), {
                    text: msg,
                    time: serverTimestamp(),
                    uid: currentUser.uid
                }).catch(err => console.error("Chat error:", err));
                chatInput.value = '';
            }
        });

        onChildAdded(ref(db, 'messages'), (snap) => {
            const m = snap.val();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="msg-user">USER:</span> ${m.text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    </script>
</body>
</html>
