<!DOCTYPE html>
<html>
<head>
  <!-- Set the viewport for proper mobile rendering -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worm?!</title>
  <style>
    /* Reset default margins and padding for the body and html */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Hide any potential scrollbars */
    }

    /* Style the iframe to fill the entire screen */
    iframe {
      display: block; /* Ensure the iframe is a block-level element */
      width: 100vw;   /* Set the width to 100% of the viewport width */
      height: 100vh;  /* Set the height to 100% of the viewport height */
      border: none;   /* Remove the default border for a seamless look */
    }
  </style>
</head>

  <!-- The iframe with the Staggering Beauty URL -->
