<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screencast</title>
  <link rel="icon" href="data:," />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .card {
      width: min(92vw, 340px);
      padding: 16px;
      border: 1px solid #ccc;
      background: #fff;
      display: grid;
      gap: 10px;
    }

    .preview-wrap {
      margin-top: 6px;
      border: 1px solid #ddd;
      background: #fafafa;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      object-fit: cover;
      display: none;
    }

    #previewHint {
      font-size: 12px;
      color: #444;
      min-height: 1.2em;
    }

    input,
    button {
      font: inherit;
      padding: 8px;
    }

    #status {
      min-height: 1.2em;
      font-size: 14px;
    }

    #authInfo {
      position: fixed;
      left: 8px;
      bottom: 8px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="off" />
    <button id="loginBtn" type="button">Sign In</button>
    <div id="status"></div>
    <div class="preview-wrap">
      <video id="localPreview" class="preview" autoplay muted playsinline></video>
      <img id="remotePreview" class="preview" alt="Camera stream preview" />
      <div id="previewHint">No preview yet.</div>
    </div>
  </div>
  <div id="authInfo">auth: pending</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { initializeFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const usernameInput = document.getElementById("username");
    const loginBtn = document.getElementById("loginBtn");
    const status = document.getElementById("status");
    const authInfo = document.getElementById("authInfo");
    const localPreview = document.getElementById("localPreview");
    const remotePreview = document.getElementById("remotePreview");
    const previewHint = document.getElementById("previewHint");

    const firebaseConfig = {
      apiKey: "AIzaSyC3qwHrum16Q5uKufb9l-ak6YGGDawSKAY",
      authDomain: "screencast-adc0c.firebaseapp.com",
      projectId: "screencast-adc0c",
      storageBucket: "screencast-adc0c.firebasestorage.app",
      messagingSenderId: "453140207401",
      appId: "1:453140207401:web:78453853d2958b05c7c938"
    };

    let firebaseApp = null;
    let firebaseAuth = null;
    let firestoreDb = null;
    let frameDocRef = null;
    let authPromise = null;
    let stream = null;
    let captureTimer = null;
    let captureInFlight = false;
    let unsubscribeFrame = null;
    const captureCanvas = document.createElement("canvas");
    const captureCtx = captureCanvas.getContext("2d");

    function ensureFirebase() {
      if (!firebaseApp) {
        firebaseApp = initializeApp(firebaseConfig);
      }
      return firebaseApp;
    }

    function ensureFirestore() {
      if (!firestoreDb) {
        const app = ensureFirebase();
        firestoreDb = initializeFirestore(app, {
          experimentalAutoDetectLongPolling: true,
          useFetchStreams: false
        });
        frameDocRef = doc(firestoreDb, "screencast", "liveFrame");
      }
      return firestoreDb;
    }

    function stopCaptureLoop() {
      if (captureTimer) {
        clearInterval(captureTimer);
        captureTimer = null;
      }
      captureInFlight = false;
    }

    function stopClientSubscription() {
      if (typeof unsubscribeFrame === "function") {
        unsubscribeFrame();
        unsubscribeFrame = null;
      }
    }

    function showLocalPreview() {
      localPreview.style.display = "block";
      remotePreview.style.display = "none";
    }

    function showRemotePreview() {
      localPreview.style.display = "none";
      remotePreview.style.display = "block";
    }

    function startCaptureLoop() {
      stopCaptureLoop();
      captureCanvas.width = 320;
      captureCanvas.height = 180;

      captureTimer = setInterval(async () => {
        if (!stream || !localPreview.srcObject || localPreview.readyState < 2 || captureInFlight) {
          return;
        }

        try {
          captureInFlight = true;
          captureCtx.drawImage(localPreview, 0, 0, captureCanvas.width, captureCanvas.height);
          const frameDataUrl = captureCanvas.toDataURL("image/jpeg", 0.65);
          await setDoc(frameDocRef, {
            frame: frameDataUrl,
            updatedAt: Date.now(),
            sender: "pc",
            senderUid: firebaseAuth && firebaseAuth.currentUser ? firebaseAuth.currentUser.uid : "anon"
          }, { merge: true });
        } catch (err) {
          status.textContent = "share write failed: " + (err && err.code ? err.code : "unknown");
        } finally {
          captureInFlight = false;
        }
      }, 500);
    }

    function startClientView() {
      stopClientSubscription();
      showRemotePreview();
      previewHint.textContent = "Waiting for pc frames...";

      unsubscribeFrame = onSnapshot(frameDocRef, (snap) => {
        const data = snap.data();
        if (!data || typeof data.frame !== "string" || !data.frame) {
          return;
        }
        remotePreview.src = data.frame;
        status.textContent = "viewing stream";
        previewHint.textContent = "Client view (updates every 0.5s)";
      }, () => {
        status.textContent = "stream read failed";
      });
    }

    function describeError(err) {
      if (!err) return "unknown";
      if (typeof err === "string") return err;
      if (err.code) return String(err.code);
      if (err.name && err.message) return String(err.name + ": " + err.message);
      if (err.message) return String(err.message);
      return "unknown";
    }

    async function ensureAnonymousAuth() {
      if (!authPromise) {
        const app = ensureFirebase();
        firebaseAuth = getAuth(app);
        authPromise = signInAnonymously(firebaseAuth);
      }

      const credential = await authPromise;
      const user = credential.user;
      authInfo.textContent = "auth: anonymous " + user.uid;
      return user;
    }

    async function signIn() {
      const name = (usernameInput.value || "").trim().toLowerCase();

      if (name !== "client" && name !== "pc") {
        status.textContent = "Only usernames client or pc are allowed.";
        return;
      }

      if (name === "client") {
        try {
          await ensureAnonymousAuth();
          ensureFirestore();
          stopCaptureLoop();
          startClientView();
          status.textContent = "signed in as client";
        } catch (err) {
          status.textContent = "client setup failed: " + describeError(err);
        }
        return;
      }

      try {
        await ensureAnonymousAuth();
        ensureFirestore();
      } catch (err) {
        status.textContent = "auth/firestore failed: " + describeError(err);
        previewHint.textContent = "Check Firebase Auth + Firestore setup/rules.";
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        status.textContent = "camera unavailable";
        previewHint.textContent = "Camera needs HTTPS or localhost.";
        return;
      }

      try {
        stopClientSubscription();
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        localPreview.srcObject = stream;
        await localPreview.play().catch(() => {});
        showLocalPreview();
        previewHint.textContent = "PC preview + sharing every 0.5s";
        startCaptureLoop();
        status.textContent = "sharing";
      } catch (err) {
        if (err && (err.name === "NotAllowedError" || err.name === "SecurityError")) {
          status.textContent = "camera permission denied";
          previewHint.textContent = "Allow camera permission in browser settings.";
        } else if (err && err.name === "NotFoundError") {
          status.textContent = "no camera device found";
          previewHint.textContent = "Connect a camera and retry.";
        } else {
          status.textContent = "camera failed: " + describeError(err);
          previewHint.textContent = "If using plain http/file, switch to https or localhost.";
        }
      }
    }

    loginBtn.addEventListener("click", signIn);
    usernameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        signIn();
      }
    });

    ensureAnonymousAuth().catch((err) => {
      authInfo.textContent = "auth: failed " + (err && err.message ? err.message : "unknown error");
    });

    window.addEventListener("beforeunload", () => {
      stopCaptureLoop();
      stopClientSubscription();
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
    });
  </script>
</body>
</html>
