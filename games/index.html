<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #222;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <button onclick="openBlankFullscreen()">Open Game</button>
    <script>
        function openBlankFullscreen() {
            const blankWindow = window.open('about:blank', '_blank');
            if (blankWindow) {
                blankWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <style>
                            * { margin: 0; padding: 0; box-sizing: border-box; }
                            body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a1a; font-family: Arial; display: flex; flex-direction: column; }
                            #gameContainer { display: flex; justify-content: center; align-items: center; flex: 1; }
                            canvas { border: 3px solid #fff; background: #000; }
                            #controls { background: #222; color: #fff; padding: 20px; display: flex; gap: 30px; align-items: center; border-top: 2px solid #444; }
                            #score { font-size: 20px; font-weight: bold; }
                            #aiBtn { padding: 10px 20px; font-size: 16px; background: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer; }
                            #aiBtn.active { background: #51cf66; }
                            .sliderContainer { display: flex; gap: 10px; align-items: center; }
                            #speedSlider { width: 200px; }
                            #speedValue { font-size: 14px; min-width: 60px; }
                        </style>
                    </head>
                    <body>
                        <div id="gameContainer">
                            <canvas id="tetrisCanvas"></canvas>
                        </div>
                        <div id="controls">
                            <div id="score">Score: 0 | Lines: 0</div>
                            <button id="aiBtn">AI: OFF</button>
                            <div class="sliderContainer">
                                <label>AI Speed:</label>
                                <input type="range" id="speedSlider" min="0.1" max="1" step="0.05" value="0.5">
                                <span id="speedValue">50%</span>
                            </div>
                        </div>
                        <script>
                            const canvas = document.getElementById('tetrisCanvas');
                            const ctx = canvas.getContext('2d');
                            const COLS = 10;
                            const ROWS = 20;
                            const BLOCK_SIZE = 30;
                            
                            canvas.width = COLS * BLOCK_SIZE;
                            canvas.height = ROWS * BLOCK_SIZE;
                            
                            const TETRIMINOS = [
                                { shape: [[1,1,1,1]], color: '#00f0f0' },
                                { shape: [[1,0],[1,0],[1,1]], color: '#0000f0' },
                                { shape: [[0,1],[1,0],[1,1]], color: '#f0f000' },
                                { shape: [[1,1,0],[0,1,1]], color: '#f00000' },
                                { shape: [[1,1],[1,1]], color: '#00f000' },
                                { shape: [[0,1,1],[1,1,0]], color: '#f000f0' },
                                { shape: [[1,1,1],[0,1,0]], color: '#f0a000' }
                            ];
                            
                            let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                            let score = 0, lines = 0;
                            let aiMode = false, aiSpeed = 0.5;
                            let lastAiMove = 0;
                            let currentPiece = null, nextPiece = null;
                            let gameOver = false;
                            
                            class Piece {
                                constructor(tetrimino) {
                                    this.tetrimino = tetrimino;
                                    this.shape = tetrimino.shape.map(row => [...row]);
                                    this.x = Math.floor(COLS / 2) - Math.ceil(this.shape[0].length / 2);
                                    this.y = 0;
                                    this.color = tetrimino.color;
                                }
                                
                                rotate() {
                                    const n = this.shape.length;
                                    const rotated = Array(this.shape[0].length).fill().map(() => Array(n).fill(0));
                                    for (let i = 0; i < n; i++) {
                                        for (let j = 0; j < this.shape[i].length; j++) {
                                            rotated[j][n - 1 - i] = this.shape[i][j];
                                        }
                                    }
                                    this.shape = rotated;
                                }
                                
                                canMove(dx, dy) {
                                    for (let i = 0; i < this.shape.length; i++) {
                                        for (let j = 0; j < this.shape[i].length; j++) {
                                            if (this.shape[i][j]) {
                                                const nx = this.x + j + dx;
                                                const ny = this.y + i + dy;
                                                if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
                                                if (ny >= 0 && board[ny][nx]) return false;
                                            }
                                        }
                                    }
                                    return true;
                                }
                                
                                move(dx, dy) {
                                    if (this.canMove(dx, dy)) {
                                        this.x += dx;
                                        this.y += dy;
                                        return true;
                                    }
                                    return false;
                                }
                            }
                            
                            function getNewPiece() {
                                return new Piece(TETRIMINOS[Math.floor(Math.random() * TETRIMINOS.length)]);
                            }
                            
                            function mergePiece() {
                                for (let i = 0; i < currentPiece.shape.length; i++) {
                                    for (let j = 0; j < currentPiece.shape[i].length; j++) {
                                        if (currentPiece.shape[i][j]) {
                                            const y = currentPiece.y + i;
                                            const x = currentPiece.x + j;
                                            if (y >= 0) board[y][x] = currentPiece.color;
                                        }
                                    }
                                }
                                clearLines();
                                currentPiece = nextPiece;
                                nextPiece = getNewPiece();
                                if (!currentPiece.canMove(0, 1)) gameOver = true;
                            }
                            
                            function clearLines() {
                                for (let i = ROWS - 1; i >= 0; i--) {
                                    if (board[i].every(cell => cell)) {
                                        board.splice(i, 1);
                                        board.unshift(Array(COLS).fill(0));
                                        lines++;
                                        score += 100;
                                    }
                                }
                            }
                            
                            function evaluateMove(piece, x, y, rotation) {
                                const testBoard = board.map(row => [...row]);
                                const testPiece = new Piece(piece.tetrimino);
                                testPiece.shape = piece.shape.map(row => [...row]);
                                testPiece.x = x;
                                testPiece.y = y;
                                
                                for (let r = 0; r < rotation; r++) testPiece.rotate();
                                
                                let canFit = true;
                                for (let i = 0; i < testPiece.shape.length; i++) {
                                    for (let j = 0; j < testPiece.shape[i].length; j++) {
                                        if (testPiece.shape[i][j]) {
                                            const py = testPiece.y + i;
                                            const px = testPiece.x + j;
                                            if (px < 0 || px >= COLS || py >= ROWS || (py >= 0 && testBoard[py][px])) {
                                                canFit = false;
                                                break;
                                            }
                                        }
                                    }
                                    if (!canFit) break;
                                }
                                
                                if (!canFit) return -999999;
                                
                                while (testPiece.y + testPiece.shape.length < ROWS) {
                                    let canMoveDown = true;
                                    for (let i = 0; i < testPiece.shape.length; i++) {
                                        for (let j = 0; j < testPiece.shape[i].length; j++) {
                                            if (testPiece.shape[i][j]) {
                                                const py = testPiece.y + i + 1;
                                                const px = testPiece.x + j;
                                                if (py >= ROWS || (py >= 0 && testBoard[py][px])) {
                                                    canMoveDown = false;
                                                    break;
                                                }
                                            }
                                        }
                                        if (!canMoveDown) break;
                                    }
                                    if (!canMoveDown) break;
                                    testPiece.y++;
                                }
                                
                                for (let i = 0; i < testPiece.shape.length; i++) {
                                    for (let j = 0; j < testPiece.shape[i].length; j++) {
                                        if (testPiece.shape[i][j]) {
                                            testBoard[testPiece.y + i][testPiece.x + j] = 1;
                                        }
                                    }
                                }
                                
                                let holes = 0, height = 0, clearLines = 0;
                                for (let col = 0; col < COLS; col++) {
                                    let filled = false;
                                    for (let row = ROWS - 1; row >= 0; row--) {
                                        if (testBoard[row][col]) {
                                            if (row > height) height = row;
                                            filled = true;
                                        } else if (filled) holes++;
                                    }
                                }
                                
                                for (let row = ROWS - 1; row >= 0; row--) {
                                    if (testBoard[row].every(cell => cell)) clearLines++;
                                }
                                
                                return clearLines * 1000 - holes * 100 - height * 10;
                            }
                            
                            function aiMove() {
                                let bestScore = -999999, bestX = 0, bestRotation = 0;
                                for (let rot = 0; rot < 4; rot++) {
                                    for (let x = -2; x < COLS + 2; x++) {
                                        const score = evaluateMove(currentPiece, x, 0, rot);
                                        if (score > bestScore) {
                                            bestScore = score;
                                            bestX = x;
                                            bestRotation = rot;
                                        }
                                    }
                                }
                                
                                for (let r = 0; r < bestRotation; r++) {
                                    if (currentPiece.canMove(0, 0)) currentPiece.rotate();
                                }
                                
                                while (currentPiece.x > bestX) currentPiece.move(-1, 0);
                                while (currentPiece.x < bestX) currentPiece.move(1, 0);
                                
                                while (currentPiece.move(0, 1)) {}
                                mergePiece();
                            }
                            
                            function draw() {
                                ctx.fillStyle = '#000';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                
                                for (let i = 0; i < ROWS; i++) {
                                    for (let j = 0; j < COLS; j++) {
                                        if (board[i][j]) {
                                            ctx.fillStyle = board[i][j];
                                            ctx.fillRect(j * BLOCK_SIZE, i * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                                        }
                                    }
                                }
                                
                                if (currentPiece) {
                                    ctx.fillStyle = currentPiece.color;
                                    for (let i = 0; i < currentPiece.shape.length; i++) {
                                        for (let j = 0; j < currentPiece.shape[i].length; j++) {
                                            if (currentPiece.shape[i][j]) {
                                                const x = (currentPiece.x + j) * BLOCK_SIZE;
                                                const y = (currentPiece.y + i) * BLOCK_SIZE;
                                                if (y >= 0) ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                                            }
                                        }
                                    }
                                }
                                
                                ctx.strokeStyle = '#333';
                                for (let i = 0; i <= COLS; i++) ctx.strokeRect(i * BLOCK_SIZE, 0, 0, canvas.height);
                                for (let i = 0; i <= ROWS; i++) ctx.strokeRect(0, i * BLOCK_SIZE, canvas.width, 0);
                            }
                            
                            function gameLoop() {
                                if (!gameOver) {
                                    if (aiMode && performance.now() - lastAiMove > (1 - aiSpeed) * 500 + 50) {
                                        aiMove();
                                        lastAiMove = performance.now();
                                    } else if (!aiMode && currentPiece.move(0, 1)) {
                                    } else if (!aiMode) {
                                        mergePiece();
                                    }
                                }
                                
                                draw();
                                document.getElementById('score').textContent = \`Score: \${score} | Lines: \${lines}\`;
                                requestAnimationFrame(gameLoop);
                            }
                            
                            document.addEventListener('keydown', (e) => {
                                if (!aiMode && currentPiece && !gameOver) {
                                    if (e.key === 'ArrowLeft') currentPiece.move(-1, 0);
                                    if (e.key === 'ArrowRight') currentPiece.move(1, 0);
                                    if (e.key === 'ArrowUp') currentPiece.rotate();
                                    if (e.key === ' ' || e.key === 'ArrowDown') { while (currentPiece.move(0, 1)) {} mergePiece(); }
                                }
                            });
                            
                            document.getElementById('aiBtn').addEventListener('click', () => {
                                aiMode = !aiMode;
                                const btn = document.getElementById('aiBtn');
                                btn.textContent = aiMode ? 'AI: ON' : 'AI: OFF';
                                btn.classList.toggle('active', aiMode);
                            });
                            
                            document.getElementById('speedSlider').addEventListener('input', (e) => {
                                aiSpeed = parseFloat(e.target.value);
                                document.getElementById('speedValue').textContent = Math.round(aiSpeed * 100) + '%';
                            });
                            
                            currentPiece = getNewPiece();
                            nextPiece = getNewPiece();
                            gameLoop();
                        </script>
                    </body>
                    </html>
                `);
                blankWindow.document.close();
            }
        }
    </script>
</body>
</html>
