<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #222;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <button onclick="launchGame()">Open Game</button>
    <script>
        function launchGame() {
            const w = window.open('about:blank', '_blank');
            if (!w) return;

            setTimeout(() => {
                const d = w.document;
                d.title = 'Game Menu';
                d.body.innerHTML = `
                    <div id="hub">
                        <header id="topbar">
                            <div id="brand">Game Menu</div>
                            <nav id="menu">
                                <button class="menu-btn active" data-view="tetris">Tetris</button>
                                <button class="menu-btn" data-view="minesweeper">Minesweeper</button>
                                <button class="menu-btn" data-view="pong">Pong</button>
                                <button class="menu-btn" data-view="web">Web Iframe</button>
                            </nav>
                        </header>

                        <main id="views">
                            <section id="view-tetris" class="view active">
                                <div class="panel">
                                    <span id="t-score">Score: 0</span>
                                    <button id="t-ai">AI OFF</button>
                                    <label for="t-speed">AI Speed</label>
                                    <input id="t-speed" type="range" min="0.1" max="1" step="0.05" value="0.5">
                                    <span id="t-speed-label">50%</span>
                                    <button id="t-restart">Restart</button>
                                </div>
                                <canvas id="t-canvas"></canvas>
                                <div id="t-status" class="note">Arrow keys + space in manual mode. AI uses deeper lookahead.</div>
                            </section>

                            <section id="view-minesweeper" class="view">
                                <div class="panel">
                                    <span id="m-status">Minesweeper ready</span>
                                    <button id="m-reset">New Board</button>
                                </div>
                                <div id="m-board" class="ms-board"></div>
                                <div class="note">Left click to reveal. Right click to flag.</div>
                            </section>

                            <section id="view-pong" class="view">
                                <div class="panel">
                                    <span id="p-score">0 : 0</span>
                                    <button id="p-reset">Restart Pong</button>
                                </div>
                                <canvas id="p-canvas" width="720" height="400"></canvas>
                                <div class="note">Paddle controls: W/S or Arrow Up/Down. Right paddle is AI.</div>
                            </section>

                            <section id="view-web" class="view">
                                <div class="panel wrap">
                                    <label for="web-url">URL</label>
                                    <input id="web-url" type="text" placeholder="https://example.com">
                                    <button id="web-go">Go</button>
                                    <button id="web-blank">about:blank</button>
                                </div>
                                <iframe id="web-frame" src="about:blank" referrerpolicy="no-referrer"></iframe>
                                <div class="note">Some sites block embedding with X-Frame-Options/CSP. If blocked, try another URL.</div>
                            </section>
                        </main>
                    </div>
                    <style>
                        * { box-sizing: border-box; }
                        body {
                            margin: 0;
                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                            background: radial-gradient(circle at top, #141a24 0%, #090d14 65%);
                            color: #f2f6ff;
                            min-height: 100vh;
                        }
                        #hub {
                            width: 100%;
                            min-height: 100vh;
                            display: flex;
                            flex-direction: column;
                        }
                        #topbar {
                            position: sticky;
                            top: 0;
                            z-index: 20;
                            display: flex;
                            flex-wrap: wrap;
                            gap: 12px;
                            align-items: center;
                            justify-content: space-between;
                            padding: 14px 16px;
                            background: rgba(7, 11, 18, 0.92);
                            border-bottom: 1px solid #253146;
                            backdrop-filter: blur(10px);
                        }
                        #brand {
                            font-size: 18px;
                            font-weight: 700;
                            color: #7ad7ff;
                        }
                        #menu {
                            display: flex;
                            flex-wrap: wrap;
                            gap: 8px;
                        }
                        .menu-btn {
                            border: 1px solid #3a4866;
                            background: #1d2636;
                            color: #d8e2ff;
                            border-radius: 8px;
                            padding: 8px 12px;
                            cursor: pointer;
                        }
                        .menu-btn.active {
                            background: #2f8cff;
                            color: #ffffff;
                            border-color: #62a6ff;
                        }
                        #views {
                            width: 100%;
                            max-width: 1100px;
                            margin: 0 auto;
                            padding: 14px;
                            display: flex;
                            flex-direction: column;
                            gap: 16px;
                        }
                        .view {
                            display: none;
                            gap: 10px;
                            flex-direction: column;
                        }
                        .view.active { display: flex; }
                        .panel {
                            display: flex;
                            flex-wrap: wrap;
                            gap: 10px;
                            align-items: center;
                            background: #121a28;
                            border: 1px solid #2a3550;
                            border-radius: 10px;
                            padding: 10px 12px;
                        }
                        .panel.wrap input {
                            min-width: 260px;
                            flex: 1;
                        }
                        .panel button {
                            border: 1px solid #3a4866;
                            background: #1d2636;
                            color: #d8e2ff;
                            border-radius: 8px;
                            padding: 7px 12px;
                            cursor: pointer;
                        }
                        .panel button:hover { background: #25314a; }
                        #t-ai.on { background: #3bbb62; border-color: #73dd93; color: #fff; }
                        input[type="range"] { width: 170px; }
                        input[type="text"] {
                            background: #0d1420;
                            border: 1px solid #3a4866;
                            color: #ebf3ff;
                            border-radius: 8px;
                            padding: 8px 10px;
                        }
                        #t-canvas, #p-canvas {
                            display: block;
                            background: #000;
                            border: 1px solid #2c3a57;
                            border-radius: 8px;
                            max-width: 100%;
                            height: auto;
                        }
                        #web-frame {
                            width: 100%;
                            min-height: 70vh;
                            border: 1px solid #2c3a57;
                            border-radius: 8px;
                            background: #ffffff;
                        }
                        .note {
                            font-size: 13px;
                            color: #a4b4d7;
                        }
                        .ms-board {
                            display: grid;
                            gap: 2px;
                            width: fit-content;
                            max-width: 100%;
                            overflow: auto;
                            padding: 4px;
                            border: 1px solid #2a3550;
                            border-radius: 8px;
                            background: #0f1624;
                        }
                        .ms-cell {
                            width: 30px;
                            height: 30px;
                            border: 1px solid #435475;
                            background: #243047;
                            color: #e8efff;
                            font-weight: 700;
                            cursor: pointer;
                            user-select: none;
                            padding: 0;
                        }
                        .ms-cell.revealed {
                            background: #151f31;
                            border-color: #2f3e5f;
                            cursor: default;
                        }
                        .ms-cell.mine {
                            background: #8a1f1f;
                            color: #fff;
                        }
                        .ms-cell.flag {
                            background: #324b25;
                            color: #d8ff7d;
                        }
                        @media (max-width: 740px) {
                            #menu { width: 100%; }
                            .menu-btn { flex: 1; min-width: 130px; }
                            .panel { font-size: 14px; }
                            .panel.wrap input { min-width: 180px; }
                            #p-canvas { width: 100%; }
                        }
                    </style>
                `;

                const $ = (id) => d.getElementById(id);
                const menuButtons = Array.from(d.querySelectorAll('.menu-btn'));

                const views = {
                    tetris: $('view-tetris'),
                    minesweeper: $('view-minesweeper'),
                    pong: $('view-pong'),
                    web: $('view-web')
                };

                let activeView = 'tetris';

                function setView(name) {
                    if (!views[name]) return;
                    activeView = name;
                    for (const b of menuButtons) {
                        b.classList.toggle('active', b.dataset.view === name);
                    }
                    for (const key of Object.keys(views)) {
                        views[key].classList.toggle('active', key === name);
                    }

                    if (name === 'tetris') tStart(); else tStop();
                    if (name === 'pong') pStart(); else pStop();
                }

                for (const b of menuButtons) {
                    b.addEventListener('click', () => setView(b.dataset.view));
                }

                const keyState = {
                    up: false,
                    down: false
                };

                function clamp(v, min, max) {
                    return Math.max(min, Math.min(max, v));
                }

                function shuffle(arr) {
                    for (let i = arr.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        const tmp = arr[i];
                        arr[i] = arr[j];
                        arr[j] = tmp;
                    }
                    return arr;
                }

                function cloneShape(shape) {
                    return shape.map(row => row.slice());
                }

                function rotateShape(shape) {
                    const rows = shape.length;
                    const cols = shape[0].length;
                    const out = Array.from({ length: cols }, () => Array(rows).fill(0));
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            out[c][rows - 1 - r] = shape[r][c];
                        }
                    }
                    return out;
                }

                function uniqueRotations(shape) {
                    const seen = new Set();
                    const out = [];
                    let cur = cloneShape(shape);
                    for (let i = 0; i < 4; i++) {
                        const key = cur.map(r => r.join('')).join('|');
                        if (!seen.has(key)) {
                            seen.add(key);
                            out.push(cloneShape(cur));
                        }
                        cur = rotateShape(cur);
                    }
                    return out;
                }

                const TETRIMINOS = [
                    { id: 'I', s: [[1,1,1,1]], co: '#00e5ff' },
                    { id: 'J', s: [[1,0],[1,0],[1,1]], co: '#2f5dff' },
                    { id: 'L', s: [[0,1],[0,1],[1,1]], co: '#ff8c00' },
                    { id: 'S', s: [[0,1,1],[1,1,0]], co: '#58ef59' },
                    { id: 'Z', s: [[1,1,0],[0,1,1]], co: '#ff4f4f' },
                    { id: 'T', s: [[1,1,1],[0,1,0]], co: '#d35bff' },
                    { id: 'O', s: [[1,1],[1,1]], co: '#ffe14a' }
                ];

                const tCanvas = $('t-canvas');
                const tCtx = tCanvas.getContext('2d');
                const tScoreEl = $('t-score');
                const tAiBtn = $('t-ai');
                const tSpeed = $('t-speed');
                const tSpeedLabel = $('t-speed-label');
                const tRestartBtn = $('t-restart');
                const tStatus = $('t-status');

                const tCols = 10;
                const tRows = 20;
                const tBlock = 28;
                tCanvas.width = tCols * tBlock;
                tCanvas.height = tRows * tBlock;

                let tBoard = [];
                let tBag = [];
                let tCurrent = null;
                let tNext = null;
                let tScore = 0;
                let tOver = false;
                let tAi = false;
                let tAiSpeed = 0.5;
                let tGravityMs = 0;
                let tAiMs = 0;
                let tLast = w.performance.now();
                let tRunning = false;

                function tRefillBag() {
                    tBag = shuffle([...Array(TETRIMINOS.length).keys()]);
                }

                function tTakeTemplate() {
                    if (!tBag.length) tRefillBag();
                    return TETRIMINOS[tBag.pop()];
                }

                function tCreatePiece(template) {
                    const sh = cloneShape(template.s);
                    return {
                        id: template.id,
                        co: template.co,
                        sh,
                        x: Math.floor(tCols / 2) - Math.ceil(sh[0].length / 2),
                        y: -1
                    };
                }

                function tCollides(shape, px, py, board = tBoard) {
                    for (let r = 0; r < shape.length; r++) {
                        for (let c = 0; c < shape[r].length; c++) {
                            if (!shape[r][c]) continue;
                            const x = px + c;
                            const y = py + r;
                            if (x < 0 || x >= tCols || y >= tRows) return true;
                            if (y >= 0 && board[y][x]) return true;
                        }
                    }
                    return false;
                }

                function tMove(dx, dy) {
                    if (!tCurrent || tOver) return false;
                    if (tCollides(tCurrent.sh, tCurrent.x + dx, tCurrent.y + dy)) return false;
                    tCurrent.x += dx;
                    tCurrent.y += dy;
                    return true;
                }

                function tRotate() {
                    if (!tCurrent || tOver) return;
                    const rotated = rotateShape(tCurrent.sh);
                    if (!tCollides(rotated, tCurrent.x, tCurrent.y)) {
                        tCurrent.sh = rotated;
                        return;
                    }
                    if (!tCollides(rotated, tCurrent.x - 1, tCurrent.y)) {
                        tCurrent.x -= 1;
                        tCurrent.sh = rotated;
                        return;
                    }
                    if (!tCollides(rotated, tCurrent.x + 1, tCurrent.y)) {
                        tCurrent.x += 1;
                        tCurrent.sh = rotated;
                    }
                }

                function tBoardMask(srcBoard) {
                    return srcBoard.map(row => row.map(cell => (cell ? 1 : 0)));
                }

                function tMaskCollides(mask, shape, px, py) {
                    for (let r = 0; r < shape.length; r++) {
                        for (let c = 0; c < shape[r].length; c++) {
                            if (!shape[r][c]) continue;
                            const x = px + c;
                            const y = py + r;
                            if (x < 0 || x >= tCols || y >= tRows) return true;
                            if (y >= 0 && mask[y][x]) return true;
                        }
                    }
                    return false;
                }

                function tSimulateDrop(mask, shape, px) {
                    let py = -4;
                    while (!tMaskCollides(mask, shape, px, py + 1)) py++;
                    if (tMaskCollides(mask, shape, px, py)) return null;

                    const out = mask.map(row => row.slice());
                    for (let r = 0; r < shape.length; r++) {
                        for (let c = 0; c < shape[r].length; c++) {
                            if (!shape[r][c]) continue;
                            const y = py + r;
                            const x = px + c;
                            if (y < 0) return null;
                            out[y][x] = 1;
                        }
                    }

                    let lines = 0;
                    for (let row = tRows - 1; row >= 0; row--) {
                        let full = true;
                        for (let col = 0; col < tCols; col++) {
                            if (!out[row][col]) {
                                full = false;
                                break;
                            }
                        }
                        if (full) {
                            out.splice(row, 1);
                            out.unshift(Array(tCols).fill(0));
                            lines++;
                            row++;
                        }
                    }

                    return { mask: out, lines };
                }

                function tAnalyzeMask(mask) {
                    const heights = Array(tCols).fill(0);
                    let holes = 0;

                    for (let col = 0; col < tCols; col++) {
                        let found = false;
                        for (let row = 0; row < tRows; row++) {
                            if (mask[row][col]) {
                                if (!found) {
                                    heights[col] = tRows - row;
                                    found = true;
                                }
                            } else if (found) {
                                holes++;
                            }
                        }
                    }

                    const aggregateHeight = heights.reduce((a, b) => a + b, 0);
                    const maxHeight = Math.max(...heights);

                    let bumpiness = 0;
                    for (let i = 0; i < tCols - 1; i++) {
                        bumpiness += Math.abs(heights[i] - heights[i + 1]);
                    }

                    let wells = 0;
                    for (let col = 0; col < tCols; col++) {
                        const left = col === 0 ? heights[col + 1] + 1 : heights[col - 1];
                        const right = col === tCols - 1 ? heights[col - 1] + 1 : heights[col + 1];
                        if (heights[col] < left && heights[col] < right) {
                            wells += Math.min(left, right) - heights[col];
                        }
                    }

                    let rowTransitions = 0;
                    for (let row = 0; row < tRows; row++) {
                        let prev = 1;
                        for (let col = 0; col < tCols; col++) {
                            const cur = mask[row][col] ? 1 : 0;
                            if (cur !== prev) rowTransitions++;
                            prev = cur;
                        }
                        if (prev === 0) rowTransitions++;
                    }

                    let colTransitions = 0;
                    for (let col = 0; col < tCols; col++) {
                        let prev = 1;
                        for (let row = 0; row < tRows; row++) {
                            const cur = mask[row][col] ? 1 : 0;
                            if (cur !== prev) colTransitions++;
                            prev = cur;
                        }
                        if (prev === 0) colTransitions++;
                    }

                    let leftMass = 0;
                    let rightMass = 0;
                    for (let col = 0; col < tCols; col++) {
                        if (col < tCols / 2) leftMass += heights[col];
                        else rightMass += heights[col];
                    }
                    const balance = Math.abs(leftMass - rightMass);

                    return {
                        aggregateHeight,
                        holes,
                        maxHeight,
                        bumpiness,
                        wells,
                        rowTransitions,
                        colTransitions,
                        balance
                    };
                }

                function tEvaluate(sim, shape, px) {
                    const m = tAnalyzeMask(sim.mask);
                    const center = px + shape[0].length / 2;
                    const centerPenalty = Math.abs(center - (tCols / 2)) * 6;
                    return (
                        sim.lines * 1900
                        - m.holes * 900
                        - m.maxHeight * 145
                        - m.aggregateHeight * 21
                        - m.bumpiness * 78
                        - m.wells * 54
                        - m.rowTransitions * 16
                        - m.colTransitions * 19
                        - m.balance * 18
                        - centerPenalty
                    );
                }

                function tEnumerateMoves(mask, pieceShape) {
                    const rotations = uniqueRotations(pieceShape);
                    const moves = [];
                    for (const rot of rotations) {
                        const maxX = tCols - rot[0].length;
                        for (let x = 0; x <= maxX; x++) {
                            const sim = tSimulateDrop(mask, rot, x);
                            if (!sim) continue;
                            moves.push({
                                x,
                                shape: rot,
                                mask: sim.mask,
                                score: tEvaluate(sim, rot, x)
                            });
                        }
                    }
                    return moves;
                }

                function tBestImmediateScore(mask, pieceShape) {
                    const moves = tEnumerateMoves(mask, pieceShape);
                    if (!moves.length) return -1000000000;
                    let best = -1000000000;
                    for (const move of moves) {
                        if (move.score > best) best = move.score;
                    }
                    return best;
                }

                function tChooseBestMove() {
                    const mask = tBoardMask(tBoard);
                    const currentMoves = tEnumerateMoves(mask, tCurrent.sh);
                    if (!currentMoves.length) return null;

                    let best = null;
                    let bestScore = -1000000000;

                    for (const move of currentMoves) {
                        let score = move.score;

                        if (tNext) {
                            const nextBest = tBestImmediateScore(move.mask, tNext.sh);
                            score += nextBest * 0.9;
                        }

                        let expectedThird = 0;
                        for (const tpl of TETRIMINOS) {
                            expectedThird += tBestImmediateScore(move.mask, tpl.s);
                        }
                        expectedThird /= TETRIMINOS.length;
                        score += expectedThird * 0.22;

                        if (score > bestScore) {
                            bestScore = score;
                            best = move;
                        }
                    }

                    return best;
                }

                function tSpawn() {
                    if (!tNext) tNext = tCreatePiece(tTakeTemplate());
                    tCurrent = tNext;
                    tCurrent.x = Math.floor(tCols / 2) - Math.ceil(tCurrent.sh[0].length / 2);
                    tCurrent.y = -1;
                    tNext = tCreatePiece(tTakeTemplate());

                    if (tCollides(tCurrent.sh, tCurrent.x, tCurrent.y)) {
                        tOver = true;
                        tStatus.textContent = 'Game over. Press Restart.';
                    }
                }

                function tLock() {
                    for (let r = 0; r < tCurrent.sh.length; r++) {
                        for (let c = 0; c < tCurrent.sh[r].length; c++) {
                            if (!tCurrent.sh[r][c]) continue;
                            const x = tCurrent.x + c;
                            const y = tCurrent.y + r;
                            if (y >= 0) tBoard[y][x] = tCurrent.co;
                        }
                    }

                    let cleared = 0;
                    for (let row = tRows - 1; row >= 0; row--) {
                        if (tBoard[row].every(Boolean)) {
                            tBoard.splice(row, 1);
                            tBoard.unshift(Array(tCols).fill(0));
                            cleared++;
                            row++;
                        }
                    }

                    const lineScore = [0, 120, 340, 720, 1200][cleared] || (cleared * 300);
                    tScore += lineScore;
                    tScoreEl.textContent = 'Score: ' + tScore;
                    tSpawn();
                }

                function tHardDrop() {
                    if (!tCurrent || tOver) return;
                    while (!tCollides(tCurrent.sh, tCurrent.x, tCurrent.y + 1)) {
                        tCurrent.y++;
                    }
                    tLock();
                }

                function tReset() {
                    tBoard = Array.from({ length: tRows }, () => Array(tCols).fill(0));
                    tBag = [];
                    tCurrent = null;
                    tNext = null;
                    tScore = 0;
                    tOver = false;
                    tGravityMs = 0;
                    tAiMs = 0;
                    tScoreEl.textContent = 'Score: 0';
                    tStatus.textContent = 'Arrow keys + space in manual mode. AI uses deeper lookahead.';
                    tSpawn();
                    tRender();
                }

                function tAiStep() {
                    if (!tCurrent || tOver) return;
                    const best = tChooseBestMove();
                    if (!best) {
                        tOver = true;
                        tStatus.textContent = 'AI has no legal move.';
                        return;
                    }
                    tCurrent.sh = cloneShape(best.shape);
                    tCurrent.x = best.x;
                    tCurrent.y = -1;
                    tHardDrop();
                }

                function tRender() {
                    tCtx.fillStyle = '#000';
                    tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);

                    for (let row = 0; row < tRows; row++) {
                        for (let col = 0; col < tCols; col++) {
                            if (!tBoard[row][col]) continue;
                            tCtx.fillStyle = tBoard[row][col];
                            tCtx.fillRect(col * tBlock, row * tBlock, tBlock - 1, tBlock - 1);
                        }
                    }

                    if (tCurrent) {
                        tCtx.fillStyle = tCurrent.co;
                        for (let r = 0; r < tCurrent.sh.length; r++) {
                            for (let c = 0; c < tCurrent.sh[r].length; c++) {
                                if (!tCurrent.sh[r][c]) continue;
                                const x = tCurrent.x + c;
                                const y = tCurrent.y + r;
                                if (y >= 0) {
                                    tCtx.fillRect(x * tBlock, y * tBlock, tBlock - 1, tBlock - 1);
                                }
                            }
                        }
                    }

                    if (tOver) {
                        tCtx.fillStyle = 'rgba(0,0,0,0.55)';
                        tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
                        tCtx.fillStyle = '#ffffff';
                        tCtx.font = 'bold 28px Arial';
                        tCtx.textAlign = 'center';
                        tCtx.fillText('GAME OVER', tCanvas.width / 2, tCanvas.height / 2);
                    }
                }

                function tLoop(now) {
                    if (!tRunning) return;
                    const dt = Math.min(120, now - tLast);
                    tLast = now;

                    if (!tOver) {
                        if (tAi) {
                            tAiMs += dt;
                            const aiInterval = (1 - tAiSpeed) * 650 + 120;
                            if (tAiMs >= aiInterval) {
                                tAiMs = 0;
                                tAiStep();
                            }
                        } else {
                            tGravityMs += dt;
                            if (tGravityMs >= 500) {
                                tGravityMs = 0;
                                if (!tMove(0, 1)) tLock();
                            }
                        }
                    }

                    tRender();
                    w.requestAnimationFrame(tLoop);
                }

                function tStart() {
                    if (tRunning) return;
                    tRunning = true;
                    tLast = w.performance.now();
                    w.requestAnimationFrame(tLoop);
                }

                function tStop() {
                    tRunning = false;
                }

                tAiBtn.addEventListener('click', () => {
                    tAi = !tAi;
                    tAiBtn.textContent = tAi ? 'AI ON' : 'AI OFF';
                    tAiBtn.classList.toggle('on', tAi);
                    tAiMs = 0;
                    tGravityMs = 0;
                });

                tSpeed.addEventListener('input', (e) => {
                    tAiSpeed = parseFloat(e.target.value);
                    tSpeedLabel.textContent = Math.round(tAiSpeed * 100) + '%';
                });

                tRestartBtn.addEventListener('click', () => {
                    tReset();
                });

                const mBoardEl = $('m-board');
                const mStatus = $('m-status');
                const mResetBtn = $('m-reset');
                const mRows = 12;
                const mCols = 12;
                const mMines = 24;

                let mBoard = [];
                let mFirstClick = true;
                let mOver = false;
                let mRevealed = 0;

                function mInBounds(r, c) {
                    return r >= 0 && r < mRows && c >= 0 && c < mCols;
                }

                function mNeighbors(r, c) {
                    const out = [];
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            const nr = r + dr;
                            const nc = c + dc;
                            if (mInBounds(nr, nc)) out.push([nr, nc]);
                        }
                    }
                    return out;
                }

                function mBuildEmpty() {
                    mBoard = Array.from({ length: mRows }, () =>
                        Array.from({ length: mCols }, () => ({
                            mine: false,
                            revealed: false,
                            flag: false,
                            count: 0
                        }))
                    );
                }

                function mPlaceMines(safeR, safeC) {
                    let placed = 0;
                    while (placed < mMines) {
                        const r = Math.floor(Math.random() * mRows);
                        const c = Math.floor(Math.random() * mCols);
                        if ((r === safeR && c === safeC) || mBoard[r][c].mine) continue;
                        mBoard[r][c].mine = true;
                        placed++;
                    }

                    for (let r = 0; r < mRows; r++) {
                        for (let c = 0; c < mCols; c++) {
                            if (mBoard[r][c].mine) continue;
                            let count = 0;
                            for (const [nr, nc] of mNeighbors(r, c)) {
                                if (mBoard[nr][nc].mine) count++;
                            }
                            mBoard[r][c].count = count;
                        }
                    }
                }

                function mRevealAllMines() {
                    for (let r = 0; r < mRows; r++) {
                        for (let c = 0; c < mCols; c++) {
                            if (mBoard[r][c].mine) mBoard[r][c].revealed = true;
                        }
                    }
                }

                function mFloodReveal(startR, startC) {
                    const stack = [[startR, startC]];
                    while (stack.length) {
                        const [r, c] = stack.pop();
                        const cell = mBoard[r][c];
                        if (cell.revealed || cell.flag) continue;
                        cell.revealed = true;
                        mRevealed++;

                        if (cell.count === 0) {
                            for (const [nr, nc] of mNeighbors(r, c)) {
                                const nCell = mBoard[nr][nc];
                                if (!nCell.revealed && !nCell.mine && !nCell.flag) {
                                    stack.push([nr, nc]);
                                }
                            }
                        }
                    }
                }

                function mCheckWin() {
                    return mRevealed === (mRows * mCols - mMines);
                }

                function mRender() {
                    mBoardEl.style.gridTemplateColumns = 'repeat(' + mCols + ', 30px)';
                    mBoardEl.innerHTML = '';

                    for (let r = 0; r < mRows; r++) {
                        for (let c = 0; c < mCols; c++) {
                            const cell = mBoard[r][c];
                            const btn = d.createElement('button');
                            btn.className = 'ms-cell';
                            btn.dataset.r = String(r);
                            btn.dataset.c = String(c);

                            if (cell.revealed) {
                                btn.classList.add('revealed');
                                if (cell.mine) {
                                    btn.classList.add('mine');
                                    btn.textContent = 'X';
                                } else if (cell.count > 0) {
                                    btn.textContent = String(cell.count);
                                }
                            } else if (cell.flag) {
                                btn.classList.add('flag');
                                btn.textContent = 'F';
                            }

                            mBoardEl.appendChild(btn);
                        }
                    }
                }

                function mRevealCell(r, c) {
                    if (mOver) return;
                    const cell = mBoard[r][c];
                    if (cell.revealed || cell.flag) return;

                    if (mFirstClick) {
                        mPlaceMines(r, c);
                        mFirstClick = false;
                    }

                    if (cell.mine) {
                        cell.revealed = true;
                        mRevealAllMines();
                        mOver = true;
                        mStatus.textContent = 'Boom. You lost.';
                        mRender();
                        return;
                    }

                    mFloodReveal(r, c);
                    if (mCheckWin()) {
                        mOver = true;
                        mStatus.textContent = 'You cleared it.';
                    }
                    mRender();
                }

                function mToggleFlag(r, c) {
                    if (mOver) return;
                    const cell = mBoard[r][c];
                    if (cell.revealed) return;
                    cell.flag = !cell.flag;
                    mRender();
                }

                function mReset() {
                    mFirstClick = true;
                    mOver = false;
                    mRevealed = 0;
                    mBuildEmpty();
                    mStatus.textContent = 'Minesweeper ready';
                    mRender();
                }

                mBoardEl.addEventListener('click', (e) => {
                    const cellEl = e.target.closest('.ms-cell');
                    if (!cellEl) return;
                    const r = parseInt(cellEl.dataset.r, 10);
                    const c = parseInt(cellEl.dataset.c, 10);
                    mRevealCell(r, c);
                });

                mBoardEl.addEventListener('contextmenu', (e) => {
                    const cellEl = e.target.closest('.ms-cell');
                    if (!cellEl) return;
                    e.preventDefault();
                    const r = parseInt(cellEl.dataset.r, 10);
                    const c = parseInt(cellEl.dataset.c, 10);
                    mToggleFlag(r, c);
                });

                mResetBtn.addEventListener('click', () => mReset());

                const pCanvas = $('p-canvas');
                const pCtx = pCanvas.getContext('2d');
                const pScoreEl = $('p-score');
                const pResetBtn = $('p-reset');

                const pState = {
                    width: pCanvas.width,
                    height: pCanvas.height,
                    paddleH: 90,
                    paddleW: 12,
                    leftY: 155,
                    rightY: 155,
                    ballX: pCanvas.width / 2,
                    ballY: pCanvas.height / 2,
                    ballR: 8,
                    ballVX: 280,
                    ballVY: 120,
                    leftScore: 0,
                    rightScore: 0
                };

                let pRunning = false;
                let pLast = w.performance.now();

                function pResetRound(dir = 1) {
                    pState.ballX = pState.width / 2;
                    pState.ballY = pState.height / 2;
                    const angle = (Math.random() * 2 - 1) * 0.9;
                    const speed = 300;
                    pState.ballVX = speed * dir;
                    pState.ballVY = speed * angle;
                }

                function pResetGame() {
                    pState.leftY = (pState.height - pState.paddleH) / 2;
                    pState.rightY = (pState.height - pState.paddleH) / 2;
                    pState.leftScore = 0;
                    pState.rightScore = 0;
                    pResetRound(Math.random() > 0.5 ? 1 : -1);
                    pScoreEl.textContent = '0 : 0';
                    pRender();
                }

                function pRender() {
                    pCtx.fillStyle = '#000';
                    pCtx.fillRect(0, 0, pState.width, pState.height);

                    pCtx.strokeStyle = '#33415f';
                    pCtx.setLineDash([6, 10]);
                    pCtx.beginPath();
                    pCtx.moveTo(pState.width / 2, 0);
                    pCtx.lineTo(pState.width / 2, pState.height);
                    pCtx.stroke();
                    pCtx.setLineDash([]);

                    pCtx.fillStyle = '#6ee7ff';
                    pCtx.fillRect(20, pState.leftY, pState.paddleW, pState.paddleH);
                    pCtx.fillStyle = '#ffb86b';
                    pCtx.fillRect(pState.width - 20 - pState.paddleW, pState.rightY, pState.paddleW, pState.paddleH);

                    pCtx.fillStyle = '#ffffff';
                    pCtx.beginPath();
                    pCtx.arc(pState.ballX, pState.ballY, pState.ballR, 0, Math.PI * 2);
                    pCtx.fill();
                }

                function pUpdate(dt) {
                    const leftSpeed = 340;
                    if (keyState.up) pState.leftY -= leftSpeed * dt;
                    if (keyState.down) pState.leftY += leftSpeed * dt;
                    pState.leftY = clamp(pState.leftY, 0, pState.height - pState.paddleH);

                    const target = pState.ballY - pState.paddleH / 2;
                    const diff = target - pState.rightY;
                    const aiMove = clamp(diff, -260 * dt, 260 * dt);
                    pState.rightY = clamp(pState.rightY + aiMove, 0, pState.height - pState.paddleH);

                    pState.ballX += pState.ballVX * dt;
                    pState.ballY += pState.ballVY * dt;

                    if (pState.ballY - pState.ballR <= 0 && pState.ballVY < 0) {
                        pState.ballY = pState.ballR;
                        pState.ballVY *= -1;
                    }
                    if (pState.ballY + pState.ballR >= pState.height && pState.ballVY > 0) {
                        pState.ballY = pState.height - pState.ballR;
                        pState.ballVY *= -1;
                    }

                    const leftX = 20;
                    const rightX = pState.width - 20 - pState.paddleW;

                    if (
                        pState.ballVX < 0 &&
                        pState.ballX - pState.ballR <= leftX + pState.paddleW &&
                        pState.ballY >= pState.leftY &&
                        pState.ballY <= pState.leftY + pState.paddleH
                    ) {
                        pState.ballX = leftX + pState.paddleW + pState.ballR;
                        pState.ballVX = Math.abs(pState.ballVX) * 1.03;
                        pState.ballVY += ((pState.ballY - (pState.leftY + pState.paddleH / 2)) / (pState.paddleH / 2)) * 120;
                    }

                    if (
                        pState.ballVX > 0 &&
                        pState.ballX + pState.ballR >= rightX &&
                        pState.ballY >= pState.rightY &&
                        pState.ballY <= pState.rightY + pState.paddleH
                    ) {
                        pState.ballX = rightX - pState.ballR;
                        pState.ballVX = -Math.abs(pState.ballVX) * 1.03;
                        pState.ballVY += ((pState.ballY - (pState.rightY + pState.paddleH / 2)) / (pState.paddleH / 2)) * 120;
                    }

                    if (pState.ballX < -40) {
                        pState.rightScore++;
                        pScoreEl.textContent = pState.leftScore + ' : ' + pState.rightScore;
                        pResetRound(1);
                    }
                    if (pState.ballX > pState.width + 40) {
                        pState.leftScore++;
                        pScoreEl.textContent = pState.leftScore + ' : ' + pState.rightScore;
                        pResetRound(-1);
                    }
                }

                function pLoop(now) {
                    if (!pRunning) return;
                    const dt = Math.min(0.033, (now - pLast) / 1000);
                    pLast = now;
                    pUpdate(dt);
                    pRender();
                    w.requestAnimationFrame(pLoop);
                }

                function pStart() {
                    if (pRunning) return;
                    pRunning = true;
                    pLast = w.performance.now();
                    w.requestAnimationFrame(pLoop);
                }

                function pStop() {
                    pRunning = false;
                }

                pResetBtn.addEventListener('click', () => pResetGame());

                const webUrl = $('web-url');
                const webGo = $('web-go');
                const webBlank = $('web-blank');
                const webFrame = $('web-frame');

                function normalizeUrl(raw) {
                    const value = raw.trim();
                    if (!value) return 'about:blank';
                    if (/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(value)) return value;
                    return 'https://' + value;
                }

                function goToUrl() {
                    const url = normalizeUrl(webUrl.value);
                    webFrame.src = url;
                }

                webGo.addEventListener('click', goToUrl);
                webBlank.addEventListener('click', () => {
                    webUrl.value = 'about:blank';
                    webFrame.src = 'about:blank';
                });
                webUrl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') goToUrl();
                });

                function onKeyDown(e) {
                    if (activeView === 'pong') {
                        if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') keyState.up = true;
                        if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') keyState.down = true;
                        if (['w', 'W', 's', 'S', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
                        return;
                    }

                    if (activeView !== 'tetris' || tAi || tOver || !tCurrent) return;

                    if (e.key === 'ArrowLeft') tMove(-1, 0);
                    if (e.key === 'ArrowRight') tMove(1, 0);
                    if (e.key === 'ArrowDown') {
                        if (!tMove(0, 1)) tLock();
                    }
                    if (e.key === 'ArrowUp') tRotate();
                    if (e.key === ' ') tHardDrop();

                    if (['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp', ' '].includes(e.key)) {
                        e.preventDefault();
                    }
                }

                function onKeyUp(e) {
                    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') keyState.up = false;
                    if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') keyState.down = false;
                }

                w.addEventListener('keydown', onKeyDown);
                w.addEventListener('keyup', onKeyUp);

                tReset();
                mReset();
                pResetGame();
                setView('tetris');
                w.focus();
            }, 50);
        }
    </script>
</body>
