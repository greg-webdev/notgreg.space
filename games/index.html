<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #222;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <button onclick="launchGame()">Open Game</button>
    <script>
        function launchGame() {
            const w = window.open('about:blank', '_blank');
            if (!w) return;

            setTimeout(() => {
                const d = w.document;
                d.body.innerHTML = '<div id="gameWrap"><canvas id="c"></canvas></div><div id="ui"><span id="score">Score: 0</span><button id="aiBtn">AI OFF</button><div><label>Speed:</label><input type="range" id="speed" min="0.1" max="1" step="0.05" value="0.5"><span id="sp">50%</span></div></div><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;color:#fff;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;overflow:hidden}#gameWrap{padding-top:10px}#c{display:block;background:#000;border:1px solid #1f1f1f}#ui{width:302px;background:#20232a;color:#fff;padding:12px;display:flex;gap:16px;align-items:center;justify-content:space-between}#aiBtn{padding:7px 12px;background:#ff6b6b;color:#fff;border:none;cursor:pointer;border-radius:4px}#aiBtn.on{background:#51cf66}#ui div{display:flex;align-items:center;gap:6px}input{width:120px}</style>';

                const c = d.getElementById('c');
                const x = c.getContext('2d');
                const scoreEl = d.getElementById('score');
                const aiBtn = d.getElementById('aiBtn');
                const speedEl = d.getElementById('speed');
                const speedText = d.getElementById('sp');

                const W = 10;
                const H = 20;
                const B = 30;
                c.width = W * B;
                c.height = H * B;

                const TETRIMINOS = [
                    { s: [[1,1,1,1]], co: '#00e5ff' },
                    { s: [[1,0],[1,0],[1,1]], co: '#2f5dff' },
                    { s: [[0,1],[1,0],[1,1]], co: '#ffd000' },
                    { s: [[1,1,0],[0,1,1]], co: '#ff3b30' },
                    { s: [[1,1],[1,1]], co: '#39ff14' },
                    { s: [[0,1,1],[1,1,0]], co: '#ff00ff' },
                    { s: [[1,1,1],[0,1,0]], co: '#ff8c00' }
                ];

                let board = Array.from({ length: H }, () => Array(W).fill(0));
                let score = 0;
                let ai = false;
                let speed = 0.5;
                let over = false;
                let p = null;
                let np = null;

                let gravityMs = 0;
                let aiMs = 0;
                let lastFrame = w.performance.now();

                function cloneShape(shape) {
                    return shape.map(row => row.slice());
                }

                function rotateShape(shape) {
                    const rows = shape.length;
                    const cols = shape[0].length;
                    const out = Array.from({ length: cols }, () => Array(rows).fill(0));
                    for (let r = 0; r < rows; r++) {
                        for (let c2 = 0; c2 < cols; c2++) {
                            out[c2][rows - 1 - r] = shape[r][c2];
                        }
                    }
                    return out;
                }

                function uniqueRotations(shape) {
                    const seen = new Set();
                    const result = [];
                    let cur = cloneShape(shape);
                    for (let i = 0; i < 4; i++) {
                        const key = cur.map(r => r.join('')).join('|');
                        if (!seen.has(key)) {
                            seen.add(key);
                            result.push(cloneShape(cur));
                        }
                        cur = rotateShape(cur);
                    }
                    return result;
                }

                class Piece {
                    constructor(t) {
                        this.sh = cloneShape(t.s);
                        this.x = Math.floor(W / 2) - Math.ceil(this.sh[0].length / 2);
                        this.y = 0;
                        this.co = t.co;
                    }

                    ok(dx, dy, shape = this.sh, testX = this.x, testY = this.y) {
                        for (let i = 0; i < shape.length; i++) {
                            for (let j = 0; j < shape[i].length; j++) {
                                if (!shape[i][j]) continue;
                                const nx = testX + j + dx;
                                const ny = testY + i + dy;
                                if (nx < 0 || nx >= W || ny >= H) return false;
                                if (ny >= 0 && board[ny][nx]) return false;
                            }
                        }
                        return true;
                    }

                    mv(dx, dy) {
                        if (!this.ok(dx, dy)) return false;
                        this.x += dx;
                        this.y += dy;
                        return true;
                    }

                    rot() {
                        const rotated = rotateShape(this.sh);
                        if (this.ok(0, 0, rotated, this.x, this.y)) {
                            this.sh = rotated;
                        }
                    }
                }

                function newP() {
                    return new Piece(TETRIMINOS[Math.floor(Math.random() * TETRIMINOS.length)]);
                }

                function merge() {
                    for (let i = 0; i < p.sh.length; i++) {
                        for (let j = 0; j < p.sh[i].length; j++) {
                            if (!p.sh[i][j]) continue;
                            const yy = p.y + i;
                            if (yy >= 0) board[yy][p.x + j] = p.co;
                        }
                    }

                    let cleared = 0;
                    for (let r = H - 1; r >= 0; r--) {
                        if (board[r].every(Boolean)) {
                            board.splice(r, 1);
                            board.unshift(Array(W).fill(0));
                            cleared++;
                            r++;
                        }
                    }

                    score += cleared * 100;
                    p = np;
                    np = newP();

                    if (!p.ok(0, 0)) {
                        over = true;
                    }
                }

                function collides(mask, shape, px, py) {
                    for (let i = 0; i < shape.length; i++) {
                        for (let j = 0; j < shape[i].length; j++) {
                            if (!shape[i][j]) continue;
                            const x2 = px + j;
                            const y2 = py + i;
                            if (x2 < 0 || x2 >= W || y2 >= H) return true;
                            if (y2 >= 0 && mask[y2][x2]) return true;
                        }
                    }
                    return false;
                }

                function simulateDrop(mask, shape, px) {
                    let py = -4;
                    while (!collides(mask, shape, px, py + 1)) py++;
                    if (collides(mask, shape, px, py)) return null;

                    const nextMask = mask.map(r => r.slice());
                    for (let i = 0; i < shape.length; i++) {
                        for (let j = 0; j < shape[i].length; j++) {
                            if (!shape[i][j]) continue;
                            const y2 = py + i;
                            const x2 = px + j;
                            if (y2 < 0) return null;
                            nextMask[y2][x2] = 1;
                        }
                    }

                    let lines = 0;
                    for (let r = H - 1; r >= 0; r--) {
                        let full = true;
                        for (let c2 = 0; c2 < W; c2++) {
                            if (!nextMask[r][c2]) {
                                full = false;
                                break;
                            }
                        }
                        if (full) {
                            nextMask.splice(r, 1);
                            nextMask.unshift(Array(W).fill(0));
                            lines++;
                            r++;
                        }
                    }

                    return { mask: nextMask, lines, y: py };
                }

                function analyzeBoard(mask) {
                    const heights = Array(W).fill(0);
                    let holes = 0;

                    for (let col = 0; col < W; col++) {
                        let seenBlock = false;
                        for (let row = 0; row < H; row++) {
                            if (mask[row][col]) {
                                if (!seenBlock) {
                                    heights[col] = H - row;
                                    seenBlock = true;
                                }
                            } else if (seenBlock) {
                                holes++;
                            }
                        }
                    }

                    const aggregate = heights.reduce((a, b) => a + b, 0);
                    const maxHeight = Math.max(...heights);

                    let bumpiness = 0;
                    for (let i = 0; i < W - 1; i++) {
                        bumpiness += Math.abs(heights[i] - heights[i + 1]);
                    }

                    let wells = 0;
                    for (let col = 0; col < W; col++) {
                        const left = col === 0 ? heights[col + 1] + 1 : heights[col - 1];
                        const right = col === W - 1 ? heights[col - 1] + 1 : heights[col + 1];
                        if (heights[col] < left && heights[col] < right) {
                            wells += Math.min(left, right) - heights[col];
                        }
                    }

                    let topDanger = 0;
                    for (const h of heights) {
                        if (h >= H - 2) topDanger += h - (H - 3);
                    }

                    let leftMass = 0;
                    let rightMass = 0;
                    for (let col = 0; col < W; col++) {
                        if (col < W / 2) leftMass += heights[col];
                        else rightMass += heights[col];
                    }
                    const balance = Math.abs(leftMass - rightMass);

                    return { aggregate, holes, maxHeight, bumpiness, wells, topDanger, balance };
                }

                function scorePlacement(result, shape, px) {
                    const m = analyzeBoard(result.mask);
                    const lineBonus = [0, 120, 360, 900, 2200][result.lines];
                    const pieceCenter = px + shape[0].length / 2;
                    const centerPenalty = Math.abs(pieceCenter - (W / 2)) * 2;

                    return (
                        lineBonus
                        - m.aggregate * 0.45
                        - m.holes * 12
                        - m.bumpiness * 2.4
                        - m.maxHeight * 2.2
                        - m.wells * 1.5
                        - m.topDanger * 40
                        - m.balance * 1.4
                        - centerPenalty
                    );
                }

                function bestOnePly(mask, shape) {
                    const rotations = uniqueRotations(shape);
                    let best = -Infinity;

                    for (const rotShape of rotations) {
                        const maxX = W - rotShape[0].length;
                        for (let px = 0; px <= maxX; px++) {
                            const result = simulateDrop(mask, rotShape, px);
                            if (!result) continue;
                            const val = scorePlacement(result, rotShape, px);
                            if (val > best) best = val;
                        }
                    }

                    return best;
                }

                function findBestPlacement(mask, curShape, nextShape) {
                    const rotations = uniqueRotations(curShape);
                    let best = null;

                    for (const rotShape of rotations) {
                        const maxX = W - rotShape[0].length;
                        for (let px = 0; px <= maxX; px++) {
                            const first = simulateDrop(mask, rotShape, px);
                            if (!first) continue;

                            let val = scorePlacement(first, rotShape, px);

                            if (nextShape) {
                                const follow = bestOnePly(first.mask, nextShape);
                                if (follow > -Infinity) val += follow * 0.65;
                            }

                            if (!best || val > best.val) {
                                best = { val, x: px, shape: cloneShape(rotShape) };
                            }
                        }
                    }

                    return best;
                }

                function aiMove() {
                    if (!p || over) return;
                    const mask = board.map(row => row.map(cell => (cell ? 1 : 0)));
                    const best = findBestPlacement(mask, p.sh, np ? np.sh : null);

                    if (!best) {
                        over = true;
                        return;
                    }

                    p.sh = cloneShape(best.shape);
                    p.x = best.x;
                    while (p.mv(0, 1)) {}
                    merge();
                }

                function draw() {
                    x.fillStyle = '#000';
                    x.fillRect(0, 0, c.width, c.height);

                    for (let r = 0; r < H; r++) {
                        for (let c2 = 0; c2 < W; c2++) {
                            if (!board[r][c2]) continue;
                            x.fillStyle = board[r][c2];
                            x.fillRect(c2 * B, r * B, B - 1, B - 1);
                        }
                    }

                    if (p) {
                        x.fillStyle = p.co;
                        for (let i = 0; i < p.sh.length; i++) {
                            for (let j = 0; j < p.sh[i].length; j++) {
                                if (p.sh[i][j] && p.y + i >= 0) {
                                    x.fillRect((p.x + j) * B, (p.y + i) * B, B - 1, B - 1);
                                }
                            }
                        }
                    }
                }

                function loop(now) {
                    const dt = Math.min(100, now - lastFrame);
                    lastFrame = now;

                    if (!over) {
                        if (ai) {
                            aiMs += dt;
                            const aiInterval = (1 - speed) * 280 + 35;
                            if (aiMs >= aiInterval) {
                                aiMs = 0;
                                aiMove();
                            }
                        } else {
                            gravityMs += dt;
                            if (gravityMs >= 500) {
                                gravityMs = 0;
                                if (p && !p.mv(0, 1)) merge();
                            }
                        }
                    }

                    draw();
                    scoreEl.textContent = over ? ('Score: ' + score + '  GAME OVER') : ('Score: ' + score);
                    w.requestAnimationFrame(loop);
                }

                w.addEventListener('keydown', e => {
                    if (!ai && p && !over) {
                        if (e.key === 'ArrowLeft') p.mv(-1, 0);
                        if (e.key === 'ArrowRight') p.mv(1, 0);
                        if (e.key === 'ArrowUp') p.rot();
                        if (e.key === 'ArrowDown') {
                            if (!p.mv(0, 1)) merge();
                        }
                        if (e.key === ' ') {
                            while (p.mv(0, 1)) {}
                            merge();
                        }
                    }

                    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                        e.preventDefault();
                    }
                });

                aiBtn.onclick = () => {
                    ai = !ai;
                    aiBtn.textContent = ai ? 'AI ON' : 'AI OFF';
                    aiBtn.classList.toggle('on', ai);
                    aiMs = 0;
                    gravityMs = 0;
                };

                speedEl.oninput = e => {
                    speed = parseFloat(e.target.value);
                    speedText.textContent = Math.round(speed * 100) + '%';
                };

                p = newP();
                np = newP();
                w.focus();
                w.requestAnimationFrame(loop);
            }, 50);
        }
    </script>
</body>
</html>
