<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game - Home</title>
    <style>
        body { background: #222; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #333; padding: 32px 24px; border-radius: 12px; box-shadow: 0 2px 16px #0008; display: flex; flex-direction: column; align-items: center; }
        label, input { font-size: 1.2em; }
        input[type=number] { width: 80px; margin: 0 8px; }
        button { margin-top: 24px; font-size: 1.2em; padding: 8px 24px; border-radius: 6px; border: none; background: #4caf50; color: #fff; cursor: pointer; }
        button:hover { background: #388e3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snake Game</h1>
        <form id="sizeForm">
            <label>
                Width:
                <input type="number" id="width" min="40" max="1000" value="400" required>
            </label>
            <label>
                Height:
                <input type="number" id="height" min="40" max="900" value="400" required>
            </label>
            <button type="submit">Start Game</button>
        </form>
    </div>
    <script>
        document.getElementById('sizeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const w = document.getElementById('width').value;
            const h = document.getElementById('height').value;
            window.location.href = `index.html?width=${w}&height=${h}`;
        });
    </script>
</body>
</html>
