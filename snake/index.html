<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Snake Game</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #111; display: block; }
    </style>
</head>
<body style="flex-direction:column;">
    <div id="sliderRow" style="width:400px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
        <label for="speedSlider" style="color:white;margin-right:8px;">Speed:</label>
        <input type="range" id="speedSlider" min="1" max="1000" value="1" style="flex:1;">
        <span id="speedValue" style="color:white;margin-left:8px;">1x</span>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let grid = 20;
        // Parse URL params for width/height
        function getParam(name, def) {
            const m = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
            return m ? parseInt(decodeURIComponent(m[1])) : def;
        }
        let width = getParam('width', 400);
        let height = getParam('height', 400);
        // Clamp to allowed range
        width = Math.max(40, Math.min(1000, width));
        height = Math.max(40, Math.min(900, height));
        // Set grid size to fit evenly (max 50x50 grid)
        let cols = Math.floor(width / grid);
        let rows = Math.floor(height / grid);
        // Adjust grid size to fit canvas exactly
        grid = Math.min(Math.floor(width / cols), Math.floor(height / rows));
        cols = Math.floor(width / grid);
        rows = Math.floor(height / grid);
        width = cols * grid;
        height = rows * grid;
        // Set canvas size
        canvas.width = width;
        canvas.height = height;
        document.getElementById('sliderRow').style.width = width + 'px';
        let snake = [{x: 200, y: 200}];
        let dx = grid, dy = 0;
        let food = {x: 100, y: 100};
        let gameOver = false;
        let botMode = false;
        let speed = 1;
        let baseDelay = 100;
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        speedSlider.addEventListener('input', function() {
            speed = parseInt(this.value);
            speedValue.textContent = speed + 'x';
        });

        function draw() {
            ctx.clearRect(0, 0, 400, 400);

            // Draw food
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, grid, grid);

            // Draw snake
            ctx.fillStyle = 'lime';
            snake.forEach(s => ctx.fillRect(s.x, s.y, grid, grid));
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                food.x = Math.floor(Math.random() * 20) * grid;
                food.y = Math.floor(Math.random() * 20) * grid;
            } else {
                snake.pop();
            }
        }

        function checkCollision() {
            const head = snake[0];
            // Wall collision
            if (head.x < 0 || head.x >= width || head.y < 0 || head.y >= height) return true;
            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -grid; }
            else if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = grid; }
            else if (e.key === 'ArrowLeft' && dx === 0) { dx = -grid; dy = 0; }
            else if (e.key === 'ArrowRight' && dx === 0) { dx = grid; dy = 0; }
            else if (e.key === 'b' || e.key === 'B') {
                botMode = !botMode;
                if (botMode) {
                    gameOver = false;
                }
            }
        });

        function botAI() {
            // Greedy AI: move toward food, avoid collisions
            const head = snake[0];
            const directions = [
                {dx: 0, dy: -grid}, // up
                {dx: 0, dy: grid},  // down
                {dx: -grid, dy: 0}, // left
                {dx: grid, dy: 0}   // right
            ];
            // Sort directions by distance to food
            directions.sort((a, b) => {
                const ax = head.x + a.dx, ay = head.y + a.dy;
                const bx = head.x + b.dx, by = head.y + b.dy;
                const distA = Math.abs(ax - food.x) + Math.abs(ay - food.y);
                const distB = Math.abs(bx - food.x) + Math.abs(by - food.y);
                return distA - distB;
            });
            // Try each direction, pick the first that doesn't collide
            for (let dir of directions) {
                const newHead = {x: head.x + dir.dx, y: head.y + dir.dy};
                // Check wall collision
                if (newHead.x < 0 || newHead.x >= width || newHead.y < 0 || newHead.y >= height) continue;
                // Check self collision
                let collision = false;
                for (let i = 0; i < snake.length; i++) {
                    if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
                        collision = true;
                        break;
                    }
                }
                if (!collision) {
                    dx = dir.dx;
                    dy = dir.dy;
                    return;
                }
            }
            // If all directions collide, just keep current direction (will die)
        }

        function loop() {
            if (gameOver) {
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.fillText('Game Over', 120, 200);
                return;
            }
            if (botMode) {
                botAI();
            }
            moveSnake();
            gameOver = checkCollision();
            draw();
            // Speed: 1x = 100ms, 1000x = 0.1ms (minimum 1ms for browser safety)
            let delay = Math.max(1, baseDelay / speed);
            setTimeout(loop, delay);
        }

        loop();
    </script>
</body>
</html>
