<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Snake Game</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #111; display: block; }
    </style>
</head>
<body style="flex-direction:column;">
    <div id="startScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
        <div style="background:#333;padding:32px 24px;border-radius:12px;box-shadow:0 2px 16px #0008;display:flex;flex-direction:column;align-items:center;">
            <h1>Snake Game</h1>
            <form id="sizeForm">
                <label style="color:white;">Width:
                    <input type="number" id="width" min="40" max="1000" value="400" required style="width:80px;margin:0 8px;">
                </label>
                <label style="color:white;">Height:
                    <input type="number" id="height" min="40" max="900" value="400" required style="width:80px;margin:0 8px;">
                </label>
                <button type="submit" style="margin-top:24px;font-size:1.2em;padding:8px 24px;border-radius:6px;border:none;background:#4caf50;color:#fff;cursor:pointer;">Start Game</button>
            </form>
        </div>
    </div>
    <div id="gameContainer" style="display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;">
        <div id="sliderRow" style="width:400px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
            <label for="speedSlider" style="color:white;margin-right:8px;">Speed:</label>
            <input type="range" id="speedSlider" min="1" max="1000" value="1" style="flex:1;">
            <span id="speedValue" style="color:white;margin-left:8px;">1x</span>
        </div>
        <canvas id="game" width="400" height="400"></canvas>
    </div>
    <script>
        // --- Home/start logic ---
        let width = 400, height = 400;
        let grid = 20;
        let cols = 20, rows = 20;
        let canvas, ctx, speedSlider, speedValue;
        let snake, dx, dy, food, gameOver, botMode, speed, baseDelay;
        let gameStarted = false;

        document.getElementById('sizeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            width = Math.max(40, Math.min(1000, parseInt(document.getElementById('width').value)));
            height = Math.max(40, Math.min(900, parseInt(document.getElementById('height').value)));
            grid = 20;
            cols = Math.floor(width / grid);
            rows = Math.floor(height / grid);
            width = cols * grid;
            height = rows * grid;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            canvas = document.getElementById('game');
            ctx = canvas.getContext('2d');
            canvas.width = width;
            canvas.height = height;
            document.getElementById('sliderRow').style.width = width + 'px';
            speedSlider = document.getElementById('speedSlider');
            speedValue = document.getElementById('speedValue');
            startGame();
        });

        function startGame() {
            snake = [{x: Math.floor(cols/2)*grid, y: Math.floor(rows/2)*grid}];
            dx = grid; dy = 0;
            food = {x: grid * Math.floor(Math.random() * cols), y: grid * Math.floor(Math.random() * rows)};
            gameOver = false;
            botMode = false;
            speed = 1;
            baseDelay = 100;
            speedSlider.value = 1;
            speedValue.textContent = '1x';
            speedSlider.oninput = function() {
                speed = parseInt(this.value);
                speedValue.textContent = speed + 'x';
            };
            document.addEventListener('keydown', handleKey);
            if (!gameStarted) {
                gameStarted = true;
                loop();
            }
        }

        function handleKey(e) {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -grid; }
            else if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = grid; }
            else if (e.key === 'ArrowLeft' && dx === 0) { dx = -grid; dy = 0; }
            else if (e.key === 'ArrowRight' && dx === 0) { dx = grid; dy = 0; }
            else if (e.key === 'b' || e.key === 'B') {
                botMode = !botMode;
                if (botMode) gameOver = false;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            // Draw food
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, grid, grid);
            // Draw snake
            ctx.fillStyle = 'lime';
            snake.forEach(s => ctx.fillRect(s.x, s.y, grid, grid));
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            // Eat food
            if (head.x === food.x && head.y === food.y) {
                // Place food at random empty cell
                let empty = [];
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        if (!snake.some(s => s.x === x * grid && s.y === y * grid)) {
                            empty.push({x: x * grid, y: y * grid});
                        }
                    }
                }
                if (empty.length > 0) {
                    let f = empty[Math.floor(Math.random() * empty.length)];
                    food.x = f.x;
                    food.y = f.y;
                }
            } else {
                snake.pop();
            }
        }

        function checkCollision() {
            const head = snake[0];
            // Wall collision
            if (head.x < 0 || head.x >= width || head.y < 0 || head.y >= height) return true;
            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        // (Key handler moved to handleKey)

        function botAI() {
            // Advanced BFS pathfinding AI
            const head = snake[0];
            const directions = [
                {dx: 0, dy: -grid}, // up
                {dx: 0, dy: grid},  // down
                {dx: -grid, dy: 0}, // left
                {dx: grid, dy: 0}   // right
            ];
            // BFS to find shortest path to food
            function posKey(x, y) { return x + ',' + y; }
            let queue = [{x: head.x, y: head.y, path: []}];
            let visited = new Set();
            snake.forEach(s => visited.add(posKey(s.x, s.y)));
            visited.delete(posKey(head.x, head.y)); // allow head
            let found = null;
            while (queue.length > 0) {
                let {x, y, path} = queue.shift();
                if (x === food.x && y === food.y) { found = path; break; }
                for (let dir of directions) {
                    let nx = x + dir.dx, ny = y + dir.dy;
                    if (nx < 0 || nx >= width || ny < 0 || ny >= height) continue;
                    if (visited.has(posKey(nx, ny))) continue;
                    visited.add(posKey(nx, ny));
                    queue.push({x: nx, y: ny, path: path.concat([{dx: dir.dx, dy: dir.dy}])});
                }
            }
            if (found && found.length > 0) {
                dx = found[0].dx;
                dy = found[0].dy;
                return;
            }
            // If no path to food, try to survive: pick any safe move
            for (let dir of directions) {
                let nx = head.x + dir.dx, ny = head.y + dir.dy;
                if (nx < 0 || nx >= width || ny < 0 || ny >= height) continue;
                let collision = false;
                for (let i = 0; i < snake.length; i++) {
                    if (nx === snake[i].x && ny === snake[i].y) { collision = true; break; }
                }
                if (!collision) {
                    dx = dir.dx;
                    dy = dir.dy;
                    return;
                }
            }
            // If all else fails, keep current direction (will die)
        }

        function loop() {
            if (!gameStarted) return;
            if (gameOver) {
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.fillText('Game Over', width/2-80, height/2);
                return;
            }
            if (botMode) {
                botAI();
            }
            moveSnake();
            gameOver = checkCollision();
            draw();
            // Speed: 1x = 100ms, 1000x = 0.1ms (minimum 1ms for browser safety)
            let delay = Math.max(1, baseDelay / speed);
            setTimeout(loop, delay);
        }
    </script>
</body>
</html>
