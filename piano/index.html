<!-- 
  A simple website that dynamically generates a list of checkboxes for powers of two.
  The generation starts at 2 and continues until the value is greater than 1 billion.
  This page is styled using Tailwind CSS for a clean, responsive design.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piano</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font for a clean look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Style for the checkbox itself */
        input[type="checkbox"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            height: 1.5rem;
            width: 1.5rem;
            min-width: 1.5rem;
            border: 2px solid #6366f1; /* Indigo-500 border */
            border-radius: 0.375rem; /* Rounded corners */
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        input[type="checkbox"]:checked {
            background-color: #6366f1; /* Indigo-500 background when checked */
            border-color: #6366f1;
        }
        input[type="checkbox"]:checked::before {
            content: '✓';
            color: white;
            font-size: 1rem;
            display: block;
            text-align: center;
            line-height: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-2xl bg-gray-800 p-8 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-semibold text-center mb-6 text-indigo-400">Piano</h1>
        <p class="text-center text-gray-400 mb-8">
            Checkboxes
        </p>

        <!-- Container for the dynamically generated checkboxes -->
        <div id="checkbox-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Checkboxes will be inserted here by JavaScript -->
        </div>

        <!-- Added a "Wins" counter below the checkboxes -->
        <div class="mt-8 text-center text-xl font-semibold text-green-400 bg-gray-700 p-4 rounded-lg shadow-md">
            Wins: <span id="win-counter">1</span>
        </div>
    </main>

    <script>
        // Get the container element where checkboxes will be added
        const container = document.getElementById('checkbox-container');
        
        // Initial value is 2
        let value = 2;
        const limit = 10000000000000;

        // Loop to generate checkboxes until the value exceeds the limit
        while (value <= limit) {
            // Create a new div to hold the label and checkbox for styling
            const checkboxWrapper = document.createElement('div');
            checkboxWrapper.className = 'flex items-center space-x-3 bg-gray-700 p-4 rounded-lg shadow-md hover:bg-gray-600 transition-colors duration-200 cursor-pointer';

            // Create the checkbox input element
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `pow2-${value}`;
            checkbox.value = value;
            
            // Create the label for the checkbox
            const label = document.createElement('label');
            label.htmlFor = `pow2-${value}`;
            label.textContent = value.toLocaleString(); // Use toLocaleString for number formatting
            label.className = 'text-gray-200 text-lg font-medium cursor-pointer';
            
            // Append the checkbox and label to the wrapper
            checkboxWrapper.appendChild(checkbox);
            checkboxWrapper.appendChild(label);

            // Add an onclick handler to the wrapper to toggle the checkbox
            checkboxWrapper.onclick = () => {
                checkbox.checked = !checkbox.checked;
            };

            // Append the new checkbox wrapper to the main container
            container.appendChild(checkboxWrapper);

            // Double the value for the next iteration
            value *= 2;
        }
    </script>
</body>
</html>
