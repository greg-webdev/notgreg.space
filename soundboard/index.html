<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Sound Board</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a;
            color: white;
            font-family: 'system-ui', -apple-system, sans-serif;
            flex-direction: column;
        }

        .container {
            padding: 2rem;
            text-align: center;
            max-width: 900px;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #38bdf8;
            text-shadow: 3px 3px 0px #0369a1;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        .sound-btn {
            position: relative;
            height: 120px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 8px 0px var(--shadow-color);
            background: var(--btn-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .sound-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 0px var(--shadow-color);
        }

        .sound-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px var(--shadow-color);
        }

        /* Unique button colors */
        .btn-1 { --btn-color: #ef4444; --shadow-color: #991b1b; }
        .btn-2 { --btn-color: #22c55e; --shadow-color: #166534; }
        .btn-3 { --btn-color: #3b82f6; --shadow-color: #1e40af; }
        .btn-4 { --btn-color: #eab308; --shadow-color: #854d0e; }
        .btn-5 { --btn-color: #a855f7; --shadow-color: #6b21a8; }
        .btn-6 { --btn-color: #f97316; --shadow-color: #9a3412; }
        .btn-7 { --btn-color: #06b6d4; --shadow-color: #155e75; }
        .btn-8 { --btn-color: #ec4899; --shadow-color: #9d174d; }
        .btn-9 { --btn-color: #6366f1; --shadow-color: #3730a3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sound Board</h1>
        <div class="button-grid">
            <button class="sound-btn btn-1" onclick="playSound('can-i-haz-chezburger-plz')">Can I Haz Chezburger</button>
            <button class="sound-btn btn-2" onclick="playSound('mmmm-chezburger')">Mmmm Chezburger</button>
            <button class="sound-btn btn-3" onclick="playSound('yuno-miles-super-fast-rap-song')">Yuno Miles Fast</button>
            <button class="sound-btn btn-4" onclick="playSound('we-do-not-care')">We Do Not Care</button>
            <button class="sound-btn btn-5" onclick="playSound('gyatt-for-rizzmas')">Gyatt Rizzmas</button>
            <button class="sound-btn btn-6" onclick="playSound('mario-fart')">Mario Fart</button>
            <button class="sound-btn btn-7" onclick="playSound('yeah-boiii-i-i-i')">Yeah Boiii</button>
            <button class="sound-btn btn-8" onclick="playSound('roblox-classic-explosion')">Roblox Explosion</button>
            <button class="sound-btn btn-9" onclick="playSound('vine-boom')">Vine Boom</button>
        </div>
    </div>

    <script>
        let currentAudio = null;

        function playSound(name) {
            // Stop and reset current audio if it exists
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            const url = `https://www.myinstants.com/media/sounds/${name}.mp3`;
            currentAudio = new Audio(url);
            currentAudio.play().catch(e => console.error("Playback failed:", e));
        }
    </script>
</body>
</html>
