<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Minecraft APK Download</title>
	<style>
		:root {
			--bg: #10141f;
			--panel: #1a2233;
			--text: #f3f6ff;
			--muted: #c9d4ef;
			--accent: #3fa34d;
			--accent-hover: #4ab85a;
		}

		html, body {
			margin: 0;
			padding: 0;
			min-height: 100%;
			font-family: "Segoe UI", Tahoma, Arial, sans-serif;
			background: radial-gradient(circle at 20% 20%, #1f2d4a 0%, var(--bg) 55%);
			color: var(--text);
		}

		.wrap {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 20px;
			box-sizing: border-box;
		}

		.panel {
			width: min(92vw, 620px);
			background: var(--panel);
			border: 1px solid rgba(255, 255, 255, 0.18);
			border-radius: 14px;
			padding: 22px;
			box-shadow: 0 16px 38px rgba(0, 0, 0, 0.4);
			text-align: center;
		}

		h1 {
			margin: 0 0 10px;
			font-size: 1.7rem;
		}

		p {
			margin: 0 0 18px;
			color: var(--muted);
			line-height: 1.45;
		}

		.download {
			display: inline-block;
			text-decoration: none;
			border: 1px solid rgba(255, 255, 255, 0.3);
			border-radius: 10px;
			padding: 12px 18px;
			background: var(--accent);
			color: #fff;
			font-weight: 700;
			transition: background 0.15s ease;
		}

		.download:hover {
			background: var(--accent-hover);
		}

		.file {
			margin-top: 12px;
			font-size: 0.95rem;
			color: #a6b6dc;
			word-break: break-all;
		}
	</style>
</head>
<body>
	<main class="wrap">
		<section class="panel">
			<h1>Minecraft APK</h1>
			<p>Click below to download the APK file.</p>
			<a class="download" href="minecraft-26-1.apk" download>Download APK</a>
			<div class="file">File: minecraft-26-1.apk</div>
		</section>
	</main>
</body>
</html>
