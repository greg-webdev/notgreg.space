<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            --bg-color: #121212;
            --search-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }

        .logo {
            max-width: 120px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        form {
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background-color: var(--search-bg);
            color: var(--text-color);
            outline: none;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s;
        }

        input[type="text"]:focus {
            background-color: #252525;
        }

        .shortcuts {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Liquid Glass Shortcut Button Styles */
        .shortcut {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.20);
        }

        .shortcut:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.12) 100%);
            box-shadow: 0 12px 48px 0 rgba(31, 38, 135, 0.35);
        }

        .shortcut:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.15);
        }

        /* Glass Enabled State */
        .shortcut.glass-enabled {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0.15) 100%) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 2px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.25), inset 1px 1px 0 rgba(255, 255, 255, 0.3);
        }
        .shortcut.glass-enabled:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.25) 100%) !important;
            box-shadow: 0 12px 48px 0 rgba(255, 255, 255, 0.35), inset 1px 1px 0 rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        /* Toggle Button */
        .glass-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .glass-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .glass-toggle.active {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <button 
            class="glass-toggle"
            id="glassToggle"
            onclick="toggleGlass()"
        >
            🔵 Glass OFF
        </button>

        <div class="search-container">
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" placeholder="Search or enter URL" autocomplete="off" autofocus>
            </form>
        </div>

        <div class="shortcuts">
            <a href="https://notgreg.space" class="shortcut" title="NotGreg">NG</a>
            <a href="https://youtube.com" class="shortcut" title="YouTube">YT</a>
            <a href="https://notgreg.space/opticals" class="shortcut" title="Opticals">OP</a>
            <a href="https://eelslap.com" class="shortcut" title="Eelslap">EEL</a>
        </div>
    </div>

    <script>
        let glassEnabled = false;

        function toggleGlass() {
            glassEnabled = !glassEnabled;
            const toggle = document.getElementById('glassToggle');
            const shortcuts = document.querySelectorAll('.shortcut');
            
            toggle.classList.toggle('active');
            toggle.textContent = glassEnabled ? '✨ Glass ON' : '🔵 Glass OFF';
            
            shortcuts.forEach(shortcut => {
                shortcut.classList.toggle('glass-enabled');
            });
        }
    </script>

</body>
</html>
