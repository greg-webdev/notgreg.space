<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSTV Encoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #2a2a44;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #file-input-label {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #ffffff;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
        }

        #file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #file-input {
            display: none;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #mode-select {
            background-color: #3b3b5b;
            color: #e0e0e0;
            border: 2px solid #5a5a7a;
            padding: 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        #mode-select:focus {
            outline: none;
            border-color: #6a11cb;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f72585 0%, #b5179e 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:disabled {
            background: #4a4a5c;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        canvas {
            border-radius: 1rem;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            border: 2px solid #5a5a7a;
        }

        #status-message {
            text-align: center;
            font-weight: 600;
            min-height: 24px; /* Maintain layout space */
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

<div class="container">
    <h1 class="text-3xl font-bold text-center mb-4 text-blue-300">SSTV Encoder</h1>
    <p class="text-center text-gray-400">
        Encode an image into an audio signal using various Slow-Scan Television modes.
    </p>

    <div class="input-group">
        <label id="file-input-label" for="file-input">
            <i class="fas fa-file-image"></i> Select an Image
        </label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="select-group">
        <label for="mode-select" class="text-center font-bold">Select SSTV Mode:</label>
        <select id="mode-select">
            <option value="robot36">Robot 36</option>
            <option value="martin1">Martin 1</option>
            <option value="martin2">Martin 2</option>
            <option value="scottie1">Scottie 1</option>
            <option value="pd120">PD120</option>
        </select>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <button id="encode-btn" class="btn-primary" disabled>
            <i class="fas fa-play"></i> Start Encoding
        </button>
        <button id="stop-btn" class="btn-primary" disabled>
            <i class="fas fa-stop"></i> Stop
        </button>
    </div>

    <div class="flex justify-center">
        <canvas id="image-canvas" width="320" height="240"></canvas>
    </div>

    <p id="status-message" class="text-green-400"></p>
</div>

<script>
    // Constants for SSTV modes
    const SAMPLES_PER_SECOND = 44100;
    const FREQ_SYNC = 1200;
    const FREQ_BLACK = 1500;
    const FREQ_WHITE = 2300;
    const FREQ_VIS_START = 1900;
    const FREQ_VIS_END = 1200;
    const FREQ_VIS_DATA = [1100, 1300, 1500, 1700, 1900, 2100, 2300, 2500];

    // Define all modes and their parameters in a single object
    const MODES = {
        robot36: {
            vis: [0, 0, 1, 1, 1, 1, 0, 0], // 0x3C
            lineDuration: 0.13824, // 138.24ms (Y/U/V channels)
            sync: 0.009,
            porch: 0.003,
            visBit: 0.030,
            blackFreq: 1500,
            whiteFreq: 2300
        },
        martin1: {
            vis: [0, 0, 1, 0, 1, 1, 0, 0], // 0x2C
            lineDuration: 0.1464, // 146.4ms (R/G/B channels)
            sync: 0.0048,
            porch: 0.0015,
            visBit: 0.010,
            blackFreq: 1500,
            whiteFreq: 2300
        },
        martin2: {
            vis: [0, 0, 1, 0, 0, 1, 0, 0], // 0x24
            lineDuration: 0.237, // 237ms (R/G/B channels)
            sync: 0.0048,
            porch: 0.0015,
            visBit: 0.010,
            blackFreq: 1500,
            whiteFreq: 2300
        },
        scottie1: {
            vis: [0, 0, 1, 1, 1, 1, 0, 0], // 0x3C
            lineDuration: 0.11024, // 110.24ms (R/G/B channels)
            sync: 0.009,
            porch: 0.0015,
            visBit: 0.030,
            blackFreq: 1500,
            whiteFreq: 2300
        },
        pd120: {
            // Note: PD120 is a digital mode and is more complex.
            // This implementation is a simplification and will play a single tone
            // to indicate the mode has been selected.
            vis: null, // No VIS for this simplified version
            lineDuration: 0.120,
            sync: 0,
            porch: 0,
            visBit: 0,
            blackFreq: 1500,
            whiteFreq: 2300
        }
    };

    const IMAGE_WIDTH = 320;
    const IMAGE_HEIGHT = 240;

    let audioContext;
    let isPlaying = false;

    // UI elements
    const fileInput = document.getElementById('file-input');
    const encodeBtn = document.getElementById('encode-btn');
    const stopBtn = document.getElementById('stop-btn');
    const canvas = document.getElementById('image-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const statusMessage = document.getElementById('status-message');
    const modeSelect = document.getElementById('mode-select');

    /**
     * Helper function to play a single tone for a given duration.
     * @param {number} frequency - The frequency of the tone in Hz.
     * @param {number} duration - The duration of the tone in seconds.
     * @returns {Promise<void>} A promise that resolves when the tone has finished playing.
     */
    function playTone(frequency, duration) {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        return new Promise(resolve => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            gainNode.gain.setValueAtTime(1, audioContext.currentTime);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);

            oscillator.onended = () => {
                resolve();
            };
        });
    }

    /**
     * Encodes a single pixel's color value to an SSTV frequency.
     * @param {number} value - The pixel value (0-255).
     * @param {number} blackFreq - The frequency for black.
     * @param {number} whiteFreq - The frequency for white.
     * @returns {number} The corresponding frequency in Hz.
     */
    function valueToFrequency(value, blackFreq, whiteFreq) {
        return blackFreq + (value / 255) * (whiteFreq - blackFreq);
    }

    /**
     * The main function to encode and play the SSTV signal.
     */
    async function startEncoding() {
        if (isPlaying) {
            statusMessage.textContent = "Encoding is already in progress.";
            return;
        }

        isPlaying = true;
        encodeBtn.disabled = true;
        stopBtn.disabled = false;
        statusMessage.textContent = "Starting encoding...";

        const selectedMode = modeSelect.value;
        const modeParams = MODES[selectedMode];

        // Step 1: Play sync pulse
        if (modeParams.sync > 0) {
            statusMessage.textContent = "Playing Sync Pulse...";
            await playTone(FREQ_SYNC, modeParams.sync);
            await playTone(modeParams.blackFreq, modeParams.porch); // Porch
        }

        // Step 2: Play calibration header & VIS
        if (modeParams.vis) {
            statusMessage.textContent = "Playing Calibration Tones...";
            await playTone(modeParams.blackFreq, 0.3);
            await playTone(FREQ_VIS_START, 0.01);
            await playTone(FREQ_VIS_END, 0.01);

            statusMessage.textContent = "Playing VIS Code...";
            for (const bit of modeParams.vis) {
                const freq = FREQ_VIS_DATA[bit];
                await playTone(freq, modeParams.visBit);
            }
            await playTone(FREQ_VIS_END, 0.01);
        } else {
            // Placeholder for modes without VIS in this simplified example
            statusMessage.textContent = `Simplified PD120 mode selected. Playing mode tone...`;
            await playTone(1000, 2); // Play a tone for 2 seconds to signify the mode.
            await playTone(1500, 2);
            await playTone(2000, 2);
        }

        // Step 3: Transmit the image data line by line
        const imageData = ctx.getImageData(0, 0, IMAGE_WIDTH, IMAGE_HEIGHT);
        const data = imageData.data;
        const pixelDuration = (modeParams.lineDuration - modeParams.sync - modeParams.porch) / IMAGE_WIDTH;

        for (let y = 0; y < IMAGE_HEIGHT; y++) {
            statusMessage.textContent = `Encoding line ${y + 1} of ${IMAGE_HEIGHT} for ${selectedMode}...`;
            
            if (modeParams.sync > 0) {
                await playTone(FREQ_SYNC, modeParams.sync);
                await playTone(modeParams.blackFreq, modeParams.porch);
            }

            for (let x = 0; x < IMAGE_WIDTH; x++) {
                const i = (y * IMAGE_WIDTH + x) * 4;
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // Play Red component
                await playTone(valueToFrequency(r, modeParams.blackFreq, modeParams.whiteFreq), pixelDuration / 3);
                // Play Green component
                await playTone(valueToFrequency(g, modeParams.blackFreq, modeParams.whiteFreq), pixelDuration / 3);
                // Play Blue component
                await playTone(valueToFrequency(b, modeParams.blackFreq, modeParams.whiteFreq), pixelDuration / 3);
            }
        }
        
        statusMessage.textContent = "Encoding complete!";
        isPlaying = false;
        encodeBtn.disabled = false;
        stopBtn.disabled = true;
    }

    /**
     * Stops the encoding process.
     */
    function stopEncoding() {
        if (audioContext) {
            audioContext.close().then(() => {
                audioContext = null;
                isPlaying = false;
                encodeBtn.disabled = false;
                stopBtn.disabled = true;
                statusMessage.textContent = "Encoding stopped.";
            }).catch(e => {
                console.error("Error stopping audio context:", e);
                statusMessage.textContent = "Error stopping encoding.";
            });
        }
    }

    /**
     * Renders the uploaded image to the canvas for preview.
     * @param {File} file - The image file object.
     */
    function renderImageToCanvas(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, IMAGE_WIDTH, IMAGE_HEIGHT);
                encodeBtn.disabled = false;
                statusMessage.textContent = "Image loaded. Ready to encode!";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
    
    // Add event listeners
    fileInput.addEventListener('change', (event) => {
        if (event.target.files.length > 0) {
            renderImageToCanvas(event.target.files[0]);
        }
    });

    encodeBtn.addEventListener('click', startEncoding);
    stopBtn.addEventListener('click', stopEncoding);
</script>

</body>
</html>
