<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSTV Encoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #2a2a44;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #file-input-label {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #ffffff;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
        }

        #file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #file-input {
            display: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f72585 0%, #b5179e 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:disabled {
            background: #4a4a5c;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        canvas {
            border-radius: 1rem;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            border: 2px solid #5a5a7a;
            background-color: #000;
        }

        #status-message {
            text-align: center;
            font-weight: 600;
            min-height: 24px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

<div class="container">
    <h1 class="text-3xl font-bold text-center mb-4 text-blue-300">SSTV Encoder</h1>
    <p class="text-center text-gray-400">
        Encode an image into a Scottie S1 audio signal and download it as a WAV file.
    </p>

    <div class="input-group">
        <label id="file-input-label" for="file-input">
            <i class="fas fa-file-image"></i> Select an Image
        </label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <button id="download-btn" class="btn-primary" disabled>
            <i class="fas fa-download"></i> Download SSTV Audio
        </button>
    </div>

    <div class="flex justify-center">
        <canvas id="image-canvas" width="320" height="256"></canvas>
    </div>

    <p id="status-message" class="text-green-400">Please select an image to begin encoding.</p>
</div>

<script>
    // UI elements
    const fileInput = document.getElementById('file-input');
    const downloadBtn = document.getElementById('download-btn');
    const canvas = document.getElementById('image-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const statusMessage = document.getElementById('status-message');
    
    // SSTV Constants (Scottie S1 mode)
    const SAMPLES_PER_SECOND = 44100;
    const WIDTH = 320;
    const HEIGHT = 256;
    const DELAY = 0.1; // In seconds.
    const MODE = 60; // Scottie S1
    const COLOR_LOW = 1500;
    const COLOR_HIGH = 2300;
    
    // Total length is recalculated based on the new header structure
    // This value is more accurate
    const TOTAL_LENGTH = 1000 * (0.3 + 0.01 + 0.3 + (7 * 0.03 + 0.03 + 0.03) + 256 * ((9 + 1.5) / 1000 + 0.432 * 3));
    
    let audioContext;
    let audioBuffer;

    // Helper class to manage SSTV tones
    class Tone {
        #context;
        #audioBuffer;
        #currentSample;
        
        constructor(context, length) {
            this.#context = context;
            this.#audioBuffer = this.#context.createBuffer(1, length, SAMPLES_PER_SECOND);
            this.#currentSample = 0;
        }

        // Generates a tone and adds it to the internal buffer
        tone(frequency, duration) {
            const numSamples = Math.floor(duration * SAMPLES_PER_SECOND / 1000);
            const channelData = this.#audioBuffer.getChannelData(0);
            
            for (let i = 0; i < numSamples; i++) {
                const time = i / SAMPLES_PER_SECOND;
                const value = Math.sin(2 * Math.PI * frequency * time);
                if (this.#currentSample + i < channelData.length) {
                    channelData[this.#currentSample + i] = value;
                }
            }
            this.#currentSample += numSamples;
        }

        // Encodes the VIS (Vertical Interval Signaling) mode
        mode(mode) {
            // Start bit
            this.tone(1200, 30);
            
            // 7 data bits (LSB first)
            const bits = Array.from(
                mode.toString(2).padStart(7, '0'),
                Number
            ).reverse();

            for (const bit of bits) {
                this.tone(bit ? 1100 : 1300, 30);
            }
            
            // Even parity bit
            const parity = bits.reduce((sum, curr) => sum ^ curr, 0);
            this.tone(parity ? 1100 : 1300, 30);
            
            // Stop bit
            this.tone(1200, 30);
        }

        getBuffer() {
            return this.#audioBuffer;
        }
    }

    /**
     * Writes the image data to an audio buffer using SSTV protocols.
     * @param {ImageData} imageData - The image data to encode.
     * @param {Tone} tone - The Tone object to write to.
     */
    function writeImageToTone(imageData, tone) {
        // Calibration Header
        tone.tone(1900, 300);
        tone.tone(1200, 10);
        tone.tone(1900, 300);
        tone.mode(MODE);

        // Start sync (first line only)
        tone.tone(1200, 9);
        for (let y = 0; y < HEIGHT; y++) {
            const start = y * WIDTH * 4;

            for (const channel of [1, 2, 0]) { // G, B, R channels
                if (channel === 0) {
                    // Horizontal sync (red only)
                    tone.tone(1200, 9);
                }
                // Separator tone
                tone.tone(1500, 1.5);
                for (let x = 0; x < WIDTH; x++) {
                    const value = imageData.data[start + x * 4 + channel];
                    tone.tone(
                        COLOR_LOW + (COLOR_HIGH - COLOR_LOW) * (value / 255),
                        0.432
                    );
                }
            }
        }
    }

    /**
     * Creates a WAV file header.
     * @param {number} byteCount - Total data size in bytes.
     * @param {number} sampleRate - The sample rate.
     * @param {number} channelCount - The number of audio channels.
     * @returns {DataView} The WAV header.
     */
    const encoder = new TextEncoder();
    function createWavHeader(byteCount, sampleRate, channelCount = 1) {
        const header = new DataView(new ArrayBuffer(44));
        const byteView = new Uint8Array(header.buffer);
        
        // RIFF chunk
        byteView.set(encoder.encode('RIFF'), 0);
        header.setUint32(4, byteCount + 36, true);
        byteView.set(encoder.encode('WAVE'), 8);

        // fmt chunk
        byteView.set(encoder.encode('fmt '), 12);
        header.setUint32(16, 16, true);
        header.setUint16(20, 1, true); // Audio format: PCM
        header.setUint16(22, channelCount, true);
        header.setUint32(24, sampleRate, true);
        header.setUint32(28, sampleRate * 4, true); // Byte rate
        header.setUint16(32, channelCount * 2, true); // Block align
        header.setUint16(34, 16, true); // Bits per sample

        // data chunk
        byteView.set(encoder.encode('data'), 36);
        header.setUint32(40, byteCount, true);

        return header;
    }

    /**
     * Renders the image to the canvas and then encodes it to a WAV file for download.
     * @param {File} file - The image file object.
     */
    async function encodeAndDownload(file) {
        downloadBtn.disabled = true;
        statusMessage.textContent = "Loading image...";
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            const img = new Image();
            img.onload = async () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, WIDTH, HEIGHT);
                
                statusMessage.textContent = "Encoding SSTV signal...";

                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }

                const totalSamples = Math.ceil(TOTAL_LENGTH * SAMPLES_PER_SECOND / 1000);
                const tone = new Tone(audioContext, totalSamples);
                writeImageToTone(ctx.getImageData(0, 0, WIDTH, HEIGHT), tone);
                
                const buffer = tone.getBuffer();
                const floats = buffer.getChannelData(0);
                
                // Convert floating-point samples to 16-bit integers
                const view = new DataView(new ArrayBuffer(floats.length * 2));
                for (const [i, float] of floats.entries()) {
                    view.setInt16(i * 2, Math.min(Math.max(float, -1), 1) * 0x7fff, true);
                }

                // Create the WAV Blob
                const blob = new Blob([createWavHeader(view.byteLength, SAMPLES_PER_SECOND), view], {
                    type: 'audio/wav'
                });

                // Trigger the download
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'sstv-image.wav';
                document.body.appendChild(a);
                a.click();
                
                // Clean up
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusMessage.textContent = "Download complete!";
                downloadBtn.disabled = false;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Add event listeners
    fileInput.addEventListener('change', (event) => {
        if (event.target.files.length > 0) {
            downloadBtn.disabled = false;
            statusMessage.textContent = `Image selected. Ready to encode.`;
        }
    });

    downloadBtn.addEventListener('click', () => {
        if (fileInput.files.length > 0) {
            encodeAndDownload(fileInput.files[0]);
        } else {
            statusMessage.textContent = "Please select an image first.";
        }
    });
</script>

</body>
</html>
