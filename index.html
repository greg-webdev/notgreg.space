<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greg's Homepage</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .prism-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000;
    }

    .prism-container {
      width: 100%;
      height: 100%;
    }

    .banner {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 18px 12px;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 800;
      background: rgba(0, 0, 0, 0.55);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      letter-spacing: 0.02em;
    }

    .content {
      position: relative;
      z-index: 1;
      width: min(760px, 92vw);
      margin: 0 auto;
      padding: 11vh 20px 40px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.05;
      text-shadow: 0 0 26px rgba(255, 255, 255, 0.35);
    }

    .about {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 28px;
    }

    .cta {
      font-size: 1.05rem;
      padding: 12px 26px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.44);
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .cta:hover {
      background: rgba(255, 255, 255, 0.17);
      border-color: rgba(255, 255, 255, 0.74);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    function Prism({ timeScale = 1.0 }) {
      const containerRef = useRef(null);

      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;

        const canvas = document.createElement("canvas");
        canvas.style.position = "absolute";
        canvas.style.inset = "0";
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.display = "block";
        container.appendChild(canvas);

        const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        if (!gl) {
          return () => {
            if (canvas.parentElement === container) container.removeChild(canvas);
          };
        }

        const vertexShaderSource = `
          attribute vec2 a_pos;
          void main() {
            gl_Position = vec4(a_pos, 0.0, 1.0);
          }
        `;

        const fragmentShaderSource = `
          precision highp float;

          uniform vec2 u_resolution;
          uniform float u_time;

          float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
          }

          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);

            float a = hash(i + vec2(0.0, 0.0));
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));

            return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
          }

          void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = uv * 2.0 - 1.0;
            p.x *= u_resolution.x / u_resolution.y;

            float t = u_time * 0.55;

            float ring = length(p);
            float shardA = sin((p.x * 8.0 + p.y * 3.0) + t * 1.5);
            float shardB = cos((p.y * 10.0 - p.x * 2.5) - t * 1.2);
            float grain = noise(p * 6.0 + vec2(t * 0.7, -t * 0.5));

            vec3 col = vec3(0.01, 0.01, 0.015);
            col += vec3(0.25, 0.45, 0.95) * (0.35 + 0.35 * shardA);
            col += vec3(0.95, 0.35, 0.75) * (0.20 + 0.30 * shardB);
            col += vec3(0.40, 0.90, 0.95) * (0.16 + 0.20 * grain);

            float vignette = smoothstep(1.45, 0.12, ring);
            col *= vignette;

            gl_FragColor = vec4(col, 1.0);
          }
        `;

        const compileShader = (type, source) => {
          const shader = gl.createShader(type);
          if (!shader) return null;
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.warn("Shader compile error:", gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
          }
          return shader;
        };

        const vs = compileShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fs = compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource);
        if (!vs || !fs) {
          return () => {
            if (canvas.parentElement === container) container.removeChild(canvas);
          };
        }

        const program = gl.createProgram();
        if (!program) return;
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          console.warn("Program link error:", gl.getProgramInfoLog(program));
          return;
        }

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([-1, -1, 3, -1, -1, 3]),
          gl.STATIC_DRAW
        );

        const posLoc = gl.getAttribLocation(program, "a_pos");
        const timeLoc = gl.getUniformLocation(program, "u_time");
        const resLoc = gl.getUniformLocation(program, "u_resolution");

        const resize = () => {
          const dpr = Math.min(2, window.devicePixelRatio || 1);
          const w = Math.max(1, container.clientWidth);
          const h = Math.max(1, container.clientHeight);
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          gl.viewport(0, 0, canvas.width, canvas.height);
        };

        resize();
        const ro = new ResizeObserver(resize);
        ro.observe(container);

        let raf = 0;
        const started = performance.now();

        const draw = () => {
          const t = (performance.now() - started) * 0.001 * timeScale;

          gl.useProgram(program);
          gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
          gl.enableVertexAttribArray(posLoc);
          gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

          if (resLoc) gl.uniform2f(resLoc, canvas.width, canvas.height);
          if (timeLoc) gl.uniform1f(timeLoc, t);

          gl.drawArrays(gl.TRIANGLES, 0, 3);
          raf = requestAnimationFrame(draw);
        };

        raf = requestAnimationFrame(draw);

        return () => {
          cancelAnimationFrame(raf);
          ro.disconnect();

          if (positionBuffer) gl.deleteBuffer(positionBuffer);
          if (program) gl.deleteProgram(program);
          if (vs) gl.deleteShader(vs);
          if (fs) gl.deleteShader(fs);
          if (canvas.parentElement === container) container.removeChild(canvas);
        };
      }, [timeScale]);

      return <div className="prism-container" ref={containerRef} />;
    }

    function App() {
      return (
        <div className="page">
          <div className="prism-bg">
            <Prism timeScale={1.0} />
          </div>

          <div className="banner">Happy Birthday Mom!</div>

          <main className="content">
            <h1>Welcome to Greg's Homepage</h1>
            <div className="about">
              <p>Hi, I'm Greg, 13 years old.</p>
              <p>I like coding for fun!</p>
            </div>
            <button className="cta" onClick={() => { window.location.href = "/about"; }}>
              Learn More About Me
            </button>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
