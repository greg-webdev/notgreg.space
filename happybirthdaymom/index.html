<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff69b4 0%, #00aaff 100%);
            color: #ffffff;
            text-align: center;
        }
        .birthday-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            border: 3px solid #ff69b4;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #00aaff;
        }
        p {
            font-size: 1.5rem;
            margin: 1rem 0;
            line-height: 1.6;
            color: #333;
        }
        .hearts {
            font-size: 3rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="birthday-card">
        <h1>Happy Birthday Mom! 🎉</h1>
        <p>Wishing you a day filled with love, laughter, and all your favorite things!</p>
        <p>You are the best mom ever! ❤️</p>
        <div class="hearts">💖 💕 💗 💓 💞</div>
    </div>
</body>
</html>
