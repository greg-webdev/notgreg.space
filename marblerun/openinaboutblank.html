        drawCtx.beginPath();
        drawCtx.arc(0, 0, coreR, 0, TAU);
        drawCtx.fill();
        for (let i = 0; i < 8; i += 1) {
          const a = (i / 8) * TAU;
          const tx = Math.cos(a) * size * 0.45;
          const ty = Math.sin(a) * size * 0.45;
          drawCtx.fillRect(tx - size * 0.06, ty - size * 0.06, size * 0.12, size * 0.12);
        }
      }

      if (selected) {
        drawCtx.strokeStyle = "#ff9e40";
        drawCtx.lineWidth = 2;
        drawCtx.strokeRect(-half - 4, -half - 4, size + 8, size + 8);
      }

      drawCtx.restore();
    }

    function drawParts() {
      for (const part of state.parts) {
        const pose = state.partPoses.get(part.id);
        if (!pose) {
          continue;
        }
        const base = partColor(part);
        const selected = part.id === state.selectedPartId;

        if (isPathMover(part)) {
          ensurePartPathEndpoints(part);
          const ax = part.fromX;
          const ay = part.fromY;
          const bx = part.toX;
          const by = part.toY;
          ctx.strokeStyle = "rgba(60, 58, 48, 0.24)";
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        drawPartShape(ctx, part, pose, base, selected);

        if (!part.active && part.motion !== "static") {
          ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
          ctx.font = "700 12px Space Grotesk";
          ctx.fillText("OFF", pose.x - 14, pose.y + 4);
        }
      }
    }

    function drawPads() {
      for (const pad of state.pads) {
        const pose = state.partPoses.get(pad.id);
        if (!pose) {
          continue;
        }
        const selected = pad.id === state.selectedPartId;
        drawPartShape(ctx, pad, pose, partColor(pad), selected);
      }
    }

    function drawSelectedHandles() {
      const selectedLine = getSelectedLine();
      if (selectedLine) {
        ctx.strokeStyle = "rgba(255, 158, 64, 0.9)";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(selectedLine.x1, selectedLine.y1);
        ctx.lineTo(selectedLine.x2, selectedLine.y2);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = "#ff9e40";
        ctx.beginPath();
        ctx.arc(selectedLine.x1, selectedLine.y1, 7, 0, TAU);
        ctx.fill();

        ctx.fillStyle = "#2fbf71";
        ctx.beginPath();
        ctx.arc(selectedLine.x2, selectedLine.y2, 7, 0, TAU);
        ctx.fill();
        return;
      }

      const part = findPartById(state.selectedPartId);
      if (!part) {
        return;
      }

      const pose = state.partPoses.get(part.id) || { x: part.x, y: part.y };
      const hx = pose.x + part.size * 0.62;
      const hy = pose.y - part.size * 0.62;

      ctx.fillStyle = "#0d8b96";
      ctx.fillRect(hx - 6, hy - 6, 12, 12);
      ctx.strokeStyle = "rgba(12, 62, 68, 0.9)";
      ctx.lineWidth = 2;
      ctx.strokeRect(hx - 6, hy - 6, 12, 12);

      if (isTeleportPad(part)) {
        const target = ensureTeleportTarget(part);
        ctx.strokeStyle = "rgba(90, 109, 255, 0.8)";
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(pose.x, pose.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = "rgba(90, 109, 255, 0.16)";
        ctx.strokeStyle = "rgba(90, 109, 255, 0.95)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(target.x, target.y, 8, 0, TAU);
        ctx.fill();
        ctx.stroke();
      }

      if (!isPathMover(part)) {
        return;
      }

      ensurePartPathEndpoints(part);

      ctx.strokeStyle = "rgba(255, 158, 64, 0.9)";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(part.fromX, part.fromY);
      ctx.lineTo(part.toX, part.toY);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "#ff9e40";
      ctx.beginPath();
      ctx.arc(part.fromX, part.fromY, 7, 0, TAU);
      ctx.fill();

      ctx.fillStyle = "#2fbf71";
      ctx.beginPath();
      ctx.arc(part.toX, part.toY, 7, 0, TAU);
      ctx.fill();

      ctx.fillStyle = "rgba(20, 28, 36, 0.9)";
      ctx.font = "700 11px IBM Plex Mono";
      ctx.fillText("FROM", part.fromX + 10, part.fromY - 8);
      ctx.fillText("TO", part.toX + 10, part.toY - 8);
    }

    function selectPartInRect(x1, y1, x2, y2) {
      const minX = Math.min(x1, x2);
      const minY = Math.min(y1, y2);
      const maxX = Math.max(x1, x2);
      const maxY = Math.max(y1, y2);

      rebuildColliderCache();
      let chosen = null;
      let bestDist = Number.POSITIVE_INFINITY;
      const cx = (minX + maxX) * 0.5;
      const cy = (minY + maxY) * 0.5;

      for (const part of state.parts) {
        const pose = state.partPoses.get(part.id);
        if (!pose) {
          continue;
        }
        if (pose.x < minX || pose.x > maxX || pose.y < minY || pose.y > maxY) {
          continue;
        }
        const d = distanceSq(cx, cy, pose.x, pose.y);
        if (d < bestDist) {
          bestDist = d;
          chosen = part;
        }
      }

      for (const pad of state.pads) {
        const pose = state.partPoses.get(pad.id);
        if (!pose) {
          continue;
        }
        if (pose.x < minX || pose.x > maxX || pose.y < minY || pose.y > maxY) {
          continue;
        }
        const d = distanceSq(cx, cy, pose.x, pose.y);
        if (d < bestDist) {
          bestDist = d;
          chosen = pad;
        }
      }

      let chosenLine = -1;
      for (let i = 0; i < state.lineSegments.length; i += 1) {
        const line = state.lineSegments[i];
        const mx = (line.x1 + line.x2) * 0.5;
        const my = (line.y1 + line.y2) * 0.5;
        if (mx < minX || mx > maxX || my < minY || my > maxY) {
          continue;
        }
        const d = distanceSq(cx, cy, mx, my);
        if (d < bestDist) {
          bestDist = d;
          chosen = null;
          chosenLine = i;
        }
      }

      if (chosen) {
        setSelectedPart(chosen.id);
      } else {
        setSelectedLineIndex(chosenLine);
      }
    }

    function prepareMiniCanvas(cnv, drawCtx, targetHeight) {
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      cnv.style.height = targetHeight.toFixed(0) + "px";
      const rect = cnv.getBoundingClientRect();
      const bw = Math.max(1, Math.floor(rect.width * dpr));
      const bh = Math.max(1, Math.floor(rect.height * dpr));
      if (cnv.width !== bw || cnv.height !== bh) {
        cnv.width = bw;
        cnv.height = bh;
      }
      drawCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { width: rect.width, height: rect.height };
    }

    function drawSelectedPreview() {
      const part = findPartById(state.selectedPartId);
      const previewHeight = clamp(part ? part.size * 2.1 : 120, 120, 260);
      const dims = prepareMiniCanvas(previewCanvas, previewCtx, previewHeight);
      const w = dims.width;
      const h = dims.height;

      previewCtx.clearRect(0, 0, w, h);

      const g = previewCtx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, "#fffef9");
      g.addColorStop(1, "#f1e6d1");
      previewCtx.fillStyle = g;
      previewCtx.fillRect(0, 0, w, h);

      if (!part) {
        previewCtx.fillStyle = "rgba(30, 31, 38, 0.55)";
        previewCtx.font = "700 14px Space Grotesk";
        previewCtx.fillText("No selected item", 12, 24);
        return;
      }

      const cx = w * 0.5;
      const cy = h * 0.6;
      const p = {
        ...part,
        x: cx,
        y: cy
      };

      ensurePartPathEndpoints(part);

      if (isPathMover(part)) {
        const dx = part.toX - part.fromX;
        const dy = part.toY - part.fromY;
        p.fromX = cx - dx * 0.32;
        p.fromY = cy - dy * 0.32;
        p.toX = cx + dx * 0.32;
        p.toY = cy + dy * 0.32;

        previewCtx.strokeStyle = "rgba(60, 58, 48, 0.35)";
        previewCtx.lineWidth = 2;
        previewCtx.setLineDash([5, 4]);
        previewCtx.beginPath();
        previewCtx.moveTo(p.fromX, p.fromY);
        previewCtx.lineTo(p.toX, p.toY);
        previewCtx.stroke();
        previewCtx.setLineDash([]);

        previewCtx.fillStyle = "#ff9e40";
        previewCtx.beginPath();
        previewCtx.arc(p.fromX, p.fromY, 4, 0, TAU);
        previewCtx.fill();

        previewCtx.fillStyle = "#2fbf71";
        previewCtx.beginPath();
        previewCtx.arc(p.toX, p.toY, 4, 0, TAU);
        previewCtx.fill();
      }

      const previewPose = computePartPose(p, state.simTime);
      drawPartShape(previewCtx, p, previewPose, partColor(p), true);
    }

    function drawToolPreview() {
      const dims = prepareMiniCanvas(toolPreviewCanvas, toolPreviewCtx, 90);
      const w = dims.width;
      const h = dims.height;
      toolPreviewCtx.clearRect(0, 0, w, h);

      const g = toolPreviewCtx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, "#fffef9");
      g.addColorStop(1, "#f2e8d4");
      toolPreviewCtx.fillStyle = g;
      toolPreviewCtx.fillRect(0, 0, w, h);

      const tool = ui.tool.value;
      if (tool === "line") {
        toolPreviewCtx.strokeStyle = "#5f5848";
        toolPreviewCtx.lineWidth = 6;
        toolPreviewCtx.beginPath();
        toolPreviewCtx.moveTo(24, h * 0.72);
        toolPreviewCtx.lineTo(w - 24, h * 0.28);
        toolPreviewCtx.stroke();
        return;
      }

      if (tool === "peg") {
        const r = 16;
        const cx = w * 0.5;
        const cy = h * 0.52;
        const ring = toolPreviewCtx.createRadialGradient(cx - r * 0.4, cy - r * 0.4, 1, cx, cy, r);
        ring.addColorStop(0, "#fff");
        ring.addColorStop(0.45, "#f4d796");
        ring.addColorStop(1, "#c28c2f");
        toolPreviewCtx.fillStyle = ring;
        toolPreviewCtx.beginPath();
        toolPreviewCtx.arc(cx, cy, r, 0, TAU);
        toolPreviewCtx.fill();
        return;
      }

      if (tool === "trigger") {
        toolPreviewCtx.fillStyle = "rgba(14, 160, 169, 0.16)";
        toolPreviewCtx.strokeStyle = "rgba(14, 160, 169, 0.86)";
        toolPreviewCtx.lineWidth = 2;
        toolPreviewCtx.fillRect(40, 18, w - 80, h - 34);
        toolPreviewCtx.strokeRect(40, 18, w - 80, h - 34);
        return;
      }

      if (tool === "select") {
        toolPreviewCtx.fillStyle = "rgba(255, 158, 64, 0.18)";
        toolPreviewCtx.strokeStyle = "rgba(255, 158, 64, 0.95)";
        toolPreviewCtx.lineWidth = 2;
        toolPreviewCtx.fillRect(44, 20, w - 88, h - 40);
        toolPreviewCtx.strokeRect(44, 20, w - 88, h - 40);
        return;
      }

      const p = createPart(tool, w * 0.5, h * 0.58);
      if (!p) {
        return;
      }

      p.size = clamp(world.partSize, 22, Math.min(w, h) * 0.7);
      syncPartPathFromCenter(p);

      if (isPathMover(p)) {
        const dx = p.toX - p.fromX;
        const dy = p.toY - p.fromY;
        p.fromX = p.x - dx * 0.28;
        p.fromY = p.y - dy * 0.28;
        p.toX = p.x + dx * 0.28;
        p.toY = p.y + dy * 0.28;
        toolPreviewCtx.strokeStyle = "rgba(60, 58, 48, 0.26)";
        toolPreviewCtx.lineWidth = 2;
        toolPreviewCtx.setLineDash([4, 4]);
        toolPreviewCtx.beginPath();
        toolPreviewCtx.moveTo(p.fromX, p.fromY);
        toolPreviewCtx.lineTo(p.toX, p.toY);
        toolPreviewCtx.stroke();
        toolPreviewCtx.setLineDash([]);
      }

      const pose = computePartPose(p, state.simTime);
      drawPartShape(toolPreviewCtx, p, pose, partColor(p), false);
    }

    function drawTriggers() {
      for (const t of state.triggers) {
        const flash = t.flash > 0 ? 0.28 : 0.14;
        ctx.fillStyle = "rgba(14, 160, 169, " + flash.toFixed(3) + ")";
        ctx.strokeStyle = "rgba(14, 160, 169, 0.8)";
        ctx.lineWidth = 2;
        ctx.fillRect(t.x, t.y, t.w, t.h);
        ctx.strokeRect(t.x, t.y, t.w, t.h);

        ctx.fillStyle = "rgba(20, 28, 36, 0.82)";
        ctx.font = "700 11px IBM Plex Mono";
        ctx.fillText(t.action + " -> " + t.target, t.x + 4, t.y + 14);
      }
    }

    function drawMarbles() {
      for (const m of state.marbles) {
        const speed = Math.hypot(m.vx, m.vy);
        const streakLength = Math.min(42, speed * 0.03 * world.trail * 1.8);
        if (streakLength > 2.5 && speed > 0.0001) {
          const inv = 1 / speed;
          const sx = m.x - m.vx * inv * streakLength;
          const sy = m.y - m.vy * inv * streakLength;
          const streak = ctx.createLinearGradient(m.x, m.y, sx, sy);
          streak.addColorStop(0, "rgba(255, 255, 255, 0.55)");
          streak.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.strokeStyle = streak;
          ctx.lineWidth = Math.max(1.4, m.r * 0.5);
          ctx.beginPath();
          ctx.moveTo(m.x, m.y);
          ctx.lineTo(sx, sy);
          ctx.stroke();
        }

        const grad = ctx.createRadialGradient(m.x - m.r * 0.35, m.y - m.r * 0.35, 1, m.x, m.y, m.r);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.35, m.color);
        grad.addColorStop(1, "#29313a");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, TAU);
        ctx.fill();
      }
    }

    function drawDraft() {
      if (ui.tool.value === "select" && state.selectionRect) {
        const r = state.selectionRect;
        ctx.fillStyle = "rgba(255, 158, 64, 0.14)";
        ctx.strokeStyle = "rgba(255, 158, 64, 0.9)";
        ctx.lineWidth = 2;
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.strokeRect(r.x, r.y, r.w, r.h);
        return;
      }

      if (!state.pointerDown || !state.drawStart) {
        return;
      }

      if (ui.tool.value !== "line" && ui.tool.value !== "trigger") {
        return;
      }

      if (ui.tool.value === "line") {
        ctx.strokeStyle = "rgba(13, 139, 150, 0.95)";
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(state.drawStart.x, state.drawStart.y);
        ctx.lineTo(state.pointer.x, state.pointer.y);
        ctx.stroke();
        ctx.setLineDash([]);
      } else {
        const x = Math.min(state.drawStart.x, state.pointer.x);
        const y = Math.min(state.drawStart.y, state.pointer.y);
        const w = Math.max(10, Math.abs(state.drawStart.x - state.pointer.x));
        const h = Math.max(10, Math.abs(state.drawStart.y - state.pointer.y));
        ctx.fillStyle = "rgba(14, 160, 169, 0.16)";
        ctx.strokeStyle = "rgba(14, 160, 169, 0.86)";
        ctx.lineWidth = 2;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);
      }
    }

    function updateHud(msPerFrame) {
      const fps = msPerFrame > 0 ? Math.round(1000 / msPerFrame) : 0;
      state.fps = fps;
      const moving = state.parts.filter((p) => p.motion !== "static").length;
      hud.textContent =
        "marbles:  " + state.marbles.length + "\n" +
        "lines:    " + state.lineSegments.length + "\n" +
        "pegs:     " + state.pegs.length + "\n" +
        "parts:    " + state.parts.length + "\n" +
        "moving:   " + moving + "\n" +
        "pads:     " + state.pads.length + "\n" +
        "triggers: " + state.triggers.length + "\n" +
        "score:    " + state.score + "\n" +
        "fps:      " + fps;
    }

    function resetDemoCourse() {
      clearWorld(false);
      const w = world.width;
      const h = world.height;

      addLine(24, h * 0.12, w * 0.34, h * 0.16);
      addLine(w * 0.34, h * 0.16, w * 0.56, h * 0.28);
      addLine(w * 0.56, h * 0.28, w * 0.78, h * 0.25);
      addLine(w * 0.1, h * 0.36, w * 0.4, h * 0.51);
      addLine(w * 0.42, h * 0.5, w * 0.88, h * 0.62);
      addLine(w * 0.12, h * 0.74, w * 0.7, h * 0.9);

      for (let i = 0; i < 7; i += 1) {
        addPeg(w * 0.2 + i * (w * 0.07), h * 0.23 + ((i % 2) * h * 0.05), 9);
      }

      const b1 = createPart("sMoveBlock", w * 0.28, h * 0.56);
      b1.moveDistance = 160;
      b1.moveAngle = Math.PI * 0.03;
      b1.moveSpeed = 1.6;
      syncPartPathFromCenter(b1);
      state.parts.push(b1);
      rememberBuild("parts", b1);

      const b2 = createPart("lMoveWedge", w * 0.72, h * 0.72);
      b2.moveDistance = 150;
      b2.moveAngle = Math.PI * 0.85;
      b2.moveSpeed = 1.25;
      syncPartPathFromCenter(b2);
      state.parts.push(b2);
      rememberBuild("parts", b2);

      const b3 = createPart("wMoveCircle", w * 0.64, h * 0.36);
      b3.moveDistance = 190;
      b3.moveSpeed = 0.95;
      b3.moveAngle = Math.PI * 1.25;
      syncPartPathFromCenter(b3);
      state.parts.push(b3);
      rememberBuild("parts", b3);

      const s1 = createPart("spinGear", w * 0.49, h * 0.56);
      s1.spinSpeed = 2.9;
      s1.size = 74;
      state.parts.push(s1);
      rememberBuild("parts", s1);

      const s2 = createPart("spinBlock", w * 0.83, h * 0.84);
      s2.spinSpeed = -2.4;
      s2.size = 64;
      state.parts.push(s2);
      rememberBuild("parts", s2);

      const tpadA = createPart("teleport", w * 0.2, h * 0.62);
      tpadA.size = 44;
      state.pads.push(tpadA);
      rememberBuild("pads", tpadA);

      const tpadB = createPart("teleport", w * 0.9, h * 0.3);
      tpadB.size = 44;
      state.pads.push(tpadB);
      rememberBuild("pads", tpadB);

      const boost = createPart("boost", w * 0.54, h * 0.76);
      boost.baseAngle = -Math.PI * 0.5;
      state.pads.push(boost);
      rememberBuild("pads", boost);

      const goal = createPart("goal", w * 0.92, h * 0.91);
      goal.size = 48;
      state.pads.push(goal);
      rememberBuild("pads", goal);

      const hazard = createPart("hazard", w * 0.44, h * 0.9);
      hazard.size = 44;
      state.pads.push(hazard);
      rememberBuild("pads", hazard);

      addTriggerZone(w * 0.07, h * 0.18, w * 0.15, h * 0.3);
      const last = state.triggers[state.triggers.length - 1];
      last.action = "toggle";
      last.target = "all-moving";
      rebuildTriggerLinkOptions();

      for (let i = 0; i < 5; i += 1) {
        spawnMarble(30 + i * 18, 12, 20);
      }
    }

    let previousTime = performance.now();
    let accumulator = 0;
    const fixedStep = 1 / 120;

    function frame(now) {
      const elapsed = Math.min(0.05, (now - previousTime) / 1000);
      previousTime = now;

      if (!state.paused) {
        accumulator += elapsed;
        while (accumulator >= fixedStep) {
          step(fixedStep);
          accumulator -= fixedStep;
        }
      }

      rebuildColliderCache();
      drawBackground();
      drawLineSegments();
      drawPegs();
      drawTriggers();
      drawParts();
      drawPads();
      drawSelectedHandles();
      drawMarbles();
      drawDraft();
      drawSelectedPreview();
      drawToolPreview();
      updateHud(now - (frame.lastNow || now));
      frame.lastNow = now;

      requestAnimationFrame(frame);
    }
    frame.lastNow = 0;

    ui.gravity.addEventListener("input", updateUiValueLabels);
    ui.bounce.addEventListener("input", updateUiValueLabels);
    ui.friction.addEventListener("input", updateUiValueLabels);
    ui.marbleSize.addEventListener("input", updateUiValueLabels);
    ui.timeScale.addEventListener("input", updateUiValueLabels);
    ui.motorPower.addEventListener("input", updateUiValueLabels);
    ui.trail.addEventListener("input", updateUiValueLabels);
    ui.partSize.addEventListener("input", updateUiValueLabels);
    ui.moveDistance.addEventListener("input", updateUiValueLabels);
    ui.moveSpeed.addEventListener("input", updateUiValueLabels);
    ui.spinSpeed.addEventListener("input", updateUiValueLabels);
    ui.moveAngle.addEventListener("input", updateUiValueLabels);
    ui.phase.addEventListener("input", updateUiValueLabels);

    ui.applySelected.addEventListener("click", () => {
      const part = findPartById(state.selectedPartId);
      if (part) {
        applyTuningToPart(part);
      }
      updateSelectionInfo();
    });

    ui.updateSelectedFromMenu.addEventListener("click", () => {
      applySelectedEditorValues();
    });

    ui.selectedActive.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedX.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedY.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedFromX.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedFromY.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedToX.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedToY.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedAngle.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.selectedSize.addEventListener("change", () => {
      applySelectedEditorValues();
    });

    ui.movingTriggerLink.addEventListener("change", () => {
      const part = findPartById(state.selectedPartId);
      if (!part || part.motion === "static" || part.padType) {
        return;
      }
      part.activationTriggerId = ui.movingTriggerLink.value;
      syncSelectedEditorFromPart();
    });

    ui.toolCategory.addEventListener("change", () => {
      rebuildToolOptions();
      drawToolPreview();
    });

    ui.tool.addEventListener("change", () => {
      syncToolMenuFromTool();
      drawToolPreview();
    });

    ui.newRunTab.addEventListener("click", () => {
      createRunTab();
    });

    ui.saveMbr.addEventListener("click", () => {
      saveToMbrFile();
    });

    ui.loadMbr.addEventListener("click", () => {
      ui.loadMbrInput.click();
    });

    ui.loadMbrInput.addEventListener("change", async (evt) => {
      const file = evt.target.files && evt.target.files[0];
      ui.loadMbrInput.value = "";
      if (!file) {
        return;
      }

      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        loadFromMbrPayload(payload);
      } catch (error) {
        alert("Could not load .mbr file: " + (error && error.message ? error.message : "Invalid file"));
      }
    });

    ui.themeToggle.addEventListener("click", () => {
      state.darkMode = !state.darkMode;
      applyTheme();
    });

    ui.spawn.addEventListener("click", () => {
      spawnMarble(world.width * 0.12, 12, 24);
    });

    ui.burst.addEventListener("click", () => {
      for (let i = 0; i < 20; i += 1) {
        spawnMarble(world.width * 0.08 + Math.random() * 120, 10 - i * 2, (Math.random() - 0.5) * 65);
      }
    });

    ui.rain.addEventListener("click", () => {
      state.raining = !state.raining;
      ui.rain.textContent = state.raining ? "Stop Rain" : "Start Rain";
    });

    ui.pause.addEventListener("click", () => {
      state.paused = !state.paused;
      ui.pause.textContent = state.paused ? "Resume" : "Pause";
    });

    ui.clearMarbles.addEventListener("click", () => {
      clearWorld(true);
    });

    ui.clearTracks.addEventListener("click", () => {
      clearWorld(false);
    });

    ui.undo.addEventListener("click", () => {
      undoBuild();
    });

    ui.demo.addEventListener("click", () => {
      resetDemoCourse();
    });

    canvas.addEventListener("pointerdown", (evt) => {
      canvas.setPointerCapture(evt.pointerId);
      const pos = getPointerPosition(evt);
      state.pointerDown = true;
      state.pointer = pos;
      state.dragLast = pos;

      if (ui.tool.value === "line" || ui.tool.value === "trigger") {
        state.drawStart = pos;
        state.dragMode = "draw";
        return;
      }

      if (ui.tool.value === "select") {
        if (getSelectedTeleportHandleAt(pos.x, pos.y)) {
          state.dragMode = "drag-teleport-target";
          return;
        }

        const lineHandle = getSelectedLineHandleAt(pos.x, pos.y);
        if (lineHandle) {
          state.dragMode = lineHandle;
          return;
        }

        if (getSelectedResizeHandleAt(pos.x, pos.y)) {
          state.dragMode = "resize-part";
          return;
        }

        const handle = getSelectedHandleAt(pos.x, pos.y);
        if (handle) {
          state.dragMode = handle === "from" ? "drag-from" : "drag-to";
          return;
        }

        const selected = findPartById(state.selectedPartId);
        rebuildColliderCache();
        if (selected) {
          const pose = state.partPoses.get(selected.id);
          if (pose && distanceSq(pos.x, pos.y, pose.x, pose.y) < Math.max(14, selected.size * 0.6) ** 2) {
            state.dragMode = "move-part";
            return;
          }
        }

        if (isNearSelectedLine(pos.x, pos.y)) {
          state.dragMode = "move-line";
          return;
        }

        state.dragMode = "select-rect";
        state.drawStart = pos;
        state.selectionRect = { x: pos.x, y: pos.y, w: 0, h: 0 };
        return;
      }

      const clickedItem = getNearestSelectableAt(pos.x, pos.y, 24);
      if (clickedItem && !evt.altKey) {
        setSelectedPart(clickedItem.id);
        state.pointerDown = false;
        state.dragMode = null;
        return;
      }

      if (ui.tool.value === "peg") {
        addPeg(pos.x, pos.y, 9);
        state.pointerDown = false;
        return;
      }

      addPart(ui.tool.value, pos.x, pos.y);
      state.pointerDown = false;
      state.dragMode = null;
    });

    canvas.addEventListener("pointermove", (evt) => {
      state.pointer = getPointerPosition(evt);

      if (!state.pointerDown || ui.tool.value !== "select") {
        return;
      }

      const part = findPartById(state.selectedPartId);
      const selectedLine = getSelectedLine();

      if (state.dragMode === "drag-line-from" && selectedLine) {
        selectedLine.x1 = state.pointer.x;
        selectedLine.y1 = state.pointer.y;
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "drag-line-to" && selectedLine) {
        selectedLine.x2 = state.pointer.x;
        selectedLine.y2 = state.pointer.y;
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "move-line" && selectedLine && state.dragLast) {
        const dx = state.pointer.x - state.dragLast.x;
        const dy = state.pointer.y - state.dragLast.y;
        selectedLine.x1 += dx;
        selectedLine.y1 += dy;
        selectedLine.x2 += dx;
        selectedLine.y2 += dy;
        state.dragLast = { x: state.pointer.x, y: state.pointer.y };
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "drag-teleport-target" && isTeleportPad(part)) {
        part.teleportTargetX = state.pointer.x;
        part.teleportTargetY = state.pointer.y;
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "drag-from" && part && isPathMover(part)) {
        part.fromX = state.pointer.x;
        part.fromY = state.pointer.y;
        syncPartCenterFromPath(part);
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "drag-to" && part && isPathMover(part)) {
        part.toX = state.pointer.x;
        part.toY = state.pointer.y;
        syncPartCenterFromPath(part);
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "resize-part" && part) {
        rebuildColliderCache();
        const pose = state.partPoses.get(part.id) || { x: part.x, y: part.y };
        const dist = Math.hypot(state.pointer.x - pose.x, state.pointer.y - pose.y);
        part.size = clamp(dist / 0.62, 14, 260);
        syncSelectedEditorFromPart();
        return;
      }

      if (state.dragMode === "move-part" && part && state.dragLast) {
        const dx = state.pointer.x - state.dragLast.x;
        const dy = state.pointer.y - state.dragLast.y;
        moveSelectedPartBy(dx, dy);
        state.dragLast = { x: state.pointer.x, y: state.pointer.y };
        return;
      }

      if (state.dragMode === "select-rect" && state.drawStart) {
        state.selectionRect = {
          x: Math.min(state.drawStart.x, state.pointer.x),
          y: Math.min(state.drawStart.y, state.pointer.y),
          w: Math.abs(state.pointer.x - state.drawStart.x),
          h: Math.abs(state.pointer.y - state.drawStart.y)
        };
      }
    });

    canvas.addEventListener("pointerup", (evt) => {
      const pos = getPointerPosition(evt);

      if (ui.tool.value === "select") {
        if (state.dragMode === "select-rect" && state.drawStart) {
          const w = Math.abs(pos.x - state.drawStart.x);
          const h = Math.abs(pos.y - state.drawStart.y);
          if (w < 6 && h < 6) {
            selectNearestPart(pos.x, pos.y);
          } else {
            selectPartInRect(state.drawStart.x, state.drawStart.y, pos.x, pos.y);
          }
        }

        state.pointerDown = false;
        state.drawStart = null;
        state.dragMode = null;
        state.dragLast = null;
        state.selectionRect = null;
        return;
      }

      if (state.pointerDown && state.drawStart) {
        if (ui.tool.value === "line") {
          addLine(state.drawStart.x, state.drawStart.y, pos.x, pos.y);
        } else if (ui.tool.value === "trigger") {
          addTriggerZone(state.drawStart.x, state.drawStart.y, pos.x, pos.y);
        }
      }
      state.pointerDown = false;
      state.drawStart = null;
      state.dragMode = null;
      state.dragLast = null;
      state.selectionRect = null;
    });

    canvas.addEventListener("pointercancel", () => {
      state.pointerDown = false;
      state.drawStart = null;
      state.dragMode = null;
      state.dragLast = null;
      state.selectionRect = null;
    });

    canvas.addEventListener("contextmenu", (evt) => {
      evt.preventDefault();
      const pos = getPointerPosition(evt);
      removeNearestPiece(pos.x, pos.y);
    });

    window.addEventListener("keydown", (evt) => {
      if (isTypingTarget(evt.target)) {
        return;
      }

      const key = evt.key.toLowerCase();
      if (evt.code === "Space") {
        evt.preventDefault();
        spawnMarble(world.width * 0.14, 10, 24);
      }
      if (evt.key === "Delete" || evt.key === "Backspace") {
        evt.preventDefault();
        deleteSelectedItem();
      }
      if (key === "u") {
        undoBuild();
      }
      if (key === "p") {
        state.paused = !state.paused;
        ui.pause.textContent = state.paused ? "Resume" : "Pause";
      }
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
    });

    resizeCanvas();
    updateUiValueLabels();
    applyTheme();
    rebuildToolOptions("line");
    syncToolMenuFromTool();
    rebuildTriggerLinkOptions();
    createRunTab("Run 1", makeEmptySceneData(), true);
    resetDemoCourse();
    saveActiveRunData();
    renderRunTabs();
    drawToolPreview();
    drawSelectedPreview();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
</template>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101820;
      color: #e8eef4;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .launcher {
      display: grid;
      gap: 12px;
      text-align: center;
      padding: 20px;
      border: 1px solid #2f3f4f;
      border-radius: 12px;
      background: #172431;
      width: min(92vw, 420px);
    }

    button {
      border: 1px solid #3c5165;
      border-radius: 10px;
      padding: 10px 14px;
      background: #223446;
      color: #e8eef4;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    #status {
      min-height: 1.2em;
      font-size: 13px;
      color: #9fb4c8;
    }
  </style>

  <div class="launcher">
    <div>Marble Run Standalone Launcher</div>
    <button id="openBtn" type="button">Open Marble Run in about:blank</button>
    <div id="status"></div>
  </div>

  <script>
    const source = document.getElementById("marbleRunSource");
    const openBtn = document.getElementById("openBtn");
    const status = document.getElementById("status");

    function setStatus(message) {
      status.textContent = message || "";
    }

    openBtn.addEventListener("click", () => {
      if (!source) {
        setStatus("Missing embedded Marble Run source.");
        return;
      }

      const win = window.open("about:blank", "_blank");
      if (!win) {
        setStatus("Popup blocked. Allow popups and try again.");
        return;
      }

      const html = "<!DOCTYPE html>\n" + source.innerHTML;
      win.document.open();
      win.document.write(html);
      win.document.close();
      setStatus("Opened Marble Run in a new about:blank page.");
    });
  </script>
</body>
</html>
