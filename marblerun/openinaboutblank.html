<head>

<body>
  <template id="marbleRunSource"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marble Run Simulator</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap");

    :root {
      --ink: #1e1f26;
      --panel: #fffaf1;
      --line: #d9d0bf;
      --shadow: 0 14px 38px rgba(18, 24, 40, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(1400px 700px at 120% -30%, rgba(13, 139, 150, 0.2), transparent 65%),
        radial-gradient(1200px 600px at -20% 120%, rgba(236, 111, 74, 0.24), transparent 68%),
        linear-gradient(180deg, #fffdf7 0%, #f0eadf 100%);
    }

    body.dark {
      --ink: #e8eef4;
      --line: #344351;
      background:
        radial-gradient(1200px 620px at 130% -30%, rgba(24, 143, 173, 0.23), transparent 65%),
        radial-gradient(1000px 500px at -20% 120%, rgba(192, 95, 68, 0.2), transparent 68%),
        linear-gradient(180deg, #0f1419 0%, #111b24 100%);
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(255, 252, 244, 0.82);
      backdrop-filter: blur(8px);
    }

    body.dark .topbar {
      background: rgba(20, 29, 37, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tabs {
      flex: 1;
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .tab-btn {
      width: auto;
      white-space: nowrap;
      border-radius: 10px;
      border: 1px solid #ccbfa2;
      padding: 8px 10px;
      background: linear-gradient(180deg, #fff 0%, #f4e9d1 100%);
      color: #1f2731;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .tab-btn.active {
      border-color: #0d8b96;
      box-shadow: 0 0 0 2px rgba(13, 139, 150, 0.18) inset;
    }

    body.dark .tab-btn {
      border-color: #415262;
      background: linear-gradient(180deg, #1e2a35 0%, #1a2430 100%);
      color: #dce6ef;
    }

    body.dark .tab-btn.active {
      border-color: #22a8b5;
      box-shadow: 0 0 0 2px rgba(34, 168, 181, 0.28) inset;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-actions button {
      width: auto;
      min-width: 92px;
    }

    .app {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 14px;
      padding: 14px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.96), rgba(255, 245, 224, 0.96));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      backdrop-filter: blur(8px);
    }

    body.dark .panel {
      background: linear-gradient(180deg, rgba(24, 34, 42, 0.96), rgba(18, 27, 35, 0.96));
      border-color: #2f3d4a;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0;
      font-size: 1.52rem;
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 0;
      font-size: 0.9rem;
      color: rgba(30, 31, 38, 0.82);
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .group {
      border: 1px solid #dfd6c6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.55);
      padding: 8px;
      display: grid;
      gap: 7px;
    }

    body.dark .group {
      border-color: #31404e;
      background: rgba(15, 23, 31, 0.58);
    }

    .group-title {
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.72;
      font-weight: 700;
    }

    .row {
      display: grid;
      gap: 6px;
    }

    .row label {
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      gap: 8px;
    }

    .value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.74rem;
      opacity: 0.85;
    }

    input[type="range"],
    input[type="number"],
    select,
    button {
      width: 100%;
      border-radius: 11px;
      border: 1px solid #d5ccb8;
      background: #fff;
      font: inherit;
      color: inherit;
    }

    body.dark input[type="range"],
    body.dark input[type="number"],
    body.dark select,
    body.dark button {
      border-color: #425466;
      background: #16212b;
      color: #d9e6f2;
    }

    input[type="range"] {
      accent-color: #0d8b96;
    }

    select,
    button {
      padding: 8px 10px;
      font-size: 0.88rem;
    }

    button {
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      background: linear-gradient(180deg, #fff 0%, #fff5de 100%);
    }

    body.dark button {
      background: linear-gradient(180deg, #223140 0%, #18232f 100%);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(30, 31, 38, 0.15);
      border-color: #c4b89b;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .buttons button.wide {
      grid-column: span 2;
    }

    .canvas-shell {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #d5cdbb;
      box-shadow: var(--shadow);
      min-height: 240px;
      background: linear-gradient(180deg, rgba(252, 248, 239, 0.95), rgba(244, 237, 226, 0.95));
    }

    body.dark .canvas-shell {
      border-color: #2e3c4a;
      background: linear-gradient(180deg, rgba(16, 24, 32, 0.96), rgba(13, 20, 28, 0.96));
    }

    #sim {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(229, 220, 200, 0.9);
      background: rgba(255, 252, 246, 0.86);
      font-size: 0.78rem;
      font-family: "IBM Plex Mono", monospace;
      backdrop-filter: blur(4px);
      pointer-events: none;
      white-space: pre;
    }

    body.dark .hud {
      border-color: rgba(81, 99, 115, 0.9);
      background: rgba(19, 29, 37, 0.86);
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .editor-grid .row {
      gap: 4px;
    }

    #toolPreview,
    #partPreview {
      width: 100%;
      border: 1px solid #d9d0bf;
      border-radius: 10px;
      background: linear-gradient(180deg, #fffef9 0%, #f8f0df 100%);
    }

    #toolPreview {
      height: 90px;
    }

    #partPreview {
      height: 120px;
    }

    .tip {
      border-radius: 12px;
      border: 1px dashed #c7bba0;
      background: rgba(255, 248, 233, 0.86);
      padding: 8px;
      font-size: 0.76rem;
      line-height: 1.35;
    }

    body.dark .tip {
      border-color: #4b5a67;
      background: rgba(20, 31, 39, 0.86);
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .panel {
        max-height: 52vh;
      }

      .canvas-shell {
        min-height: 44vh;
      }
    }
  </style>
</head>
<body class="dark">
  <div class="topbar">
    <div class="tabs" id="runTabs"></div>
    <div class="top-actions">
      <button id="newRunTab">New Tab</button>
      <button id="saveMbr">Save .mbr</button>
      <button id="loadMbr">Load .mbr</button>
      <button id="themeToggle">Light Mode</button>
      <input id="loadMbrInput" type="file" accept=".mbr,application/json" hidden />
    </div>
  </div>

  <div class="app">
    <aside class="panel">
      <header>
        <h1>Marble Run</h1>
        <p class="sub">Static, moving, spinning, pads, and trigger zones with targetable start/stop logic.</p>
      </header>

      <div class="controls">
        <div class="group">
          <div class="group-title">Build Tool</div>
          <div class="row">
            <label for="toolCategory">Tool Menu</label>
            <select id="toolCategory">
              <option value="draw">Draw Tools</option>
              <option value="static">Static Parts</option>
              <option value="move">Moving Parts</option>
              <option value="spin">Spinners</option>
              <option value="pads">Pads</option>
              <option value="edit">Edit</option>
            </select>
          </div>
          <div class="row">
            <label for="tool">Part Type</label>
            <select id="tool"></select>
          </div>
          <canvas id="toolPreview" width="300" height="90"></canvas>
        </div>

        <div class="group">
          <div class="group-title">Physics</div>
          <div class="row">
            <label for="gravity">Gravity <span class="value" id="gravityVal"></span></label>
            <input id="gravity" type="range" min="200" max="1800" step="10" value="920" />
          </div>
          <div class="row">
            <label for="bounce">Bounce <span class="value" id="bounceVal"></span></label>
            <input id="bounce" type="range" min="0.05" max="0.95" step="0.01" value="0.44" />
          </div>
          <div class="row">
            <label for="friction">Surface Grip <span class="value" id="frictionVal"></span></label>
            <input id="friction" type="range" min="0" max="0.45" step="0.01" value="0.05" />
          </div>
          <div class="row">
            <label for="marbleSize">Marble Size <span class="value" id="sizeVal"></span></label>
            <input id="marbleSize" type="range" min="6" max="20" step="1" value="10" />
          </div>
          <div class="row">
            <label for="timeScale">Sim Speed <span class="value" id="timeVal"></span></label>
            <input id="timeScale" type="range" min="0.25" max="2" step="0.05" value="1" />
          </div>
          <div class="row">
            <label for="trail">Trail Glow <span class="value" id="trailVal"></span></label>
            <input id="trail" type="range" min="0" max="1" step="0.05" value="0.55" />
          </div>
        </div>

        <div class="group">
          <div class="group-title">Moving Part Tuning</div>
          <div class="row">
            <label for="motorPower">Global Motor Power <span class="value" id="motorVal"></span></label>
            <input id="motorPower" type="range" min="0.2" max="3" step="0.05" value="1" />
          </div>
          <div class="row">
            <label for="partSize">Part Size <span class="value" id="partSizeVal"></span></label>
            <input id="partSize" type="range" min="18" max="160" step="2" value="56" />
          </div>
          <div class="row">
            <label for="moveDistance">Move Distance <span class="value" id="moveDistVal"></span></label>
            <input id="moveDistance" type="range" min="8" max="260" step="2" value="90" />
          </div>
          <div class="row">
            <label for="moveSpeed">Move Speed <span class="value" id="moveSpeedVal"></span></label>
            <input id="moveSpeed" type="range" min="0.1" max="4" step="0.05" value="1.4" />
          </div>
          <div class="row">
            <label for="spinSpeed">Spin Speed <span class="value" id="spinSpeedVal"></span></label>
            <input id="spinSpeed" type="range" min="-8" max="8" step="0.1" value="2.6" />
          </div>
          <div class="row">
            <label for="moveAngle">Move Angle <span class="value" id="moveAngleVal"></span></label>
            <input id="moveAngle" type="range" min="0" max="360" step="1" value="0" />
          </div>
          <div class="row">
            <label for="phase">Phase Offset <span class="value" id="phaseVal"></span></label>
            <input id="phase" type="range" min="0" max="360" step="1" value="0" />
          </div>
          <div class="row">
            <label for="movingTriggerLink">Activating Trigger</label>
            <select id="movingTriggerLink">
              <option value="">Any Trigger Target</option>
              <option value="__manual__">Manual Only</option>
            </select>
          </div>
          <button id="applySelected">Apply Slider Tuning To Selected</button>
        </div>

        <div class="group">
          <div class="group-title">Selected Item Editor</div>
          <canvas id="partPreview" width="300" height="120"></canvas>
          <div class="row">
            <label>Item <span class="value" id="selectedItemMeta">none</span></label>
          </div>
          <div class="row">
            <label for="selectedActive">Active</label>
            <select id="selectedActive">
              <option value="on">On</option>
              <option value="off">Off</option>
            </select>
          </div>
          <div class="editor-grid">
            <div class="row">
              <label for="selectedX">Center X</label>
              <input id="selectedX" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedY">Center Y</label>
              <input id="selectedY" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedFromX">From X</label>
              <input id="selectedFromX" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedFromY">From Y</label>
              <input id="selectedFromY" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedToX">To X</label>
              <input id="selectedToX" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedToY">To Y</label>
              <input id="selectedToY" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedAngle">Angle</label>
              <input id="selectedAngle" type="number" step="1" />
            </div>
            <div class="row">
              <label for="selectedSize">Size</label>
              <input id="selectedSize" type="number" step="1" />
            </div>
          </div>
          <button id="updateSelectedFromMenu">Update Selected Item</button>
        </div>

        <div class="group">
          <div class="group-title">Trigger Zone Config</div>
          <div class="row">
            <label for="triggerAction">Action</label>
            <select id="triggerAction">
              <option value="toggle">Toggle</option>
              <option value="start">Start</option>
              <option value="stop">Stop</option>
            </select>
          </div>
          <div class="row">
            <label for="triggerTarget">Target</label>
            <select id="triggerTarget">
              <option value="all-moving">All Moving Parts</option>
              <option value="smooth">Smooth Movers</option>
              <option value="linear">Linear Movers</option>
              <option value="warp">Warp Movers</option>
              <option value="spinners">Spinners</option>
              <option value="selected">Selected Part</option>
            </select>
          </div>
        </div>
      </div>

      <div class="buttons">
        <button id="spawn">Spawn 1</button>
        <button id="burst">Burst 20</button>
        <button id="rain">Start Rain</button>
        <button id="pause">Pause</button>
        <button id="clearMarbles">Clear Marbles</button>
        <button id="clearTracks">Clear All Parts</button>
        <button id="undo">Undo Build</button>
        <button class="wide" id="demo">Reset Demo Course</button>
      </div>

      <div class="tip" id="selectionInfo">Selected item: none</div>
      <div class="tip">Click any item or line to select it. In Select/Edit, drag to box-select, drag FROM/TO handles to edit path, drag line endpoints to reshape tracks, and drag cyan square handle to resize. Hold Alt while building to place on top of an existing item.</div>
    </aside>

    <section class="canvas-shell">
      <canvas id="sim"></canvas>
      <div id="hud" class="hud"></div>
    </section>
  </div>

  <script>
    const TAU = Math.PI * 2;

    const canvas = document.getElementById("sim");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const toolPreviewCanvas = document.getElementById("toolPreview");
    const toolPreviewCtx = toolPreviewCanvas.getContext("2d");
    const previewCanvas = document.getElementById("partPreview");
    const previewCtx = previewCanvas.getContext("2d");

    const ui = {
      runTabs: document.getElementById("runTabs"),
      newRunTab: document.getElementById("newRunTab"),
      saveMbr: document.getElementById("saveMbr"),
      loadMbr: document.getElementById("loadMbr"),
      loadMbrInput: document.getElementById("loadMbrInput"),
      themeToggle: document.getElementById("themeToggle"),
      toolCategory: document.getElementById("toolCategory"),
      tool: document.getElementById("tool"),
      gravity: document.getElementById("gravity"),
      bounce: document.getElementById("bounce"),
      friction: document.getElementById("friction"),
      marbleSize: document.getElementById("marbleSize"),
      timeScale: document.getElementById("timeScale"),
      motorPower: document.getElementById("motorPower"),
      trail: document.getElementById("trail"),
      partSize: document.getElementById("partSize"),
      moveDistance: document.getElementById("moveDistance"),
      moveSpeed: document.getElementById("moveSpeed"),
      spinSpeed: document.getElementById("spinSpeed"),

      phase: document.getElementById("phase"),

      triggerAction: document.getElementById("triggerAction"),
      triggerTarget: document.getElementById("triggerTarget"),
      applySelected: document.getElementById("applySelected"),
      selectedItemMeta: document.getElementById("selectedItemMeta"),
      selectedActive: document.getElementById("selectedActive"),
      selectedX: document.getElementById("selectedX"),
      selectedY: document.getElementById("selectedY"),
      selectedFromX: document.getElementById("selectedFromX"),
      selectedFromY: document.getElementById("selectedFromY"),
      selectedToX: document.getElementById("selectedToX"),
      selectedToY: document.getElementById("selectedToY"),
      selectedAngle: document.getElementById("selectedAngle"),
      selectedSize: document.getElementById("selectedSize"),
      updateSelectedFromMenu: document.getElementById("updateSelectedFromMenu"),
      selectionInfo: document.getElementById("selectionInfo"),
      gravityVal: document.getElementById("gravityVal"),
      bounceVal: document.getElementById("bounceVal"),
      frictionVal: document.getElementById("frictionVal"),
      sizeVal: document.getElementById("sizeVal"),
      timeVal: document.getElementById("timeVal"),
      motorVal: document.getElementById("motorVal"),
      trailVal: document.getElementById("trailVal"),
      partSizeVal: document.getElementById("partSizeVal"),
      moveDistVal: document.getElementById("moveDistVal"),
      moveSpeedVal: document.getElementById("moveSpeedVal"),
      spinSpeedVal: document.getElementById("spinSpeedVal"),
      moveAngleVal: document.getElementById("moveAngleVal"),
      phaseVal: document.getElementById("phaseVal"),
      spawn: document.getElementById("spawn"),
      burst: document.getElementById("burst"),
      rain: document.getElementById("rain"),
      pause: document.getElementById("pause"),
      clearMarbles: document.getElementById("clearMarbles"),
      clearTracks: document.getElementById("clearTracks"),
      undo: document.getElementById("undo"),
      demo: document.getElementById("demo")

    const world = {
      width: 0,
      height: 0,
      gravity: Number(ui.gravity.value),
      bounce: Number(ui.bounce.value),
      friction: Number(ui.friction.value),
      airDrag: 0.02,

      timeScale: Number(ui.timeScale.value),

      moveSpeed: Number(ui.moveSpeed.value),

      phase: Number(ui.phase.value) * (Math.PI / 180)

    const state = {

      parts: [],
      pads: [],
      triggers: [],

      partPoses: new Map(),

      paused: false,
      raining: false,
      rainTimer: 0,
      pointerDown: false,
      drawStart: null,
      pointer: { x: 0, y: 0 },
      fps: 0,
      simTime: 0,
      selectedPartId: null,
      selectedLineIndex: -1,
      score: 0,
      teleporterCooldown: 0,
      dragMode: null,
      dragLast: null,
      selectionRect: null,
      runs: [],
      activeRunIndex: -1,
      nextRunId: 1,
      darkMode: true
    };

    const TOOL_PRESETS = {
      block: { shape: "block", motion: "static" },
      circle: { shape: "circle", motion: "static" },
      wedge: { shape: "wedge", motion: "static" },
      curveLarge: { shape: "curveLarge", motion: "static" },
      curveSmall: { shape: "curveSmall", motion: "static" },
      sMoveBlock: { shape: "block", motion: "smooth" },

      spinBlock: { shape: "block", motion: "spin" },

      spinGear: { shape: "gear", motion: "spin" },
      goal: { shape: "padSquare", motion: "static", padType: "goal" },
      teleport: { shape: "padSquare", motion: "static", padType: "teleport" },
      boost: { shape: "padSquare", motion: "static", padType: "boost" },
      hazard: { shape: "padSquare", motion: "static", padType: "hazard" }
    };

    const TOOL_MENU_GROUPS = [
      {
        id: "draw",
        tools: [
          ["line", "Line Track"],
          ["peg", "Peg Bumper"],
          ["trigger", "Trigger Zone (Drag)"]
        ]
      },
      {
        id: "static",
        tools: [
          ["block", "Block"],
          ["circle", "Circle"],
          ["wedge", "Wedge"],
          ["curveLarge", "Curve (Large)"],
          ["curveSmall", "Curve (Small)"]
        ]
      },
      {
        id: "move",
        tools: [
          ["sMoveBlock", "S-Move Block"],
          ["sMoveCircle", "S-Move Circle"],
          ["sMoveWedge", "S-Move Wedge"],
          ["lMoveBlock", "L-Move Block"],
          ["lMoveCircle", "L-Move Circle"],
          ["lMoveWedge", "L-Move Wedge"],
          ["wMoveBlock", "W-Move Block"],
          ["wMoveCircle", "W-Move Circle"],
          ["wMoveWedge", "W-Move Wedge"]
        ]
      },
      {
        id: "spin",
        tools: [
          ["spinBlock", "Spin Block"],
          ["spinCircle", "Spin Circle"],
          ["spinWedge", "Spin Wedge"],
          ["spinGear", "Spin Gear"]
        ]
      },
      {
        id: "pads",
        tools: [
          ["goal", "Goal"],
          ["teleport", "Teleport Pad"],
          ["boost", "Boost Pad"],
          ["hazard", "Hazard"]
        ]
      },
      {
        id: "edit",
        tools: [["select", "Select/Edit"]]
      }
    ];

    const TOOL_TO_MENU = Object.create(null);
    for (const group of TOOL_MENU_GROUPS) {
      for (const toolEntry of group.tools) {
        TOOL_TO_MENU[toolEntry[0]] = group.id;
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function normalizeAngle(angle) {
      let a = angle;
      while (a < 0) {
        a += TAU;
      }
      while (a >= TAU) {
        a -= TAU;
      }
      return a;
    }

    function randomColor() {
      const palette = ["#ec6f4a", "#0d8b96", "#f6c65b", "#628f2f", "#2b6488", "#b65a7a"];
      return palette[Math.floor(Math.random() * palette.length)];
    }

    function distanceSq(ax, ay, bx, by) {
      const dx = ax - bx;
      const dy = ay - by;
      return dx * dx + dy * dy;
    }

    function isPathMover(part) {
      return !!part && (part.motion === "smooth" || part.motion === "linear" || part.motion === "warp");
    }

    function isTeleportPad(part) {
      return !!part && part.padType === "teleport";
    }

    function ensureTeleportTarget(part) {
      if (!isTeleportPad(part)) {
        return null;
      }
      if (Number.isFinite(part.teleportTargetX) && Number.isFinite(part.teleportTargetY)) {
        return {
          x: part.teleportTargetX,
          y: part.teleportTargetY
        };
      }

      const offset = Math.max(80, part.size * 1.4);
      const fallback = {
        x: part.x,
        y: part.y - offset
      };
      return fallback;
    }

    function rebuildToolOptions(preferredTool = null) {
      const currentGroup = TOOL_MENU_GROUPS.find((group) => group.id === ui.toolCategory.value) || TOOL_MENU_GROUPS[0];
      const targetTool = preferredTool || ui.tool.value;

      ui.tool.innerHTML = "";
      for (const [value, label] of currentGroup.tools) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        ui.tool.appendChild(option);
      }

      if (currentGroup.tools.some(([value]) => value === targetTool)) {
        ui.tool.value = targetTool;
      } else {
        ui.tool.value = currentGroup.tools[0][0];
      }
    }

    function syncToolMenuFromTool() {
      const menuId = TOOL_TO_MENU[ui.tool.value] || TOOL_MENU_GROUPS[0].id;
      if (ui.toolCategory.value !== menuId) {
        ui.toolCategory.value = menuId;
      }
    }

    function getSelectedLine() {
      if (state.selectedLineIndex < 0 || state.selectedLineIndex >= state.lineSegments.length) {
        return null;
      }
      return state.lineSegments[state.selectedLineIndex];
    }

    function setSelectedLineIndex(index) {
      if (!Number.isInteger(index) || index < 0 || index >= state.lineSegments.length) {
        state.selectedLineIndex = -1;
      } else {
        state.selectedLineIndex = index;
      }
      if (state.selectedLineIndex >= 0) {
        state.selectedPartId = null;
      }
      updateSelectionInfo();
    }

    function syncPartPathFromCenter(part) {
      if (!part) {
        return;
      }
      if (!isPathMover(part)) {
        part.fromX = part.x;
        part.fromY = part.y;
        part.toX = part.x;
        part.toY = part.y;
        return;
      }

      const half = part.moveDistance * 0.5;
      const dx = Math.cos(part.moveAngle) * half;
      const dy = Math.sin(part.moveAngle) * half;
      part.fromX = part.x - dx;
      part.fromY = part.y - dy;
      part.toX = part.x + dx;
      part.toY = part.y + dy;
    }

    function ensurePartPathEndpoints(part) {
      if (!part) {
        return;
      }
      if (
        typeof part.fromX !== "number" ||
        typeof part.fromY !== "number" ||
        typeof part.toX !== "number" ||
        typeof part.toY !== "number"
      ) {
        syncPartPathFromCenter(part);
      }
    }

    function syncPartCenterFromPath(part) {
      if (!part) {
        return;
      }
      ensurePartPathEndpoints(part);
      part.x = (part.fromX + part.toX) * 0.5;
      part.y = (part.fromY + part.toY) * 0.5;
      const dx = part.toX - part.fromX;
      const dy = part.toY - part.fromY;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.0001) {
        part.moveDistance = dist;
        part.moveAngle = Math.atan2(dy, dx);
      }
    }

    function formatNum(value) {
      return Number.isFinite(value) ? value.toFixed(1) : "";
    }

    function parseNum(input, fallback) {
      const v = Number(input.value);
      return Number.isFinite(v) ? v : fallback;
    }

    function isTypingTarget(target) {
      if (!target) {
        return false;
      }
      const tag = (target.tagName || "").toLowerCase();
      return tag === "input" || tag === "textarea" || tag === "select" || target.isContentEditable;
    }

    function cloneData(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function makeEmptySceneData() {
      return {
        marbles: [],
        lineSegments: [],
        pegs: [],
        parts: [],
        pads: [],
        triggers: [],
        buildHistory: [],
        score: 0,
        simTime: 0,
        selectedPartId: null,
        selectedLineIndex: -1
      };
    }

    function exportCurrentSceneData() {
      return {
        marbles: cloneData(state.marbles),
        lineSegments: cloneData(state.lineSegments),
        pegs: cloneData(state.pegs),
        parts: cloneData(state.parts),
        pads: cloneData(state.pads),
        triggers: cloneData(state.triggers),
        buildHistory: cloneData(state.buildHistory),
        score: state.score,
        simTime: state.simTime,
        selectedPartId: state.selectedPartId,
        selectedLineIndex: state.selectedLineIndex
      };
    }

    function importSceneData(data) {
      const safe = data || makeEmptySceneData();
      state.marbles = cloneData(safe.marbles || []);
      state.lineSegments = cloneData(safe.lineSegments || []);
      state.pegs = cloneData(safe.pegs || []);
      state.parts = cloneData(safe.parts || []);
      state.pads = cloneData(safe.pads || []);
      state.triggers = cloneData(safe.triggers || []);
      state.buildHistory = cloneData(safe.buildHistory || []);
      state.score = Number.isFinite(safe.score) ? safe.score : 0;
      state.simTime = Number.isFinite(safe.simTime) ? safe.simTime : 0;
      state.selectedPartId = safe.selectedPartId || null;
      state.selectedLineIndex = Number.isInteger(safe.selectedLineIndex) ? safe.selectedLineIndex : -1;
      if (!findPartById(state.selectedPartId)) {
        state.selectedPartId = null;
      }
      if (state.selectedPartId) {
        state.selectedLineIndex = -1;
      }
      if (state.selectedLineIndex < 0 || state.selectedLineIndex >= state.lineSegments.length) {
        state.selectedLineIndex = -1;
      }
      state.pointerDown = false;
      state.drawStart = null;
      state.dragMode = null;
      state.dragLast = null;
      state.selectionRect = null;
      rebuildTriggerLinkOptions();
      updateSelectionInfo();
    }

    function saveActiveRunData() {
      if (state.activeRunIndex < 0 || state.activeRunIndex >= state.runs.length) {
        return;
      }
      state.runs[state.activeRunIndex].data = exportCurrentSceneData();
    }

    function renderRunTabs() {
      ui.runTabs.innerHTML = "";
      for (let i = 0; i < state.runs.length; i += 1) {
        const run = state.runs[i];
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (i === state.activeRunIndex ? " active" : "");
        btn.textContent = run.name;
        btn.addEventListener("click", () => {
          switchToRun(i);
        });
        ui.runTabs.appendChild(btn);
      }
    }

    function switchToRun(index) {
      if (index < 0 || index >= state.runs.length) {
        return;
      }
      if (state.activeRunIndex === index) {
        return;
      }
      saveActiveRunData();
      state.activeRunIndex = index;
      importSceneData(state.runs[index].data || makeEmptySceneData());
      renderRunTabs();
    }

    function createRunTab(name = null, seedData = null, activate = true) {
      const runId = state.nextRunId;
      state.nextRunId += 1;
      const run = {
        id: runId,
        name: name || "Run " + runId,
        data: seedData ? cloneData(seedData) : makeEmptySceneData()
      };
      state.runs.push(run);
      if (activate) {
        if (state.activeRunIndex >= 0) {
          saveActiveRunData();
        }
        state.activeRunIndex = state.runs.length - 1;
        importSceneData(run.data);
      }
      renderRunTabs();
      return run;
    }

    function applyTheme() {
      document.body.classList.toggle("dark", state.darkMode);
      ui.themeToggle.textContent = state.darkMode ? "Light Mode" : "Dark Mode";
    }

    function saveToMbrFile() {
      saveActiveRunData();
      const payload = {
        format: "marblerun.mbr",
        version: 1,
        theme: state.darkMode ? "dark" : "light",
        activeRunId: state.runs[state.activeRunIndex] ? state.runs[state.activeRunIndex].id : null,
        uiValues: {
          gravity: ui.gravity.value,
          bounce: ui.bounce.value,
          friction: ui.friction.value,
          marbleSize: ui.marbleSize.value,
          timeScale: ui.timeScale.value,
          trail: ui.trail.value,
          motorPower: ui.motorPower.value,
          partSize: ui.partSize.value,
          moveDistance: ui.moveDistance.value,
          moveSpeed: ui.moveSpeed.value,
          spinSpeed: ui.spinSpeed.value,
          moveAngle: ui.moveAngle.value,
          phase: ui.phase.value
        },
        runs: state.runs.map((run) => ({
          id: run.id,
          name: run.name,
          data: run.data
        }))
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "marble-run-" + Date.now() + ".mbr";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function loadFromMbrPayload(payload) {
      if (!payload || !Array.isArray(payload.runs) || payload.runs.length === 0) {
        throw new Error("Invalid .mbr file");
      }

      if (payload.uiValues) {
        const keys = Object.keys(payload.uiValues);
        for (const key of keys) {
          if (ui[key]) {
            ui[key].value = payload.uiValues[key];
          }
        }
      }

      updateUiValueLabels();

      state.runs = payload.runs.map((run) => ({
        id: Number.isFinite(run.id) ? run.id : state.nextRunId++,
        name: typeof run.name === "string" && run.name.trim() ? run.name : "Run",
        data: cloneData(run.data || makeEmptySceneData())
      }));

      const maxId = state.runs.reduce((m, run) => Math.max(m, run.id), 0);
      state.nextRunId = Math.max(maxId + 1, state.nextRunId);

      state.darkMode = payload.theme !== "light";
      applyTheme();

      const desiredId = payload.activeRunId;
      let idx = state.runs.findIndex((run) => run.id === desiredId);
      if (idx < 0) {
        idx = 0;
      }
      state.activeRunIndex = idx;
      importSceneData(state.runs[idx].data);
      renderRunTabs();
    }

    function nearestPointOnSegment(px, py, s) {
      const vx = s.x2 - s.x1;
      const vy = s.y2 - s.y1;
      const lenSq = vx * vx + vy * vy;
      if (lenSq < 0.000001) {
        return { x: s.x1, y: s.y1, t: 0 };
      }
      let t = ((px - s.x1) * vx + (py - s.y1) * vy) / lenSq;
      t = clamp(t, 0, 1);
      return {
        x: s.x1 + t * vx,
        y: s.y1 + t * vy,
        t
      };
    }

    function resizeCanvas() {
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const rect = canvas.getBoundingClientRect();
      world.width = rect.width;
      world.height = rect.height;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function updateUiValueLabels() {
      world.gravity = Number(ui.gravity.value);
      world.bounce = Number(ui.bounce.value);
      world.friction = Number(ui.friction.value);
      world.timeScale = Number(ui.timeScale.value);
      world.motorPower = Number(ui.motorPower.value);
      world.trail = Number(ui.trail.value);
      world.partSize = Number(ui.partSize.value);
      world.moveDistance = Number(ui.moveDistance.value);
      world.moveSpeed = Number(ui.moveSpeed.value);
      world.spinSpeed = Number(ui.spinSpeed.value);
      world.moveAngle = Number(ui.moveAngle.value) * (Math.PI / 180);
      world.phase = Number(ui.phase.value) * (Math.PI / 180);

      ui.gravityVal.textContent = world.gravity.toFixed(0);
      ui.bounceVal.textContent = world.bounce.toFixed(2);
      ui.frictionVal.textContent = world.friction.toFixed(2);
      ui.sizeVal.textContent = Number(ui.marbleSize.value).toFixed(0) + " px";
      ui.timeVal.textContent = world.timeScale.toFixed(2) + "x";
      ui.motorVal.textContent = world.motorPower.toFixed(2) + "x";
      ui.trailVal.textContent = world.trail.toFixed(2);
      ui.partSizeVal.textContent = world.partSize.toFixed(0) + " px";
      ui.moveDistVal.textContent = world.moveDistance.toFixed(0) + " px";
      ui.moveSpeedVal.textContent = world.moveSpeed.toFixed(2);
      ui.spinSpeedVal.textContent = world.spinSpeed.toFixed(1) + " rad/s";
      ui.moveAngleVal.textContent = Number(ui.moveAngle.value).toFixed(0) + " deg";
      ui.phaseVal.textContent = Number(ui.phase.value).toFixed(0) + " deg";
    }

    function rememberBuild(group, ref) {
      state.buildHistory.push({ group, ref });
      if (state.buildHistory.length > 900) {
        state.buildHistory.shift();
      }
    }

    function spawnMarble(x = world.width * 0.16, y = 26, speedX = 0) {
      if (state.marbles.length >= world.maxMarbles) {
        state.marbles.shift();
      }
      const r = Number(ui.marbleSize.value);
      state.marbles.push({
        x,
        y,
        vx: speedX,
        vy: 0,
        r,
        mass: Math.max(1, r * 0.34),
        color: randomColor(),
        triggerState: Object.create(null),
        cooldown: Object.create(null)
      });
    }

    function addLine(x1, y1, x2, y2) {
      if (distanceSq(x1, y1, x2, y2) < 100) {
        return;
      }
      const seg = { x1, y1, x2, y2 };
      state.lineSegments.push(seg);
      rememberBuild("lineSegments", seg);
    }

    function addPeg(x, y, r = 9) {
      const peg = { x, y, r };
      state.pegs.push(peg);
      rememberBuild("pegs", peg);
    }

    function createPart(tool, x, y) {
      const preset = TOOL_PRESETS[tool];
      if (!preset) {
        return null;
      }
      const id = "p-" + Date.now().toString(36) + "-" + Math.floor(Math.random() * 9999).toString(36);
      const part = {
        id,
        tool,
        x,
        y,
        shape: preset.shape,
        motion: preset.motion,
        padType: preset.padType || null,
        size: world.partSize,
        moveDistance: world.moveDistance,
        moveSpeed: world.moveSpeed,
        spinSpeed: world.spinSpeed,
        moveAngle: world.moveAngle,
        phase: world.phase,
        baseAngle: world.moveAngle,
        active: true,
        teleporterIndex: -1,
        activationTriggerId: ""
      };

      if (part.motion === "spin") {
        part.moveDistance = 0;
      }

      if (part.padType) {
        part.active = true;
      }

      syncPartPathFromCenter(part);

      return part;
    }

    function addPart(tool, x, y) {
      const part = createPart(tool, x, y);
      if (!part) {
        return;
      }
      if (part.padType) {
        state.pads.push(part);
        rememberBuild("pads", part);
      } else {
        state.parts.push(part);
        rememberBuild("parts", part);
      }
      setSelectedPart(part.id);
    }

    function addTriggerZone(ax, ay, bx, by) {
      const x = Math.min(ax, bx);
      const y = Math.min(ay, by);
      const w = Math.max(20, Math.abs(ax - bx));
      const h = Math.max(20, Math.abs(ay - by));
      const id = "t-" + Date.now().toString(36) + "-" + Math.floor(Math.random() * 9999).toString(36);
      const trigger = {
        id,
        x,
        y,
        w,
        h,
        action: ui.triggerAction.value,
        target: ui.triggerTarget.value,
        selectedPartId: state.selectedPartId,
        flash: 0
      };
      state.triggers.push(trigger);
      rememberBuild("triggers", trigger);
      rebuildTriggerLinkOptions();
    }

    function findPartById(id) {
      if (!id) {
        return null;
      }
      for (const part of state.parts) {
        if (part.id === id) {
          return part;
        }
      }
      for (const pad of state.pads) {
        if (pad.id === id) {
          return pad;
        }
      }
      return null;
    }

    function rebuildTriggerLinkOptions() {
      const prev = ui.movingTriggerLink.value;
      const options = [
        { value: "", label: "Any Trigger Target" },
        { value: "__manual__", label: "Manual Only" }
      ];

      for (let i = 0; i < state.triggers.length; i += 1) {
        const t = state.triggers[i];
        options.push({
          value: t.id,
          label: "Trigger " + (i + 1) + " (" + t.action + " -> " + t.target + ")"
        });
      }

      ui.movingTriggerLink.innerHTML = "";
      for (const opt of options) {
        const el = document.createElement("option");
        el.value = opt.value;
        el.textContent = opt.label;
        ui.movingTriggerLink.appendChild(el);
      }

      if (options.some((o) => o.value === prev)) {
        ui.movingTriggerLink.value = prev;
      } else {
        ui.movingTriggerLink.value = "";
      }
    }

    function setSelectedPart(partOrId) {
      const id = typeof partOrId === "string" ? partOrId : partOrId ? partOrId.id : null;
      state.selectedPartId = id;
      state.selectedLineIndex = -1;
      updateSelectionInfo();
    }

    function syncSelectedEditorFromPart() {
      const selectedLine = getSelectedLine();
      const part = findPartById(state.selectedPartId);
      if (!part && !selectedLine) {
        ui.selectedItemMeta.textContent = "none";
        ui.selectedActive.value = "on";
        ui.selectedX.value = "";
        ui.selectedY.value = "";
        ui.selectedFromX.value = "";
        ui.selectedFromY.value = "";
        ui.selectedToX.value = "";
        ui.selectedToY.value = "";
        ui.selectedAngle.value = "";
        ui.selectedSize.value = "";
        ui.selectedActive.disabled = true;
        ui.selectedX.disabled = true;
        ui.selectedY.disabled = true;
        ui.selectedFromX.disabled = true;
        ui.selectedFromY.disabled = true;
        ui.selectedToX.disabled = true;
        ui.selectedToY.disabled = true;
        ui.selectedAngle.disabled = true;
        ui.selectedSize.disabled = true;
        ui.movingTriggerLink.disabled = true;
        ui.movingTriggerLink.value = "";
        ui.updateSelectedFromMenu.disabled = true;
        return;
      }

      if (selectedLine) {
        const mx = (selectedLine.x1 + selectedLine.x2) * 0.5;
        const my = (selectedLine.y1 + selectedLine.y2) * 0.5;
        ui.selectedItemMeta.textContent = "line | static";
        ui.selectedActive.value = "on";
        ui.selectedX.value = formatNum(mx);
        ui.selectedY.value = formatNum(my);
        ui.selectedFromX.value = formatNum(selectedLine.x1);
        ui.selectedFromY.value = formatNum(selectedLine.y1);
        ui.selectedToX.value = formatNum(selectedLine.x2);
        ui.selectedToY.value = formatNum(selectedLine.y2);
        ui.selectedAngle.value = (Math.atan2(selectedLine.y2 - selectedLine.y1, selectedLine.x2 - selectedLine.x1) * (180 / Math.PI)).toFixed(1);
        ui.selectedSize.value = "";
        ui.selectedActive.disabled = true;
        ui.selectedX.disabled = true;
        ui.selectedY.disabled = true;
        ui.selectedFromX.disabled = false;
        ui.selectedFromY.disabled = false;
        ui.selectedToX.disabled = false;
        ui.selectedToY.disabled = false;
        ui.selectedAngle.disabled = true;
        ui.selectedSize.disabled = true;
        ui.movingTriggerLink.disabled = true;
        ui.movingTriggerLink.value = "";
        ui.updateSelectedFromMenu.disabled = false;
        return;
      }

      ensurePartPathEndpoints(part);
      const tpTarget = isTeleportPad(part) ? ensureTeleportTarget(part) : null;

      ui.selectedItemMeta.textContent = part.tool + " | " + part.motion;
      ui.selectedActive.value = part.active ? "on" : "off";
      ui.selectedX.value = formatNum(part.x);
      ui.selectedY.value = formatNum(part.y);
      if (isTeleportPad(part)) {
        ui.selectedFromX.value = formatNum(tpTarget ? tpTarget.x : part.x);
        ui.selectedFromY.value = formatNum(tpTarget ? tpTarget.y : part.y);
        ui.selectedToX.value = "";
        ui.selectedToY.value = "";
      } else {
        ui.selectedFromX.value = formatNum(part.fromX);
        ui.selectedFromY.value = formatNum(part.fromY);
        ui.selectedToX.value = formatNum(part.toX);
        ui.selectedToY.value = formatNum(part.toY);
      }
      ui.selectedAngle.value = (part.baseAngle * (180 / Math.PI)).toFixed(1);
      ui.selectedSize.value = formatNum(part.size);
      ui.selectedX.disabled = isPathMover(part);
      ui.selectedY.disabled = isPathMover(part);
      ui.selectedAngle.disabled = false;
      ui.selectedSize.disabled = false;
      ui.updateSelectedFromMenu.disabled = false;

      const isTp = isTeleportPad(part);
      const disableMotion = !isPathMover(part) && !isTp;
      ui.selectedFromX.disabled = disableMotion;
      ui.selectedFromY.disabled = disableMotion;
      ui.selectedToX.disabled = disableMotion || isTp;
      ui.selectedToY.disabled = disableMotion || isTp;
      ui.selectedActive.disabled = part.motion === "static" || !!part.padType;

      const canLinkTrigger = part.motion !== "static" && !part.padType;
      ui.movingTriggerLink.disabled = !canLinkTrigger;
      if (canLinkTrigger) {
        const v = part.activationTriggerId || "";
        if (Array.from(ui.movingTriggerLink.options).some((o) => o.value === v)) {
          ui.movingTriggerLink.value = v;
        } else {
          ui.movingTriggerLink.value = "";
          part.activationTriggerId = "";
        }
      } else {
        ui.movingTriggerLink.value = "";
      }
    }

    function applySelectedEditorValues() {
      const selectedLine = getSelectedLine();
      if (selectedLine) {
        selectedLine.x1 = parseNum(ui.selectedFromX, selectedLine.x1);
        selectedLine.y1 = parseNum(ui.selectedFromY, selectedLine.y1);
        selectedLine.x2 = parseNum(ui.selectedToX, selectedLine.x2);
        selectedLine.y2 = parseNum(ui.selectedToY, selectedLine.y2);
        syncSelectedEditorFromPart();
        updateSelectionInfo();
        return;
      }

      const part = findPartById(state.selectedPartId);
      if (!part) {
        return;
      }

      part.baseAngle = parseNum(ui.selectedAngle, part.baseAngle * (180 / Math.PI)) * (Math.PI / 180);
      part.size = clamp(parseNum(ui.selectedSize, part.size), 12, 260);
      part.active = ui.selectedActive.value !== "off";
      if (part.motion !== "static" && !part.padType) {
        part.activationTriggerId = ui.movingTriggerLink.value;
      }

      if (isTeleportPad(part)) {
        const tpTarget = ensureTeleportTarget(part);
        part.teleportTargetX = parseNum(ui.selectedFromX, tpTarget ? tpTarget.x : part.x);
        part.teleportTargetY = parseNum(ui.selectedFromY, tpTarget ? tpTarget.y : part.y);
      }

      if (isPathMover(part)) {
        part.fromX = parseNum(ui.selectedFromX, part.fromX);
        part.fromY = parseNum(ui.selectedFromY, part.fromY);
        part.toX = parseNum(ui.selectedToX, part.toX);
        part.toY = parseNum(ui.selectedToY, part.toY);
        syncPartCenterFromPath(part);
      } else {
        part.x = parseNum(ui.selectedX, part.x);
        part.y = parseNum(ui.selectedY, part.y);
        syncPartPathFromCenter(part);
      }

      syncSelectedEditorFromPart();
      updateSelectionInfo();
    }

    function updateSelectionInfo() {
      const selectedLine = getSelectedLine();
      if (selectedLine) {
        ui.selectionInfo.textContent =
          "Selected line: (" +
          selectedLine.x1.toFixed(0) +
          "," +
          selectedLine.y1.toFixed(0) +
          ") -> (" +
          selectedLine.x2.toFixed(0) +
          "," +
          selectedLine.y2.toFixed(0) +
          ")";
        syncSelectedEditorFromPart();
        return;
      }

      const part = findPartById(state.selectedPartId);
      if (!part) {
        ui.selectionInfo.textContent = "Selected item: none";
        syncSelectedEditorFromPart();
        return;
      }
      ensurePartPathEndpoints(part);
      ui.selectionInfo.textContent = "Selected part: " + part.tool + " | motion=" + part.motion + " | size=" + part.size.toFixed(0) + " | center=(" + part.x.toFixed(0) + "," + part.y.toFixed(0) + ")";
      syncSelectedEditorFromPart();
    }

    function applyTuningToPart(part) {
      if (!part || part.padType) {
        return;
      }
      part.size = world.partSize;
      part.moveDistance = world.moveDistance;
      part.moveSpeed = world.moveSpeed;
      part.spinSpeed = world.spinSpeed;
      part.moveAngle = world.moveAngle;
      part.phase = world.phase;
      part.baseAngle = world.moveAngle;
      if (part.motion !== "static") {
        part.activationTriggerId = ui.movingTriggerLink.value;
      }
      if (isPathMover(part)) {
        syncPartPathFromCenter(part);
      }
    }

    function undoBuild() {
      const item = state.buildHistory.pop();
      if (!item) {
        return;
      }
      const list = state[item.group];
      if (!Array.isArray(list)) {
        return;
      }
      const idx = list.lastIndexOf(item.ref);
      if (idx >= 0) {
        list.splice(idx, 1);
      }
      if (item.group === "triggers") {
        rebuildTriggerLinkOptions();
      }
      if (state.selectedLineIndex >= state.lineSegments.length) {
        state.selectedLineIndex = -1;
      }
      if (!findPartById(state.selectedPartId) && state.selectedLineIndex < 0) {
        setSelectedPart(null);
        return;
      }
      updateSelectionInfo();
    }

    function clearWorld(keepTracks = false) {
      state.marbles.length = 0;
      state.score = 0;
      if (!keepTracks) {
        state.lineSegments.length = 0;
        state.pegs.length = 0;
        state.parts.length = 0;
        state.pads.length = 0;
        state.triggers.length = 0;
        state.buildHistory.length = 0;
        state.selectedLineIndex = -1;
        setSelectedPart(null);
        rebuildTriggerLinkOptions();
        return;
      }
      updateSelectionInfo();
    }

    function triangleMotion(theta) {
      const cycle = ((theta / Math.PI) % 2 + 2) % 2;
      if (cycle < 1) {
        return {
          value: -1 + cycle * 2,
          slope: 2 / Math.PI
        };
      }
      return {
        value: 3 - cycle * 2,
        slope: -2 / Math.PI
      };
    }

    function sawMotion(theta) {
      const cycle = ((theta / TAU) % 1 + 1) % 1;
      return {
        value: -1 + cycle * 2,
        slope: 1 / Math.PI
      };
    }

    function computePartPose(part, time) {
      let x = part.x;
      let y = part.y;
      let angle = part.baseAngle;
      let vx = 0;
      let vy = 0;
      let omega = 0;

      if (!part.active) {
        return { x, y, angle, vx, vy, omega };
      }

      const power = world.motorPower;
      const theta = time * part.moveSpeed * power + part.phase;
      ensurePartPathEndpoints(part);

      if (isPathMover(part)) {
        const dx = part.toX - part.fromX;
        const dy = part.toY - part.fromY;
        let t = 0.5;
        let dt = 0;

        if (part.motion === "smooth") {
          t = 0.5 + 0.5 * Math.sin(theta);
          dt = 0.5 * Math.cos(theta) * part.moveSpeed * power;
        } else if (part.motion === "linear") {
          const wave = triangleMotion(theta);
          t = 0.5 + 0.5 * wave.value;
          dt = 0.5 * wave.slope * part.moveSpeed * power;
        } else if (part.motion === "warp") {
          const wave = sawMotion(theta);
          t = 0.5 + 0.5 * wave.value;
          dt = 0.5 * wave.slope * part.moveSpeed * power;
        }

        x = part.fromX + dx * t;
        y = part.fromY + dy * t;
        vx = dx * dt;
        vy = dy * dt;
      } else if (part.motion === "spin") {
        const spin = part.spinSpeed * power;
        angle += spin * time + part.phase;
        omega += spin;
      }

      return {
        x,
        y,
        angle: normalizeAngle(angle),
        vx,
        vy,
        omega
      };
    }

    function rotatePoint(x, y, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      return {
        x: x * c - y * s,
        y: x * s + y * c
      };
    }

    function worldPoint(pose, lx, ly) {
      const p = rotatePoint(lx, ly, pose.angle);
      return {
        x: pose.x + p.x,
        y: pose.y + p.y
      };
    }

    function localVelocityToWorld(pose, wx, wy) {
      return {
        vx: pose.vx - pose.omega * (wy - pose.y),
        vy: pose.vy + pose.omega * (wx - pose.x)
      };
    }

    function pushSegment(s, vx = 0, vy = 0, omega = 0, cx = 0, cy = 0) {
      state.colliders.segments.push({
        x1: s.x1,
        y1: s.y1,
        x2: s.x2,
        y2: s.y2,
        vx,
        vy,
        omega,
        cx,
        cy
      });
    }

    function pushCircle(c, vx = 0, vy = 0, omega = 0, cx = 0, cy = 0) {
      state.colliders.circles.push({
        x: c.x,
        y: c.y,
        r: c.r,
        vx,
        vy,
        omega,
        cx,
        cy
      });
    }

    function buildPartColliders(part, pose) {
      const size = part.size;

      if (part.shape === "circle") {
        pushCircle({ x: pose.x, y: pose.y, r: size * 0.5 }, pose.vx, pose.vy, pose.omega, pose.x, pose.y);
        return;
      }

      if (part.shape === "gear") {
        const coreR = size * 0.34;
        pushCircle({ x: pose.x, y: pose.y, r: coreR }, pose.vx, pose.vy, pose.omega, pose.x, pose.y);
        const teeth = 8;
        for (let i = 0; i < teeth; i += 1) {
          const a = pose.angle + (i / teeth) * TAU;
          const tx = pose.x + Math.cos(a) * (size * 0.48);
          const ty = pose.y + Math.sin(a) * (size * 0.48);
          const vel = localVelocityToWorld(pose, tx, ty);
          pushCircle({ x: tx, y: ty, r: size * 0.09 }, vel.vx, vel.vy, pose.omega, pose.x, pose.y);
        }
        return;
      }

      if (part.shape === "block" || part.shape === "padSquare") {
        const h = size * 0.5;
        const a = worldPoint(pose, -h, -h);
        const b = worldPoint(pose, h, -h);
        const c = worldPoint(pose, h, h);
        const d = worldPoint(pose, -h, h);
        const vA = localVelocityToWorld(pose, a.x, a.y);
        const vB = localVelocityToWorld(pose, b.x, b.y);
        const vC = localVelocityToWorld(pose, c.x, c.y);
        const vD = localVelocityToWorld(pose, d.x, d.y);
        pushSegment({ x1: a.x, y1: a.y, x2: b.x, y2: b.y }, (vA.vx + vB.vx) * 0.5, (vA.vy + vB.vy) * 0.5, pose.omega, pose.x, pose.y);
        pushSegment({ x1: b.x, y1: b.y, x2: c.x, y2: c.y }, (vB.vx + vC.vx) * 0.5, (vB.vy + vC.vy) * 0.5, pose.omega, pose.x, pose.y);
        pushSegment({ x1: c.x, y1: c.y, x2: d.x, y2: d.y }, (vC.vx + vD.vx) * 0.5, (vC.vy + vD.vy) * 0.5, pose.omega, pose.x, pose.y);
        pushSegment({ x1: d.x, y1: d.y, x2: a.x, y2: a.y }, (vD.vx + vA.vx) * 0.5, (vD.vy + vA.vy) * 0.5, pose.omega, pose.x, pose.y);
        return;
      }

      if (part.shape === "wedge") {
        const h = size * 0.5;
        const a = worldPoint(pose, -h, -h);
        const b = worldPoint(pose, h, h);
        const c = worldPoint(pose, -h, h);
        const vA = localVelocityToWorld(pose, a.x, a.y);
        const vB = localVelocityToWorld(pose, b.x, b.y);
        const vC = localVelocityToWorld(pose, c.x, c.y);
        pushSegment({ x1: a.x, y1: a.y, x2: b.x, y2: b.y }, (vA.vx + vB.vx) * 0.5, (vA.vy + vB.vy) * 0.5, pose.omega, pose.x, pose.y);
        pushSegment({ x1: b.x, y1: b.y, x2: c.x, y2: c.y }, (vB.vx + vC.vx) * 0.5, (vB.vy + vC.vy) * 0.5, pose.omega, pose.x, pose.y);
        pushSegment({ x1: c.x, y1: c.y, x2: a.x, y2: a.y }, (vC.vx + vA.vx) * 0.5, (vC.vy + vA.vy) * 0.5, pose.omega, pose.x, pose.y);
        return;
      }

      if (part.shape === "curveLarge" || part.shape === "curveSmall") {
        const radius = part.shape === "curveLarge" ? size * 0.7 : size * 0.45;
        const thickness = size * 0.22;
        const steps = 10;
        for (let i = 0; i <= steps; i += 1) {
          const t = i / steps;
          const a = pose.angle + t * (Math.PI * 0.5);
          const x = pose.x + Math.cos(a) * radius;
          const y = pose.y + Math.sin(a) * radius;
          const vel = localVelocityToWorld(pose, x, y);
          pushCircle({ x, y, r: thickness * 0.45 }, vel.vx, vel.vy, pose.omega, pose.x, pose.y);
        }
      }
    }

    function rebuildColliderCache() {
      state.colliders.segments.length = 0;
      state.colliders.circles.length = 0;
      state.partPoses.clear();

      for (const seg of state.lineSegments) {
        pushSegment(seg);
      }

      for (const peg of state.pegs) {
        pushCircle(peg);
      }

      for (const part of state.parts) {
        const pose = computePartPose(part, state.simTime);
        state.partPoses.set(part.id, pose);
        buildPartColliders(part, pose);
      }

      for (const pad of state.pads) {
        const pose = computePartPose(pad, state.simTime);
        state.partPoses.set(pad.id, pose);
        buildPartColliders(pad, pose);
      }
    }

    function resolveMarbleSegment(m, s) {
      const cp = nearestPointOnSegment(m.x, m.y, s);
      let nx = m.x - cp.x;
      let ny = m.y - cp.y;
      let distSq = nx * nx + ny * ny;

      if (distSq <= 0.000001) {
        const tx = s.x2 - s.x1;
        const ty = s.y2 - s.y1;
        const len = Math.hypot(tx, ty) || 1;
        nx = -ty / len;
        ny = tx / len;
        distSq = 1;
      }

      const dist = Math.sqrt(distSq);
      if (dist >= m.r) {
        return;
      }

      const invDist = 1 / dist;
      nx *= invDist;
      ny *= invDist;

      const penetration = m.r - dist;
      m.x += nx * penetration;
      m.y += ny * penetration;

      const svx = (s.vx || 0) - (s.omega || 0) * (cp.y - (s.cy || 0));
      const svy = (s.vy || 0) + (s.omega || 0) * (cp.x - (s.cx || 0));

      const rvx = m.vx - svx;
      const rvy = m.vy - svy;
      const vn = rvx * nx + rvy * ny;

      if (vn < 0) {
        const e = world.bounce;
        const rvxAfter = rvx - (1 + e) * vn * nx;
        const rvyAfter = rvy - (1 + e) * vn * ny;

        const tx = -ny;
        const ty = nx;
        const vt = rvxAfter * tx + rvyAfter * ty;
        const grip = world.friction;

        m.vx = rvxAfter - vt * grip * tx + svx;
        m.vy = rvyAfter - vt * grip * ty + svy;
      }
    }

    function resolveMarbleCircle(m, c) {
      let nx = m.x - c.x;
      let ny = m.y - c.y;
      let distSq = nx * nx + ny * ny;
      const minDist = m.r + c.r;

      if (distSq >= minDist * minDist) {
        return;
      }

      if (distSq <= 0.000001) {
        nx = 1;
        ny = 0;
        distSq = 1;
      }

      const dist = Math.sqrt(distSq);
      const invDist = 1 / dist;
      nx *= invDist;
      ny *= invDist;

      const penetration = minDist - dist;
      m.x += nx * penetration;
      m.y += ny * penetration;

      const centerY = c.cy ?? c.y;
      const centerX = c.cx ?? c.x;
      const cvx = (c.vx || 0) - (c.omega || 0) * (m.y - centerY);
      const cvy = (c.vy || 0) + (c.omega || 0) * (m.x - centerX);

      const rvx = m.vx - cvx;
      const rvy = m.vy - cvy;
      const vn = rvx * nx + rvy * ny;

      if (vn < 0) {
        const e = world.bounce;
        m.vx = rvx - (1 + e) * vn * nx + cvx;
        m.vy = rvy - (1 + e) * vn * ny + cvy;
      }
    }

    function resolveMarbleMarble(a, b) {
      let nx = b.x - a.x;
      let ny = b.y - a.y;
      let distSq = nx * nx + ny * ny;
      const minDist = a.r + b.r;

      if (distSq >= minDist * minDist) {
        return;
      }

      if (distSq <= 0.000001) {
        nx = 1;
        ny = 0;
        distSq = 1;
      }

      const dist = Math.sqrt(distSq);
      const invDist = 1 / dist;
      nx *= invDist;
      ny *= invDist;

      const overlap = minDist - dist;
      const totalMass = a.mass + b.mass;
      const aPush = overlap * (b.mass / totalMass);
      const bPush = overlap * (a.mass / totalMass);

      a.x -= nx * aPush;
      a.y -= ny * aPush;
      b.x += nx * bPush;
      b.y += ny * bPush;

      const relVelX = b.vx - a.vx;
      const relVelY = b.vy - a.vy;
      const relAlongNormal = relVelX * nx + relVelY * ny;
      if (relAlongNormal > 0) {
        return;
      }

      const e = world.bounce * 0.95;
      const j = -(1 + e) * relAlongNormal / (1 / a.mass + 1 / b.mass);
      const impulseX = j * nx;
      const impulseY = j * ny;

      a.vx -= impulseX / a.mass;
      a.vy -= impulseY / a.mass;
      b.vx += impulseX / b.mass;
      b.vy += impulseY / b.mass;
    }

    function limitSpeed(m, maxSpeed = 1950) {
      const speed = Math.hypot(m.vx, m.vy);
      if (speed > maxSpeed) {
        const factor = maxSpeed / speed;
        m.vx *= factor;
        m.vy *= factor;
      }
    }

    function applyTriggerAction(part, action) {
      if (!part || part.motion === "static" || part.padType) {
        return;
      }
      if (action === "start") {
        part.active = true;
      } else if (action === "stop") {
        part.active = false;
      } else {
        part.active = !part.active;
      }
    }

    function getTriggerTargets(trigger) {
      const list = [];
      if (trigger.target === "all-moving") {
        for (const part of state.parts) {
          if (part.motion !== "static") {
            list.push(part);
          }
        }
      } else if (trigger.target === "smooth") {
        for (const part of state.parts) {
          if (part.motion === "smooth") {
            list.push(part);
          }
        }
      } else if (trigger.target === "linear") {
        for (const part of state.parts) {
          if (part.motion === "linear") {
            list.push(part);
          }
        }
      } else if (trigger.target === "warp") {
        for (const part of state.parts) {
          if (part.motion === "warp") {
            list.push(part);
          }
        }
      } else if (trigger.target === "spinners") {
        for (const part of state.parts) {
          if (part.motion === "spin") {
            list.push(part);
          }
        }
      } else if (trigger.target === "selected") {
        const found = findPartById(trigger.selectedPartId);
        if (found && found.motion !== "static" && !found.padType) {
          list.push(found);
        }
      }
      return list;
    }

    function fireTrigger(trigger) {
      const targets = getTriggerTargets(trigger);
      for (const part of targets) {
        if (part.activationTriggerId === "__manual__") {
          continue;
        }
        if (part.activationTriggerId && part.activationTriggerId !== trigger.id) {
          continue;
        }
        applyTriggerAction(part, trigger.action);
      }
      trigger.flash = 0.22;
    }

    function handleTriggerZones(m) {
      for (const trigger of state.triggers) {
        const inside = m.x >= trigger.x && m.x <= trigger.x + trigger.w && m.y >= trigger.y && m.y <= trigger.y + trigger.h;
        const wasInside = !!m.triggerState[trigger.id];
        if (inside && !wasInside) {
          fireTrigger(trigger);
        }
        m.triggerState[trigger.id] = inside;
      }
    }

    function teleportPairForPad(pad) {
      const teleports = state.pads.filter((p) => p.padType === "teleport");
      if (teleports.length < 2) {
        return null;
      }
      const idx = teleports.indexOf(pad);
      if (idx < 0) {
        return null;
      }
      return teleports[(idx + 1) % teleports.length];
    }

    function getTeleportDestinationForPad(pad) {
      if (isTeleportPad(pad)) {
        if (Number.isFinite(pad.teleportTargetX) && Number.isFinite(pad.teleportTargetY)) {
          return {
            x: pad.teleportTargetX,
            y: pad.teleportTargetY
          };
        }
      }

      const target = teleportPairForPad(pad);
      if (!target) {
        return null;
      }
      const targetPose = state.partPoses.get(target.id);
      if (!targetPose) {
        return null;
      }
      return {
        x: targetPose.x,
        y: targetPose.y - pad.size * 0.6
      };
    }

    function applyPads(m, dt) {
      for (const key of Object.keys(m.cooldown)) {
        m.cooldown[key] = Math.max(0, m.cooldown[key] - dt);
      }

      for (const pad of state.pads) {
        const pose = state.partPoses.get(pad.id);
        if (!pose) {
          continue;
        }
        const half = pad.size * 0.5;
        if (Math.abs(m.x - pose.x) > half + m.r || Math.abs(m.y - pose.y) > half + m.r) {
          continue;
        }

        if (pad.padType === "goal") {
          if ((m.cooldown.goal || 0) <= 0) {
            state.score += 1;
            m.cooldown.goal = 0.2;
            m.y = -100;
          }
          continue;
        }

        if (pad.padType === "hazard") {
          if ((m.cooldown.hazard || 0) <= 0) {
            m.cooldown.hazard = 0.2;
            m.y = world.height + 200;
          }
          continue;
        }

        if (pad.padType === "boost") {
          const boostMag = 240;
          const a = pad.baseAngle;
          m.vx += Math.cos(a) * boostMag * dt;
          m.vy += Math.sin(a) * boostMag * dt;
          continue;
        }

        if (pad.padType === "teleport") {
          if ((m.cooldown.teleport || 0) > 0) {
            continue;
          }
          const destination = getTeleportDestinationForPad(pad);
          if (!destination) {
            continue;
          }
          m.x = destination.x;
          m.y = destination.y;
          m.cooldown.teleport = 0.4;
        }
      }
    }

    function resolveWorldBounds(m) {
      if (m.x - m.r < 0) {
        m.x = m.r;
        m.vx = Math.abs(m.vx) * world.bounce;
      }
      if (m.x + m.r > world.width) {
        m.x = world.width - m.r;
        m.vx = -Math.abs(m.vx) * world.bounce;
      }
      if (m.y - m.r < 0) {
        m.y = m.r;
        m.vy = Math.abs(m.vy) * world.bounce;
      }
      if (m.y + m.r > world.height - 4) {
        m.y = world.height - 4 - m.r;
        m.vy = -Math.abs(m.vy) * world.bounce;
        m.vx *= (1 - world.friction * 0.35);
      }
    }

    function determinePhysicsSubsteps(simDt) {
      let maxSpeed = 0;
      let minRadius = Number.POSITIVE_INFINITY;
      for (const m of state.marbles) {
        maxSpeed = Math.max(maxSpeed, Math.hypot(m.vx, m.vy));
        minRadius = Math.min(minRadius, m.r);
      }
      if (!Number.isFinite(minRadius)) {
        minRadius = Number(ui.marbleSize.value) || 10;
      }
      const travel = maxSpeed * simDt;
      const threshold = Math.max(5, minRadius * 0.55);
      return clamp(Math.ceil(travel / threshold), 1, 6);
    }

    function getPointerPosition(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: evt.clientX - rect.left,
        y: evt.clientY - rect.top
      };
    }

    function selectNearestPart(x, y, maxDist = 44) {
      rebuildColliderCache();
      let bestPart = null;
      let bestLine = -1;
      let bestDist = maxDist * maxDist;

      for (let i = 0; i < state.lineSegments.length; i += 1) {
        const cp = nearestPointOnSegment(x, y, state.lineSegments[i]);
        const d = distanceSq(x, y, cp.x, cp.y);
        if (d < bestDist) {
          bestDist = d;
          bestPart = null;
          bestLine = i;
        }
      }

      for (const part of state.parts) {
        const pose = state.partPoses.get(part.id);
        if (!pose) {
          continue;
        }
        const d = distanceSq(x, y, pose.x, pose.y);
        if (d < bestDist) {
          bestDist = d;
          bestPart = part;
          bestLine = -1;
        }
      }

      for (const pad of state.pads) {
        const pose = state.partPoses.get(pad.id);
        if (!pose) {
          continue;
        }
        const d = distanceSq(x, y, pose.x, pose.y);
        if (d < bestDist) {
          bestDist = d;
          bestPart = pad;
          bestLine = -1;
        }
      }

      if (bestPart) {
        setSelectedPart(bestPart.id);
      } else {
        setSelectedLineIndex(bestLine);
      }
    }

    function getNearestSelectableAt(x, y, maxDist = 44) {
      rebuildColliderCache();
      let bestPart = null;
      let bestDist = maxDist * maxDist;

      for (const part of state.parts) {
        const pose = state.partPoses.get(part.id);
        if (!pose) {
          continue;
        }
        const d = distanceSq(x, y, pose.x, pose.y);
        if (d < bestDist) {
          bestDist = d;
          bestPart = part;
        }
      }

      for (const pad of state.pads) {
        const pose = state.partPoses.get(pad.id);
        if (!pose) {
          continue;
        }
        const d = distanceSq(x, y, pose.x, pose.y);
        if (d < bestDist) {
          bestDist = d;
          bestPart = pad;
        }
      }

      return bestPart;
    }

    function getSelectedHandleAt(x, y) {
      const part = findPartById(state.selectedPartId);
      if (!part || !isPathMover(part)) {
        return null;
      }
      ensurePartPathEndpoints(part);
      if (distanceSq(x, y, part.fromX, part.fromY) <= 12 * 12) {
        return "from";
      }
      if (distanceSq(x, y, part.toX, part.toY) <= 12 * 12) {
        return "to";
      }
      return null;
    }

    function getSelectedLineHandleAt(x, y) {
      const line = getSelectedLine();
      if (!line) {
        return null;
      }
      if (distanceSq(x, y, line.x1, line.y1) <= 12 * 12) {
        return "drag-line-from";
      }
      if (distanceSq(x, y, line.x2, line.y2) <= 12 * 12) {
        return "drag-line-to";
      }
      return null;
    }

    function isNearSelectedLine(x, y, maxDist = 14) {
      const line = getSelectedLine();
      if (!line) {
        return false;
      }
      const cp = nearestPointOnSegment(x, y, line);
      return distanceSq(x, y, cp.x, cp.y) <= maxDist * maxDist;
    }

    function getSelectedTeleportHandleAt(x, y) {
      const part = findPartById(state.selectedPartId);
      if (!isTeleportPad(part)) {
        return false;
      }
      const target = ensureTeleportTarget(part);
      return !!target && distanceSq(x, y, target.x, target.y) <= 13 * 13;
    }

    function getSelectedResizeHandleAt(x, y) {
      const part = findPartById(state.selectedPartId);
      if (!part) {
        return false;
      }
      rebuildColliderCache();
      const pose = state.partPoses.get(part.id) || { x: part.x, y: part.y };
      const hx = pose.x + part.size * 0.62;
      const hy = pose.y - part.size * 0.62;
      return distanceSq(x, y, hx, hy) <= 13 * 13;
    }

    function moveSelectedPartBy(dx, dy) {
      const part = findPartById(state.selectedPartId);
      if (!part) {
        return;
      }
      part.x += dx;
      part.y += dy;
      ensurePartPathEndpoints(part);
      part.fromX += dx;
      part.fromY += dy;
      part.toX += dx;
      part.toY += dy;
      if (isTeleportPad(part) && Number.isFinite(part.teleportTargetX) && Number.isFinite(part.teleportTargetY)) {
        part.teleportTargetX += dx;
        part.teleportTargetY += dy;
      }
      syncSelectedEditorFromPart();
    }

    function deleteSelectedItem() {
      if (state.selectedLineIndex >= 0 && state.selectedLineIndex < state.lineSegments.length) {
        state.lineSegments.splice(state.selectedLineIndex, 1);
        state.selectedLineIndex = -1;
        updateSelectionInfo();
        return true;
      }

      const id = state.selectedPartId;
      if (!id) {
        return false;
      }

      const partIdx = state.parts.findIndex((part) => part.id === id);
      if (partIdx >= 0) {
        state.parts.splice(partIdx, 1);
        setSelectedPart(null);
        return true;
      }

      const padIdx = state.pads.findIndex((part) => part.id === id);
      if (padIdx >= 0) {
        state.pads.splice(padIdx, 1);
        setSelectedPart(null);
        return true;
      }

      return false;
    }

    function removeNearestPiece(x, y) {
      rebuildColliderCache();

      for (let i = state.triggers.length - 1; i >= 0; i -= 1) {
        const t = state.triggers[i];
        if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
          state.triggers.splice(i, 1);
          rebuildTriggerLinkOptions();
          return;
        }
      }

      for (let i = state.pads.length - 1; i >= 0; i -= 1) {
        const p = state.pads[i];
        const pose = state.partPoses.get(p.id);
        if (pose && distanceSq(x, y, pose.x, pose.y) < (p.size * 0.65) * (p.size * 0.65)) {
          state.pads.splice(i, 1);
          if (state.selectedPartId === p.id) {
            setSelectedPart(null);
          }
          return;
        }
      }

      for (let i = state.parts.length - 1; i >= 0; i -= 1) {
        const p = state.parts[i];
        const pose = state.partPoses.get(p.id);
        if (pose && distanceSq(x, y, pose.x, pose.y) < (p.size * 0.7) * (p.size * 0.7)) {
          state.parts.splice(i, 1);
          if (state.selectedPartId === p.id) {
            setSelectedPart(null);
          }
          return;
        }
      }

      for (let i = state.pegs.length - 1; i >= 0; i -= 1) {
        const p = state.pegs[i];
        if (distanceSq(x, y, p.x, p.y) < (p.r + 10) * (p.r + 10)) {
          state.pegs.splice(i, 1);
          return;
        }
      }

      for (let i = state.lineSegments.length - 1; i >= 0; i -= 1) {
        const s = state.lineSegments[i];
        const cp = nearestPointOnSegment(x, y, s);
        if (distanceSq(x, y, cp.x, cp.y) < 120) {
          state.lineSegments.splice(i, 1);
          if (state.selectedLineIndex === i) {
            state.selectedLineIndex = -1;
            updateSelectionInfo();
          } else if (state.selectedLineIndex > i) {
            state.selectedLineIndex -= 1;
          }
          return;
        }
      }
    }

    function step(dt) {
      const simDt = dt * world.timeScale;
      if (simDt <= 0) {
        return;
      }

      const substeps = determinePhysicsSubsteps(simDt);
      const subDt = simDt / substeps;

      for (let substep = 0; substep < substeps; substep += 1) {
        state.simTime += subDt;
        rebuildColliderCache();

        for (const trigger of state.triggers) {
          if (trigger.flash > 0) {
            trigger.flash = Math.max(0, trigger.flash - subDt);
          }
        }

        if (state.raining) {
          state.rainTimer -= subDt;
          while (state.rainTimer <= 0) {
            spawnMarble(24 + Math.random() * (world.width * 0.46), 8, (Math.random() - 0.5) * 45);
            state.rainTimer += 0.065;
          }
        }

        for (let i = state.marbles.length - 1; i >= 0; i -= 1) {
          const m = state.marbles[i];

          m.vy += world.gravity * subDt;

          const damp = Math.max(0, 1 - world.airDrag * subDt * 4);
          m.vx *= damp;
          m.vy *= damp;

          m.x += m.vx * subDt;
          m.y += m.vy * subDt;

          resolveWorldBounds(m);
          applyPads(m, subDt);
          handleTriggerZones(m);

          if (m.y > world.height + 180 || m.y < -220) {
            state.marbles.splice(i, 1);
          }
        }

        for (let pass = 0; pass < 3; pass += 1) {
          for (let i = 0; i < state.marbles.length; i += 1) {
            const m = state.marbles[i];

            for (const s of state.colliders.segments) {
              resolveMarbleSegment(m, s);
            }

            for (const c of state.colliders.circles) {
              resolveMarbleCircle(m, c);
            }

            for (let j = i + 1; j < state.marbles.length; j += 1) {
              resolveMarbleMarble(m, state.marbles[j]);
            }

            resolveWorldBounds(m);
            limitSpeed(m);
          }
        }
      }
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, world.height);
      g.addColorStop(0, "#fff8ea");
      g.addColorStop(1, "#efe5d2");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.strokeStyle = "rgba(140, 132, 118, 0.17)";
      ctx.lineWidth = 1;
      for (let x = 0; x < world.width; x += 28) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, world.height);
        ctx.stroke();
      }
      for (let y = 0; y < world.height; y += 28) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(world.width, y);
        ctx.stroke();
      }
    }

    function drawLineSegments() {
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      for (let i = 0; i < state.lineSegments.length; i += 1) {
        const s = state.lineSegments[i];
        const selected = i === state.selectedLineIndex;
        ctx.strokeStyle = selected ? "#ff9e40" : "#5f5848";
        ctx.lineWidth = selected ? 7 : 6;
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();

        ctx.strokeStyle = selected ? "rgba(255, 255, 255, 0.9)" : "rgba(255, 255, 255, 0.55)";
        ctx.lineWidth = selected ? 1.8 : 1.3;
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1 - 0.8);
        ctx.lineTo(s.x2, s.y2 - 0.8);
        ctx.stroke();
      }
    }

    function drawPegs() {
      for (const p of state.pegs) {
        const ring = ctx.createRadialGradient(p.x - p.r * 0.4, p.y - p.r * 0.4, 1, p.x, p.y, p.r);
        ring.addColorStop(0, "#fff");
        ring.addColorStop(0.45, "#f4d796");
        ring.addColorStop(1, "#c28c2f");
        ctx.fillStyle = ring;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, TAU);
        ctx.fill();
      }
    }

    function partColor(part) {
      if (part.padType === "goal") {
        return "#8fff4f";
      }
      if (part.padType === "teleport") {
        return "#5a6dff";
      }
      if (part.padType === "boost") {
        return "#ffe24d";
      }
      if (part.padType === "hazard") {
        return "#ff5252";
      }

      if (part.motion === "smooth") {
        return "#e07f5d";
      }
      if (part.motion === "linear") {
        return "#4b83d0";
      }
      if (part.motion === "warp") {
        return "#8f63d6";
      }
      if (part.motion === "spin") {
        return "#0d8b96";
      }
      return "#ffffff";
    }

    function drawPartShape(drawCtx, part, pose, color, selected) {
      const size = part.size;
      const half = size * 0.5;

      drawCtx.save();
      drawCtx.translate(pose.x, pose.y);
      drawCtx.rotate(pose.angle);

      if (part.shape === "block" || part.shape === "padSquare") {
        drawCtx.fillStyle = color;
        drawCtx.fillRect(-half, -half, size, size);
      } else if (part.shape === "circle") {
        drawCtx.fillStyle = color;
        drawCtx.beginPath();
        drawCtx.arc(0, 0, half, 0, TAU);
        drawCtx.fill();
      } else if (part.shape === "wedge") {
        drawCtx.fillStyle = color;
        drawCtx.beginPath();
        drawCtx.moveTo(-half, -half);
        drawCtx.lineTo(half, half);
        drawCtx.lineTo(-half, half);
        drawCtx.closePath();
        drawCtx.fill();
      } else if (part.shape === "curveLarge" || part.shape === "curveSmall") {
        const radius = part.shape === "curveLarge" ? size * 0.72 : size * 0.46;
        const thick = size * 0.2;
        drawCtx.strokeStyle = color;
        drawCtx.lineWidth = thick;
        drawCtx.beginPath();
        drawCtx.arc(0, 0, radius, 0, Math.PI * 0.5);
        drawCtx.stroke();
      } else if (part.shape === "gear") {
        const coreR = size * 0.34;
        drawCtx.fillStyle = color;
