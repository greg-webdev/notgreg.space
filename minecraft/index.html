<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Keyframes for a subtle breathing/shimmer animation */
        @keyframes text-breathe {
            0% {
                transform: scale(1);
                text-shadow: 0 0 8px rgba(74, 222, 128, 0.6), 0 0 15px rgba(74, 222, 128, 0.4); /* green-400 equivalent glow */
            }
            50% {
                transform: scale(1.02); /* Slightly grow */
                text-shadow: 0 0 12px rgba(74, 222, 128, 0.8), 0 0 20px rgba(74, 138, 222, 0.6), 0 0 30px rgba(74, 222, 128, 0.4);
            }
            100% {
                transform: scale(1);
                text-shadow: 0 0 8px rgba(74, 222, 128, 0.6), 0 0 15px rgba(74, 84, 222, 0.4);
            }
        }

        .animate-text-breathe {
            animation: text-breathe 3s ease-in-out infinite alternate;
        }

        /* Liquid Glass Button Styles */
        .minecraft-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px 0 rgba(74, 222, 128, 0.2);
            position: relative;
            overflow: hidden;
        }

        .minecraft-btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.15) 100%);
            box-shadow: 0 12px 48px 0 rgba(74, 222, 128, 0.4);
            transform: translateY(-2px);
        }

        .minecraft-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px 0 rgba(74, 222, 128, 0.2);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-4 space-y-8">
    <!-- Title -->
    <h1 class="text-4xl font-extrabold text-center text-green-400 tracking-wide animate-text-breathe">
        Minecraft Launcher
    </h1>

    <div class="space-y-6 w-full max-w-xs">
        <!-- Link for 1.8 (Multiplayer) -->
        <a href="https://greg-webdev.github.io/mc2/1.8.html"
           class="minecraft-btn block w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-center
                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
            1.8 (Multiplayer)
        </a>

        <!-- Link for 1.12 (Singleplayer) -->
        <a href="https://greg-webdev.github.io/mc2/1.12.html"
           class="minecraft-btn block w-full bg-green-600 text-white font-bold py-3 px-6 rounded-lg text-center
                  focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">
            1.12 (Singleplayer)
        </a>
    </div>
</body>
</html>
