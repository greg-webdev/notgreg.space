<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Chess</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Standard */
        }
        /* Custom styles for chess pieces to ensure proper rendering and size */
        .chess-piece {
            font-size: 3rem; /* Adjust as needed for piece size */
            line-height: 1; /* Ensure no extra space above/below piece */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        /* Ensure the board container takes up appropriate space */
        .board-container {
            width: min(100%, 32rem); /* Changed from 48rem to 32rem */
            height: min(100%, 32rem); /* Changed from 48rem to 32rem */
        }
        .captured-pieces-display {
            font-size: 1.5rem; /* Size for captured pieces */
            line-height: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-height: 2rem; /* Ensure some height even if empty */
            padding: 0.5rem;
            border: 1px solid #4a5568; /* gray-700 */
            border-radius: 0.5rem;
            background-color: #2d3748; /* gray-800 */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white p-4">

    <h1 class="text-4xl font-bold mb-6 text-yellow-400">Multiplayer Chess</h1>
    <p class="text-lg mb-4">Your User ID: <span id="userIdDisplay" class="font-mono text-blue-400">Loading...</span></p>

    <div id="lobbyView" class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-semibold mb-4 text-center">Lobby</h2>
        <div class="mb-4">
            <input type="text" id="newGameIdInput" placeholder="Enter New Game ID (e.g., mygame123)" class="w-full p-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-2"/>
            <button id="createGameBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 mb-4 shadow-md">
                Create New Game
            </button>
        </div>
        <div class="mb-4">
            <input type="text" id="gameIdInput" placeholder="Enter Existing Game ID to Join" class="w-full p-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-2"/>
            <button id="joinGameBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 shadow-md">
                Join Game
            </button>
        </div>
        <h3 class="text-xl font-semibold mb-3">Available Games:</h3>
        <ul id="availableGamesList" class="space-y-2 max-h-60 overflow-y-auto pr-2">
            <p class="text-gray-400 text-center">Loading available games...</p>
        </ul>
    </div>

    <div id="gameView" class="hidden flex-col lg:flex-row gap-8 w-full max-w-6xl">
        <div class="flex-1 bg-gray-800 p-6 rounded-xl shadow-lg flex flex-col items-center">
            <h2 class="text-3xl font-semibold mb-4 text-center">Game: <span id="gameIdDisplay" class="font-mono text-cyan-400"></span></h2>
            <div class="mb-4 text-center">
                <p class="text-xl">Turn: <span id="turnDisplay" class="font-bold"></span></p>
                <p class="text-sm text-gray-400">White: <span id="whitePlayerDisplay"></span></p>
                <p class="text-sm text-gray-400">Black: <span id="blackPlayerDisplay"></span></p>
                <p class="text-md mt-2">Status: <span id="gameStatusDisplay" class="font-semibold text-orange-400"></span></p>
            </div>

            <!-- Chess Board Container -->
            <div id="chessBoard" class="grid grid-cols-8 border-2 border-gray-600 rounded-lg overflow-hidden board-container">
                <!-- Squares will be dynamically inserted here by JavaScript -->
            </div>
            <button id="leaveGameBtn" class="mt-6 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 shadow-md">
                Leave Game
            </button>
        </div>

        <div class="flex-1 bg-gray-800 p-6 rounded-xl shadow-lg flex flex-col">
            <h2 class="text-2xl font-semibold mb-4 text-center">Captured Pieces</h2>
            <div class="mb-4">
                <p class="text-sm text-gray-400 mb-1">White Captured:</p>
                <div id="capturedWhitePiecesDisplay" class="captured-pieces-display text-gray-800"></div>
                <p class="text-sm text-gray-400 mt-4 mb-1">Black Captured:</p>
                <div id="capturedBlackPiecesDisplay" class="captured-pieces-display text-amber-100"></div>
            </div>

            <h2 class="text-2xl font-semibold mb-4 text-center">Chat</h2>
            <div id="chatMessages" class="flex-1 overflow-y-auto border border-gray-700 p-4 rounded-lg mb-4 bg-gray-700 max-h-80 min-h-[200px]">
                <!-- Chat messages will be dynamically inserted here -->
            </div>
            <div class="flex">
                <input type="text" id="chatInput" placeholder="Type a message..." class="flex-1 p-3 rounded-l-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <button id="sendChatBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-r-lg transition duration-300 ease-in-out transform hover:scale-105 shadow-md">
                    Send
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, query, where, addDoc, getDocs, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // Import chess.js library - Updated to a stable CDN URL
        import { Chess } from "https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0-beta.7/chess.min.js";

        // Global variables for Firebase and game state
        let app;
        let db;
        let auth;
        let userId = null;
        let isAuthReady = false;
        let gameId = '';
        let chess = new Chess(); // Initialize chess.js
        let selectedSquare = null; // {row, col}
        let validMoves = []; // Array of {row, col} for valid moves
        let turn = 'white'; // 'white' or 'black'
        let players = { white: null, black: null };
        let gameStatus = 'waiting'; // 'waiting', 'playing', 'check', 'checkmate', 'stalemate'
        let chatMessages = [];
        let availableGames = [];
        let capturedWhitePieces = [];
        let capturedBlackPieces = [];
        let unsubscribeGameListener = null;
        let unsubscribeGamesListener = null;

        // Ensure __app_id and __firebase_config are defined in the Canvas environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        // CORRECTED Firebase Config with your provided API Key
        const firebaseConfig = {
            apiKey: "AIzaSyD77rYCiT3O8BHWYLgdfsLf_9iq0Bq4Uzg",
            authDomain: "chess6969-6d8af.firebaseapp.com",
            projectId: "chess6969-6d8af",
            storageBucket: "chess6969-6d8af.firebasestorage.app",
            messagingSenderId: "176883638566",
            appId: "1:176883638566:web:14216441ece77c5540a1e7"
        };

        // Chess piece representations (using Unicode chess symbols for visual appeal)
        // Note: chess.js uses 'p', 'r', 'n', 'b', 'q', 'k' for pieces and 'w', 'b' for color
        const PIECES_UNICODE = {
            'wp': '♙', 'wr': '♖', 'wn': '♘', 'wb': '♗', 'wq': '♕', 'wk': '♔',
            'bp': '♟', 'br': '♜', 'bn': '♞', 'bb': '♝', 'bq': '♛', 'bk': '♚',
            '': '' // Empty square
        };

        // Helper function to convert chess.js piece object to our string format (e.g., 'wp', 'bn')
        const getPieceString = (pieceObj) => {
            if (!pieceObj) return '';
            return `${pieceObj.color}${pieceObj.type}`;
        };

        // --- UI Update Functions ---
        const updateLobbyView = () => {
            console.log("updateLobbyView called. Current gameId:", gameId);
            const lobbyView = document.getElementById('lobbyView');
            const gameView = document.getElementById('gameView');
            if (gameId) {
                lobbyView.classList.add('hidden');
                gameView.classList.remove('hidden');
                gameView.classList.add('flex'); // Ensure flex display for game view
                calculateAndSetSquareSize(); // Recalculate square size when game view becomes visible
            } else {
                lobbyView.classList.remove('hidden');
                gameView.classList.add('hidden');
                gameView.classList.remove('flex');
            }
        };

        const renderAvailableGames = () => {
            console.log("renderAvailableGames called. Available games:", availableGames.length);
            const availableGamesList = document.getElementById('availableGamesList');
            availableGamesList.innerHTML = ''; // Clear previous list

            if (!isAuthReady) {
                availableGamesList.innerHTML = '<p class="text-gray-400 text-center">Loading available games...</p>';
                return;
            }

            if (availableGames.length === 0) {
                availableGamesList.innerHTML = '<p class="text-gray-400 text-center">No games available. Create one!</p>';
                return;
            }

            availableGames.forEach(game => {
                const listItem = document.createElement('li');
                listItem.className = 'bg-gray-700 p-3 rounded-lg flex justify-between items-center shadow-sm';
                listItem.innerHTML = `
                    <span class="text-gray-300 font-mono text-sm break-all mr-2">${game.id}</span>
                    <div class="flex space-x-2">
                        <span class="px-2 py-1 text-xs rounded-full ${game.status === 'waiting' ? 'bg-yellow-500 text-black' : 'bg-green-500 text-white'}">
                            ${game.status.toUpperCase()}
                        </span>
                        ${game.players.white === userId && game.status === 'waiting' ? `
                            <button class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-1 px-2 rounded-md transition duration-200 delete-game-btn" data-game-id="${game.id}">
                                Delete
                            </button>
                        ` : ''}
                        <button class="bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold py-1 px-2 rounded-md transition duration-200 join-game-btn" data-game-id="${game.id}">
                            ${game.players.white === userId || game.players.black === userId ? 'Rejoin' : 'Join'}
                        </button>
                    </div>
                `;
                availableGamesList.appendChild(listItem);
            });

            // Add event listeners to newly rendered buttons
            document.querySelectorAll('.join-game-btn').forEach(button => {
                button.onclick = () => joinGame(button.dataset.gameId);
            });
            document.querySelectorAll('.delete-game-btn').forEach(button => {
                button.onclick = () => deleteGame(button.dataset.gameId);
            });
        };

        let squareSize = 0;
        const calculateAndSetSquareSize = () => {
            const boardElement = document.getElementById('chessBoard');
            // Only calculate if the board element is visible and has a width
            if (boardElement && boardElement.offsetWidth > 0) {
                const boardWidth = boardElement.offsetWidth;
                squareSize = boardWidth / 8;
                console.log("Calculated squareSize:", squareSize, "Board Width:", boardWidth);
                renderBoard(); // Re-render board with new square size
            } else {
                console.log("Board element not visible or has no width for square size calculation.");
            }
        };

        const renderBoard = () => {
            console.log("renderBoard called. Chess FEN:", chess.fen());
            const chessBoardElement = document.getElementById('chessBoard');
            chessBoardElement.innerHTML = ''; // Clear previous board

            // chess.js board is an array of arrays of piece objects or null
            const boardArray = chess.board(); // Get the current board from chess.js

            boardArray.forEach((row, rIdx) => {
                row.forEach((pieceObj, cIdx) => {
                    const pieceString = getPieceString(pieceObj); // Convert to our 'wp', 'bn' format

                    const isLightSquare = (rIdx + cIdx) % 2 === 0;
                    const isSelected = selectedSquare && selectedSquare.row === rIdx && selectedSquare.col === cIdx;
                    const isPossibleMove = validMoves.some(move => move.row === rIdx && move.col === cIdx);

                    const bgColor = isSelected ? 'bg-yellow-500' : (isLightSquare ? 'bg-amber-100' : 'bg-amber-700');
                    const textColor = isLightSquare ? 'text-gray-800' : 'text-amber-100';

                    const squareDiv = document.createElement('div');
                    squareDiv.className = `relative flex items-center justify-center text-4xl font-bold cursor-pointer transition-colors duration-100 ${bgColor} ${textColor}`;
                    squareDiv.style.width = `${squareSize}px`;
                    squareDiv.style.height = `${squareSize}px`;
                    squareDiv.dataset.row = rIdx;
                    squareDiv.dataset.col = cIdx;
                    squareDiv.onclick = () => handleSquareClick(rIdx, cIdx);

                    const pieceSpan = document.createElement('span');
                    pieceSpan.className = 'chess-piece';
                    pieceSpan.textContent = PIECES_UNICODE[pieceString]; // Use the Unicode map
                    squareDiv.appendChild(pieceSpan);

                    if (isPossibleMove) {
                        const dotDiv = document.createElement('div');
                        dotDiv.className = 'absolute w-3 h-3 bg-blue-500 rounded-full opacity-75';
                        squareDiv.appendChild(dotDiv);
                    }

                    chessBoardElement.appendChild(squareDiv);
                });
            });
        };

        const updateGameInfo = () => {
            console.log("updateGameInfo called. Current Turn:", turn, "Game Status:", gameStatus);
            document.getElementById('gameIdDisplay').textContent = gameId;
            document.getElementById('turnDisplay').textContent = turn.toUpperCase();
            document.getElementById('turnDisplay').className = `font-bold ${turn === 'white' ? 'text-white' : 'text-gray-400'}`;
            
            document.getElementById('whitePlayerDisplay').textContent = players.white || 'Waiting...';
            document.getElementById('blackPlayerDisplay').textContent = players.black || 'Waiting...';
            
            const gameStatusDisplay = document.getElementById('gameStatusDisplay');
            if (chess.is_checkmate()) {
                const winner = chess.turn() === 'w' ? 'Black' : 'White'; // If white is checkmated, black wins
                gameStatusDisplay.textContent = `CHECKMATE! ${winner} Wins!`;
                gameStatusDisplay.className = 'font-semibold text-green-500';
            } else if (chess.is_stalemate()) {
                gameStatusDisplay.textContent = 'STALEMATE! Game Over.';
                gameStatusDisplay.className = 'font-semibold text-yellow-500';
            } else if (chess.is_check()) {
                gameStatusDisplay.textContent = 'CHECK!';
                gameStatusDisplay.className = 'font-semibold text-red-500';
            } else {
                gameStatusDisplay.textContent = gameStatus.toUpperCase();
                gameStatusDisplay.className = 'font-semibold text-orange-400';
            }
        };

        const renderChatMessages = () => {
            console.log("renderChatMessages called. Messages count:", chatMessages.length);
            const chatMessagesDiv = document.getElementById('chatMessages');
            chatMessagesDiv.innerHTML = '';
            chatMessages.forEach((msg, index) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'mb-2';
                msgDiv.innerHTML = `<span class="font-bold text-blue-300">${msg.sender}:</span> ${msg.message}`;
                chatMessagesDiv.appendChild(msgDiv);
            });
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight; // Scroll to bottom
        };

        const renderCapturedPieces = () => {
            console.log("renderCapturedPieces called. White:", capturedWhitePieces.length, "Black:", capturedBlackPieces.length);
            const capturedWhitePiecesDisplay = document.getElementById('capturedWhitePiecesDisplay');
            const capturedBlackPiecesDisplay = document.getElementById('capturedBlackPiecesDisplay');

            capturedWhitePiecesDisplay.innerHTML = '';
            capturedBlackPiecesDisplay.innerHTML = '';

            capturedWhitePieces.forEach(piece => {
                const span = document.createElement('span');
                span.textContent = PIECES_UNICODE[piece];
                capturedWhitePiecesDisplay.appendChild(span);
            });

            capturedBlackPieces.forEach(piece => {
                const span = document.createElement('span');
                span.textContent = PIECES_UNICODE[piece];
                capturedBlackPiecesDisplay.appendChild(span);
            });
        };


        // --- Game Logic Functions ---
        const createGame = async () => {
            if (!userId) {
                console.error("User not authenticated.");
                return;
            }
            const newGameIdInput = document.getElementById('newGameIdInput');
            const customGameId = newGameIdInput.value.trim();

            if (!customGameId) {
                alert("Please enter a Game ID to create a new game."); // Using alert for simplicity, consider a custom modal
                return;
            }

            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, customGameId);
            try {
                const docSnap = await getDoc(gameDocRef);
                if (docSnap.exists()) {
                    alert(`Game ID "${customGameId}" already exists. Please choose a different one or join it.`);
                    return;
                }

                // Initialize a new chess game and get its FEN
                const newChessGame = new Chess();
                const initialFen = newChessGame.fen();
                console.log("Creating new game with FEN:", initialFen);

                await setDoc(gameDocRef, {
                    boardFen: initialFen, // Store FEN string
                    turn: 'white',
                    players: { white: userId, black: null },
                    status: 'waiting',
                    chat: [{ sender: 'System', message: `${userId} created game "${customGameId}".` }],
                    capturedWhitePieces: JSON.stringify([]),
                    capturedBlackPieces: JSON.stringify([]),
                    createdAt: new Date().toISOString()
                });
                window.gameId = customGameId;
                newGameIdInput.value = ''; // Clear input after creating
                console.log("Game created in Firestore with ID:", customGameId);
            } catch (e) {
                console.error("Error creating game:", e);
                alert("Error creating game. Please try again.");
            }
        };

        const joinGame = async (idToJoin) => {
            if (!userId) {
                console.error("User not authenticated.");
                return;
            }
            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, idToJoin);
            try {
                const docSnap = await getDoc(gameDocRef);
                if (docSnap.exists()) {
                    const gameData = docSnap.data();
                    if (gameData.status === 'waiting' && !gameData.players.black) {
                        await updateDoc(gameDocRef, {
                            'players.black': userId,
                            status: 'playing',
                            chat: [...gameData.chat, { sender: 'System', message: `${userId} joined the game.` }]
                        });
                        window.gameId = idToJoin;
                        console.log("Joined game with ID:", idToJoin);
                    } else if (gameData.players.white === userId || gameData.players.black === userId) {
                        window.gameId = idToJoin; // Rejoin if already a player
                        console.log("Rejoined game with ID:", idToJoin);
                    } else {
                        alert("Game is full or not accepting new players.");
                    }
                } else {
                    alert("Game does not exist.");
                }
            } catch (e) {
                console.error("Error joining game:", e);
                alert("Error joining game. Please try again.");
            }
        };

        // Helper to convert (row, col) to algebraic square (e.g., 'a1', 'h8')
        const toAlgebraic = (row, col) => {
            const file = String.fromCharCode(97 + col); // 'a' to 'h'
            const rank = 8 - row; // '8' to '1'
            return `${file}${rank}`;
        };

        const handleSquareClick = (row, col) => {
            console.log("handleSquareClick called. Row:", row, "Col:", col);
            if (!gameId || chess.is_game_over()) {
                console.log("Game not active or over. Cannot click.");
                return;
            }

            const currentPlayerColor = players.white === userId ? 'white' : (players.black === userId ? 'black' : null);
            if (!currentPlayerColor || (currentPlayerColor === 'white' && chess.turn() !== 'w') || (currentPlayerColor === 'black' && chess.turn() !== 'b')) {
                console.log("It's not your turn or you are not a player.");
                return;
            }

            const squareAlgebraic = toAlgebraic(row, col);
            const piece = chess.get(squareAlgebraic); // Get piece object from chess.js

            if (selectedSquare) {
                const startSquareAlgebraic = toAlgebraic(selectedSquare.row, selectedSquare.col);
                
                if (selectedSquare.row === row && selectedSquare.col === col) {
                    console.log("Deselecting square.");
                    selectedSquare = null;
                    validMoves = [];
                    renderBoard();
                    return;
                }

                // If clicking on your own piece, select the new piece and update valid moves
                if (piece && piece.color === chess.turn()) {
                    console.log("Selecting new piece.");
                    selectedSquare = { row, col };
                    const moves = chess.moves({ square: squareAlgebraic, verbose: true });
                    validMoves = moves.map(move => {
                        const targetRow = 8 - parseInt(move.to[1]);
                        const targetCol = move.to.charCodeAt(0) - 97;
                        return { row: targetRow, col: targetCol };
                    });
                    renderBoard();
                    return;
                }

                // Attempt to move the selected piece
                try {
                    console.log("Attempting move from", startSquareAlgebraic, "to", squareAlgebraic);
                    const moveResult = chess.move({
                        from: startSquareAlgebraic,
                        to: squareAlgebraic,
                        promotion: 'q' // auto-promote to queen for simplicity
                    });

                    if (moveResult) {
                        console.log("Move successful:", moveResult);
                        makeMove(moveResult); // Pass the move result to makeMove
                        selectedSquare = null;
                        validMoves = [];
                        renderBoard(); // Render immediately for local responsiveness
                    } else {
                        console.log("Invalid move. chess.js returned null.");
                    }
                } catch (e) {
                    console.error("Error making move with chess.js:", e);
                    console.log("Invalid move. (Error caught)");
                }
            } else {
                // If no piece is selected, select the clicked piece if it's the current player's turn
                if (piece && piece.color === chess.turn()) {
                    console.log("Selecting piece:", piece);
                    selectedSquare = { row, col };
                    const moves = chess.moves({ square: squareAlgebraic, verbose: true });
                    validMoves = moves.map(move => {
                        const targetRow = 8 - parseInt(move.to[1]);
                        const targetCol = move.to.charCodeAt(0) - 97;
                        return { row: targetRow, col: targetCol };
                    });
                    renderBoard();
                } else {
                    console.log("No piece selected or not your piece/turn.");
                }
            }
        };

        // makeMove now takes the result from chess.move()
        const makeMove = async (moveResult) => {
            if (!gameId || !userId || chess.is_game_over()) {
                console.log("Game not active or over. Cannot make move.");
                return;
            }

            // Update captured pieces based on moveResult
            let updatedCapturedWhitePieces = [...capturedWhitePieces];
            let updatedCapturedBlackPieces = [...capturedBlackPieces];

            if (moveResult.captured) {
                const capturedPieceString = `${moveResult.color === 'w' ? 'b' : 'w'}${moveResult.captured}`;
                if (moveResult.color === 'w') { // White captured a black piece
                    updatedCapturedWhitePieces.push(capturedPieceString);
                } else { // Black captured a white piece
                    updatedCapturedBlackPieces.push(capturedPieceString);
                }
                console.log("Piece captured:", capturedPieceString);
            }

            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, gameId);
            try {
                await updateDoc(gameDocRef, {
                    boardFen: chess.fen(), // Save the new FEN string
                    turn: chess.turn() === 'w' ? 'white' : 'black', // Update turn based on chess.js
                    capturedWhitePieces: JSON.stringify(updatedCapturedWhitePieces),
                    capturedBlackPieces: JSON.stringify(updatedCapturedBlackPieces),
                    status: chess.is_checkmate() ? 'checkmate' : (chess.is_stalemate() ? 'stalemate' : (chess.is_check() ? 'check' : 'playing')),
                });
                console.log("Move made and updated in Firestore. New FEN:", chess.fen());
            } catch (e) {
                console.error("Error updating board:", e);
            }
        };

        const sendChatMessage = async () => {
            const chatInput = document.getElementById('chatInput');
            if (!gameId || !userId || !chatInput.value.trim()) return;

            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, gameId);
            const message = {
                sender: userId,
                message: chatInput.value.trim(),
                timestamp: new Date().toISOString()
            };

            try {
                const docSnap = await getDoc(gameDocRef);
                if (docSnap.exists()) {
                    const currentChat = docSnap.data().chat || [];
                    await updateDoc(gameDocRef, {
                        chat: [...currentChat, message]
                    });
                    chatInput.value = ''; // Clear input
                    console.log("Chat message sent.");
                }
            } catch (e) {
                console.error("Error sending chat message:", e);
            }
        };

        const leaveGame = async () => {
            console.log("Leaving game...");
            if (!gameId || !userId) {
                console.error("Cannot leave game: gameId or userId not set.");
                return;
            }

            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, gameId);
            try {
                const docSnap = await getDoc(gameDocRef);
                if (docSnap.exists()) {
                    const gameData = docSnap.data();
                    let updatedPlayers = { ...gameData.players };

                    if (updatedPlayers.white === userId) {
                        updatedPlayers.white = null;
                    } else if (updatedPlayers.black === userId) {
                        updatedPlayers.black = null;
                    } else {
                        console.warn("You are not a player in this game, just observing.");
                    }

                    await updateDoc(gameDocRef, {
                        players: updatedPlayers,
                        chat: [...(gameData.chat || []), { sender: 'System', message: `${userId} left the game.` }]
                    });
                    console.log(`${userId} marked as left in Firestore for game ${gameId}.`);
                } else {
                    console.warn(`Game ${gameId} does not exist when trying to leave.`);
                }
            } catch (e) {
                console.error("Error updating player status on leave:", e);
            }

            // Local state cleanup (always perform this regardless of Firestore update success)
            if (unsubscribeGameListener) {
                unsubscribeGameListener();
                unsubscribeGameListener = null;
            }
            gameId = '';
            selectedSquare = null;
            validMoves = [];
            chess.reset(); // Reset chess.js board
            turn = 'white';
            players = { white: null, black: null };
            gameStatus = 'waiting';
            chatMessages = [];
            capturedWhitePieces = [];
            capturedBlackPieces = [];
            updateLobbyView();
            renderBoard(); // Render initial board state
            updateGameInfo(); // Update game info display
            renderChatMessages(); // Clear chat
            renderCapturedPieces(); // Clear captured pieces display
            fetchAvailableGames();
            console.log("Game left and local state reset.");
        };


        const deleteGame = async (gameToDeleteId) => {
            console.log("Attempting to delete game:", gameToDeleteId);
            if (!userId) {
                console.error("User not authenticated.");
                return;
            }
            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, gameToDeleteId);
            try {
                const docSnap = await getDoc(gameDocRef);
                if (docSnap.exists()) {
                    const gameData = docSnap.data();
                    if ((gameData.players.white === userId && gameData.status === 'waiting') || (!gameData.players.white && !gameData.players.black)) {
                        await deleteDoc(gameDocRef);
                        console.log(`Game ${gameToDeleteId} deleted successfully.`);
                        if (gameId === gameToDeleteId) {
                            leaveGame(); // Leave the game if it was the current one
                        } else {
                            fetchAvailableGames(); // Refresh lobby if another game was deleted
                        }
                    } else {
                        console.warn("You are not authorized to delete this game or it's already in progress.");
                    }
                } else {
                    console.warn("Game does not exist.");
                }
            } catch (e) {
                console.error("Error deleting game:", e);
            }
        };

        // --- Firebase Listeners and Initialization ---
        const setupGameListener = () => {
            console.log("setupGameListener called for gameId:", gameId);
            if (unsubscribeGameListener) {
                unsubscribeGameListener(); // Unsubscribe from previous game if any
                console.log("Unsubscribed from previous game listener.");
            }
            if (!gameId || !isAuthReady || !userId) {
                console.log("Not setting up game listener: missing gameId, auth not ready, or userId.");
                chess.reset(); // Reset chess.js board
                turn = 'white';
                players = { white: null, black: null };
                gameStatus = 'waiting';
                chatMessages = [];
                capturedWhitePieces = [];
                capturedBlackPieces = [];
                renderBoard();
                updateGameInfo();
                renderChatMessages();
                renderCapturedPieces();
                return;
            }

            const gameDocRef = doc(db, `artifacts/${appId}/public/data/games`, gameId);
            unsubscribeGameListener = onSnapshot(gameDocRef, (docSnap) => {
                console.log("onSnapshot triggered for game:", gameId);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    console.log("Firestore data received:", data);
                    
                    try {
                        chess.load(data.boardFen || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'); // Load FEN
                        console.log("chess.js board loaded with FEN:", chess.fen());
                    } catch (e) {
                        console.error("Error loading FEN into chess.js:", e);
                        // Fallback to reset if FEN is invalid
                        chess.reset();
                        console.log("chess.js board reset due to FEN loading error.");
                    }

                    turn = data.turn || 'white';
                    players = data.players || { white: null, black: null };
                    gameStatus = data.status || 'waiting';
                    chatMessages = data.chat || [];
                    capturedWhitePieces = data.capturedWhitePieces ? JSON.parse(data.capturedWhitePieces) : [];
                    capturedBlackPieces = data.capturedBlackPieces ? JSON.parse(data.capturedBlackPieces) : [];

                    renderBoard();
                    updateGameInfo();
                    renderChatMessages();
                    renderCapturedPieces();
                    console.log("UI updated based on Firestore data.");

                    // New: Check if both players have left to delete the game
                    if (!data.players.white && !data.players.black) {
                        console.log(`Both players left game ${gameId}. Deleting game document.`);
                        deleteGame(gameId); // Call deleteGame
                    }

                } else {
                    console.log("No such game document! Game might have been deleted.");
                    leaveGame(); // Automatically leave if game document disappears
                }
            }, (error) => {
                console.error("Error listening to game state:", error);
            });
        };

        const fetchAvailableGames = async () => {
            console.log("fetchAvailableGames called.");
            if (!isAuthReady || !userId) {
                console.log("Not fetching available games: auth not ready or userId missing.");
                return;
            }

            try {
                const gamesCollectionRef = collection(db, `artifacts/${appId}/public/data/games`);
                const q = query(gamesCollectionRef);
                const querySnapshot = await getDocs(q);
                availableGames = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                availableGames = availableGames.filter(game => game.status === 'waiting' || (game.status === 'playing' && (game.players.white === userId || game.players.black === userId)));
                renderAvailableGames();
                console.log("Available games fetched successfully.");
            } catch (error) {
                console.error("Error fetching available games:", error);
            }
        };

        const setupAvailableGamesListener = () => {
            console.log("setupAvailableGamesListener called.");
            if (unsubscribeGamesListener) {
                unsubscribeGamesListener();
                console.log("Unsubscribed from previous available games listener.");
            }
            const q = query(collection(db, `artifacts/${appId}/public/data/games`));
            unsubscribeGamesListener = onSnapshot(q, (snapshot) => {
                console.log("onSnapshot triggered for available games.");
                availableGames = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                availableGames = availableGames.filter(game => game.status === 'waiting' || (game.status === 'playing' && (game.players.white === userId || game.players.black === userId)));
                renderAvailableGames();
            }, (error) => {
                console.error("Error listening to available games:", error);
            });
        };

        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', async () => {
            console.log("DOMContentLoaded fired.");
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            console.log("Firebase initialized.");

            const userIdDisplay = document.getElementById('userIdDisplay');
            const createGameBtn = document.getElementById('createGameBtn');
            const newGameIdInput = document.getElementById('newGameIdInput');
            const gameIdInput = document.getElementById('gameIdInput');
            const joinGameBtn = document.getElementById('joinGameBtn');
            const leaveGameBtn = document.getElementById('leaveGameBtn');
            const sendChatBtn = document.getElementById('sendChatBtn');
            const chatInput = document.getElementById('chatInput');
            const chessBoardElement = document.getElementById('chessBoard');

            // Initial authentication
            try {
                console.log("Firebase Config:", firebaseConfig);
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    console.log("Attempting sign-in with custom token...");
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    console.log("Attempting anonymous sign-in...");
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error during Firebase authentication:", error);
                try {
                    console.log("Fallback: Attempting anonymous sign-in due to initial failure...");
                    await signInAnonymously(auth);
                } catch (anonError) {
                    console.error("Error during anonymous sign-in (fallback):", anonError);
                }
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userId = user.uid;
                    userIdDisplay.textContent = userId;
                    isAuthReady = true;
                    createGameBtn.disabled = false;
                    newGameIdInput.disabled = false;
                    gameIdInput.disabled = false;
                    joinGameBtn.disabled = false;
                    console.log("Firebase Auth Ready. User ID:", userId);
                    setupAvailableGamesListener();
                    fetchAvailableGames();
                } else {
                    userId = null;
                    userIdDisplay.textContent = 'Not signed in';
                    isAuthReady = true;
                    createGameBtn.disabled = true;
                    newGameIdInput.disabled = true;
                    gameIdInput.disabled = true;
                    joinGameBtn.disabled = true;
                    console.log("Firebase Auth Ready. No user signed in.");
                    if (unsubscribeGamesListener) {
                        unsubscribeGamesListener();
                    }
                    availableGames = [];
                    renderAvailableGames();
                }
            });

            createGameBtn.addEventListener('click', createGame);
            joinGameBtn.addEventListener('click', () => joinGame(gameIdInput.value));
            leaveGameBtn.addEventListener('click', leaveGame);
            sendChatBtn.addEventListener('click', sendChatMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendChatMessage();
                }
            });

            Object.defineProperty(window, 'gameId', {
                get: () => gameId,
                set: (newValue) => {
                    console.log("gameId setter called. Old:", gameId, "New:", newValue);
                    gameId = newValue;
                    setupGameListener();
                    updateLobbyView();
                }
            });

            updateLobbyView();
            updateGameInfo();
            renderCapturedPieces();

            window.addEventListener('resize', calculateAndSetSquareSize);
            console.log("DOMContentLoaded complete. Initial UI render triggered.");
        });
    </script>
</body>
</html>
