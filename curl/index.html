<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG.S Ai 1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        /* Ensure all colors match the new professional theme (sky/gray) */

        .chat-scroll {
            /* Scrollbar styling for a cleaner look */
            scrollbar-width: thin;
            scrollbar-color: #38bdf8 #1f2937; /* Sky thumb, dark track */
        }

        .chat-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: #1f2937; /* dark track */
            border-radius: 10px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: #38bdf8; /* sky thumb */
            border-radius: 10px;
            border: 2px solid #1f2937;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen overflow-hidden flex items-stretch justify-center" style="font-family: 'Inter', sans-serif;">

    <!-- Changed min-h-screen to h-full and added max-w-7xl for better scaling -->
    <div id="app" class="w-full bg-gray-800 shadow-2xl flex flex-col h-full border-sky-400 max-w-7xl mx-auto">
        
        <!-- Header: NG.S Ai 1.1 (Fixed at top by flex-col layout) -->
        <header class="p-4 bg-sky-600/70 border-b-4 border-sky-400 flex-shrink-0">
            <h1 class="text-3xl font-extrabold text-center text-white tracking-wide">
                NG.S Ai 1.1
            </h1>
            <div id="user-status-area" class="text-center mt-2 text-sm">
                <!-- User status and Sign In/Out button will be rendered here -->
            </div>
        </header>

        <!-- Chat History (flex-grow handles scrolling in the middle) -->
        <div id="chat-history" class="flex-grow p-4 pt-8 pb-8 space-y-4 overflow-y-auto chat-scroll max-w-4xl w-full mx-auto">
            <div class="flex justify-start">
                <!-- Initial message -->
                <div class="max-w-xs md:max-w-md p-3 rounded-xl bg-sky-500 shadow-md text-gray-900">
                    <strong class="font-bold">NG.S Ai:</strong>
                    <p class="mt-1">Initializing chat. Please wait for the connection to finalize...</p>
                </div>
            </div>
            <!-- Messages will be appended here via Firestore listener -->
        </div>

        <!-- Loading Indicator Area (Fixed just above the input) -->
        <div class="p-4 bg-gray-700 border-t border-gray-600 flex flex-col items-center flex-shrink-0">
            
            <div id="loading-indicator" class="hidden text-sm text-sky-300 flex items-center justify-center">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-sky-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Generating response...
            </div>

        </div>


        <!-- Input Area (Fixed at bottom by flex-col layout) -->
        <div class="p-4 border-t-4 border-sky-400 bg-gray-700 flex space-x-2 flex-shrink-0">
            <!-- Constrained the input width to match chat history for better alignment -->
            <div class="flex flex-grow max-w-4xl mx-auto space-x-2">
                <input type="text" id="user-input" placeholder="Ask a question..." 
                    class="flex-grow p-3 rounded-full border-2 border-sky-400 bg-gray-900 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-300" disabled>
                <button id="send-btn" 
                        class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition duration-200 transform hover:scale-105 active:scale-95 disabled:bg-gray-500 disabled:cursor-not-allowed" disabled>
                    Send
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signInWithCustomToken, 
            onAuthStateChanged, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            setLogLevel,
            collection,
            query,
            orderBy,
            addDoc,
            serverTimestamp,
            onSnapshot
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- GLOBAL CONFIG & STATE ---
        const MODEL_NAME = 'gemini-2.5-flash-preview-09-2025';
        // NOTE: The GEMINI_API_KEY is left as a placeholder string, the Canvas environment handles it.
        const GEMINI_API_KEY = "AIzaSyBGf8AHbe72jamL45XYPa9kRxQD9nT98-8"; 

        let userId = 'unknown';
        let app, db, auth; 
        let unsubscribeChat = null; // To hold the Firestore listener
        let isAuthReady = false;
        
        // This array will hold the current chat history for the Gemini API call
        let chatHistory = []; 

        // Get DOM elements
        const chatHistoryEl = document.getElementById('chat-history');
        const userInputEl = document.getElementById('user-input');
        const sendBtnEl = document.getElementById('send-btn');
        const loadingEl = document.getElementById('loading-indicator');
        const userStatusEl = document.getElementById('user-status-area');
        
        // Professional Persona System Prompt
        const systemPrompt = `You are a helpful and professional large language model. Your purpose is to provide clear, concise, and accurate information, answer questions, and assist the user in their tasks.
If the user asks what 'NG.S Ai' stands for, you MUST reply with the exact phrase: "NG.S Ai stands for notgreg.space ai."
If the user asks who created you, who made you, or similar questions about your origin, you MUST reply with the exact phrase: "I was created by a developer named Greg."
Otherwise, do not mention that you are an LLM, a large language model, Gemini, or affiliated with Google. Your default persona is simply a helpful, friendly assistant. Maintain a friendly and respectful tone.`;

        // --- FIREBASE CONFIGURATION (Using Canvas-provided globals) ---
        // Access Canvas global variables safely
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        // Collection path for public/shared conversations
        const CHAT_COLLECTION_PATH = `/artifacts/${appId}/public/data/chats`;


        // --- FIREBASE AUTH & UI FUNCTIONS ---

        function renderUserStatus() {
            if (!isAuthReady) {
                userStatusEl.innerHTML = '<p class="text-sky-300">Connecting...</p>';
                return;
            }
            
            // Safe check for auth initialization
            if (!auth) {
                // If auth failed to initialize but we are ready, show the guest ID if set
                const currentStatusId = userId !== 'unknown' ? userId : 'Failed';
                userStatusEl.innerHTML = `<div class="flex items-center justify-center text-sm">Signed in as: <span class="font-semibold text-red-400">Guest</span> (ID: ${currentStatusId})</div>`;
                return;
            }

            // Check if currentUser is available and not anonymous
            const isGoogleUser = auth.currentUser && !auth.currentUser.isAnonymous;
            const statusText = isGoogleUser 
                ? `Signed in as: <span class="font-semibold text-green-400">${auth.currentUser.displayName || auth.currentUser.email}</span>`
                : `Signed in as: <span class="font-semibold text-yellow-400">Guest</span> (ID: ${userId})`;
            
            const buttonHtml = isGoogleUser 
                ? `<button id="sign-out-btn" class="ml-3 text-red-400 hover:text-red-500 font-bold p-1 rounded transition-colors">Sign Out</button>`
                : `<button id="google-sign-in-btn" class="ml-3 bg-white text-gray-800 font-bold py-1 px-3 rounded-full shadow-md hover:bg-gray-200 transition-colors">Sign In with Google</button>`;
            
            userStatusEl.innerHTML = `
                <div class="flex items-center justify-center text-sm">
                    ${statusText}
                    ${buttonHtml}
                </div>
            `;

            // Attach event listeners
            document.getElementById('google-sign-in-btn')?.addEventListener('click', signInWithGoogle);
            document.getElementById('sign-out-btn')?.addEventListener('click', () => signOut(auth));
        }

        async function signInWithGoogle() {
            const provider = new GoogleAuthProvider();
            try {
                // NOTE: This might still fail with auth/unauthorized-domain if the Canvas host is not added to your Firebase project.
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Google Sign-In Failed:", error);
            }
        }

        async function setupFirebase() {
            setLogLevel('Debug');
            
            if (!firebaseConfig) {
                 // Suppress console.error here to avoid confusing the user with expected missing config
                 // console.error("Firebase config is missing. Cannot initialize Firebase.");
                 isAuthReady = true;
                 // Set a fallback ID and status if config is missing but allow UI to load
                 userId = crypto.randomUUID();
                 renderUserStatus();
                 userInputEl.disabled = true;
                 sendBtnEl.disabled = true;
                 return;
            }

            try {
                // Initialize Firebase services using the provided config
                app = initializeApp(firebaseConfig); 
                db = getFirestore(app);
                auth = getAuth(app); 

                // 1. Initial Authentication attempt (Custom token provided by Canvas)
                let customTokenSignInSuccessful = false;
                if (initialAuthToken) {
                    try {
                        // Attempt to sign in with the custom token
                        await signInWithCustomToken(auth, initialAuthToken);
                        customTokenSignInSuccessful = true;
                    } catch (tokenError) {
                        // Log the error but continue to anonymous sign-in
                        console.warn("Custom token sign-in failed (likely mismatch or expiration). Falling back to Anonymous Sign-in.", tokenError.message);
                    }
                }
                
                // 2. Fallback to Anonymous Sign-in if Custom Token failed or was not provided
                if (!customTokenSignInSuccessful) {
                    await signInAnonymously(auth);
                }
                
                // 3. Set up Auth State Listener
                onAuthStateChanged(auth, (user) => {
                    isAuthReady = true;

                    if (user) {
                        // Use the authenticated user's UID
                        userId = user.uid;
                        console.log("Auth State Changed: User is signed in. UID:", userId);
                        loadMessages();
                        userInputEl.disabled = false;
                        sendBtnEl.disabled = false;
                    } else {
                        // User is signed out, use a temporary fallback ID
                        // NOTE: If the user is signed out, we should try to use a locally generated ID
                        // but since the previous sign-in attempt usually works, this branch is often for signOut.
                        userId = crypto.randomUUID(); 
                        console.log("Auth State Changed: No user signed in. Using fallback ID:", userId);
                        
                        chatHistoryEl.innerHTML = ''; 
                        chatHistory = [];
                        loadMessages();
                    }
                    renderUserStatus();
                });

            } catch (error) {
                console.error("Firebase setup encountered an error:", error);
                
                // Ensure UI reflects the failure state
                isAuthReady = true;
                userId = crypto.randomUUID();
                
                if (!auth) {
                    // Create a minimal mock auth object if initialization totally failed for renderUserStatus
                    auth = { currentUser: null, isAnonymous: true }; 
                }
                renderUserStatus(); 
                userInputEl.disabled = true;
                sendBtnEl.disabled = true;
            }
        }

        // --- FIRESTORE DATA FUNCTIONS ---

        /**
         * Loads and subscribes to chat messages in real-time.
         */
        function loadMessages() {
            if (!db || !isAuthReady) return;
            
            // If there's an existing listener, unsubscribe it first
            if (unsubscribeChat) {
                unsubscribeChat();
            }

            // Query messages ordered by timestamp
            // NOTE: Firestore queries must be filtered client-side by userId as orderBy on unindexed fields is problematic.
            const q = query(
                collection(db, CHAT_COLLECTION_PATH),
                orderBy('timestamp', 'asc')
            );

            // Re-initialize local history array and UI
            chatHistory = [];
            chatHistoryEl.innerHTML = '';

            unsubscribeChat = onSnapshot(q, (snapshot) => {
                let needsScroll = false;
                
                // Check if the user is scrolling near the bottom before update
                if (chatHistoryEl.scrollHeight - chatHistoryEl.scrollTop < chatHistoryEl.clientHeight + 100) {
                    needsScroll = true;
                }

                const newChatHistory = [];

                snapshot.docChanges().forEach(change => {
                    const data = change.doc.data();
                    
                    // Client-side filter: Only display messages belonging to the current user
                    // Note: We use the current 'userId' which is set by auth or fallback.
                    if (data.userId !== userId) return;

                    const role = data.sender === 'user' ? 'user' : 'model';
                    
                    // Add to the list used for the Gemini API context
                    newChatHistory.push({
                        role: role, 
                        parts: [{ text: data.content }]
                    });
                });
                
                // If a change was detected, we update the UI
                if (JSON.stringify(chatHistory) !== JSON.stringify(newChatHistory)) {
                    // Update the local history array
                    chatHistory = newChatHistory;

                    // Re-render the entire chat from the current chatHistory to ensure order and consistency
                    chatHistoryEl.innerHTML = '';
                    newChatHistory.forEach(msg => {
                        displayMessage(msg.parts[0].text, msg.role);
                    });

                    // Scroll to the bottom if needed (especially if a new message was added)
                    if (needsScroll || snapshot.docChanges().some(c => c.type === 'added' && c.doc.data().userId === userId)) {
                        chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
                    }
                }
            }, (error) => {
                console.error("Firestore onSnapshot error:", error);
            });
        }

        /**
         * Saves a message to Firestore.
         * @param {string} sender - 'user' or 'model'.
         * @param {string} content - The message content.
         */
        async function saveMessage(sender, content) {
            if (!db || !userId || userId === 'unknown') {
                console.error("Cannot save message: DB not initialized or User ID missing. Displaying locally.");
                
                // If Firestore is unavailable, display the message locally but don't save to chatHistory array
                displayMessage(content, sender);

                // If the user's message failed to save, the subsequent API call will likely fail 
                // due to lack of a stable userId/auth state, but we return to attempt the API call.
                return;
            }
            
            try {
                // IMPORTANT: When saving, if the user is authenticated (auth.currentUser exists), 
                // we must use auth.currentUser.uid to pass the Firestore security rules.
                const actualUserId = auth && auth.currentUser ? auth.currentUser.uid : userId;
                
                await addDoc(collection(db, CHAT_COLLECTION_PATH), {
                    userId: actualUserId,
                    sender: sender,
                    content: content,
                    timestamp: serverTimestamp()
                });
            } catch (error) {
                console.error("Error saving message to Firestore:", error);
            }
        }


        // --- DOWNLOAD UTILITY FUNCTION ---

        /**
         * Converts text to a Blob and triggers a download.
         * @param {string} text - The content of the file.
         * @param {string} filename - The name of the file (e.g., 'response.txt').
         */
        function downloadFile(text, filename) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            // Create a temporary link element to trigger the download
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            
            // Append, click, and remove the anchor element
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a);
            
            // Clean up the created object URL
            URL.revokeObjectURL(url); 
        }

        // --- CODE PARSING FUNCTION ---

        /**
         * Parses the model's text response, splitting it into text and code blocks.
         */
        function parseModelResponse(responseText) {
            // Regex to find and capture markdown code blocks globally
            // Captures: 1: Full match, 2: Language, 3: Code content
            const codeBlockRegex = /```(\w+)\n([\s\S]*?)\n```/g; 
            
            const parts = [];
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(responseText)) !== null) {
                // 1. Text before the code block
                const textBefore = responseText.substring(lastIndex, match.index).trim();
                if (textBefore) {
                    parts.push({ type: 'text', content: textBefore });
                }

                // 2. The code block itself
                const [, language, code] = match;
                const cleanCode = code.trim();
                
                let filename = `file.${language.toLowerCase() || 'txt'}`;
                
                // Set common file extensions/names
                const lang = language.toLowerCase();
                if (lang === 'javascript' || lang === 'js') {
                    filename = 'script.js';
                } else if (lang === 'html' || lang === 'css') {
                    filename = `style.${lang}`;
                } else if (lang === 'python' || lang === 'py') {
                    filename = 'script.py';
                } else if (lang === 'markdown' || lang === 'md') {
                    filename = 'document.md';
                } else if (lang === 'typescript' || lang === 'ts') {
                    filename = 'script.ts';
                }
                
                parts.push({ 
                    type: 'code', 
                    language: language || 'unknown', 
                    code: cleanCode, 
                    filename: filename 
                });

                lastIndex = match.index + match[0].length;
            }

            // 3. Remaining text after the last code block
            const textAfter = responseText.substring(lastIndex).trim();
            if (textAfter) {
                parts.push({ type: 'text', content: textAfter });
            }

            // If no code blocks found, treat the whole response as a single text part
            if (parts.length === 0 && responseText.trim().length > 0) {
                return [{ type: 'text', content: responseText }];
            }
            
            return parts;
        }


        // --- CHAT DISPLAY FUNCTIONS ---

        /**
         * Appends a message to the chat history UI, handling code blocks separately.
         * This function is now called by the onSnapshot listener for rendering.
         * @param {string} responseText - The message content.
         * @param {string} sender - 'user' or 'model' ('user' or 'NG.S Ai').
         */
        function displayMessage(responseText, sender) {
            const messageContainer = document.createElement('div');
            // 'user' in Firestore is 'user' role, 'model' in Firestore is 'model' role
            const role = sender === 'user' ? 'user' : 'model'; 

            messageContainer.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const messageBubble = document.createElement('div');
            
            let senderName, bgColor;
            if (role === 'user') {
                senderName = 'You';
                bgColor = 'bg-gray-600 text-gray-100';
            } else {
                senderName = 'NG.S Ai'; 
                bgColor = 'bg-sky-500 text-gray-900';
            }

            // Class setup for the main bubble container
            messageBubble.className = `max-w-xs md:max-w-md p-3 rounded-xl shadow-lg ${bgColor} transform transition duration-300 hover:scale-[1.02] flex flex-col space-y-2`;
            
            const parts = role === 'model' ? parseModelResponse(responseText) : [{ type: 'text', content: responseText }];
            
            const tempDiv = document.createElement('div');
            
            // Add sender name header
            const headerEl = document.createElement('p');
            headerEl.innerHTML = `<strong class="font-bold">${senderName}:</strong>`;
            tempDiv.appendChild(headerEl);

            let foundFirstText = false;

            parts.forEach(part => {
                if (part.type === 'text') {
                    
                    if (!foundFirstText) {
                        // Start the message text right after the name
                        headerEl.innerHTML += ' ' + part.content;
                        foundFirstText = true;
                    } else {
                        // Subsequent text parts get their own paragraph
                        const paragraph = document.createElement('p');
                        paragraph.className = 'whitespace-pre-wrap';
                        paragraph.innerHTML = part.content;
                        tempDiv.appendChild(paragraph);
                    }

                } else if (part.type === 'code') {
                    // Display code notice and button, hide code content
                    
                    const spacer = document.createElement('div');
                    spacer.className = 'h-2';
                    tempDiv.appendChild(spacer);

                    const codeNotice = document.createElement('p');
                    codeNotice.className = 'mt-2 text-sm italic text-gray-800 font-semibold border-t pt-2 border-sky-400'; 
                    codeNotice.textContent = `[Generated Code: ${part.language.toUpperCase()}]`;
                    tempDiv.appendChild(codeNotice);

                    const downloadBtn = document.createElement('button');
                    downloadBtn.textContent = `↓ Download ${part.filename}`;
                    downloadBtn.className = 'text-xs font-semibold px-3 py-1 self-start bg-sky-700/50 hover:bg-sky-700 rounded-full text-white transition-colors shadow-md';
                    
                    downloadBtn.addEventListener('click', () => {
                        downloadFile(part.code, part.filename);
                    });
                    
                    tempDiv.appendChild(downloadBtn);
                }
            });
            
            // If the message only contained code (or the first part was code), add an intro sentence
            if (!foundFirstText && parts.some(p => p.type === 'code')) {
                 headerEl.innerHTML += ' Here is the requested code:';
            }

            messageBubble.appendChild(tempDiv);
            messageContainer.appendChild(messageBubble);
            chatHistoryEl.appendChild(messageContainer);
            chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight; // Auto-scroll to ensure latest message is visible
        }

        /**
         * Calls the Gemini API with exponential backoff.
         * @param {string} userQuery - The user's latest query.
         * @param {number} attempt - Current retry attempt (starts at 1).
         * @returns {Promise<string>} - The model's generated text.
         */
        async function callGeminiApi(userQuery, attempt = 1) {
            
            // NOTE: Ensure GEMINI_API_KEY is an empty string if using Canvas proxy
            const apiKey = GEMINI_API_KEY === "AIzaSyBGf8AHbe72jamL45XYPa9kRxQD9nT98-8" ? "" : GEMINI_API_KEY;
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            
            // Use the synchronized chatHistory from Firestore for context
            const currentChatContext = [
                ...chatHistory,
                { role: "user", parts: [{ text: userQuery }] }
            ];
            
            const payload = {
                contents: currentChatContext,
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                }
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    if (response.status === 429 && attempt < 5) { // Too Many Requests, retry
                        const delay = Math.pow(2, attempt) * 1000 + Math.random() * 1000;
                        await new Promise(res => setTimeout(res, delay));
                        return callGeminiApi(userQuery, attempt + 1);
                    }
                    throw new Error(`API error! Status: ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!text) {
                     const blockReason = result.candidates?.[0]?.safetyRatings?.[0]?.blockReason;
                     if (blockReason) {
                         throw new Error(`The request was blocked by safety settings (${blockReason}).`);
                     }
                     throw new Error("Received an empty response from the model.");
                }
                return text;

            } catch (error) {
                console.error("Gemini API Failure:", error);
                return `Apologies, I encountered an error while processing your request: ${error.message}`;
            }
        }

        async function sendMessage() {
            if (userInputEl.disabled) return;
            
            const userText = userInputEl.value.trim();
            if (!userText) return;

            // 1. Disable UI and show loading
            userInputEl.value = '';
            userInputEl.disabled = true;
            sendBtnEl.disabled = true;
            loadingEl.classList.remove('hidden');

            try {
                // 2. Save user message to Firestore (this will trigger the UI update via onSnapshot)
                // If Firestore save fails, the message will be displayed locally via the saveMessage fallback
                await saveMessage('user', userText);
                
                // 3. Get model response
                const modelResponse = await callGeminiApi(userText);
                
                // 4. Save model response to Firestore (this will trigger the final UI update)
                // If Firestore save fails, the message will be displayed locally via the saveMessage fallback
                await saveMessage('model', modelResponse);

            } catch (error) {
                console.error("Chatbot Error:", error);
                
                // If anything truly catastrophic happened, log it and display a generic error
                const errorContent = `ERROR: Failed to get response. Please check your network connection and try again.`;
                
                // Save/display the error message
                await saveMessage('model', errorContent);

            } finally {
                // 5. Re-enable UI and hide loading
                userInputEl.disabled = false;
                sendBtnEl.disabled = false;
                loadingEl.classList.add('hidden');
                userInputEl.focus();
            }
        }

        // --- EVENT LISTENERS & INIT ---
        sendBtnEl.addEventListener('click', sendMessage);
        userInputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !userInputEl.disabled) {
                sendMessage();
            }
        });
        
        // Initialize Firebase and Auth on load
        window.onload = setupFirebase;

    </script>

</body>
</html>
