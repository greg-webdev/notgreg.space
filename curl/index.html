<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG.S Ai Chatbot</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f2937; /* Dark background */
        }

        .chat-scroll {
            /* Scrollbar styling for a cleaner look */
            scrollbar-width: thin;
            scrollbar-color: #38bdf8 #1f2937; /* Sky thumb, dark track */
        }

        .chat-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: #1f2937; /* dark track */
            border-radius: 10px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: #38bdf8; /* sky thumb */
            border-radius: 10px;
            border: 2px solid #1f2937;
        }

        /* Custom styles for chat bubbles */
        .user-message {
            background-color: #3b82f6; /* Blue for user */
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .model-message {
            background-color: #4b5563; /* Dark gray for model */
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- Main Chat Container -->
    <div class="flex flex-col flex-grow w-full max-w-4xl mx-auto p-4 md:p-8">
        
        <!-- Header, now including the Sign-in Button for side-by-side layout on desktop -->
        <header class="flex flex-col sm:flex-row sm:justify-between sm:items-center pb-4 border-b border-gray-700 mb-4">
            
            <!-- Title and Auth Status (Left side/Top) -->
            <div class="mb-4 sm:mb-0 text-center sm:text-left">
                <h1 class="text-2xl font-bold text-sky-400">NG.S AI Assistant</h1>
                <p id="auth-status" class="text-xs text-gray-400 mt-1">Initializing...</p>
            </div>

            <!-- Google Sign-in Button (Right side/Bottom) -->
            <div id="google-sign-in-container">
                <button id="google-sign-in-btn"
                        class="flex items-center space-x-2 px-4 py-2 bg-white text-gray-900 font-semibold rounded-lg shadow-md hover:bg-gray-100 transition duration-150 w-full justify-center sm:w-auto">
                    <!-- Google Logo SVG -->
                    <svg class="w-5 h-5" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg"><path d="M533.5 275.43c0-18.42-1.52-36.56-4.71-54.24H271.7v102.77h146.43c-6.38 34.6-26.69 63.95-55.88 83.39l-4.73 3.09 82.5 63.88 5.75.56c48.81-45.1 77.26-111.4 77.26-199.45z" fill="#4285F4"/><path d="M271.7 544.3c73.4 0 135.26-24.18 180.37-65.73l-88.25-68.31c-24.64 16.5-56.9 26.25-92.12 26.25-70.81 0-131.25-47.9-153.2-111.9l-5.46.33-85.25 66.02-1.2 5.56c47.1 92.74 150.3 151.78 265.13 151.78z" fill="#34A853"/><path d="M118.5 328.31c-11.23-34.62-11.23-71.69 0-106.31L33.24 135.91c-32.99 65.17-32.99 140.24 0 205.41l85.25-63.01z" fill="#FBBC04"/><path d="M271.7 108.33c40.42 0 76.51 13.91 105.15 41.21L450 78.58C402.9 33.34 342.3 0 271.7 0c-114.83 0-218.03 59.04-265.13 151.78l85.25 66.02c21.95-64 82.39-111.9 153.2-111.9z" fill="#EA4335"/></svg>
                    <span>Sign in with Google</span>
                </button>
            </div>
        </header>

        <!-- Chat Display Area -->
        <div id="chat-messages" class="flex-grow overflow-y-auto chat-scroll space-y-4 p-4 bg-gray-800 rounded-lg shadow-xl mb-4">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Area -->
        <div class="flex items-center space-x-3 bg-gray-800 p-4 rounded-lg shadow-xl">
            <input type="text" id="user-input" placeholder="Ask me anything..."
                   class="flex-grow p-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:ring-sky-500 focus:border-sky-500 disabled:opacity-50"
                   disabled>
            <button id="send-btn"
                    class="p-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg shadow-md transition duration-150 disabled:opacity-50"
                    disabled>
                Send
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden text-center mt-4">
            <div class="flex items-center justify-center space-x-2">
                <div class="w-4 h-4 rounded-full bg-sky-400 animate-bounce"></div>
                <div class="w-4 h-4 rounded-full bg-sky-400 animate-bounce delay-150"></div>
                <div class="w-4 h-4 rounded-full bg-sky-400 animate-bounce delay-300"></div>
                <span class="text-sky-400 ml-2">Thinking...</span>
            </div>
        </div>

    </div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserSessionPersistence, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, addDoc, onSnapshot, doc, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Firebase variables
        let app;
        let db;
        let auth;
        let userId = null;
        let chatHistoryCollection = null;

        // --- CONSTANTS FROM GLOBAL ENVIRONMENT ---
        // The environment variable __app_id is mandatory for security rules.
        // If missing, we use the projectId as a safer fallback than 'default-app-id' to prevent permission errors.
        const PATH_ID_FALLBACK = 'greai-c598d';
        const appId = typeof __app_id !== 'undefined' ? __app_id : PATH_ID_FALLBACK;
        
        // 1. Define the user's full, explicit Firebase configuration as a guaranteed base.
        const EXPLICIT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyB-3k9jGl0z9BVvxs_1BsRNpilfgl2sQAE",
            authDomain: "greai-c598d.firebaseapp.com",
            projectId: "greai-c598d",
            storageBucket: "greai-c598d.firebasestorage.app",
            messagingSenderId: "620495902794",
            appId: "1:620495902794:web:fcf3570f455cf1f0e62eb3",
            measurementId: "G-JMKT2M3RJD"
        };

        // 2. Safely parse the environment configuration.
        let parsedConfig = {};
        try {
            if (typeof __firebase_config === 'string' && __firebase_config.trim() !== '') {
                parsedConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.error("Critical Error: Failed to parse __firebase_config JSON string.", e);
        }

        // 3. Merge the explicit config with the environment config, prioritizing environment values if present.
        const firebaseConfig = {
            ...EXPLICIT_FIREBASE_CONFIG, // Start with the guaranteed values
            ...parsedConfig // Overwrite with any values provided by the environment
        };

        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        const apiKey = ""; // API Key is left empty for runtime provision (for Gemini API)

        // DOM elements
        const chatMessagesEl = document.getElementById('chat-messages');
        const userInputEl = document.getElementById('user-input');
        const sendBtnEl = document.getElementById('send-btn');
        const loadingEl = document.getElementById('loading');
        const authStatusEl = document.getElementById('auth-status');
        const googleSignInBtn = document.getElementById('google-sign-in-btn'); // NEW
        const googleSignInContainer = document.getElementById('google-sign-in-container'); // NEW

        // Internal chat history state (used to generate API prompt)
        let chatHistory = [];

        // --- UTILITY FUNCTIONS ---

        /**
         * Converts a Firestore timestamp object to a readable time string.
         * @param {Object} timestamp - Firestore Timestamp object.
         * @returns {string} Formatted time string.
         */
        function formatTimestamp(timestamp) {
            if (timestamp && timestamp.toDate) {
                const date = timestamp.toDate();
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return '';
        }

        /**
         * Displays a message in the chat UI.
         * @param {string} text - The message content.
         * @param {string} role - 'user' or 'model'.
         * @param {Object} timestamp - The Firestore Timestamp object.
         */
        function displayMessage(text, role, timestamp) {
            const messageDiv = document.createElement('div');
            // Use flex and Tailwind for styling
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-3`;
            
            const contentDiv = document.createElement('div');
            // Apply role-specific styles
            contentDiv.className = `max-w-xs md:max-w-md lg:max-w-lg p-3 rounded-xl shadow-md text-sm ${role}-message`;
            contentDiv.style.wordBreak = 'break-word'; // Ensure long words wrap

            // Sanitize text before injecting (basic)
            contentDiv.innerHTML = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            const timeSpan = document.createElement('span');
            timeSpan.className = `block mt-1 text-xs opacity-70 ${role === 'user' ? 'text-right' : 'text-left'}`;
            timeSpan.textContent = formatTimestamp(timestamp);
            
            contentDiv.appendChild(timeSpan);
            messageDiv.appendChild(contentDiv);
            chatMessagesEl.appendChild(messageDiv);
            
            // Scroll to bottom
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        /**
         * Clears all messages from the chat UI.
         */
        function clearMessages() {
            chatMessagesEl.innerHTML = '';
        }
        
        // --- FIRESTORE / CHAT LOGIC ---

        /**
         * Listens to the chat history collection in real-time and updates the UI.
         */
        function listenForHistory() {
            if (!db || !userId) {
                console.warn("Firestore or UserId not ready for listening.");
                return;
            }

            // Path: /artifacts/{appId}/users/{userId}/chat_history
            chatHistoryCollection = collection(db, `artifacts/${appId}/users/${userId}/chat_history`);
            
            // Query: Get all messages
            const q = query(chatHistoryCollection);

            // This ensures the listener is set up correctly after auth state changes
            onSnapshot(q, (snapshot) => {
                clearMessages();
                chatHistory = [];
                
                // Get documents and convert them to an array of message objects
                const messages = snapshot.docs.map(doc => doc.data());
                
                // Sort messages in-memory by timestamp
                messages.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeA - timeB;
                });

                // Display sorted messages and rebuild the local chat history for the API call
                messages.forEach(message => {
                    displayMessage(message.text, message.role, message.timestamp);
                    // Only push valid role/text pairs to the API history
                    if (message.role && message.text) {
                        chatHistory.push({ role: message.role, parts: [{ text: message.text }] });
                    }
                });

                console.log(`Chat history loaded. Total messages: ${messages.length}`);
            }, (error) => {
                console.error("Firestore onSnapshot error:", error);
                // Report any real-time permission error
                displayMessage(`System Error: Failed to load chat history. ${error.message}`, 'model', new Date());
            });
        }

        /**
         * Saves a new message to Firestore.
         * @param {string} text - The message content.
         * @param {string} role - 'user' or 'model'.
         */
        async function saveMessage(text, role) {
            if (!chatHistoryCollection) {
                console.error("Chat collection not initialized. Cannot save message.");
                return;
            }
            try {
                await addDoc(chatHistoryCollection, {
                    text: text,
                    role: role,
                    timestamp: new Date() 
                });
            } catch (error) {
                console.error("Error saving message to Firestore:", error);
                displayMessage(`System Error: Could not save message. ${error.message}`, 'model', new Date());
            }
        }

        // --- GEMINI API INTERACTION ---

        /**
         * Calls the Gemini API to get a response.
         * @param {string} userText - The user's latest query.
         * @returns {Promise<string>} The model's generated text.
         */
        async function callGeminiApi(userText) {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            // Append the new user message to the history for the API call
            const currentChatHistory = [...chatHistory, { role: 'user', parts: [{ text: userText }] }];

            const payload = {
                contents: currentChatHistory,
                // Optional: Add system instruction for persona
                systemInstruction: {
                    parts: [{ text: "You are a friendly, helpful, and concise AI assistant. Respond conversationally." }]
                },
                tools: [{ "google_search": {} }] // Enable Google Search grounding
            };

            // Use exponential backoff for retries
            const maxRetries = 5;
            let delay = 1000;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(`API Error: ${response.status} - ${JSON.stringify(errorData)}`);
                    }

                    const result = await response.json();
                    const modelText = result.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I couldn't generate a response.";
                    
                    return modelText;

                } catch (error) {
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2; // Exponential backoff
                    } else {
                        throw error; // Throw the error on the last attempt
                    }
                }
            }
        }

        // --- MAIN CHAT APPLICATION LOGIC ---

        /**
         * Handles sending a message: calls API and saves both messages to Firestore.
         */
        async function sendMessage() {
            const userText = userInputEl.value.trim();
            if (!userText || !userId) {
                return; // Do nothing if input is empty or not authenticated
            }

            // 1. Disable UI and show loading
            userInputEl.value = ''; // Clear input immediately
            userInputEl.disabled = true;
            sendBtnEl.disabled = true;
            loadingEl.classList.remove('hidden');

            try {
                // 2. Save user message to Firestore (which triggers UI update via onSnapshot)
                await saveMessage(userText, 'user');
                
                // 3. Get model response from API
                const modelResponse = await callGeminiApi(userText);
                
                // 4. Save model response to Firestore (which triggers UI update via onSnapshot)
                await saveMessage(modelResponse, 'model');

            } catch (error) {
                console.error("Chatbot Error:", error);
                // Directly display a system error message if saving failed or API call failed
                displayMessage(`ERROR: Failed to process your request. Details: ${error.message}`, 'model', new Date());
            } finally {
                // 5. Re-enable UI and hide loading
                userInputEl.disabled = false;
                sendBtnEl.disabled = false;
                loadingEl.classList.add('hidden');
                userInputEl.focus();
            }
        }
        
        /**
         * Initiates Google Sign-In using a popup.
         */
        async function signInWithGoogle() {
            if (!auth) {
                console.error("Auth service not initialized.");
                return;
            }

            // Disable buttons during sign-in process
            googleSignInBtn.disabled = true;
            sendBtnEl.disabled = true;
            userInputEl.disabled = true;
            authStatusEl.textContent = 'Signing in with Google...';

            try {
                const provider = new GoogleAuthProvider();
                // signInWithPopup handles the sign-in flow
                await signInWithPopup(auth, provider);
                // The onAuthStateChanged listener will handle UI update upon success
                displayMessage('Successfully signed in with Google! Your chat history is now linked to your account.', 'model', new Date());

            } catch (error) {
                console.error("Google Sign-In Error:", error);
                
                let errorMessage = "Sign-in failed. Please try again.";
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage = 'Sign-in cancelled.';
                } else if (error.code === 'auth/cancelled-popup-request') {
                    errorMessage = 'Sign-in window already open.';
                }
                displayMessage(`System Notification: ${errorMessage}`, 'model', new Date());

            } finally {
                // Re-enable the Google sign-in button
                googleSignInBtn.disabled = false;
            }
        }


        // --- FIREBASE INITIALIZATION ---

        /**
         * Initializes Firebase app and handles authentication.
         */
        async function setupFirebase() {
            try {
                // Check if config has basic requirements
                if (Object.keys(firebaseConfig).length === 0 || !firebaseConfig.projectId) {
                    throw new Error(`Invalid Firebase Configuration: Config is empty or missing 'projectId'. Config: ${JSON.stringify(firebaseConfig)}`);
                }

                // Initialize app
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('debug'); // Enable debug logging for troubleshooting

                // Set session persistence
                await setPersistence(auth, browserSessionPersistence);

                // Try to sign in using the custom token or anonymously
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                    authStatusEl.textContent = 'Authenticating via Custom Token...';
                } else {
                    await signInAnonymously(auth);
                    authStatusEl.textContent = 'Authenticating Anonymously...';
                }

                // IMPORTANT: Use onAuthStateChanged to ensure we get the user ID *after* a successful sign-in
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        
                        // Determine the status text based on sign-in method
                        let statusText;
                        if (user.isAnonymous) {
                            statusText = `Anonymous User: ${userId.substring(0, 8)}... (Ready)`;
                            // Show Google button to encourage upgrade
                            googleSignInContainer.classList.remove('hidden');
                        } else {
                            statusText = `Signed in as: ${user.email || userId.substring(0, 8) + '...'} (Ready)`;
                            // Hide Google button if signed in with a persistent method
                            googleSignInContainer.classList.add('hidden');
                        }
                        authStatusEl.textContent = statusText;
                        
                        // Authentication is complete: Start listening to Firestore
                        listenForHistory();
                        
                        // Enable UI elements
                        userInputEl.disabled = false;
                        sendBtnEl.disabled = false;
                        userInputEl.focus();

                    } else {
                        userId = null;
                        authStatusEl.textContent = 'Not signed in. Please reload or sign in.';
                        userInputEl.disabled = true;
                        sendBtnEl.disabled = true;
                        googleSignInContainer.classList.remove('hidden');
                        console.error("Authentication failed or user signed out.");
                    }
                }, (error) => {
                    console.error("Authentication State Change Error:", error);
                    authStatusEl.textContent = `Auth Error: ${error.code || error.message}`;
                });

            } catch (error) {
                console.error("Firebase Initialization Failed:", error);
                authStatusEl.textContent = `Init Error: ${error.message}`;
            }
        }

        // --- EVENT LISTENERS & INIT ---
        sendBtnEl.addEventListener('click', sendMessage);
        userInputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        googleSignInBtn.addEventListener('click', signInWithGoogle); // NEW listener

        // Initialize Firebase and Auth immediately
        setupFirebase(); 

    </script>

</body>
</html>
