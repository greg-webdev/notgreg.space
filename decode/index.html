<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSTV Decoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #2a2a44;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f72585 0%, #b5179e 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:disabled {
            background: #4a4a5c;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        canvas {
            border-radius: 1rem;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            border: 2px solid #5a5a7a;
            background-color: #000;
        }

        #status-message {
            text-align: center;
            font-weight: 600;
            min-height: 24px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

<div class="container">
    <h1 class="text-3xl font-bold text-center mb-4 text-blue-300">SSTV Decoder</h1>
    <p class="text-center text-gray-400">
        Listen for an SSTV audio signal and decode the image in real-time. Automatically detects the mode.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <button id="start-btn" class="btn-primary">
            <i class="fas fa-play"></i> Start Decoding
        </button>
        <button id="stop-btn" class="btn-primary hidden">
            <i class="fas fa-stop"></i> Stop Decoding
        </button>
    </div>

    <div class="flex justify-center">
        <canvas id="image-canvas" width="320" height="240"></canvas>
    </div>

    <p id="status-message" class="text-green-400">Press "Start Decoding" to begin listening.</p>
</div>

<script>
    // Constants for SSTV decoding
    const SAMPLES_PER_SECOND = 44100;
    const FREQ_SYNC = 1200;
    const FREQ_VIS_START = 1900;
    const FREQ_VIS_END = 1200;

    // Decoding parameters for different modes
    const MODES = {
        'robot36': {
            name: 'Robot36',
            vis: [0, 0, 1, 1, 1, 1, 0, 0],
            pixelWidth: 320,
            pixelHeight: 240,
            lineDuration: 0.13824, // YUV
            sync: 0.009,
            porch: 0.003,
            isYUV: true
        },
        'martin1': {
            name: 'Martin1',
            vis: [0, 0, 1, 0, 1, 1, 0, 0],
            pixelWidth: 320,
            pixelHeight: 256,
            lineDuration: 0.1464, // RGB
            sync: 0.0048,
            porch: 0.0015,
            isYUV: false
        },
        'martin2': {
            name: 'Martin2',
            vis: [0, 0, 1, 0, 0, 1, 0, 0],
            pixelWidth: 320,
            pixelHeight: 256,
            lineDuration: 0.237, // RGB
            sync: 0.0048,
            porch: 0.0015,
            isYUV: false
        },
        'scottie1': {
            name: 'Scottie1',
            vis: [0, 0, 1, 1, 1, 1, 0, 0],
            pixelWidth: 320,
            pixelHeight: 256,
            lineDuration: 0.11024, // RGB
            sync: 0.009,
            porch: 0.0015,
            isYUV: false
        }
    };
    
    // UI elements
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const canvas = document.getElementById('image-canvas');
    const ctx = canvas.getContext('2d');
    const statusMessage = document.getElementById('status-message');

    let audioContext;
    let analyser;
    let stream;
    let isDecoding = false;
    let pixelData;
    let currentLine = 0;
    let currentPixel = 0;
    let state = 'awaiting_sync'; // State machine: awaiting_sync, decoding_vis, decoding_image
    let lastTime = 0;
    let currentMode = null;
    let visBits = [];
    let currentChannel = 0; // 0=R/Y, 1=G/U, 2=B/V

    /**
     * Initializes the decoding process by getting microphone access.
     */
    async function startDecoding() {
        if (isDecoding) return;
        isDecoding = true;
        startBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');
        statusMessage.textContent = "Requesting microphone access...";

        try {
            // Request microphone access
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            statusMessage.textContent = "Listening for SSTV signal...";
            
            // Create audio graph
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            // Initialize image data
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentLine = 0;
            currentPixel = 0;
            state = 'awaiting_sync';
            lastTime = audioContext.currentTime;
            currentMode = null;
            visBits = [];
            pixelData = ctx.createImageData(canvas.width, canvas.height);

            // Start the decoding loop
            decodeLoop();

        } catch (err) {
            console.error("Error accessing microphone:", err);
            statusMessage.textContent = "Error: Could not access microphone. Please ensure permissions are granted.";
            stopDecoding();
        }
    }

    /**
     * Helper function to convert a frequency to a pixel brightness value.
     * @param {number} freq - The frequency.
     * @param {number} blackFreq - The frequency for black.
     * @param {number} whiteFreq - The frequency for white.
     * @returns {number} The brightness value (0-255).
     */
    function freqToValue(freq, blackFreq, whiteFreq) {
        return Math.max(0, Math.min(255, 255 - ((freq - blackFreq) / (whiteFreq - blackFreq)) * 255));
    }

    /**
     * Converts YUV to RGB color space.
     * @param {number} y - The Y component.
     * @param {number} u - The U component.
     * @param {number} v - The V component.
     * @returns {number[]} An array containing [R, G, B] values.
     */
    function yuvToRgb(y, u, v) {
        const r = y + 1.402 * v;
        const g = y - 0.344 * u - 0.714 * v;
        const b = y + 1.772 * u;
        return [r, g, b].map(val => Math.max(0, Math.min(255, val)));
    }

    /**
     * The main decoding loop.
     */
    function decodeLoop() {
        if (!isDecoding) return;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        // Find the frequency with the highest amplitude
        let maxIndex = 0;
        let maxValue = 0;
        for (let i = 0; i < bufferLength; i++) {
            if (dataArray[i] > maxValue) {
                maxValue = dataArray[i];
                maxIndex = i;
            }
        }
        const dominantFrequency = maxIndex * audioContext.sampleRate / analyser.fftSize;
        const timeElapsed = audioContext.currentTime - lastTime;

        switch (state) {
            case 'awaiting_sync':
                statusMessage.textContent = `Awaiting signal... (Freq: ${dominantFrequency.toFixed(0)} Hz)`;
                // Look for a sync pulse (1200 Hz) to start decoding
                if (dominantFrequency > 1150 && dominantFrequency < 1250) {
                    state = 'decoding_vis';
                    statusMessage.textContent = "Sync pulse detected! Awaiting VIS...";
                    lastTime = audioContext.currentTime;
                    visBits = [];
                }
                break;
            
            case 'decoding_vis':
                // The VIS code starts with a 1900 Hz tone.
                if (dominantFrequency > 1800 && dominantFrequency < 2000) {
                    // This is the start of the VIS sequence.
                    // We can reset for a new VIS code.
                    visBits = [];
                    lastTime = audioContext.currentTime;
                    statusMessage.textContent = "VIS preamble detected. Reading bits...";
                }
                
                // Read the VIS bits (30ms per bit)
                if (timeElapsed >= 0.030 && visBits.length < 8) {
                    const freq = dominantFrequency;
                    let bit = 0;
                    if (freq > 1050 && freq < 1150) bit = 0;
                    else if (freq > 1250 && freq < 1350) bit = 1;
                    else if (freq > 1450 && freq < 1550) bit = 2;
                    else if (freq > 1650 && freq < 1750) bit = 3;
                    else if (freq > 1850 && freq < 1950) bit = 4;
                    else if (freq > 2050 && freq < 2150) bit = 5;
                    else if (freq > 2250 && freq < 2350) bit = 6;
                    else if (freq > 2450 && freq < 2550) bit = 7;
                    visBits.push(bit);
                    lastTime = audioContext.currentTime;
                }

                if (visBits.length === 8) {
                    // Match the VIS code to a known mode
                    let visMatch = visBits.join('');
                    for (const modeKey in MODES) {
                        const mode = MODES[modeKey];
                        if (mode.vis && mode.vis.join('') === visMatch) {
                            currentMode = mode;
                            state = 'decoding_image';
                            statusMessage.textContent = `Mode detected: ${currentMode.name}. Decoding image...`;
                            
                            // Reset canvas for new image size
                            canvas.width = currentMode.pixelWidth;
                            canvas.height = currentMode.pixelHeight;
                            pixelData = ctx.createImageData(canvas.width, canvas.height);
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            currentLine = 0;
                            currentPixel = 0;
                            currentChannel = 0;

                            // Wait for the end of the VIS sequence before starting to decode the image.
                            // This is a simplified approach. A real decoder would be more precise.
                            lastTime = audioContext.currentTime;
                            break;
                        }
                    }
                    if (state !== 'decoding_image') {
                        // VIS code not recognized, reset.
                        statusMessage.textContent = `Unrecognized VIS code. Awaiting next signal...`;
                        state = 'awaiting_sync';
                    }
                }
                break;
            
            case 'decoding_image':
                const lineTime = currentMode.lineDuration - (currentMode.sync + currentMode.porch);
                const pixelTime = lineTime / currentMode.pixelWidth;

                if (timeElapsed >= pixelTime / 3) {
                    const channelValue = freqToValue(dominantFrequency, 1500, 2300);

                    const i = (currentLine * currentMode.pixelWidth + currentPixel) * 4;

                    if (currentMode.isYUV) {
                        // YUV decoding
                        if (currentChannel === 0) pixelData.data[i] = channelValue;
                        if (currentChannel === 1) pixelData.data[i + 1] = channelValue;
                        if (currentChannel === 2) pixelData.data[i + 2] = channelValue;
                    } else {
                        // RGB decoding
                        if (currentChannel === 0) pixelData.data[i] = channelValue;
                        if (currentChannel === 1) pixelData.data[i + 1] = channelValue;
                        if (currentChannel === 2) pixelData.data[i + 2] = channelValue;
                    }
                    pixelData.data[i + 3] = 255;

                    currentChannel++;
                    if (currentChannel === 3) {
                        currentChannel = 0;
                        currentPixel++;
                    }

                    if (currentPixel >= currentMode.pixelWidth) {
                        currentPixel = 0;
                        currentLine++;

                        if (currentMode.isYUV) {
                            // Convert the entire line from YUV to RGB
                            for (let x = 0; x < currentMode.pixelWidth; x++) {
                                const yuv_i = (currentLine * currentMode.pixelWidth + x) * 4;
                                const y = pixelData.data[yuv_i];
                                const u = pixelData.data[yuv_i + 1];
                                const v = pixelData.data[yuv_i + 2];
                                const [r, g, b] = yuvToRgb(y, u, v);
                                pixelData.data[yuv_i] = r;
                                pixelData.data[yuv_i + 1] = g;
                                pixelData.data[yuv_i + 2] = b;
                            }
                        }

                        if (currentLine >= currentMode.pixelHeight) {
                            statusMessage.textContent = "Decoding complete!";
                            isDecoding = false;
                            stopBtn.classList.add('hidden');
                            startBtn.classList.remove('hidden');
                        }
                    }
                    ctx.putImageData(pixelData, 0, 0);
                    lastTime = audioContext.currentTime;
                }
                break;
        }

        requestAnimationFrame(decodeLoop);
    }

    /**
     * Stops the decoding process and microphone access.
     */
    function stopDecoding() {
        isDecoding = false;
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        statusMessage.textContent = "Decoder stopped.";
    }

    // Add event listeners
    startBtn.addEventListener('click', startDecoding);
    stopBtn.addEventListener('click', stopDecoding);

</script>

</body>
</html>
