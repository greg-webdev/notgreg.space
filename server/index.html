<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>redirecting to downloads</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom CSS for the loading bar animation */
        @keyframes loading-progress {
            from { width: 0%; }
            to { width: 100%; }
        }

        .loading-bar-fill {
            animation: loading-progress 5s linear forwards; /* Changed to 5 seconds duration */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white font-inter p-4">
    <h1 class="text-4xl font-bold mb-6 text-red-400">Permanent Redirect</h1>
    <p class="text-lg mb-8">You are being redirected to a new location.</p>

    <div class="w-full max-w-md bg-gray-700 rounded-full h-4 overflow-hidden shadow-inner">
        <div id="loadingBar" class="loading-bar-fill bg-gradient-to-r from-red-500 to-orange-500 h-full rounded-full" style="width: 0%;"></div>
    </div>
    <p id="countdown" class="mt-4 text-sm text-gray-400">Redirecting in 5 seconds...</p>

    <script>
        // Get the countdown element
        const countdownElement = document.getElementById('countdown');
        let countdown = 5; // Changed initial countdown to 5

        // Function to update the countdown text
        function updateCountdown() {
            countdownElement.textContent = `Redirecting in ${countdown} seconds...`;
            if (countdown > 0) {
                countdown--;
                setTimeout(updateCountdown, 1000); // Update every second
            }
        }

        // Start the countdown when the page loads
        window.onload = function() {
            updateCountdown();

            // Set the redirect after 5 seconds
            setTimeout(function() {
                window.location.href = 'https://165.173.23.252:8006';
            }, 5000); // Changed redirect time to 5 seconds
        };
    </script>
</body>
</html>
