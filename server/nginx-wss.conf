## nginx config for terminating TLS/WSS and proxying to local Python WS server
# Replace `example.com` with your domain. Let's Encrypt will NOT issue certificates for a bare IP address.

server {
    listen 80;
    server_name example.com;

    # Allow certbot HTTP challenge to work
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # certbot will populate these paths when a cert is requested for your domain
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Increase timeouts for long-lived WS connections
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        # Proxy to local Python WS server
        proxy_pass http://127.0.0.1:2343;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
