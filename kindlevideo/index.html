<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* This forces the GIF to 240p-style dimensions */
        .low-res-force {
            width: 320px;   /* Standard 240p width */
            height: 240px;  /* Standard 240p height */
            
            /* This ensures the image doesn't stretch weirdly */
            object-fit: contain; 
            
            /* Pixelated rendering helps it look sharper on E-ink */
            image-rendering: pixelated; 
            
            border: 1px solid #000;
            background: #eee;
        }

        body { text-align: center; padding-top: 50px; font-family: sans-serif; }
    </style>
</head>
<body>

    <h3>Low-Res Preview</h3>
    <img src="HnVideoEditor_2026_03_21_090351686.gif" class="low-res-force">

</body>
</html>
