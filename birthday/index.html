<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dad!</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
        }

        html {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            overflow: hidden;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 30px rgba(255, 20, 147, 0.5));
        }

        .title {
            font-size: 5rem;
            font-weight: bold;
            color: white;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3),
                         0 0 30px rgba(255, 20, 147, 0.8),
                         0 0 60px rgba(0, 255, 255, 0.6);
            margin-bottom: 1rem;
            animation: bounce 2s infinite, colorShift 4s infinite, wobble 0.3s infinite;
            letter-spacing: 3px;
            word-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .title:hover {
            transform: scale(1.05);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        @keyframes wobble {
            0%, 100% { transform: skewX(0deg); }
            25% { transform: skewX(1deg); }
            75% { transform: skewX(-1deg); }
        }

        @keyframes colorShift {
            0% { color: #ff1493; }
            16% { color: #ff00ff; }
            33% { color: #00ff00; }
            50% { color: #00bfff; }
            66% { color: #ffd700; }
            83% { color: #ff69b4; }
            100% { color: #ff1493; }
        }

        .emoji-container {
            margin-top: 2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .emoji {
            font-size: 4rem;
            display: inline-block;
            animation: bounce 2s infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .emoji:hover {
            transform: scale(1.3) rotate(360deg);
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) translateX(50px) scale(0.3);
            }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            border-radius: 2px;
        }

        .spark {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        .particle {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 3;
            animation: floatUp 2s ease-out forwards;
        }

        .button-container {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
        }

        button:active {
            transform: scale(0.95);
        }

        .subtitle {
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3),
                         0 0 15px rgba(0, 255, 255, 0.8);
            animation: scaleIn 1.5s ease-in-out infinite;
            font-weight: bold;
        }

        @keyframes scaleIn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .balloon {
            position: fixed;
            border-radius: 50%;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
            pointer-events: none;
            z-index: 1;
        }

        .ribbon {
            position: fixed;
            width: 100%;
            height: 3px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
            animation: ribbonFlow 4s linear infinite;
        }

        @keyframes ribbonFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .interactive-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 20, 147, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Colors and emojis
        const COLORS = ['#ff1493', '#00ff00', '#00bfff', '#ffd700', '#ff69b4', '#ff4500', '#00ffff', '#ff00ff', '#32cd32'];
        const EMOJIS = ['🎉', '🎂', '🎈', '🥳', '⭐', '✨', '🎊', '🍰', '🎁'];

        // Confetti Component
        function Confetti({ id }) {
            const [style, setStyle] = useState(() => ({
                left: Math.random() * window.innerWidth + 'px',
                top: '-10px',
                backgroundColor: COLORS[Math.floor(Math.random() * COLORS.length)],
                width: Math.random() > 0.5 ? '8px' : '10px',
                height: Math.random() > 0.5 ? '6px' : '10px',
            }));

            useEffect(() => {
                const duration = 2 + Math.random() * 2;
                const startTime = Date.now();
                let animationId;

                const animate = () => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const progress = elapsed / duration;

                    if (progress < 1) {
                        setStyle(prev => ({
                            ...prev,
                            top: (window.innerHeight * progress) + 'px',
                            opacity: 1 - progress,
                            transform: `rotate(${progress * 720}deg)`,
                        }));
                        animationId = requestAnimationFrame(animate);
                    }
                };

                animationId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationId);
            }, []);

            return <div className="confetti" style={style} />;
        }

        // Spark Component
        function Spark({ id, x, y, color }) {
            const [pos, setPos] = useState({ x, y });
            const [opacity, setOpacity] = useState(1);
            const velocityRef = useRef({
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
            });

            useEffect(() => {
                let animationId;
                const startTime = Date.now();

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    if (elapsed > 1000) return;

                    setPos(prev => ({
                        x: prev.x + velocityRef.current.vx,
                        y: prev.y + velocityRef.current.vy,
                    }));
                    velocityRef.current.vy += 0.2;
                    setOpacity(Math.max(0, 1 - elapsed / 1000));

                    animationId = requestAnimationFrame(animate);
                };

                animationId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationId);
            }, []);

            return (
                <div
                    className="spark"
                    style={{
                        left: pos.x + 'px',
                        top: pos.y + 'px',
                        backgroundColor: color,
                        boxShadow: `0 0 10px ${color}`,
                        opacity,
                    }}
                />
            );
        }

        // Enhanced Fireworks Component
        function Fireworks({ id, x, y, burstType = 'starburst' }) {
            const [fireworkParticles, setFireworkParticles] = useState([]);

            useEffect(() => {
                const particles = [];
                const burstCount = burstType === 'ring' ? 60 : burstType === 'cascade' ? 30 : 50;
                
                for (let i = 0; i < burstCount; i++) {
                    let angle, velocity;
                    
                    if (burstType === 'ring') {
                        angle = (Math.PI * 2 * i) / burstCount;
                        velocity = 6;
                    } else if (burstType === 'cascade') {
                        angle = (Math.PI / 2) + (Math.random() - 0.5) * (Math.PI / 3);
                        velocity = 4 + Math.random() * 3;
                    } else {
                        angle = (Math.PI * 2 * i) / burstCount + (Math.random() - 0.5) * 0.5;
                        velocity = 5 + Math.random() * 5;
                    }
                    
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity - (burstType === 'cascade' ? 3 : 1);
                    
                    particles.push({
                        id: i,
                        vx,
                        vy,
                        x,
                        y,
                        life: 1,
                        color: COLORS[Math.floor(Math.random() * COLORS.length)]
                    });
                }

                setFireworkParticles(particles);

                const startTime = Date.now();
                let animationId;

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(1, elapsed / 1500);

                    setFireworkParticles(prev => 
                        prev.map(p => ({
                            ...p,
                            x: p.x + p.vx,
                            y: p.y + p.vy + (burstType === 'cascade' ? 0.3 : 0.15) * progress,
                            vy: p.vy + (burstType === 'cascade' ? 0.25 : 0.15),
                            life: Math.max(0, 1 - progress)
                        })).filter(p => p.life > 0)
                    );

                    if (progress < 1) {
                        animationId = requestAnimationFrame(animate);
                    }
                };

                animationId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationId);
            }, []);

            return (
                <>
                    {fireworkParticles.map(p => (
                        <div
                            key={p.id}
                            className="spark"
                            style={{
                                left: p.x + 'px',
                                top: p.y + 'px',
                                backgroundColor: p.color,
                                boxShadow: `0 0 15px ${p.color}`,
                                opacity: p.life,
                                width: '6px',
                                height: '6px'
                            }}
                        />
                    ))}
                </>
            );
        }

        // Particle Component
        function Particle({ text, x, y, color }) {
            return (
                <div
                    className="particle"
                    style={{
                        left: x + 'px',
                        top: y + 'px',
                        color: color,
                        fontSize: (1 + Math.random()) + 'rem',
                        fontWeight: 'bold',
                        textShadow: `0 0 10px ${color}`,
                    }}
                >
                    {text}
                </div>
            );
        }

        // Balloon Component
        function Balloon({ id }) {
            const size = 40 + Math.random() * 50;
            const [pos, setPos] = useState({
                left: Math.random() * window.innerWidth,
                top: window.innerHeight + 50,
            });
            const [opacity, setOpacity] = useState(1);

            useEffect(() => {
                const duration = 6 + Math.random() * 6;
                const startTime = Date.now();
                let animationId;

                const animate = () => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const progress = elapsed / duration;

                    if (progress < 1) {
                        setPos({
                            left: window.innerWidth / 2 + (Math.sin(progress * Math.PI) * 100),
                            top: window.innerHeight - progress * (window.innerHeight + 100),
                        });
                        setOpacity(1 - progress);
                        animationId = requestAnimationFrame(animate);
                    }
                };

                animationId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationId);
            }, []);

            return (
                <div
                    className="balloon"
                    style={{
                        width: size + 'px',
                        height: size + 'px',
                        left: pos.left + 'px',
                        top: pos.top + 'px',
                        backgroundColor: COLORS[Math.floor(Math.random() * COLORS.length)],
                        opacity,
                    }}
                />
            );
        }

        // Main Birthday Component
        function BirthdayPage() {
            const [confetti, setConfetti] = useState([]);
            const [sparks, setSparks] = useState([]);
            const [fireworks, setFireworks] = useState([]);
            const [particles, setParticles] = useState([]);
            const [balloons, setBalloons] = useState([1, 2, 3, 4, 5]);
            const [ribbons, setRibbons] = useState([]);
            const [clicks, setClicks] = useState(0);
            const [interactions, setInteractions] = useState(0);
            const clickTimerRef = useRef(null);
            const konamiIndexRef = useRef(0);

            // Confetti generator
            useEffect(() => {
                const interval = setInterval(() => {
                    setConfetti(prev => [...prev.slice(-20), { id: Math.random() }]);
                }, 300);
                return () => clearInterval(interval);
            }, []);

            // Balloon generator
            useEffect(() => {
                const interval = setInterval(() => {
                    setBalloons(prev => [...prev.slice(-15), Math.random()]);
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Ribbon generator
            useEffect(() => {
                const interval = setInterval(() => {
                    if (Math.random() > 0.7) {
                        const id = Math.random();
                        setRibbons(prev => [...prev, id]);
                        setTimeout(() => {
                            setRibbons(prev => prev.filter(r => r !== id));
                        }, 8000);
                    }
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            // Create fireworks
            const createFireworks = (x, y, burstType = 'starburst') => {
                // Create enhanced fireworks burst
                setFireworks(prev => [...prev, {
                    id: Math.random(),
                    x,
                    y,
                    burstType
                }]);

                // Create particles
                for (let i = 0; i < 5; i++) {
                    setParticles(prev => [...prev, {
                        id: Math.random(),
                        text: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
                        x: x + (Math.random() - 0.5) * 150,
                        y: y + (Math.random() - 0.5) * 150,
                        color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    }]);
                }

                setInteractions(prev => prev + 1);
            };

            // Click handler
            const handleClick = (e) => {
                setClicks(c => c + 1);
                clearTimeout(clickTimerRef.current);

                const burstTypes = ['starburst', 'ring', 'cascade'];
                createFireworks(e.clientX, e.clientY, burstTypes[clicks % burstTypes.length]);

                if (clicks === 2) {
                    // Triple click - massive celebration with mixed burst types
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            createFireworks(
                                Math.random() * window.innerWidth,
                                Math.random() * window.innerHeight,
                                burstTypes[i % burstTypes.length]
                            );
                        }, i * 50);
                    }
                    setClicks(0);
                    return;
                }

                clickTimerRef.current = setTimeout(() => {
                    setClicks(0);
                }, 500);
            };

            // Keyboard handler for Konami code
            const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === KONAMI[konamiIndexRef.current]) {
                        konamiIndexRef.current++;
                        if (konamiIndexRef.current === KONAMI.length) {
                            // Mega celebration
                            for (let i = 0; i < 100; i++) {
                                setTimeout(() => {
                                    createFireworks(
                                        Math.random() * window.innerWidth,
                                        Math.random() * window.innerHeight
                                    );
                                }, i * 50);
                            }
                            konamiIndexRef.current = 0;
                        }
                    } else {
                        konamiIndexRef.current = 0;
                    }

                    // Space for mega fireworks - mix burst types
                    if (e.code === 'Space') {
                        e.preventDefault();
                        const burstTypes = ['starburst', 'ring', 'cascade'];
                        for (let i = 0; i < 30; i++) {
                            setTimeout(() => {
                                createFireworks(
                                    Math.random() * window.innerWidth,
                                    Math.random() * window.innerHeight,
                                    burstTypes[i % burstTypes.length]
                                );
                            }, i * 100);
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // Auto fireworks every 5 seconds with random burst types
            useEffect(() => {
                const burstTypes = ['starburst', 'ring', 'cascade'];
                const interval = setInterval(() => {
                    createFireworks(
                        Math.random() * window.innerWidth,
                        Math.random() * (window.innerHeight * 0.6) + 100,
                        burstTypes[Math.floor(Math.random() * burstTypes.length)]
                    );
                }, 5000);
                return () => clearInterval(interval);
            }, [createFireworks]);

            // Emoji click handlers
            const handleEmojiClick = (index) => {
                createFireworks(
                    Math.random() * window.innerWidth,
                    Math.random() * window.innerHeight
                );
            };

            // Button handlers
            const handleCelebrate = () => {
                for (let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        createFireworks(
                            Math.random() * window.innerWidth,
                            Math.random() * window.innerHeight
                        );
                    }, i * 50);
                }
            };

            const handlePartyMode = () => {
                document.body.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
            };

            // Clean up sparks and particles
            useEffect(() => {
                const timer = setTimeout(() => {
                    setSparks(prev => prev.slice(-100));
                    setParticles(prev => prev.slice(-50));
                }, 100);
                return () => clearTimeout(timer);
            }, [sparks, particles]);

            return (
                <div className="container" onClick={handleClick}>
                    <h1 className="title">HAPPY BIRTHDAY DAD!!!!</h1>
                    
                    <div className="emoji-container">
                        {EMOJIS.map((emoji, i) => (
                            <span
                                key={i}
                                className="emoji"
                                onClick={(e) => {
                                    e.stopPropagation();
                                    handleEmojiClick(i);
                                }}
                            >
                                {emoji}
                            </span>
                        ))}
                    </div>

                    <p className="subtitle">Hope you have an AMAZING day! 🎉</p>

                    <div className="button-container">
                        <button onClick={handleCelebrate}>🎊 CELEBRATE!</button>
                        <button onClick={handlePartyMode}>🌈 PARTY MODE</button>
                    </div>

                    <div className="interactive-counter">
                        Interactions: {interactions}
                    </div>

                    {/* Confetti */}
                    {confetti.map(c => <Confetti key={c.id} id={c.id} />)}

                    {/* Enhanced Fireworks */}
                    {fireworks.map(fw => <Fireworks key={fw.id} {...fw} />)}

                    {/* Sparks */}
                    {sparks.map(s => <Spark key={s.id} {...s} />)}

                    {/* Particles */}
                    {particles.map(p => <Particle key={p.id} {...p} />)}

                    {/* Balloons */}
                    {balloons.map((b, i) => <Balloon key={i} id={b} />)}

                    {/* Ribbons */}
                    {ribbons.map(r => (
                        <div
                            key={r}
                            className="ribbon"
                            style={{
                                top: Math.random() * window.innerHeight + 'px',
                                backgroundColor: COLORS[Math.floor(Math.random() * COLORS.length)],
                            }}
                        />
                    ))}
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<BirthdayPage />, document.getElementById('root'));
    </script>
</body>
</html>
