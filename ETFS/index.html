<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape the Tsunami for Squares</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .layout {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      padding: 6px;
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #444;
      background: #1a1a1a;
      padding: 6px;
      font-size: 14px;
    }

    .hud-left,
    .hud-right {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .tag {
      border: 1px solid #444;
      background: #242424;
      padding: 5px 8px;
      white-space: nowrap;
    }

    .tag.slim {
      font-size: 12px;
      color: #d4d4d4;
    }

    button {
      border: 1px solid #555;
      background: #2d2d2d;
      color: #f2f2f2;
      font: inherit;
      padding: 5px 8px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid #444;
      background: #101010;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .msg {
      pointer-events: auto;
      border: 1px solid #666;
      background: #1c1c1c;
      padding: 12px;
      text-align: center;
      width: min(92vw, 460px);
      line-height: 1.4;
    }

    .mobile {
      display: none;
      grid-template-columns: 58px 58px 58px;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .mobile .blank {
      visibility: hidden;
    }

    .mobile button {
      aspect-ratio: 1;
      padding: 0;
      font-weight: 700;
    }

    @media (max-width: 900px), (pointer: coarse) {
      .hud {
        justify-content: flex-start;
      }

      .mobile {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="hud">
      <div class="hud-left">
        <div class="tag" id="zoneTag">Squares Zone: Base</div>
        <div class="tag" id="waveTag">Next Square Wave: 0m</div>
        <div class="tag" id="speedTag">Square Speed: 180</div>
        <div class="tag" id="godTag">God: OFF</div>
        <div class="tag" id="coinTag">Square Coins: 0</div>
        <div class="tag" id="incomeTag">Square Income: 0/s</div>
        <div class="tag" id="carryTag">Carry: none</div>
        <div class="tag slim" id="ratesTag">Square Rates C1 U2 R4 E7 M11</div>
        <div class="tag slim" id="storageSummaryTag">Square Storage C0 U0 R0 E0 M0</div>
        <div class="tag slim" id="mpTag">MP: connecting</div>
      </div>
      <div class="hud-right">
        <button id="upgradeBtn" type="button">Upgrade Square Speed</button>
        <button id="restartBtn" type="button">Restart Squares Run</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>

    <div class="mobile" id="mobilePad">
      <div class="blank">x</div>
      <button type="button" data-dir="up">U</button>
      <div class="blank">x</div>
      <button type="button" data-dir="left">L</button>
      <button type="button" data-dir="down">D</button>
      <button type="button" data-dir="right">R</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBeVe5g8Uo-xaONw3YzNwpKUi5MtB3FE7w",
      authDomain: "etfbgeg.firebaseapp.com",
      projectId: "etfbgeg",
      storageBucket: "etfbgeg.firebasestorage.app",
      messagingSenderId: "94282003655",
      appId: "1:94282003655:web:4ef828ce9ee6401781bae2"
    };
    const realtimeDatabaseUrl = "https://etfbgeg-default-rtdb.firebaseio.com/";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");

    const zoneTag = document.getElementById("zoneTag");
    const waveTag = document.getElementById("waveTag");
    const speedTag = document.getElementById("speedTag");
    const godTag = document.getElementById("godTag");
    const coinTag = document.getElementById("coinTag");
    const incomeTag = document.getElementById("incomeTag");
    const carryTag = document.getElementById("carryTag");
    const storageSummaryTag = document.getElementById("storageSummaryTag");
    const mpTag = document.getElementById("mpTag");

    const upgradeBtn = document.getElementById("upgradeBtn");
    const restartBtn = document.getElementById("restartBtn");
    const mobilePad = document.getElementById("mobilePad");

    const levelDefs = [
      { name: "Easy", length: 360, spawnCount: 12 },
      { name: "Medium", length: 420, spawnCount: 14 },
      { name: "Hard", length: 490, spawnCount: 16 },
      { name: "Expert", length: 560, spawnCount: 18 },
      { name: "Insane", length: 640, spawnCount: 20 },
      { name: "Extreme", length: 730, spawnCount: 23 },
      { name: "Nightmare", length: 820, spawnCount: 26 },
      { name: "Impossible", length: 920, spawnCount: 29 },
      { name: "Chaos", length: 1030, spawnCount: 32 },
      { name: "Final", length: 1160, spawnCount: 36 }
    ];

    const safeHeight = 130;
    const baseHeight = 270;
    const worldWidth = 1600;

    const zones = [];
    let trackHeight = baseHeight;
    for (const def of levelDefs) {
      trackHeight += def.length + safeHeight;
    }

    const world = {
      w: worldWidth,
      h: trackHeight + 80,
      baseTop: trackHeight + 80 - baseHeight
    };

    let cursor = world.baseTop;
    for (let i = 0; i < levelDefs.length; i += 1) {
      const def = levelDefs[i];
      const dangerBottom = cursor;
      const dangerTop = dangerBottom - def.length;
      const safeBottom = dangerTop;
      const safeTop = safeBottom - safeHeight;
      zones.push({
        level: i + 1,
        name: def.name,
        length: def.length,
        spawnCount: def.spawnCount,
        dangerTop,
        dangerBottom,
        safeTop,
        safeBottom
      });
      cursor = safeTop;
    }

    const rarityDefs = [
      { key: "common", label: "Common", cps: 1, color: "#7bc67b" },
      { key: "uncommon", label: "Uncommon", cps: 2, color: "#7bb3d9" },
      { key: "rare", label: "Rare", cps: 4, color: "#9d88ff" },
      { key: "epic", label: "Epic", cps: 7, color: "#d98ac0" },
      { key: "mythic", label: "Mythic", cps: 11, color: "#ffc56b" }
    ];

    const state = {
      running: false,
      gameOver: false,
      keys: new Set(),
      touch: { up: false, down: false, left: false, right: false },
      gameMode: "single",
      username: "player",
      lobbyId: "",
      coins: 0,
      incomePerSecond: 0,
      highestUnlocked: 1,
      speedLevel: 1,
      baseSpeed: 180,
      speedUpgradeCost: 25,
      invincible: false,
      carryIds: [],
      maxCarry: 9,
      waveTimer: 0,
      waveInterval: 8,
      waves: [],
      mpStatus: "offline",
      mpPeers: 0,
      storage: {
        common: 0,
        uncommon: 0,
        rare: 0,
        epic: 0,
        mythic: 0
      },
      message: "Collect square units and bring them back to square storage."
    };

    const player = {
      x: world.w * 0.5,
      y: world.h - baseHeight * 0.45,
      size: 22,
      teleportLock: 0
    };

    const camera = { x: 0, y: 0 };

    const base = {
      storageX: world.w * 0.84 - 44,
      storageY: world.h - baseHeight * 0.5 - 44,
      storageSize: 88
    };

    const textbot = {
      x: world.w * 0.5,
      y: (zones[2].dangerTop + zones[2].dangerBottom) * 0.5,
      size: 20,
      nearRange: 120
    };

    const defaultLobbyId = "default-squares-lobby";
    const protectedNames = new Set(["geg", "greg", "gregory"]);
    const playerKey = "escape-squares-player-id";
    let localPlayerId = localStorage.getItem(playerKey);
    if (!localPlayerId) {
      localPlayerId = "p" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(playerKey, localPlayerId);
    }

    let db = null;
    let auth = null;
    let firebaseReady = false;
    let firebaseInitPromise = null;
    let playersCol = null;
    let mpSyncTimer = 0;
    let playersUnsubscribe = null;
    const remotePlayers = new Map();

    let nextBrainrotId = 1;
    const brainrots = [];
    const ambientSquares = [];

    function logEvent(type, details) {
      const stamp = new Date().toISOString();
      if (details !== undefined) {
        console.log("[ETFS][" + stamp + "] " + type, details);
      } else {
        console.log("[ETFS][" + stamp + "] " + type);
      }
    }

    function rarityWeights(level) {
      if (level <= 2) return [65, 23, 9, 3, 0];
      if (level <= 4) return [48, 27, 16, 8, 1];
      if (level <= 6) return [34, 26, 22, 14, 4];
      if (level <= 8) return [22, 24, 25, 20, 9];
      return [12, 21, 27, 25, 15];
    }

    function pickRarity(level) {
      const weights = rarityWeights(level);
      const total = weights.reduce((a, b) => a + b, 0);
      let roll = Math.random() * total;
      for (let i = 0; i < weights.length; i += 1) {
        roll -= weights[i];
        if (roll <= 0) return rarityDefs[i];
      }
      return rarityDefs[0];
    }

    function spawnBrainrots() {
      brainrots.length = 0;
      ambientSquares.length = 0;
      nextBrainrotId = 1;
      for (const zone of zones) {
        for (let i = 0; i < zone.spawnCount; i += 1) {
          const rarity = pickRarity(zone.level);
          brainrots.push({
            id: nextBrainrotId,
            x: 90 + Math.random() * (world.w - 180),
            y: zone.dangerTop + 38 + Math.random() * (zone.length - 76),
            size: 20,
            rarity,
            label: "S" + nextBrainrotId,
            delivered: false,
            carried: false
          });
          nextBrainrotId += 1;
        }

        // Add extra non-pickup square clutter so levels feel more square-dense.
        const clutterCount = Math.max(10, Math.floor(zone.spawnCount * 1.8));
        for (let i = 0; i < clutterCount; i += 1) {
          ambientSquares.push({
            x: 60 + Math.random() * (world.w - 120),
            y: zone.dangerTop + 20 + Math.random() * (zone.length - 40),
            size: 10 + Math.random() * 22,
            shade: 35 + Math.floor(Math.random() * 40)
          });
        }
      }
    }

    function setCanvasSize() {
      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = Math.floor(w * ratio);
      canvas.height = Math.floor(h * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function getZoneInfo(y) {
      if (y >= world.baseTop) {
        return { type: "base", label: "Base" };
      }
      for (const zone of zones) {
        if (y >= zone.safeTop && y <= zone.safeBottom) {
          return { type: "safe", label: "Safe after L" + zone.level };
        }
        if (y >= zone.dangerTop && y <= zone.dangerBottom) {
          return { type: "danger", zone };
        }
      }
      return { type: "top", label: "Top" };
    }

    function isWaveSafe(y) {
      const info = getZoneInfo(y);
      return info.type === "base" || info.type === "safe";
    }

    function updateUnlocks() {
      for (const zone of zones) {
        if (player.y >= zone.safeTop && player.y <= zone.safeBottom) {
          const unlocked = Math.min(10, zone.level + 1);
          state.highestUnlocked = Math.max(state.highestUnlocked, unlocked);
        }
      }
    }

    function spawnWave() {
      const speedProfiles = [80, 110, 140, 170, 210, 250];
      const speedBase = speedProfiles[Math.floor(Math.random() * speedProfiles.length)];
      const speed = speedBase + state.highestUnlocked * 4 + Math.random() * 12;
      state.waves.push({
        y: 2,
        speed,
        width: 2 + Math.min(6, speed / 70)
      });
      if (state.waves.length > 18) {
        state.waves.splice(0, state.waves.length - 18);
      }
    }

    function isNearTextbot() {
      return Math.abs(player.x - textbot.x) <= textbot.nearRange && Math.abs(player.y - textbot.y) <= textbot.nearRange;
    }

    function openTextbot() {
      if (!isNearTextbot()) {
        return;
      }

      const speedInput = window.prompt("Squarebot: type any speed number", String(state.baseSpeed));
      if (speedInput !== null) {
        const speedValue = Number(speedInput);
        if (Number.isFinite(speedValue) && speedValue >= 0) {
          state.baseSpeed = speedValue;
        }
      }

      const invInput = window.prompt("Squarebot: invincibility on/off", state.invincible ? "on" : "off");
      if (invInput !== null) {
        const value = invInput.trim().toLowerCase();
        if (["on", "1", "true", "yes", "y"].includes(value)) {
          state.invincible = true;
        } else if (["off", "0", "false", "no", "n"].includes(value)) {
          state.invincible = false;
        }
      }

      updateHud();
    }

    async function initMultiplayer() {
      try {
        logEvent("initMultiplayer:start", {
          projectId: firebaseConfig.projectId,
          firestore: "enabled",
          rtdbUrl: realtimeDatabaseUrl
        });
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        await signInAnonymously(auth);
        db = getFirestore(app);
        firebaseReady = true;
        state.mpStatus = "ready";
        logEvent("initMultiplayer:ready", {
          uid: auth.currentUser ? auth.currentUser.uid : "none"
        });
      } catch (err) {
        firebaseReady = false;
        state.mpStatus = "error";
        logEvent("initMultiplayer:error", err && err.message ? err.message : err);
        console.error(err);
      }
    }

    async function leaveLobby() {
      logEvent("leaveLobby:start", {
        hadSubscription: Boolean(playersUnsubscribe),
        hadPlayersCollection: Boolean(playersCol)
      });
      if (playersUnsubscribe) {
        playersUnsubscribe();
        playersUnsubscribe = null;
      }

      if (playersCol) {
        deleteDoc(doc(playersCol, localPlayerId)).catch((err) => {
          logEvent("leaveLobby:deleteDocError", err && err.message ? err.message : err);
        });
      }

      playersCol = null;
      remotePlayers.clear();
      state.mpPeers = 0;
      if (state.gameMode !== "multi") {
        state.mpStatus = firebaseReady ? "off" : "error";
      }
      logEvent("leaveLobby:done", { mpStatus: state.mpStatus });
    }

    async function joinLobby(lobbyId) {
      if (!firebaseReady) {
        logEvent("joinLobby:blocked", "Firebase unavailable");
        throw new Error("Firebase unavailable");
      }

      const withTimeout = (promise, ms, message) => {
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            setTimeout(() => reject(new Error(message)), ms);
          })
        ]);
      };

      const cleanedLobby = (lobbyId || "").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 30) || defaultLobbyId;
      logEvent("joinLobby:start", { requestedLobby: lobbyId, cleanedLobby });

      await leaveLobby();
      playersCol = collection(db, "rooms", cleanedLobby, "players");

      let activeCount = 0;
      let hasLocal = false;
      try {
        logEvent("joinLobby:getDocs:start", { cleanedLobby });
        const snapshot = await withTimeout(getDocs(playersCol), 3000, "Lobby read timed out");
        const now = Date.now();
        snapshot.forEach((snap) => {
          if (snap.id === localPlayerId) {
            hasLocal = true;
          }
          const data = snap.data();
          if (!data) {
            return;
          }
          if (typeof data.t === "number" && now - data.t > 20000) {
            return;
          }
          activeCount += 1;
        });
        logEvent("joinLobby:getDocs:done", { cleanedLobby, activeCount, hasLocal });
      } catch (err) {
        logEvent("joinLobby:getDocs:warn", err && err.message ? err.message : err);
      }

      if (activeCount >= 5 && !hasLocal) {
        playersCol = null;
        logEvent("joinLobby:full", { cleanedLobby, activeCount });
        throw new Error("Lobby is full (5/5)");
      }

      logEvent("joinLobby:setDoc:start", { cleanedLobby, localPlayerId });
      await withTimeout(setDoc(doc(playersCol, localPlayerId), {
        x: player.x,
        y: player.y,
        speed: state.baseSpeed,
        invincible: state.invincible,
        label: state.username.slice(0, 12) || "player",
        t: Date.now()
      }, { merge: true }), 4000, "Lobby write timed out");
      logEvent("joinLobby:setDoc:done", { cleanedLobby, localPlayerId });

      playersUnsubscribe = onSnapshot(playersCol, (snap) => {
        const nowTs = Date.now();
        const next = new Map();
        let active = 0;
        snap.forEach((docSnap) => {
          const data = docSnap.data();
          if (!data) {
            return;
          }
          if (typeof data.t === "number" && nowTs - data.t > 20000) {
            return;
          }
          active += 1;
          if (docSnap.id === localPlayerId) {
            return;
          }
          if (typeof data.x !== "number" || typeof data.y !== "number") {
            return;
          }
          next.set(docSnap.id, data);
        });

        remotePlayers.clear();
        next.forEach((v, k) => remotePlayers.set(k, v));
        state.mpPeers = Math.min(5, Math.max(1, active));
        state.mpStatus = "live";
        logEvent("joinLobby:snapshot", {
          active,
          remotePeers: next.size,
          lobbyId: cleanedLobby
        });
      }, (err) => {
        state.mpStatus = "error";
        logEvent("joinLobby:snapshotError", err && err.message ? err.message : err);
      });

      state.lobbyId = cleanedLobby;
      state.mpStatus = "live";
      logEvent("joinLobby:done", { lobbyId: cleanedLobby, mpStatus: state.mpStatus });
    }

    function normalizeUsername(name) {
      const trimmed = (name || "").trim();
      if (!trimmed) {
        return "player";
      }
      return trimmed.replace(/\s+/g, " ").slice(0, 16);
    }

    function showMainMenu(errorText) {
      const errorLine = errorText ? "<div style='color:#ff9a9a;margin-top:8px;'>" + errorText + "</div>" : "";
      overlay.innerHTML = "";

      const box = document.createElement("div");
      box.className = "msg";
      box.innerHTML =
        "<div style='font-weight:700;'>Escape the Tsunami for Squares</div>" +
        "<div style='margin-top:8px; display:grid; gap:8px; text-align:left;'>" +
        "<label>Lobby<select id='menuLobbyType' style='width:100%; margin-top:4px;'><option value='default'>Default Lobby</option><option value='custom'>Custom Lobby</option></select></label>" +
        "<label id='customLobbyWrap' style='display:none;'>Custom Lobby ID<input id='customLobbyInput' maxlength='30' placeholder='type lobby id' style='width:100%; margin-top:4px;'/></label>" +
        "<label>Username<input id='menuUsername' maxlength='16' placeholder='your name' style='width:100%; margin-top:4px;'/></label>" +
        "<label id='passwordWrap' style='display:none;'>Password<input id='menuPassword' type='password' maxlength='8' placeholder='required for protected names' style='width:100%; margin-top:4px;'/></label>" +
        "</div>" +
        errorLine +
        "<div id='menuStatus' style='min-height:1.2em;color:#cfcfcf;margin-top:6px;'></div>" +
        "<div style='margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;'><button id='menuStartSingleBtn' type='button'>Start Singleplayer</button><button id='menuStartMultiBtn' type='button'>Start Multiplayer</button></div>";

      overlay.appendChild(box);

      const lobbyTypeSel = document.getElementById("menuLobbyType");
      const customLobbyWrap = document.getElementById("customLobbyWrap");
      const customLobbyInput = document.getElementById("customLobbyInput");
      const userInput = document.getElementById("menuUsername");
      const passWrap = document.getElementById("passwordWrap");
      const passInput = document.getElementById("menuPassword");
      const menuStatus = document.getElementById("menuStatus");
      const startSingleBtn = document.getElementById("menuStartSingleBtn");
      const startMultiBtn = document.getElementById("menuStartMultiBtn");

      overlay.style.pointerEvents = "auto";

      lobbyTypeSel.addEventListener("change", () => {
        customLobbyWrap.style.display = lobbyTypeSel.value === "custom" ? "block" : "none";
      });

      userInput.addEventListener("input", () => {
        const normalized = normalizeUsername(userInput.value).toLowerCase();
        passWrap.style.display = protectedNames.has(normalized) ? "block" : "none";
      });

      async function startFromMenu(mode) {
        try {
          logEvent("menu:startClick", {
            mode,
            lobbyType: lobbyTypeSel.value,
            usernameInput: userInput.value
          });
          startSingleBtn.disabled = true;
          startMultiBtn.disabled = true;
          if (menuStatus) {
            menuStatus.textContent = mode === "multi" ? "Joining multiplayer..." : "Starting singleplayer...";
          }

          const withTimeout = (promise, ms, message) => {
            return Promise.race([
              promise,
              new Promise((_, reject) => {
                setTimeout(() => reject(new Error(message)), ms);
              })
            ]);
          };

          const username = normalizeUsername(userInput.value);
          const protectedName = protectedNames.has(username.toLowerCase());
          if (protectedName && (passInput.value || "").trim() !== "g") {
            logEvent("menu:blockedProtectedName", { username });
            showMainMenu("Protected username requires password: g");
            return;
          }

          state.username = username;
          state.gameMode = mode;

          if (mode === "single") {
            leaveLobby().catch(() => {});
            state.lobbyId = "";
            state.mpStatus = firebaseReady ? "off" : "error";
            state.mpPeers = 0;
            logEvent("menu:startSingle", { mpStatus: state.mpStatus });
          } else {
            if (firebaseInitPromise) {
              await firebaseInitPromise;
            }
            if (!firebaseReady) {
              logEvent("menu:multiplayerUnavailable", "Firebase anonymous sign-in failed");
              showMainMenu("Multiplayer unavailable. Firebase anonymous sign-in failed.");
              return;
            }

            const chosenLobby = lobbyTypeSel.value === "custom"
              ? normalizeUsername(customLobbyInput.value).replace(/\s+/g, "-").toLowerCase()
              : defaultLobbyId;

            await withTimeout(joinLobby(chosenLobby), 8000, "Multiplayer timed out. Check internet/Firebase and try again.");
            logEvent("menu:startMulti", { chosenLobby });
          }

          resetGame();
          state.running = true;
          clearOverlay();
          updateHud();
          logEvent("menu:startSuccess", { mode: state.gameMode });
        } catch (err) {
          logEvent("menu:startError", err && err.message ? err.message : err);
          showMainMenu(err && err.message ? err.message : "Unable to start game");
        }
      }

      startSingleBtn.addEventListener("click", () => {
        startFromMenu("single");
      });

      startMultiBtn.addEventListener("click", () => {
        startFromMenu("multi");
      });

      lobbyTypeSel.dispatchEvent(new Event("change"));
    }

    function syncMultiplayer(dt) {
      if (!playersCol || state.gameMode !== "multi") {
        return;
      }

      mpSyncTimer += dt;
      if (mpSyncTimer < 0.15) {
        return;
      }
      mpSyncTimer = 0;

      const payload = {
        x: player.x,
        y: player.y,
        speed: state.baseSpeed,
        invincible: state.invincible,
        label: localPlayerId.slice(0, 4),
        t: Date.now()
      };

      payload.label = state.username.slice(0, 12) || "player";

      setDoc(doc(playersCol, localPlayerId), payload, { merge: true }).catch(() => {
        state.mpStatus = "error";
        logEvent("syncMultiplayer:setDocError", { lobbyId: state.lobbyId });
      });
    }

    function movePlayer(dt) {
      let dx = 0;
      let dy = 0;

      if (state.keys.has("w") || state.keys.has("arrowup") || state.touch.up) dy -= 1;
      if (state.keys.has("s") || state.keys.has("arrowdown") || state.touch.down) dy += 1;
      if (state.keys.has("a") || state.keys.has("arrowleft") || state.touch.left) dx -= 1;
      if (state.keys.has("d") || state.keys.has("arrowright") || state.touch.right) dx += 1;

      const mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      const speed = state.baseSpeed;
      player.x += dx * speed * dt;
      player.y += dy * speed * dt;

      const half = player.size * 0.5;
      player.x = Math.max(half, Math.min(world.w - half, player.x));
      player.y = Math.max(half, Math.min(world.h - half, player.y));
    }

    function updateCarrier() {
      if (state.carryIds.length < state.maxCarry) {
        for (const b of brainrots) {
          if (b.delivered || b.carried) continue;
          const px0 = player.x - player.size * 0.5;
          const py0 = player.y - player.size * 0.5;
          const bx0 = b.x - b.size * 0.5;
          const by0 = b.y - b.size * 0.5;
          const overlap = px0 < bx0 + b.size && px0 + player.size > bx0 && py0 < by0 + b.size && py0 + player.size > by0;
          if (overlap) {
            state.carryIds.push(b.id);
            b.carried = true;
            if (state.carryIds.length >= state.maxCarry) {
              break;
            }
          }
        }
      }

      const inStorage =
        player.x >= base.storageX &&
        player.x <= base.storageX + base.storageSize &&
        player.y >= base.storageY &&
        player.y <= base.storageY + base.storageSize;

      const nextCarryIds = [];
      let carryIndex = 0;
      for (const id of state.carryIds) {
        const carried = brainrots.find((b) => b.id === id);
        if (!carried || carried.delivered) {
          continue;
        }

        const col = carryIndex % 3;
        const row = Math.floor(carryIndex / 3);
        carried.x = player.x + 20 + col * 14;
        carried.y = player.y + (row - 1) * 14;
        carryIndex += 1;

        if (inStorage && player.y >= world.baseTop) {
          carried.carried = false;
          carried.delivered = true;
          state.storage[carried.rarity.key] += 1;
          state.incomePerSecond += carried.rarity.cps;
          state.coins += carried.rarity.cps * 2;
        } else {
          nextCarryIds.push(id);
        }
      }

      state.carryIds = nextCarryIds;
    }

    function updateWaves(dt) {
      state.waveTimer += dt;
      if (state.waveTimer >= state.waveInterval) {
        state.waveTimer -= state.waveInterval;
        spawnWave();
      }

      for (const wave of state.waves) {
        wave.y += wave.speed * dt;
      }
      state.waves = state.waves.filter((wave) => wave.y < world.h + 120);

      if (isWaveSafe(player.y)) {
        return;
      }

      if (state.invincible) {
        return;
      }

      for (const wave of state.waves) {
        if (Math.abs(wave.y - player.y) <= player.size * 0.5 + 2) {
          state.gameOver = true;
          state.running = false;
          state.message = "A square wave got you. Restart and use safe zones between levels.";
          showOverlay(state.message);
          break;
        }
      }
    }

    function updateEconomy(dt) {
      state.coins += state.incomePerSecond * dt;
    }

    function updateHud() {
      const info = getZoneInfo(player.y);
      let zoneText = "Squares Zone: Base";
      if (info.type === "danger") {
        zoneText = "Squares Zone: L" + info.zone.level + " " + info.zone.name;
      } else if (info.type === "safe") {
        zoneText = "Squares Zone: " + info.label;
      } else if (info.type === "top") {
        zoneText = "Squares Zone: Top";
      }
      zoneTag.textContent = zoneText;

      let nearest = Infinity;
      for (const wave of state.waves) {
        const d = player.y - wave.y;
        if (d >= 0 && d < nearest) nearest = d;
      }
      if (!Number.isFinite(nearest)) {
        const estWaveSpeed = 150 + state.highestUnlocked * 4;
        const fallback = player.y + (state.waveInterval - state.waveTimer) * estWaveSpeed;
        nearest = Math.max(0, fallback);
      }
      waveTag.textContent = "Next Square Wave: " + nearest.toFixed(0) + "m";

      speedTag.textContent = "Square Speed: " + state.baseSpeed;
      godTag.textContent = "God: " + (state.invincible ? "ON" : "OFF");
      coinTag.textContent = "Square Coins: " + state.coins.toFixed(0);
      incomeTag.textContent = "Square Income: " + state.incomePerSecond.toFixed(1) + "/s";

      if (state.carryIds.length === 0) {
        carryTag.textContent = "Carry: none";
      } else {
        carryTag.textContent = "Carry: " + state.carryIds.length + "/" + state.maxCarry;
      }

      storageSummaryTag.textContent =
        "Square Storage C" + state.storage.common +
        " U" + state.storage.uncommon +
        " R" + state.storage.rare +
        " E" + state.storage.epic +
        " M" + state.storage.mythic;

      if (state.gameMode === "multi") {
        mpTag.textContent = "MP: " + state.mpStatus + " " + state.mpPeers + "/5" + (state.lobbyId ? " " + state.lobbyId : "");
      } else {
        mpTag.textContent = "MP: off";
      }

      upgradeBtn.textContent = "Upgrade Square Speed (" + state.speedUpgradeCost + ")";
      upgradeBtn.disabled = state.coins < state.speedUpgradeCost || !state.running;
    }

    function updateCamera() {
      const vw = canvas.clientWidth;
      const vh = canvas.clientHeight;
      camera.x = Math.max(0, Math.min(world.w - vw, player.x - vw * 0.5));
      camera.y = Math.max(0, Math.min(world.h - vh, player.y - vh * 0.55));
    }

    function drawWorld() {
      const vw = canvas.clientWidth;
      const vh = canvas.clientHeight;
      ctx.clearRect(0, 0, vw, vh);

      ctx.fillStyle = "#0f0f0f";
      ctx.fillRect(0, 0, vw, vh);

      ctx.save();
      ctx.translate(-camera.x, -camera.y);

      const drawWidth = Math.max(world.w, camera.x + vw + 2);

      ctx.fillStyle = "#1b1b1b";
      ctx.fillRect(0, 0, drawWidth, world.h);

      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect(0, world.baseTop, drawWidth, baseHeight);

      ctx.strokeStyle = "#3d3d3d";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, world.baseTop);
      ctx.lineTo(drawWidth, world.baseTop);
      ctx.stroke();

      for (const zone of zones) {
        ctx.fillStyle = zone.level % 2 === 0 ? "#222" : "#262626";
        ctx.fillRect(0, zone.dangerTop, drawWidth, zone.length);

        ctx.fillStyle = "#203020";
        ctx.fillRect(0, zone.safeTop, drawWidth, safeHeight);

        ctx.fillStyle = "#d7d7d7";
        ctx.font = "14px Arial";
        ctx.textAlign = "left";
        ctx.fillText("L" + zone.level + " " + zone.name + " (" + zone.length + "m)", 10, zone.dangerTop + 18);
        ctx.fillText("SAFE", 10, zone.safeTop + 18);
      }

      ctx.fillStyle = "#2a3a2a";
      ctx.fillRect(base.storageX, base.storageY, base.storageSize, base.storageSize);
      ctx.strokeStyle = "#9ad19a";
      ctx.lineWidth = 2;
      ctx.strokeRect(base.storageX, base.storageY, base.storageSize, base.storageSize);
      ctx.fillStyle = "#dff5df";
      ctx.textAlign = "center";
      ctx.font = "13px Arial";
      ctx.fillText("SQUARE STORAGE", base.storageX + base.storageSize * 0.5, base.storageY + base.storageSize * 0.55);

      for (const sq of ambientSquares) {
        ctx.fillStyle = "rgb(" + sq.shade + "," + sq.shade + "," + sq.shade + ")";
        ctx.fillRect(sq.x - sq.size * 0.5, sq.y - sq.size * 0.5, sq.size, sq.size);
      }

      for (const b of brainrots) {
        if (b.delivered) continue;
        ctx.fillStyle = b.rarity.color;
        ctx.fillRect(b.x - b.size * 0.5, b.y - b.size * 0.5, b.size, b.size);
        ctx.fillStyle = "#111";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText(b.label, b.x, b.y + 3);
      }

      ctx.fillStyle = isNearTextbot() ? "#8cd" : "#252525";
      ctx.fillRect(textbot.x - textbot.size * 0.5, textbot.y - textbot.size * 0.5, textbot.size, textbot.size);
      if (isNearTextbot()) {
        ctx.fillStyle = "#cfeeff";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText("SQUAREBOT [T]", textbot.x, textbot.y - 14);
      }

      for (const wave of state.waves) {
        ctx.strokeStyle = "#9fd3ff";
        ctx.lineWidth = wave.width || 3;
        ctx.beginPath();
        ctx.moveTo(0, wave.y);
        ctx.lineTo(drawWidth, wave.y);
        ctx.stroke();
      }

      ctx.fillStyle = "#f3f3f3";
      ctx.fillRect(player.x - player.size * 0.5, player.y - player.size * 0.5, player.size, player.size);
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 2;
      ctx.strokeRect(player.x - player.size * 0.5, player.y - player.size * 0.5, player.size, player.size);

      remotePlayers.forEach((rp, id) => {
        ctx.fillStyle = "#80d8ff";
        ctx.fillRect(rp.x - player.size * 0.5, rp.y - player.size * 0.5, player.size, player.size);
        ctx.strokeStyle = "#143b4b";
        ctx.lineWidth = 2;
        ctx.strokeRect(rp.x - player.size * 0.5, rp.y - player.size * 0.5, player.size, player.size);
        ctx.fillStyle = "#bfefff";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText((rp.label || id.slice(0, 4)).toUpperCase(), rp.x, rp.y - 10);
      });

      ctx.restore();
    }

    function showOverlay(text, options) {
      const opts = options || {};
      overlay.innerHTML = "";
      overlay.style.pointerEvents = "auto";
      const box = document.createElement("div");
      box.className = "msg";
      if (opts.start) {
        box.innerHTML = "<div>" + text + "</div><div style='margin-top:8px;'><button id='startRunBtn' type='button'>Start Run</button></div>";
      } else {
        box.innerHTML = "<div>" + text + "</div><div style='margin-top:8px;'>Press Restart Squares Run to play again.</div>";
      }
      overlay.appendChild(box);
      if (opts.start) {
        const startRunBtn = document.getElementById("startRunBtn");
        if (startRunBtn) {
          startRunBtn.addEventListener("click", () => {
            state.running = true;
            clearOverlay();
          }, { once: true });
        }
      }
    }

    function clearOverlay() {
      overlay.innerHTML = "";
      overlay.style.pointerEvents = "none";
    }

    function resetGame() {
      state.running = true;
      state.gameOver = false;
      state.keys.clear();
      state.touch.up = false;
      state.touch.down = false;
      state.touch.left = false;
      state.touch.right = false;
      state.coins = 0;
      state.incomePerSecond = 0;
      state.highestUnlocked = 1;
      state.speedLevel = 1;
      state.baseSpeed = 180;
      state.speedUpgradeCost = 25;
      state.invincible = false;
      state.carryIds = [];
      state.waveTimer = 0;
      state.waves = [];
      state.storage.common = 0;
      state.storage.uncommon = 0;
      state.storage.rare = 0;
      state.storage.epic = 0;
      state.storage.mythic = 0;

      player.x = world.w * 0.5;
      player.y = world.h - baseHeight * 0.45;
      player.teleportLock = 0;

      spawnBrainrots();
      clearOverlay();
      updateCamera();
    }

    function update(dt) {
      if (!state.running) {
        updateHud();
        return;
      }

      updateEconomy(dt);
      movePlayer(dt);
      updateUnlocks();
      updateCarrier();
      updateWaves(dt);
      syncMultiplayer(dt);

      const topSafe = zones[zones.length - 1].safeTop;
      if (player.y < topSafe) {
        state.running = false;
        state.message = "You escaped the tsunami for squares.";
        showOverlay(state.message);
      }

      updateCamera();
      updateHud();
    }

    let last = performance.now();
    let accumulator = 0;
    const fixedStep = 1 / 120;
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      accumulator += dt;
      let loops = 0;
      while (accumulator >= fixedStep && loops < 4) {
        update(fixedStep);
        accumulator -= fixedStep;
        loops += 1;
      }
      drawWorld();
      requestAnimationFrame(frame);
    }

    upgradeBtn.addEventListener("click", () => {
      if (!state.running) return;
      if (state.coins < state.speedUpgradeCost) return;
      state.coins -= state.speedUpgradeCost;
      state.speedLevel += 1;
      state.baseSpeed += 20;
      state.speedUpgradeCost = Math.floor(state.speedUpgradeCost * 1.6 + 5);
      updateHud();
    });

    restartBtn.addEventListener("click", resetGame);

    window.addEventListener("keydown", (e) => {
      const controls = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d", "W", "A", "S", "D"];
      if (controls.includes(e.key)) {
        e.preventDefault();
      }
      state.keys.add(e.key.toLowerCase());

      if (e.key.toLowerCase() === "t") {
        openTextbot();
      }
    });

    window.addEventListener("keyup", (e) => {
      state.keys.delete(e.key.toLowerCase());
    });

    function setTouch(dir, on) {
      state.touch[dir] = on;
    }

    mobilePad.querySelectorAll("button[data-dir]").forEach((btn) => {
      const dir = btn.getAttribute("data-dir");
      btn.addEventListener("pointerdown", () => setTouch(dir, true));
      btn.addEventListener("pointerup", () => setTouch(dir, false));
      btn.addEventListener("pointercancel", () => setTouch(dir, false));
      btn.addEventListener("pointerleave", () => setTouch(dir, false));
    });

    window.addEventListener("resize", setCanvasSize);

    window.addEventListener("beforeunload", () => {
      if (!playersCol) {
        return;
      }
      deleteDoc(doc(playersCol, localPlayerId)).catch(() => {});
    });

    setCanvasSize();
    firebaseInitPromise = initMultiplayer();
    resetGame();
    state.running = false;
    showMainMenu();
    restartBtn.textContent = "Restart Squares Run";
    requestAnimationFrame(frame);
  </script>
</body>
</html>
