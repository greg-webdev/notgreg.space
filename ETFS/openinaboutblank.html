<body>
  <template id="gameSource"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape the Tsunami for Squares</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .layout {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      padding: 6px;
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #3b4f66;
      background: linear-gradient(180deg, #1c2430 0%, #151b24 100%);
      padding: 6px;
      font-size: 14px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
    }

    .hud-left,
    .hud-right {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .tag {
      border: 1px solid #3b4d63;
      background: linear-gradient(180deg, #253245 0%, #1b2533 100%);
      padding: 5px 8px;
      white-space: nowrap;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .tag.slim {
      font-size: 12px;
      color: #d4d4d4;
    }

    button {
      border: 1px solid #4f6a85;
      background: linear-gradient(180deg, #30445b 0%, #223246 100%);
      color: #f2f2f2;
      font: inherit;
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 8px;
      transition: transform 90ms ease, filter 120ms ease;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid #444;
      background: #101010;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .msg {
      pointer-events: auto;
      border: 1px solid #666;
      background: #1c1c1c;
      padding: 12px;
      text-align: center;
      width: min(92vw, 460px);
      line-height: 1.4;
    }

    .menu-fullscreen {
      width: 100%;
      height: 100%;
      max-width: none;
      border: none;
      background: rgba(10, 10, 10, 0.94);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .menu-card {
      width: min(96vw, 640px);
      border: 1px solid #666;
      background: #1c1c1c;
      padding: 14px;
      text-align: center;
      line-height: 1.4;
    }

    .mobile {
      display: none;
      grid-template-columns: 58px 58px 58px;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .mobile .blank {
      visibility: hidden;
    }

    .mobile button {
      aspect-ratio: 1;
      padding: 0;
      font-weight: 700;
    }

    @media (max-width: 900px), (pointer: coarse) {
      .hud {
        justify-content: flex-start;
      }

      .mobile {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="hud">
      <div class="hud-left">
        <div class="tag" id="zoneTag">Squares Zone: Base</div>
        <div class="tag" id="waveTag">Next Square Wave: 0m</div>
        <div class="tag" id="speedTag">Square Speed: 180</div>
        <div class="tag" id="godTag">God: OFF</div>
        <div class="tag" id="coinTag">Square Coins: 0</div>
        <div class="tag" id="incomeTag">Square Income: 0/s</div>
        <div class="tag" id="carryTag">Carry: none</div>
        <div class="tag slim" id="ratesTag">Square Rates C1 U2 R4 E7 M11</div>
        <div class="tag slim" id="storageSummaryTag">Square Storage C0 U0 R0 E0 M0</div>
        <div class="tag slim" id="mpTag">MP: connecting</div>
      </div>
      <div class="hud-right">
        <button id="modeBtn" type="button">3D: OFF</button>
        <button id="upgradeBtn" type="button">Upgrade Square Speed</button>
        <button id="restartBtn" type="button">Restart Squares Run</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>

    <div class="mobile" id="mobilePad">
      <div class="blank">x</div>
      <button type="button" data-dir="up">U</button>
      <div class="blank">x</div>
      <button type="button" data-dir="left">L</button>
      <button type="button" data-dir="down">D</button>
      <button type="button" data-dir="right">R</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBeVe5g8Uo-xaONw3YzNwpKUi5MtB3FE7w",
      authDomain: "etfbgeg.firebaseapp.com",
      projectId: "etfbgeg",
      storageBucket: "etfbgeg.firebasestorage.app",
      messagingSenderId: "94282003655",
      appId: "1:94282003655:web:4ef828ce9ee6401781bae2"
    };
    const realtimeDatabaseUrl = "https://etfbgeg-default-rtdb.firebaseio.com/";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");

    const zoneTag = document.getElementById("zoneTag");
    const waveTag = document.getElementById("waveTag");
    const speedTag = document.getElementById("speedTag");
    const godTag = document.getElementById("godTag");
    const coinTag = document.getElementById("coinTag");
    const incomeTag = document.getElementById("incomeTag");
    const carryTag = document.getElementById("carryTag");
    const ratesTag = document.getElementById("ratesTag");
    const storageSummaryTag = document.getElementById("storageSummaryTag");
    const mpTag = document.getElementById("mpTag");

    const modeBtn = document.getElementById("modeBtn");
    const upgradeBtn = document.getElementById("upgradeBtn");
    const restartBtn = document.getElementById("restartBtn");
    const mobilePad = document.getElementById("mobilePad");

    const levelThemeNames = [
      "Easy", "Medium", "Hard", "Expert", "Insane", "Extreme", "Nightmare", "Impossible", "Chaos", "Final",
      "Frost", "Ash", "Neon", "Abyss", "Storm"
    ];
    const levelDefs = Array.from({ length: 30 }, (_, i) => {
      return {
        name: levelThemeNames[i % levelThemeNames.length] + " " + (i + 1),
        length: 360 + i * 38,
        spawnCount: 12 + Math.floor(i * 1.35)
      };
    });

    const safeHeight = 130;
    const baseHeight = 270;
    const worldWidth = 1600;

    const zones = [];
    let trackHeight = baseHeight;
    for (const def of levelDefs) {
      trackHeight += def.length + safeHeight;
    }

    const world = {
      w: worldWidth,
      h: trackHeight + 80,
      baseTop: trackHeight + 80 - baseHeight
    };

    let cursor = world.baseTop;
    for (let i = 0; i < levelDefs.length; i += 1) {
      const def = levelDefs[i];
      const dangerBottom = cursor;
      const dangerTop = dangerBottom - def.length;
      const safeBottom = dangerTop;
      const safeTop = safeBottom - safeHeight;
      zones.push({
        level: i + 1,
        name: def.name,
        length: def.length,
        spawnCount: def.spawnCount,
        dangerTop,
        dangerBottom,
        safeTop,
        safeBottom
      });
      cursor = safeTop;
    }

    const rarityDefs = [
      { key: "common", label: "Common", cps: 1, color: "#7bc67b" },
      { key: "uncommon", label: "Uncommon", cps: 2, color: "#7bb3d9" },
      { key: "rare", label: "Rare", cps: 4, color: "#9d88ff" },
      { key: "epic", label: "Epic", cps: 7, color: "#d98ac0" },
      { key: "mythic", label: "Mythic", cps: 11, color: "#ffc56b" },
      { key: "legendary", label: "Legendary", cps: 16, color: "#ff9f43" },
      { key: "ancient", label: "Ancient", cps: 23, color: "#52d6c5" },
      { key: "divine", label: "Divine", cps: 32, color: "#ffe38a" }
    ];

    function makeStorageObject() {
      const storage = {};
      for (const rarity of rarityDefs) {
        storage[rarity.key] = 0;
      }
      return storage;
    }

    const state = {
      running: false,
      gameOver: false,
      keys: new Set(),
      touch: { up: false, down: false, left: false, right: false },
      gameMode: "single",
      username: "player",
      lobbyId: "",
      coins: 0,
      incomePerSecond: 0,
      highestUnlocked: 1,
      speedLevel: 1,
      baseSpeed: 180,
      speedUpgradeCost: 25,
      invincible: false,
      infiniteInventory: false,
      carryIds: [],
      maxCarry: 9,
      squarebotUnlocked: false,
      view3D: false,
      waveTimer: 0,
      waveInterval: 8,
      waves: [],
      regenTimer: 0,
      regenInterval: 2.5,
      mpStatus: "offline",
      mpPeers: 0,
      localBaseIndex: 0,
      storage: makeStorageObject(),
      message: "Collect square units and bring them back to square storage."
    };

    const player = {
      x: world.w * 0.5,
      y: world.h - baseHeight * 0.45,
      size: 22,
      teleportLock: 0
    };

    const camera = { x: 0, y: 0 };
    const camControl = {
      zoom: 1,
      yaw: 0,
      dragOn: false,
      lastX: 0,
      lastY: 0
    };

    const base = {
      storageX: world.w * 0.84 - 44,
      storageY: world.h - baseHeight * 0.5 - 44,
      storageSize: 88
    };

    const textbot = {
      x: world.w * 0.5,
      y: (zones[2].dangerTop + zones[2].dangerBottom) * 0.5,
      size: 20,
      nearRange: 120
    };

    const defaultLobbyId = "default-squares-lobby";
    const protectedNames = new Set(["geg", "greg", "gregory"]);
    const deviceKey = "escape-squares-device-id";
    let deviceId = localStorage.getItem(deviceKey);
    if (!deviceId) {
      deviceId = "d" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(deviceKey, deviceId);
    }
    const tabKey = "escape-squares-tab-id";
    let tabId = sessionStorage.getItem(tabKey);
    if (!tabId) {
      tabId = "t" + Math.random().toString(36).slice(2, 10);
      sessionStorage.setItem(tabKey, tabId);
    }
    const localPlayerId = deviceId + "-" + tabId;

    const baseSlots = Array.from({ length: 10 }, (_, i) => {
      const cols = 5;
      const width = 286;
      const height = 84;
      const gapX = 14;
      const gapY = 16;
      const totalW = width * cols + gapX * (cols - 1);
      const startX = world.w * 0.5 - totalW * 0.5;
      const col = i % cols;
      const row = Math.floor(i / cols);
      return {
        x: startX + col * (width + gapX),
        y: world.h - baseHeight + 46 + row * (height + gapY),
        w: width,
        h: height,
        index: i + 1
      };
    });

    let db = null;
    let auth = null;
    let firebaseReady = false;
    let firebaseInitPromise = null;
    let playersCol = null;
    let mpReadTimer = 0;
    let mpWriteTimer = 0;
    const mpReadInterval = 2.5;
    const mpWriteInterval = 2.5;
    let mpReadInFlight = false;
    let mpWriteInFlight = false;
    const remotePlayers = new Map();

    let nextBrainrotId = 1;
    const brainrots = [];
    const ambientSquares = [];

    function logEvent(type, details) {
      const stamp = new Date().toISOString();
      if (details !== undefined) {
        console.log("[ETFS][" + stamp + "] " + type, details);
      } else {
        console.log("[ETFS][" + stamp + "] " + type);
      }
    }

    function pickAvailableBaseIndex(occupiedSet, seedStr) {
      const total = baseSlots.length;
      let hash = 0;
      const src = String(seedStr || "seed");
      for (let i = 0; i < src.length; i += 1) {
        hash = ((hash << 5) - hash + src.charCodeAt(i)) | 0;
      }
      let start = Math.abs(hash) % total;
      for (let i = 0; i < total; i += 1) {
        const candidate = (start + i) % total;
        if (!occupiedSet.has(candidate)) {
          return candidate;
        }
      }
      return 0;
    }

    function getBaseOwners() {
      const owners = Array.from({ length: baseSlots.length }, () => "");
      const pushToFirstOpen = (label) => {
        for (let i = 0; i < owners.length; i += 1) {
          if (!owners[i]) {
            owners[i] = label;
            return;
          }
        }
      };

      const localLabel = (state.username || "").trim();
      const localIndex = Math.max(0, Math.min(baseSlots.length - 1, state.localBaseIndex || 0));
      if (localLabel) {
        owners[localIndex] = localLabel;
      }

      remotePlayers.forEach((rp) => {
        if (!rp || typeof rp.label !== "string") return;
        const label = rp.label.trim();
        if (!label) return;
        if (typeof rp.baseIndex === "number" && rp.baseIndex >= 0 && rp.baseIndex < baseSlots.length) {
          if (!owners[rp.baseIndex]) {
            owners[rp.baseIndex] = label;
          }
        } else {
          pushToFirstOpen(label);
        }
      });

      return owners;
    }

    function getOwnedTotalFromStorage(storageObj) {
      return rarityDefs.reduce((sum, rarity) => sum + (storageObj[rarity.key] || 0), 0);
    }

    function getOwnedSummaryFromStorage(storageObj) {
      return rarityDefs.map((rarity) => rarity.label.slice(0, 2).toUpperCase() + (storageObj[rarity.key] || 0)).join(" ");
    }

    function getBaseInfos() {
      const infos = Array.from({ length: baseSlots.length }, (_, i) => ({
        baseIndex: i,
        owner: "",
        ownedSummary: "",
        ownedTotal: 0,
        isLocal: false
      }));

      const localIndex = Math.max(0, Math.min(baseSlots.length - 1, state.localBaseIndex || 0));
      if (state.username && state.username.trim()) {
        infos[localIndex].owner = state.username.trim();
        infos[localIndex].ownedSummary = getOwnedSummaryFromStorage(state.storage);
        infos[localIndex].ownedTotal = getOwnedTotalFromStorage(state.storage);
        infos[localIndex].isLocal = true;
      }

      const assignFirstOpen = (rp) => {
        for (let i = 0; i < infos.length; i += 1) {
          if (!infos[i].owner) {
            infos[i].owner = rp.label || "Player";
            infos[i].ownedSummary = typeof rp.ownedSummary === "string" ? rp.ownedSummary : "No data";
            infos[i].ownedTotal = typeof rp.ownedTotal === "number" ? rp.ownedTotal : 0;
            return;
          }
        }
      };

      remotePlayers.forEach((rp) => {
        if (!rp || typeof rp.label !== "string" || !rp.label.trim()) {
          return;
        }
        if (typeof rp.baseIndex === "number" && rp.baseIndex >= 0 && rp.baseIndex < infos.length) {
          if (!infos[rp.baseIndex].owner) {
            infos[rp.baseIndex].owner = rp.label.trim();
            infos[rp.baseIndex].ownedSummary = typeof rp.ownedSummary === "string" ? rp.ownedSummary : "No data";
            infos[rp.baseIndex].ownedTotal = typeof rp.ownedTotal === "number" ? rp.ownedTotal : 0;
          }
        } else {
          assignFirstOpen(rp);
        }
      });

      return infos;
    }

    function openNearestBaseOwnership() {
      const infos = getBaseInfos();
      let foundIndex = -1;
      for (let i = 0; i < baseSlots.length; i += 1) {
        const slot = baseSlots[i];
        const pad = 22;
        const inRange =
          player.x >= slot.x - pad &&
          player.x <= slot.x + slot.w + pad &&
          player.y >= slot.y - pad &&
          player.y <= slot.y + slot.h + pad;
        if (inRange) {
          foundIndex = i;
          break;
        }
      }

      if (foundIndex < 0) {
        return;
      }

      const info = infos[foundIndex];
      if (!info.owner) {
        window.alert("Base " + (foundIndex + 1) + "\nNot claimed");
        return;
      }

      window.alert(
        info.owner + "'s base" +
        "\nOwned total: " + info.ownedTotal +
        "\n" + (info.ownedSummary || "No data")
      );
    }

    function rarityWeights(level) {
      if (level <= 2) return [64, 22, 8, 3, 2, 1, 0, 0];
      if (level <= 4) return [43, 24, 15, 8, 5, 3, 2, 0];
      if (level <= 6) return [30, 23, 20, 12, 7, 4, 3, 1];
      if (level <= 8) return [19, 20, 21, 16, 11, 6, 5, 2];
      return [10, 15, 18, 16, 14, 10, 10, 7];
    }

    function pickRarity(level) {
      const weights = rarityWeights(level);
      const total = weights.reduce((a, b) => a + b, 0);
      let roll = Math.random() * total;
      for (let i = 0; i < weights.length; i += 1) {
        roll -= weights[i];
        if (roll <= 0) return rarityDefs[i];
      }
      return rarityDefs[0];
    }

    function spawnBrainrots() {
      brainrots.length = 0;
      ambientSquares.length = 0;
      nextBrainrotId = 1;
      for (const zone of zones) {
        for (let i = 0; i < zone.spawnCount; i += 1) {
          const rarity = pickRarity(zone.level);
          brainrots.push({
            id: nextBrainrotId,
            x: 90 + Math.random() * (world.w - 180),
            y: zone.dangerTop + 38 + Math.random() * (zone.length - 76),
            size: 20,
            rarity,
            label: "S" + nextBrainrotId,
            delivered: false,
            carried: false
          });
          nextBrainrotId += 1;
        }

        // Add extra non-pickup square clutter so levels feel more square-dense.
        const clutterCount = Math.max(10, Math.floor(zone.spawnCount * 1.8));
        for (let i = 0; i < clutterCount; i += 1) {
          ambientSquares.push({
            x: 60 + Math.random() * (world.w - 120),
            y: zone.dangerTop + 20 + Math.random() * (zone.length - 40),
            size: 10 + Math.random() * 22,
            shade: 35 + Math.floor(Math.random() * 40)
          });
        }
      }
    }

    function setCanvasSize() {
      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = Math.floor(w * ratio);
      canvas.height = Math.floor(h * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function getZoneInfo(y) {
      if (y >= world.baseTop) {
        return { type: "base", label: "Base" };
      }
      for (const zone of zones) {
        if (y >= zone.safeTop && y <= zone.safeBottom) {
          return { type: "safe", label: "Safe after L" + zone.level };
        }
        if (y >= zone.dangerTop && y <= zone.dangerBottom) {
          return { type: "danger", zone };
        }
      }
      return { type: "top", label: "Top" };
    }

    function isWaveSafe(y) {
      const info = getZoneInfo(y);
      return info.type === "base" || info.type === "safe";
    }

    function updateUnlocks() {
      for (const zone of zones) {
        if (player.y >= zone.safeTop && player.y <= zone.safeBottom) {
          const unlocked = Math.min(levelDefs.length, zone.level + 1);
          state.highestUnlocked = Math.max(state.highestUnlocked, unlocked);
        }
      }
    }

    function spawnWave() {
      const speedProfiles = [80, 110, 140, 170, 210, 250];
      const speedBase = speedProfiles[Math.floor(Math.random() * speedProfiles.length)];
      const speed = speedBase + state.highestUnlocked * 4 + Math.random() * 12;
      state.waves.push({
        y: 2,
        speed,
        width: 2 + Math.min(6, speed / 70)
      });
      if (state.waves.length > 18) {
        state.waves.splice(0, state.waves.length - 18);
      }
    }

    function isNearTextbot() {
      if (!state.squarebotUnlocked) {
        return false;
      }
      return Math.abs(player.x - textbot.x) <= textbot.nearRange && Math.abs(player.y - textbot.y) <= textbot.nearRange;
    }

    function openTextbot() {
      if (!isNearTextbot()) {
        return;
      }

      const speedInput = window.prompt("Squarebot: type any speed number", String(state.baseSpeed));
      if (speedInput !== null) {
        const speedValue = Number(speedInput);
        if (Number.isFinite(speedValue) && speedValue >= 0) {
          state.baseSpeed = speedValue;
        }
      }

      const invInput = window.prompt("Squarebot: invincibility on/off", state.invincible ? "on" : "off");
      if (invInput !== null) {
        const value = invInput.trim().toLowerCase();
        if (["on", "1", "true", "yes", "y"].includes(value)) {
          state.invincible = true;
        } else if (["off", "0", "false", "no", "n"].includes(value)) {
          state.invincible = false;
        }
      }

      const carryInput = window.prompt("Squarebot: infinite inventory on/off", state.infiniteInventory ? "on" : "off");
      if (carryInput !== null) {
        const value = carryInput.trim().toLowerCase();
        if (["on", "1", "true", "yes", "y"].includes(value)) {
          state.infiniteInventory = true;
        } else if (["off", "0", "false", "no", "n"].includes(value)) {
          state.infiniteInventory = false;
        }
      }

      updateHud();
    }

    async function initMultiplayer() {
      try {
        logEvent("initMultiplayer:start", {
          projectId: firebaseConfig.projectId,
          firestore: "enabled",
          rtdbUrl: realtimeDatabaseUrl
        });
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        await signInAnonymously(auth);
        db = getFirestore(app);
        firebaseReady = true;
        state.mpStatus = "ready";
        logEvent("initMultiplayer:ready", {
          uid: auth.currentUser ? auth.currentUser.uid : "none",
          localPlayerId
        });
      } catch (err) {
        firebaseReady = false;
        state.mpStatus = "error";
        logEvent("initMultiplayer:error", err && err.message ? err.message : err);
        console.error(err);
      }
    }

    async function leaveLobby() {
      logEvent("leaveLobby:start", {
        hadPlayersCollection: Boolean(playersCol)
      });

      if (playersCol) {
        deleteDoc(doc(playersCol, localPlayerId)).catch((err) => {
          logEvent("leaveLobby:deleteDocError", err && err.message ? err.message : err);
        });
      }

      playersCol = null;
      mpReadInFlight = false;
      mpWriteInFlight = false;
      mpReadTimer = 0;
      mpWriteTimer = 0;
      remotePlayers.clear();
      state.mpPeers = 0;
      if (state.gameMode !== "multi") {
        state.mpStatus = firebaseReady ? "off" : "error";
      }
      logEvent("leaveLobby:done", { mpStatus: state.mpStatus });
    }

    async function pollMultiplayerRead(force) {
      if (!playersCol || state.gameMode !== "multi") {
        return;
      }
      if (mpReadInFlight) {
        return;
      }
      if (!force && mpReadTimer < mpReadInterval) {
        return;
      }

      mpReadInFlight = true;
      mpReadTimer = 0;
      try {
        const snapshot = await getDocs(playersCol);
        const nowTs = Date.now();
        const next = new Map();
        const remoteBaseIndices = new Set();
        let active = 0;
        let localPresent = false;
        let localBaseFromDoc = null;
        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          if (!data) {
            return;
          }
          if (typeof data.t === "number" && nowTs - data.t > 20000) {
            return;
          }
          active += 1;
          if (docSnap.id === localPlayerId) {
            localPresent = true;
            if (typeof data.baseIndex === "number" && data.baseIndex >= 0 && data.baseIndex < baseSlots.length) {
              localBaseFromDoc = data.baseIndex;
            }
            return;
          }
          if (typeof data.x !== "number" || typeof data.y !== "number") {
            return;
          }
          if (typeof data.baseIndex === "number" && data.baseIndex >= 0 && data.baseIndex < baseSlots.length) {
            remoteBaseIndices.add(data.baseIndex);
          }
          next.set(docSnap.id, data);
        });

        let correctedBase = state.localBaseIndex;
        if (localPresent && typeof localBaseFromDoc === "number") {
          correctedBase = localBaseFromDoc;
        }
        if (correctedBase < 0 || correctedBase >= baseSlots.length || remoteBaseIndices.has(correctedBase) || !localPresent) {
          correctedBase = pickAvailableBaseIndex(remoteBaseIndices, localPlayerId);
        }
        if (correctedBase !== state.localBaseIndex) {
          state.localBaseIndex = correctedBase;
          mpWriteTimer = mpWriteInterval;
          logEvent("mp:baseCorrected", { localBaseIndex: correctedBase });
        }

        remotePlayers.clear();
        next.forEach((v, k) => remotePlayers.set(k, v));
        state.mpPeers = Math.min(10, Math.max(1, active));
        state.mpStatus = "live";
        logEvent("mp:readPoll", { active, remotePeers: next.size, lobbyId: state.lobbyId });
      } catch (err) {
        state.mpStatus = "error";
        logEvent("mp:readPollError", err && err.message ? err.message : err);
      } finally {
        mpReadInFlight = false;
      }
    }

    async function joinLobby(lobbyId) {
      if (!firebaseReady) {
        logEvent("joinLobby:blocked", "Firebase unavailable");
        throw new Error("Firebase unavailable");
      }

      const withTimeout = (promise, ms, message) => {
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            setTimeout(() => reject(new Error(message)), ms);
          })
        ]);
      };

      const cleanedLobby = (lobbyId || "").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 30) || defaultLobbyId;
      logEvent("joinLobby:start", { requestedLobby: lobbyId, cleanedLobby });

      await leaveLobby();
      playersCol = collection(db, "rooms", cleanedLobby, "players");

      let activeCount = 0;
      let hasLocal = false;
      const usedBaseIndices = new Set();
      try {
        logEvent("joinLobby:getDocs:start", { cleanedLobby });
        const snapshot = await withTimeout(getDocs(playersCol), 3000, "Lobby read timed out");
        const now = Date.now();
        snapshot.forEach((snap) => {
          if (snap.id === localPlayerId) {
            hasLocal = true;
          }
          const data = snap.data();
          if (!data) {
            return;
          }
          if (typeof data.t === "number" && now - data.t > 20000) {
            return;
          }
          if (typeof data.baseIndex === "number" && data.baseIndex >= 0 && data.baseIndex < baseSlots.length) {
            usedBaseIndices.add(data.baseIndex);
            if (snap.id === localPlayerId) {
              state.localBaseIndex = data.baseIndex;
            }
          }
          activeCount += 1;
        });
        logEvent("joinLobby:getDocs:done", { cleanedLobby, activeCount, hasLocal });
      } catch (err) {
        logEvent("joinLobby:getDocs:warn", err && err.message ? err.message : err);
      }

      if (!hasLocal) {
        const chosen = pickAvailableBaseIndex(usedBaseIndices, localPlayerId);
        state.localBaseIndex = chosen;
      }

      if (activeCount >= 10 && !hasLocal) {
        playersCol = null;
        logEvent("joinLobby:full", { cleanedLobby, activeCount });
        throw new Error("Lobby is full (10/10)");
      }

      logEvent("joinLobby:setDoc:start", { cleanedLobby, localPlayerId });
      await withTimeout(setDoc(doc(playersCol, localPlayerId), {
        x: player.x,
        y: player.y,
        baseIndex: state.localBaseIndex,
        ownedTotal: getOwnedTotalFromStorage(state.storage),
        ownedSummary: getOwnedSummaryFromStorage(state.storage),
        speed: state.baseSpeed,
        invincible: state.invincible,
        label: state.username.slice(0, 12) || "player",
        t: Date.now()
      }, { merge: true }), 4000, "Lobby write timed out");
      logEvent("joinLobby:setDoc:done", { cleanedLobby, localPlayerId });

      state.lobbyId = cleanedLobby;
      state.mpStatus = "live";
      mpReadTimer = mpReadInterval;
      mpWriteTimer = 0;
      await pollMultiplayerRead(true);
      logEvent("joinLobby:done", { lobbyId: cleanedLobby, mpStatus: state.mpStatus });
    }

    function normalizeUsername(name) {
      const trimmed = (name || "").trim();
      if (!trimmed) {
        return "player";
      }
      return trimmed.replace(/\s+/g, " ").slice(0, 16);
    }

    function showMainMenu(errorText) {
      const errorLine = errorText ? "<div style='color:#ff9a9a;margin-top:8px;'>" + errorText + "</div>" : "";
      overlay.innerHTML = "";

      const box = document.createElement("div");

        "<div class='menu-card'>" +

        "<label>Lobby<select id='menuLobbyType' style='width:100%; margin-top:4px;'><option value='default'>Default Lobby</option><option value='custom'>Custom Lobby</option></select></label>" +
        "<label id='customLobbyWrap' style='display:none;'>Custom Lobby ID<input id='customLobbyInput' maxlength='30' placeholder='type lobby id' style='width:100%; margin-top:4px;'/></label>" +
        "<label>Username<input id='menuUsername' maxlength='16' placeholder='your name' style='width:100%; margin-top:4px;'/></label>" +
        "<label id='passwordWrap' style='display:none;'>Password<input id='menuPassword' type='password' maxlength='8' placeholder='required for protected names' style='width:100%; margin-top:4px;'/></label>" +
        "</div>" +
        errorLine +
        "<div id='menuStatus' style='min-height:1.2em;color:#cfcfcf;margin-top:6px;'></div>" +
        "<div style='margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;'><button id='menuStartSingleBtn' type='button'>Start Singleplayer</button><button id='menuStartMultiBtn' type='button'>Start Multiplayer</button></div>" +

      overlay.appendChild(box);

      const lobbyTypeSel = document.getElementById("menuLobbyType");

      const passWrap = document.getElementById("passwordWrap");
      const passInput = document.getElementById("menuPassword");
      const menuStatus = document.getElementById("menuStatus");
      const startSingleBtn = document.getElementById("menuStartSingleBtn");
      const startMultiBtn = document.getElementById("menuStartMultiBtn");

      overlay.style.pointerEvents = "auto";

      lobbyTypeSel.addEventListener("change", () => {

        const normalized = normalizeUsername(userInput.value).toLowerCase();
        passWrap.style.display = protectedNames.has(normalized) ? "block" : "none";
      });

      async function startFromMenu(mode) {
        try {
          logEvent("menu:startClick", {
            mode,
            lobbyType: lobbyTypeSel.value,
            usernameInput: userInput.value
          });
          startSingleBtn.disabled = true;
          startMultiBtn.disabled = true;
          if (menuStatus) {
            menuStatus.textContent = mode === "multi" ? "Joining multiplayer..." : "Starting singleplayer...";
          }

          const withTimeout = (promise, ms, message) => {
            return Promise.race([
              promise,
              new Promise((_, reject) => {
                setTimeout(() => reject(new Error(message)), ms);
              })
            ]);
          };

          const username = normalizeUsername(userInput.value);
          const protectedName = protectedNames.has(username.toLowerCase());
          if (protectedName && (passInput.value || "").trim() !== "g") {
            logEvent("menu:blockedProtectedName", { username });
            showMainMenu("Protected username requires password: g");
            return;
          }

          state.username = username;
          state.gameMode = mode;

          if (mode === "single") {
            leaveLobby().catch(() => {});
            state.lobbyId = "";
            state.mpStatus = firebaseReady ? "off" : "error";
            state.mpPeers = 0;
            logEvent("menu:startSingle", { mpStatus: state.mpStatus });
          } else {
            if (firebaseInitPromise) {
              await firebaseInitPromise;
            }
            if (!firebaseReady) {
              logEvent("menu:multiplayerUnavailable", "Firebase anonymous sign-in failed");
              showMainMenu("Multiplayer unavailable. Firebase anonymous sign-in failed.");
              return;
            }

            const chosenLobby = lobbyTypeSel.value === "custom"
              ? normalizeUsername(customLobbyInput.value).replace(/\s+/g, "-").toLowerCase()
              : defaultLobbyId;

            await withTimeout(joinLobby(chosenLobby), 8000, "Multiplayer timed out. Check internet/Firebase and try again.");
            logEvent("menu:startMulti", { chosenLobby });
          }

          resetGame();
          state.running = true;
          clearOverlay();
          updateHud();
          logEvent("menu:startSuccess", { mode: state.gameMode });
        } catch (err) {
          logEvent("menu:startError", err && err.message ? err.message : err);

      }

      startSingleBtn.addEventListener("click", () => {

      });

      startMultiBtn.addEventListener("click", () => {
        startFromMenu("multi");
      });

      lobbyTypeSel.dispatchEvent(new Event("change"));
    }

    function syncMultiplayer(dt) {
      if (!playersCol || state.gameMode !== "multi") {
        return;
      }

      mpReadTimer += dt;
      mpWriteTimer += dt;
      if (mpReadTimer >= mpReadInterval) {
        pollMultiplayerRead(false);
      }
      if (mpWriteInFlight || mpWriteTimer < mpWriteInterval) {
        return;
      }
      mpWriteInFlight = true;
      mpWriteTimer = 0;

      const payload = {
        x: player.x,
        y: player.y,
        baseIndex: state.localBaseIndex,
        ownedTotal: getOwnedTotalFromStorage(state.storage),
        ownedSummary: getOwnedSummaryFromStorage(state.storage),
        speed: state.baseSpeed,
        invincible: state.invincible,
        label: localPlayerId.slice(0, 4),
        t: Date.now()
      };

      payload.label = state.username.slice(0, 12) || "player";

      setDoc(doc(playersCol, localPlayerId), payload, { merge: true }).catch(() => {
        state.mpStatus = "error";
        logEvent("syncMultiplayer:setDocError", { lobbyId: state.lobbyId });
      }).finally(() => {
        mpWriteInFlight = false;
      });
    }

    function regenerateSquares(dt) {
      state.regenTimer += dt;
      if (state.regenTimer < state.regenInterval) {
        return;
      }
      state.regenTimer = 0;

      const delivered = brainrots.filter((b) => b.delivered && !b.carried);
      if (delivered.length === 0) {
        return;
      }

      const respawnCount = Math.min(3, delivered.length);
      for (let i = 0; i < respawnCount; i += 1) {
        const idx = Math.floor(Math.random() * delivered.length);
        const sq = delivered.splice(idx, 1)[0];
        if (!sq) {
          continue;
        }
        const zone = zones[Math.floor(Math.random() * zones.length)];
        sq.delivered = false;
        sq.carried = false;
        sq.rarity = pickRarity(zone.level);
        sq.x = 90 + Math.random() * (world.w - 180);
        sq.y = zone.dangerTop + 38 + Math.random() * (zone.length - 76);
      }
    }

    function movePlayer(dt) {
      let dx = 0;
      let dy = 0;

      if (state.keys.has("w") || state.keys.has("arrowup") || state.touch.up) dy -= 1;
      if (state.keys.has("s") || state.keys.has("arrowdown") || state.touch.down) dy += 1;
      if (state.keys.has("a") || state.keys.has("arrowleft") || state.touch.left) dx -= 1;
      if (state.keys.has("d") || state.keys.has("arrowright") || state.touch.right) dx += 1;

      const mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      const speed = state.baseSpeed;
      player.x += dx * speed * dt;
      player.y += dy * speed * dt;

      const half = player.size * 0.5;
      player.x = Math.max(half, Math.min(world.w - half, player.x));
      player.y = Math.max(half, Math.min(world.h - half, player.y));
    }

    function updateCarrier() {
      const carryLimit = state.infiniteInventory ? Number.MAX_SAFE_INTEGER : state.maxCarry;
      if (state.carryIds.length < carryLimit) {
        for (const b of brainrots) {
          if (b.delivered || b.carried) continue;
          const px0 = player.x - player.size * 0.5;
          const py0 = player.y - player.size * 0.5;
          const bx0 = b.x - b.size * 0.5;
          const by0 = b.y - b.size * 0.5;
          const overlap = px0 < bx0 + b.size && px0 + player.size > bx0 && py0 < by0 + b.size && py0 + player.size > by0;
          if (overlap) {
            state.carryIds.push(b.id);
            b.carried = true;
              if (state.carryIds.length >= carryLimit) {
              break;
            }
          }
        }
      }

      const localBaseSlot = baseSlots[Math.max(0, Math.min(baseSlots.length - 1, state.localBaseIndex || 0))];
      const dropPad = {
        x: localBaseSlot.x + 10,
        y: localBaseSlot.y + 24,
        w: localBaseSlot.w - 20,
        h: localBaseSlot.h - 34
      };
      const inStorage =
        player.x >= dropPad.x &&
        player.x <= dropPad.x + dropPad.w &&
        player.y >= dropPad.y &&
        player.y <= dropPad.y + dropPad.h;

      const nextCarryIds = [];
      let carryIndex = 0;
      for (const id of state.carryIds) {
        const carried = brainrots.find((b) => b.id === id);
        if (!carried || carried.delivered) {
          continue;
        }

        const col = carryIndex % 3;
        const row = Math.floor(carryIndex / 3);
        carried.x = player.x + 20 + col * 14;
        carried.y = player.y + (row - 1) * 14;
        carryIndex += 1;

        if (inStorage && player.y >= world.baseTop) {
          carried.carried = false;
          carried.delivered = true;
          state.storage[carried.rarity.key] += 1;
          state.incomePerSecond += carried.rarity.cps;
          state.coins += carried.rarity.cps * 2;
        } else {
          nextCarryIds.push(id);
        }
      }

      state.carryIds = nextCarryIds;
    }

    function updateWaves(dt) {
      state.waveTimer += dt;
      if (state.waveTimer >= state.waveInterval) {
        state.waveTimer -= state.waveInterval;
        spawnWave();
      }

      for (const wave of state.waves) {
        wave.y += wave.speed * dt;
      }
      state.waves = state.waves.filter((wave) => wave.y < world.h + 120);

      if (isWaveSafe(player.y)) {
        return;
      }

      if (state.invincible) {
        return;
      }

      for (const wave of state.waves) {
        if (Math.abs(wave.y - player.y) <= player.size * 0.5 + 2) {
          state.gameOver = true;
          state.running = false;
          state.message = "A square wave got you. Restart and use safe zones between levels.";
          showOverlay(state.message);
          break;
        }
      }
    }

    function updateEconomy(dt) {
      state.coins += state.incomePerSecond * dt;
    }

    function updateHud() {
      const info = getZoneInfo(player.y);
      let zoneText = "Squares Zone: Base";
      if (info.type === "danger") {
        zoneText = "Squares Zone: L" + info.zone.level + " " + info.zone.name;
      } else if (info.type === "safe") {
        zoneText = "Squares Zone: " + info.label;
      } else if (info.type === "top") {
        zoneText = "Squares Zone: Top";
      }
      zoneTag.textContent = zoneText;

      let nearest = Infinity;
      for (const wave of state.waves) {
        const d = player.y - wave.y;
        if (d >= 0 && d < nearest) nearest = d;
      }
      if (!Number.isFinite(nearest)) {
        const estWaveSpeed = 150 + state.highestUnlocked * 4;
        const fallback = player.y + (state.waveInterval - state.waveTimer) * estWaveSpeed;
        nearest = Math.max(0, fallback);
      }
      waveTag.textContent = "Next Square Wave: " + nearest.toFixed(0) + "m";

      speedTag.textContent = "Square Speed: " + state.baseSpeed;
      godTag.textContent = "God: " + (state.invincible ? "ON" : "OFF");
      coinTag.textContent = "Square Coins: " + state.coins.toFixed(0);
      incomeTag.textContent = "Square Income: " + state.incomePerSecond.toFixed(1) + "/s";

      if (state.carryIds.length === 0) {
        carryTag.textContent = "Carry: none";
      } else {
        carryTag.textContent = "Carry: " + state.carryIds.length + "/" + (state.infiniteInventory ? "INF" : state.maxCarry);
      }

      storageSummaryTag.textContent =
        "Square Storage " + rarityDefs.map((r) => r.label.slice(0, 2).toUpperCase() + state.storage[r.key]).join(" ");
      ratesTag.textContent =
        "Square Rates " + rarityDefs.map((r) => r.label.slice(0, 2).toUpperCase() + r.cps).join(" ");

      if (state.gameMode === "multi") {
        mpTag.textContent = "MP: " + state.mpStatus + " " + state.mpPeers + "/10" + (state.lobbyId ? " " + state.lobbyId : "");
      } else {
        mpTag.textContent = "MP: off";
      }

      upgradeBtn.textContent = "Upgrade Square Speed (" + state.speedUpgradeCost + ")";
      upgradeBtn.disabled = state.coins < state.speedUpgradeCost || !state.running;
    }

    function updateCamera() {
      const vw = canvas.clientWidth;
      const vh = canvas.clientHeight;
      camera.x = Math.max(0, Math.min(world.w - vw, player.x - vw * 0.5));
      camera.y = Math.max(0, Math.min(world.h - vh, player.y - vh * 0.55));
    }

    function drawCube(x, y, size, fillColor, edgeColor) {
      const half = size * 0.5;
      const depth = Math.max(6, size * 0.45);
      const ox = Math.cos(camControl.yaw) * depth;
      const oy = Math.sin(camControl.yaw) * depth * 0.45 - depth * 0.7;

      const base = {
        tl: { x: x - half, y: y - half },
        tr: { x: x + half, y: y - half },
        br: { x: x + half, y: y + half },
        bl: { x: x - half, y: y + half }
      };

      const top = {
        tl: { x: base.tl.x - ox, y: base.tl.y - oy },
        tr: { x: base.tr.x - ox, y: base.tr.y - oy },
        br: { x: base.br.x - ox, y: base.br.y - oy },
        bl: { x: base.bl.x - ox, y: base.bl.y - oy }
      };

      ctx.fillStyle = fillColor;
      ctx.fillRect(base.tl.x, base.tl.y, size, size);

      ctx.fillStyle = "rgba(255,255,255,0.20)";
      ctx.beginPath();
      ctx.moveTo(top.tl.x, top.tl.y);
      ctx.lineTo(top.tr.x, top.tr.y);
      ctx.lineTo(base.tr.x, base.tr.y);
      ctx.lineTo(base.tl.x, base.tl.y);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.moveTo(base.tr.x, base.tr.y);
      ctx.lineTo(top.tr.x, top.tr.y);
      ctx.lineTo(top.br.x, top.br.y);
      ctx.lineTo(base.br.x, base.br.y);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = edgeColor;
      ctx.lineWidth = 2;
      ctx.strokeRect(base.tl.x, base.tl.y, size, size);
    }

    function drawWorld() {
      const vw = canvas.clientWidth;
      const vh = canvas.clientHeight;
      ctx.clearRect(0, 0, vw, vh);

      ctx.fillStyle = "#0f0f0f";
      ctx.fillRect(0, 0, vw, vh);

      ctx.save();
      if (state.view3D) {
        ctx.translate(vw * 0.5, vh * 0.55);
        ctx.scale(camControl.zoom, camControl.zoom);
        ctx.rotate(-camControl.yaw);
        ctx.translate(-player.x, -player.y);
      } else {
        ctx.translate(-camera.x, -camera.y);
      }

      const drawWidth = Math.max(world.w, camera.x + vw + 2);

      ctx.fillStyle = "#1b1b1b";
      ctx.fillRect(0, 0, drawWidth, world.h);

      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect(0, world.baseTop, drawWidth, baseHeight);

      ctx.strokeStyle = "#3d3d3d";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, world.baseTop);
      ctx.lineTo(drawWidth, world.baseTop);
      ctx.stroke();

      for (const zone of zones) {
        ctx.fillStyle = zone.level % 2 === 0 ? "#222" : "#262626";
        ctx.fillRect(0, zone.dangerTop, drawWidth, zone.length);

        ctx.fillStyle = "#203020";
        ctx.fillRect(0, zone.safeTop, drawWidth, safeHeight);

        ctx.fillStyle = "#d7d7d7";
        ctx.font = "14px Arial";
        ctx.textAlign = "left";
        ctx.fillText("L" + zone.level + " " + zone.name + " (" + zone.length + "m)", 10, zone.dangerTop + 18);
        ctx.fillText("SAFE", 10, zone.safeTop + 18);
      }

      ctx.fillStyle = "#26323b";
      ctx.fillRect(world.w * 0.5 - 190, world.baseTop + 8, 380, 24);
      ctx.strokeStyle = "#6fa7dd";
      ctx.lineWidth = 1;
      ctx.strokeRect(world.w * 0.5 - 190, world.baseTop + 8, 380, 24);
      ctx.fillStyle = "#dcecff";
      ctx.textAlign = "center";
      ctx.font = "12px Arial";
      ctx.fillText("BASE DISTRICT - DROP CARRIED SQUARES IN YOUR OWN BASE", world.w * 0.5, world.baseTop + 24);

      const baseInfos = getBaseInfos();
      for (let i = 0; i < baseSlots.length; i += 1) {
        const slot = baseSlots[i];
        const owner = baseInfos[i].owner;
        const claimed = owner.length > 0;
        const isMine = i === state.localBaseIndex;

        ctx.fillStyle = isMine ? "#30424e" : claimed ? "#2a3038" : "#242424";
        ctx.fillRect(slot.x, slot.y, slot.w, slot.h);
        ctx.strokeStyle = isMine ? "#9fe9ff" : claimed ? "#84b7ff" : "#666";
        ctx.lineWidth = 2;
        ctx.strokeRect(slot.x, slot.y, slot.w, slot.h);

        ctx.fillStyle = isMine ? "rgba(164,235,255,0.18)" : "rgba(255,255,255,0.05)";
        ctx.fillRect(slot.x + 10, slot.y + 24, slot.w - 20, slot.h - 34);

        ctx.fillStyle = "#e8e8e8";
        ctx.textAlign = "center";
        ctx.font = "12px Arial";
        const label = claimed ? owner + "'s base" : "Not claimed";
        ctx.fillText(label, slot.x + slot.w * 0.5, slot.y + slot.h * 0.52);

        ctx.fillStyle = "#bdbdbd";
        ctx.font = "10px Arial";
        ctx.fillText("Base " + slot.index, slot.x + slot.w * 0.5, slot.y + 16);

        if (claimed) {
          ctx.fillStyle = "#9ec7df";
          ctx.font = "10px Arial";
          ctx.fillText("Owns " + baseInfos[i].ownedTotal, slot.x + slot.w * 0.5, slot.y + slot.h - 8);
        }

        const nearPad = 22;
        const nearBase =
          player.x >= slot.x - nearPad &&
          player.x <= slot.x + slot.w + nearPad &&
          player.y >= slot.y - nearPad &&
          player.y <= slot.y + slot.h + nearPad;
        if (nearBase) {
          ctx.fillStyle = "#d8f4ff";
          ctx.font = "11px Arial";
          ctx.fillText("Press E to inspect", slot.x + slot.w * 0.5, slot.y - 8);
        }
      }

      for (const sq of ambientSquares) {
        ctx.fillStyle = "rgb(" + sq.shade + "," + sq.shade + "," + sq.shade + ")";
        ctx.fillRect(sq.x - sq.size * 0.5, sq.y - sq.size * 0.5, sq.size, sq.size);
      }

      for (const b of brainrots) {
        if (b.delivered) continue;
        ctx.fillStyle = b.rarity.color;
        ctx.fillRect(b.x - b.size * 0.5, b.y - b.size * 0.5, b.size, b.size);
        ctx.fillStyle = "#111";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText(b.label, b.x, b.y + 3);
      }

      if (state.squarebotUnlocked) {
        ctx.fillStyle = isNearTextbot() ? "#8cd" : "#252525";
        ctx.fillRect(textbot.x - textbot.size * 0.5, textbot.y - textbot.size * 0.5, textbot.size, textbot.size);
        if (isNearTextbot()) {
          ctx.fillStyle = "#cfeeff";
          ctx.font = "12px Arial";
          ctx.textAlign = "center";
          ctx.fillText("SQUAREBOT [T]", textbot.x, textbot.y - 14);
        }
      }

      for (const wave of state.waves) {
        ctx.strokeStyle = "#9fd3ff";
        ctx.lineWidth = wave.width || 3;
        ctx.beginPath();
        ctx.moveTo(0, wave.y);
        ctx.lineTo(drawWidth, wave.y);
        ctx.stroke();
      }

      if (state.view3D) {
        drawCube(player.x, player.y, player.size, "#f3f3f3", "#111");
      } else {
        ctx.fillStyle = "#f3f3f3";
        ctx.fillRect(player.x - player.size * 0.5, player.y - player.size * 0.5, player.size, player.size);
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 2;
        ctx.strokeRect(player.x - player.size * 0.5, player.y - player.size * 0.5, player.size, player.size);
      }

      remotePlayers.forEach((rp, id) => {
        if (state.view3D) {
          drawCube(rp.x, rp.y, player.size, "#80d8ff", "#143b4b");
        } else {
          ctx.fillStyle = "#80d8ff";
          ctx.fillRect(rp.x - player.size * 0.5, rp.y - player.size * 0.5, player.size, player.size);
          ctx.strokeStyle = "#143b4b";
          ctx.lineWidth = 2;
          ctx.strokeRect(rp.x - player.size * 0.5, rp.y - player.size * 0.5, player.size, player.size);
        }
        ctx.fillStyle = "#bfefff";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText((rp.label || id.slice(0, 4)).toUpperCase(), rp.x, rp.y - 10);
      });

      ctx.restore();
    }

    function showOverlay(text, options) {
      const opts = options || {};
      overlay.innerHTML = "";
      overlay.style.pointerEvents = "auto";
      const box = document.createElement("div");
      box.className = "msg";
      if (opts.start) {
        box.innerHTML = "<div>" + text + "</div><div style='margin-top:8px;'><button id='startRunBtn' type='button'>Start Run</button></div>";
      } else {
        box.innerHTML = "<div>" + text + "</div><div style='margin-top:8px;'>Press Restart Squares Run to play again.</div>";
      }
      overlay.appendChild(box);
      if (opts.start) {
        const startRunBtn = document.getElementById("startRunBtn");
        if (startRunBtn) {
          startRunBtn.addEventListener("click", () => {
            state.running = true;
            clearOverlay();
          }, { once: true });
        }
      }
    }

    function clearOverlay() {
      overlay.innerHTML = "";
      overlay.style.pointerEvents = "none";
    }

    function updateModeButton() {
      modeBtn.textContent = state.view3D
        ? "3D: ON (Zoom " + camControl.zoom.toFixed(2) + "x)"
        : "3D: OFF";
    }

    function resetGame() {
      state.running = true;
      state.gameOver = false;
      state.keys.clear();
      state.touch.up = false;
      state.touch.down = false;
      state.touch.left = false;
      state.touch.right = false;
      state.coins = 0;
      state.incomePerSecond = 0;
      state.highestUnlocked = 1;
      state.speedLevel = 1;
      state.baseSpeed = 180;
      state.speedUpgradeCost = 25;
      state.invincible = false;
      state.infiniteInventory = false;
      state.carryIds = [];
      state.waveTimer = 0;
      state.waves = [];
      state.regenTimer = 0;
      state.storage = makeStorageObject();
      camControl.zoom = 1;
      camControl.yaw = 0;
      updateModeButton();

      player.x = world.w * 0.5;
      player.y = world.h - baseHeight * 0.45;
      player.teleportLock = 0;

      spawnBrainrots();
      clearOverlay();
      updateCamera();
    }

    function update(dt) {
      if (!state.running) {
        updateHud();
        return;
      }

      updateEconomy(dt);
      regenerateSquares(dt);
      movePlayer(dt);
      updateUnlocks();
      updateCarrier();
      updateWaves(dt);
      syncMultiplayer(dt);

      const topSafe = zones[zones.length - 1].safeTop;
      if (player.y < topSafe) {
        state.running = false;
        state.message = "You escaped the tsunami for squares.";
        showOverlay(state.message);
      }

      updateCamera();
      updateHud();
    }

    let last = performance.now();
    let accumulator = 0;
    const fixedStep = 1 / 120;
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      accumulator += dt;
      let loops = 0;
      while (accumulator >= fixedStep && loops < 4) {
        update(fixedStep);
        accumulator -= fixedStep;
        loops += 1;
      }
      drawWorld();
      requestAnimationFrame(frame);
    }

    upgradeBtn.addEventListener("click", () => {
      if (!state.running) return;
      if (state.coins < state.speedUpgradeCost) return;
      state.coins -= state.speedUpgradeCost;
      state.speedLevel += 1;
      state.baseSpeed += 20;
      state.speedUpgradeCost = Math.floor(state.speedUpgradeCost * 1.6 + 5);
      updateHud();
    });

    restartBtn.addEventListener("click", resetGame);
    modeBtn.addEventListener("click", () => {
      state.view3D = !state.view3D;
      updateModeButton();
    });

    canvas.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });

    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.08 : -0.08;
      camControl.zoom = Math.max(0.6, Math.min(2.6, camControl.zoom + delta));
      updateModeButton();
    }, { passive: false });

    canvas.addEventListener("pointerdown", (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (!state.squarebotUnlocked && x >= 0 && x <= 10 && y >= rect.height - 10 && y <= rect.height) {
        state.squarebotUnlocked = true;
        logEvent("squarebot:unlocked", "bottom-left 10x10 clicked");
      }

      if (e.button !== 2) {
        return;
      }
      camControl.dragOn = true;
      camControl.lastX = e.clientX;
      camControl.lastY = e.clientY;
    });

    window.addEventListener("pointermove", (e) => {
      if (!camControl.dragOn) {
        return;
      }
      const dx = e.clientX - camControl.lastX;
      camControl.lastX = e.clientX;
      camControl.lastY = e.clientY;
      camControl.yaw += dx * 0.008;
    });

    window.addEventListener("pointerup", () => {
      camControl.dragOn = false;
    });

    window.addEventListener("keydown", (e) => {
      if (typeof e.key !== "string") {
        return;
      }
      const controls = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d", "W", "A", "S", "D"];
      if (controls.includes(e.key)) {
        e.preventDefault();
      }
      state.keys.add(e.key.toLowerCase());

      if (e.key.toLowerCase() === "t") {
        openTextbot();
      }
      if (e.key.toLowerCase() === "e") {
        openNearestBaseOwnership();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (typeof e.key !== "string") {
        return;
      }
      state.keys.delete(e.key.toLowerCase());
    });

    function setTouch(dir, on) {
      state.touch[dir] = on;
    }

    mobilePad.querySelectorAll("button[data-dir]").forEach((btn) => {
      const dir = btn.getAttribute("data-dir");
      btn.addEventListener("pointerdown", () => setTouch(dir, true));
      btn.addEventListener("pointerup", () => setTouch(dir, false));
      btn.addEventListener("pointercancel", () => setTouch(dir, false));
      btn.addEventListener("pointerleave", () => setTouch(dir, false));
    });

    window.addEventListener("resize", setCanvasSize);

    window.addEventListener("beforeunload", () => {
      if (!playersCol) {
        return;
      }
      deleteDoc(doc(playersCol, localPlayerId)).catch(() => {});
    });

    setCanvasSize();
    firebaseInitPromise = initMultiplayer();
    resetGame();
    state.running = false;
    showMainMenu();
    updateModeButton();
    restartBtn.textContent = "Restart Squares Run";
    requestAnimationFrame(frame);
  </script>
</body>
</html>
  </template>

  <div class="launcher">
    <div style="font-size:18px;font-weight:700;">Escape the Tsunami for Squares</div>
    <button id="openBtn" type="button">Open in about:blank</button>
    <div id="status"></div>
  </div>

  <script>
    (function () {
      const btn = document.getElementById("openBtn");
      const status = document.getElementById("status");
      const source = document.getElementById("gameSource");

      btn.addEventListener("click", () => {
        const win = window.open("about:blank", "_blank");
        if (!win) {
          status.textContent = "Popup blocked. Allow popups and try again.";
          return;
        }
        const html = source.innerHTML;
        win.document.open();
        win.document.write(html);
        win.document.close();
        status.textContent = "Opened in about:blank.";
      });
    })();
  </script>
</body>
</html>
