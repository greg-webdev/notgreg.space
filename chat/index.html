    <title>My Website Chat</title>
    <!-- Include Tailwind CSS CDN directly -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Optional: Basic styling for the body */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }
        /* Custom CSS for scrollbar (for better aesthetics) */
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Modal Overlay Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 0.75rem; /* rounded-xl */
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1); /* shadow-lg */
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            position: relative;
        }
        /* Video call specific styles */
        .video-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin: auto;
            background-color: #333;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: auto;
            background-color: black;
            border-radius: 0.5rem;
        }
        .video-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background-color: #222;
            border-bottom-left-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
        }
        .video-controls button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .video-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
    <!-- Import React and ReactDOM from CDN as global variables -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>

</head>
<body>
    <!-- This is the root div where your React application will be mounted -->
    <div id="root"></div>

    <script type="module">
        // ====================================================================================
        // IMPORTANT: FIREBASE CONFIGURATION
        // Your actual Firebase project's configuration, as provided by you.
        // ====================================================================================
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyAanqUBydalRrZhHeAesq9kvsoVow-ApU0",
            authDomain: "chatv1-5432a.firebaseapp.com",
            projectId: "chatv1-5432a",
            storageBucket: "chatv1-5432a.firebasestorage.app",
            messagingSenderId: "131388808210",
            appId: "1:131388808210:web:7c71c7bc57fcbba1c40ccb",
            measurementId: "G-THYHQJS7B9"
        });
        // Set __app_id to your Firebase projectId for Firestore pathing
        window.__app_id = "chatv1-5432a";
        window.__initial_auth_token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Log the Firebase config as a JSON string and then parsed object for debugging
        console.log("Firebase config string on load:", window.__firebase_config);
        let parsedFirebaseConfig;
        try {
            parsedFirebaseConfig = JSON.parse(window.__firebase_config);
            console.log("Parsed Firebase config object:", parsedFirebaseConfig);
        } catch (e) {
            console.error("Error parsing Firebase config JSON:", e);
            parsedFirebaseConfig = {}; // Ensure it's an empty object if parsing fails
        }

        // ====================================================================================
        // IMPORTANT: FIREBASE AUTHENTICATION AND FIRESTORE RULES
        // To resolve "auth/configuration-not-found" errors (Authentication setup issue)
        // and "Missing or insufficient permissions" (Firestore rules issues):
        //
        // 1. **CRITICAL: ENABLE ANONYMOUS AUTHENTICATION IN FIREBASE CONSOLE**
        //    This app now exclusively uses anonymous sign-in. If this method is not enabled,
        //    Firebase Auth will fail to initialize.
        //    Steps:
        //    a. Go to your Firebase Project Console: https://console.firebase.google.com/
        //    b. Select your project ("chatv1-5432a").
        //    c. In the left navigation bar, under "Build", click on "Authentication".
        //    d. Go to the "Sign-in method" tab.
        //    e. Find "Anonymous" in the list and click the pencil icon to edit it.
        //    f. Toggle the "Enable" button to ON.
        //    g. Click "Save".
        //
        // 2. **SET UP FIRESTORE SECURITY RULES (UPDATED FOR CHAT TABS AND CALL ROOMS)**
        //    This resolves "Missing or insufficient permissions" errors.
        //    Steps:
        //    a. Go to your Firebase Project Console: https://console.firebase.google.com/
        //    b. Select your project ("chatv1-5432a").
        //    c. In the left navigation bar, under "Build", click on "Firestore Database".
        //    d. Go to the "Rules" tab.
        //    e. **REPLACE** the existing rules with the following, then click "Publish":
        //
        //    rules_version = '2';
        //    service cloud.firestore {
        //      match /databases/{database}/documents {
        //        // Rules for chat messages within specific chat tabs
        //        // {chatName} will be 'main', 'games', or 'memes'
        //        match /artifacts/{appId}/public/data/chats/{chatName}/messages/{document=**} {
        //          allow read, write: if request.auth != null; // Allows any authenticated user
        //        }
        //
        //        // Rules for banned users within specific chat tabs
        //        match /artifacts/{appId}/public/data/chats/{chatName}/banned_users/{userId} {
        //          allow read: if request.auth != null; // Any authenticated user can read the banned list
        //          allow create, delete: if request.auth != null;
        //        }
        //
        //        // NEW: Rules for video call signaling data in 'call_rooms' collection
        //        // {chatName} refers to the active chat tab being used for call rooms
        //        // {roomId} is the unique ID for each active call room
        //        match /artifacts/{appId}/public/data/chat_tabs_calls/{chatName}/call_rooms/{roomId} {
        //          allow create: if request.auth != null; // Any authenticated user can create a new call room
        //          allow read, write: if request.auth != null; // Any authenticated user can read/write to a room
        //          // Only the original caller of the room can delete it
        //          allow delete: if request.auth != null && resource.data.callerId == request.auth.uid;
        //        }
        //      }
        //    }
        //    Remember to click "Publish" after making changes to your rules.
        //
        // NOTE: Firebase Storage rules are no longer needed as file upload functionality has been removed.
        // ====================================================================================


        // Import Firebase modules from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, deleteDoc, setDoc, getDoc, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";


        // Main App component for the chat application (inlined)
        function App() {
            // State variables
            const [db, setDb] = React.useState(null);
            const [auth, setAuth] = React.useState(null);
            const [userId, setUserId] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [newMessage, setNewMessage] = React.useState('');
            const [isAuthReady, setIsAuthReady] = React.useState(false);
            const [userName, setUserName] = React.useState(localStorage.getItem('chatUserName') || '');
            const [nameInput, setNameInput] = React.useState('');
            const [isAdmin, setIsAdmin] = React.useState(userName === 'admin'); // Track admin status
            const [showAdminPasswordScreen, setShowAdminPasswordScreen] = React.useState(false);
            const [bannedUsers, setBannedUsers] = React.useState([]); // State for banned user IDs
            const [showUnbanPage, setShowUnbanPage] = React.useState(false); // State for unban page visibility
            const [activeChatTab, setActiveChatTab] = React.useState(localStorage.getItem('activeChatTab') || null);

            const [isLoading, setIsLoading] = React.useState(true); // Loading state

            // Video call states
            const [localStream, setLocalStream] = React.useState(null);
            const [remoteStream, setRemoteStream] = React.useState(null);
            const [peerConnection, setPeerConnection] = React.useState(null);
            const [inCall, setInCall] = React.useState(false); // True if a call is active (connecting or connected)
            const [callInitiated, setCallInitiated] = React.useState(false); // True if *this user* initiated the call
            const [callOfferReceived, setCallOfferReceived] = React.useState(false); // True if an offer is waiting to be answered
            const [isVideoEnabled, setIsVideoEnabled] = React.useState(true); // State for video toggle

            // NEW: State for call rooms in the waiting area
            const [activeCallRooms, setActiveCallRooms] = React.useState([]);
            const [currentRoomId, setCurrentRoomId] = React.useState(null); // The ID of the room the user is currently in

            // Helper function to build correct Firestore path for call rooms collection
            const getChatTabCallRoomsCollectionPath = React.useCallback((appId, chatName) => {
                // Returns a string path for the 'call_rooms' collection within a specific chat tab.
                // Example: artifacts/chatv1-5432a/public/data/chat_tabs_calls/main/call_rooms
                return `artifacts/${appId}/public/data/chat_tabs_calls/${chatName}/call_rooms`;
            }, []);


            // Initialize Firebase and handle authentication
            React.useEffect(() => {
                try {
                    const app = initializeApp(parsedFirebaseConfig);
                    const firestoreDb = getFirestore(app);
                    const firebaseAuth = getAuth(app);

                    setDb(firestoreDb);
                    setAuth(firebaseAuth);

                    signInAnonymously(firebaseAuth)
                        .then((userCredential) => {
                            console.log("Signed in anonymously:", userCredential.user.uid);
                        })
                        .catch(error => {
                            console.error("Error signing in anonymously:", error);
                            setIsLoading(false);
                        });

                    const unsubscribeAuth = onAuthStateChanged(firebaseAuth, (user) => {
                        if (user) {
                            setUserId(user.uid);
                        } else {
                            setUserId(crypto.randomUUID());
                        }
                        setIsAuthReady(true);
                        setIsLoading(false);
                        console.log("Auth state changed: User ID:", user?.uid || 'anonymous', "isAuthReady:", true);
                    });

                    return () => unsubscribeAuth();
                } catch (error) {
                    console.error("Failed to initialize Firebase app or auth:", error);
                    setIsLoading(false);
                }
            }, []);

            // Set up real-time listener for messages from Firestore (depends on activeChatTab)
            React.useEffect(() => {
                if (db && isAuthReady && activeChatTab) {
                    const chatCollectionRef = collection(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/messages`);
                    const q = query(chatCollectionRef);

                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        let fetchedMessages = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        fetchedMessages = fetchedMessages.filter(msg => !bannedUsers.includes(msg.userId));
                        fetchedMessages.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
                        setMessages(fetchedMessages);
                    }, (error) => {
                        console.error("Error fetching messages:", error);
                    });

                    return () => unsubscribe();
                } else {
                    setMessages([]);
                }
            }, [db, isAuthReady, bannedUsers, activeChatTab]);

            // Set up real-time listener for banned users from Firestore (depends on activeChatTab)
            React.useEffect(() => {
                if (db && isAuthReady && activeChatTab) {
                    const bannedUsersCollectionRef = collection(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/banned_users`);
                    const q = query(bannedUsersCollectionRef);

                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const fetchedBannedUsers = snapshot.docs.map(doc => doc.id);
                        setBannedUsers(fetchedBannedUsers);
                        console.log("Fetched Banned Users:", fetchedBannedUsers);
                    }, (error) => {
                        console.error("Error fetching banned users:", error);
                    });

                    return () => unsubscribe();
                } else {
                    setBannedUsers([]);
                }
            }, [db, isAuthReady, activeChatTab]);

            // NEW: Effect for listening to active call rooms in the current chat tab
            React.useEffect(() => {
                if (!db || !isAuthReady || !activeChatTab) {
                    setActiveCallRooms([]);
                    return;
                }

                const callRoomsCollectionPath = getChatTabCallRoomsCollectionPath(window.__app_id, activeChatTab);
                const callRoomsCollectionRef = collection(db, callRoomsCollectionPath);
                const q = query(callRoomsCollectionRef);

                const unsubscribeCallRooms = onSnapshot(q, (snapshot) => {
                    const fetchedRooms = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setActiveCallRooms(fetchedRooms);
                    console.log("Fetched Active Call Rooms:", fetchedRooms);

                    // Check for an incoming offer for this user (only if not already in a call)
                    const incomingOffer = fetchedRooms.find(room =>
                        room.offer && !room.answer && room.callerId !== userId && !room.answererId && !inCall
                    );
                    setCallOfferReceived(!!incomingOffer);

                    // If we are currently in a call and our room has been deleted by other party
                    if (inCall && currentRoomId) {
                         const currentRoomStillExists = fetchedRooms.some(room => room.id === currentRoomId);
                         if (!currentRoomStillExists) {
                             console.log("Current call room removed by other party. Ending call.");
                             endCall(false); // End call, but don't delete doc again
                         }
                    }

                }, (error) => {
                    console.error("Error listening to active call rooms:", error);
                });

                return () => unsubscribeCallRooms();
            }, [db, isAuthReady, activeChatTab, userId, inCall, currentRoomId, getChatTabCallRoomsCollectionPath]);


            // Effect for WebRTC signaling via Firestore for the *current* call room
            React.useEffect(() => {
                if (!db || !isAuthReady || !activeChatTab || !userId || !currentRoomId) return;

                const callRoomsCollectionPath = getChatTabCallRoomsCollectionPath(window.__app_id, activeChatTab);
                const callDocRef = doc(collection(db, callRoomsCollectionPath), currentRoomId);

                const unsubscribeCurrentCallSignaling = onSnapshot(callDocRef, async (snapshot) => {
                    const callData = snapshot.data();
                    if (!callData) {
                        // Call document deleted while we are in it
                        if (inCall) {
                            console.log("Current call document deleted. Ending call.");
                            endCall(false); // End call, but don't delete doc again as other side did it
                        }
                        return;
                    }

                    // Process answer if we initiated the call and are waiting for an answer
                    if (callData.answer && callData.answer.type === 'answer' && peerConnection && peerConnection.remoteDescription?.type !== 'answer' && callData.answererId !== userId) {
                        try {
                            console.log("Attempting to set remote description from answer.");
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.answer));
                            setInCall(true); // Call is now connected
                            console.log("Call answer received and set.");
                        } catch (e) {
                            console.error("Error setting remote description from answer:", e.name, e.message, e.stack);
                        }
                    }

                    // Process ICE candidates
                    if (callData.iceCandidates && peerConnection) {
                        for (const candidate of callData.iceCandidates) {
                            // Ensure candidate is from the other peer and has not been added yet (basic check)
                            // Note: This basic check prevents re-adding but might not be fully robust for all scenarios.
                            if (candidate.senderId !== userId && !peerConnection.remoteDescription?.candidates?.some(c => c.candidate === candidate.candidate.candidate)) {
                                const iceCandidate = new RTCIceCandidate(candidate.candidate);
                                try {
                                    await peerConnection.addIceCandidate(iceCandidate);
                                    console.log("Added ICE candidate:", iceCandidate);
                                } catch (e) {
                                    console.error("Error adding ICE candidate:", e.name, e.message, e.stack);
                                }
                            }
                        }
                    }
                }, (error) => {
                    console.error("Error listening to current call signaling:", error.name, error.message, error.stack);
                });

                return () => unsubscribeCurrentCallSignaling();
            }, [db, isAuthReady, activeChatTab, userId, currentRoomId, peerConnection, inCall, getChatTabCallRoomsCollectionPath]); // Dependencies for signaling effect

            // Function to send a new message
            const sendMessage = async () => {
                if (bannedUsers.includes(userId)) {
                    alert('You are banned from sending messages in this chat.');
                    setNewMessage('');
                    return;
                }
                if (inCall) { // Disable chat input if in call
                    alert('Please end the video call to send chat messages.');
                    return;
                }

                if (newMessage.trim() === '' || !db || !userId || !activeChatTab) return;

                try {
                    await addDoc(collection(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/messages`), {
                        text: newMessage,
                        userId: userId,
                        userName: userName || 'Anonymous',
                        timestamp: serverTimestamp()
                    });
                    setNewMessage('');
                } catch (error) {
                    console.error("Error sending message:", error);
                }
            };

            // NEW: Function to create a new call room
            const createCall = async () => {
                if (!db || !isAuthReady || !userId || !activeChatTab) {
                    console.error("Cannot create call: Firebase not ready or tab not selected.");
                    return;
                }
                if (bannedUsers.includes(userId)) {
                    alert('You are banned from creating calls in this chat.');
                    return;
                }
                if (inCall) {
                    console.warn("Already in a call. Cannot create a new one.");
                    return;
                }

                setCallInitiated(true); // Indicate this user is initiating
                const newRoomId = crypto.randomUUID();
                setCurrentRoomId(newRoomId); // Set the room ID this user is creating/joining
                console.log("createCall: Attempting to get user media. Video Enabled:", isVideoEnabled);

                let stream;
                let pc;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: isVideoEnabled, audio: true });
                    console.log("createCall: Local stream obtained successfully.");
                    setLocalStream(stream);

                    pc = new RTCPeerConnection({
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' }, // Google's public STUN server
                        ]
                    });
                    console.log("createCall: RTCPeerConnection created.");
                    setPeerConnection(pc);

                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                    console.log("createCall: Local tracks added to peer connection.");

                    pc.ontrack = (event) => {
                        if (event.streams && event.streams[0]) {
                            console.log("createCall: Remote stream received:", event.streams[0]);
                            setRemoteStream(event.streams[0]);
                        } else {
                            console.warn("createCall: ontrack event fired without streams[0].", event);
                        }
                    };

                    const callRoomsCollectionPath = getChatTabCallRoomsCollectionPath(window.__app_id, activeChatTab);
                    const callRoomsCollection = collection(db, callRoomsCollectionPath);
                    const callDocRef = doc(callRoomsCollection, newRoomId);

                    pc.onicecandidate = async (event) => {
                        if (event.candidate) {
                            console.log("createCall: New ICE candidate generated:", event.candidate);
                            try {
                                const currentCallDoc = (await getDoc(callDocRef)).data();
                                const currentCandidates = currentCallDoc?.iceCandidates || [];
                                await setDoc(callDocRef, {
                                    iceCandidates: [...currentCandidates, { candidate: event.candidate.toJSON(), senderId: userId }]
                                }, { merge: true });
                                console.log("createCall: Sent ICE candidate to Firestore.");
                            } catch (e) {
                                console.error("createCall: Error sending ICE candidate to Firestore:", e.name, e.message, e.stack);
                            }
                        } else {
                            console.log("createCall: ICE gathering complete.");
                        }
                    };

                    console.log("createCall: Creating SDP offer...");
                    const offer = await pc.createOffer();
                    console.log("createCall: SDP offer created.");
                    await pc.setLocalDescription(offer);
                    console.log("createCall: Local description set (offer).");

                    setInCall(true); // Now that local stream is ready and offer is being sent

                    await setDoc(callDocRef, {
                        offer: offer,
                        callerId: userId,
                        callerName: userName || 'Anonymous', // Store caller's name
                        answer: null,
                        answererId: null,
                        iceCandidates: [],
                        createdAt: serverTimestamp(),
                        isVideoCall: isVideoEnabled
                    });
                    console.log(`createCall: Call room ${newRoomId} created and offer sent to Firestore.`);

                } catch (error) {
                    console.error("createCall: Error during call process:", error.name, error.message, error.stack);
                    alert(`Failed to create video call: ${error.name || 'Error'}. Please check your console for more details and ensure camera/mic permissions are granted.`);
                    // Clean up if an error occurs during initiation
                    if (stream) stream.getTracks().forEach(track => track.stop());
                    if (pc) pc.close();
                    setLocalStream(null);
                    setRemoteStream(null);
                    setPeerConnection(null);
                    setInCall(false);
                    setCallInitiated(false);
                    setCurrentRoomId(null); // Clear room ID
                    // Attempt to clean up call room document in Firestore if it was partially created
                    if (db && activeChatTab && newRoomId) {
                        try {
                            const callRoomsCollectionPath = getChatTabCallRoomsCollectionPath(window.__app_id, activeChatTab);
                            await deleteDoc(doc(collection(db, callRoomsCollectionPath), newRoomId));
                            console.log("createCall: Cleaned up failed call document.");
                        } catch (e) {
                            console.error("createCall: Error cleaning up failed call document:", e);
                        }
                    }
                }
            };

            // NEW: Function to join an existing call room
            const joinCall = async (roomId, offerData) => {
                if (!db || !isAuthReady || !userId || !activeChatTab) {
                    console.error("joinCall: Cannot join call: Firebase not ready or tab not selected.");
                    return;
                }
                if (bannedUsers.includes(userId)) {
                    alert('You are banned from joining calls in this chat.');
                    return;
                }
                if (inCall) {
                    console.warn("joinCall: Already in a call. Cannot join another.");
                    return;
                }

                setCurrentRoomId(roomId); // Set the room ID this user is joining
                setInCall(true); // Show video UI
                console.log(`joinCall: Attempting to join room ${roomId}. Video Enabled:`, isVideoEnabled);

                let stream;
                let pc;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: isVideoEnabled, audio: true });
                    console.log("joinCall: Local stream obtained for joining call.");
                    setLocalStream(stream);

                    pc = new RTCPeerConnection({
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                        ]
                    });
                    console.log("joinCall: RTCPeerConnection created for joining.");
                    setPeerConnection(pc);

                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                    console.log("joinCall: Local tracks added to peer connection for joining.");

                    pc.ontrack = (event) => {
                        if (event.streams && event.streams[0]) {
                            console.log("joinCall: Remote stream received:", event.streams[0]);
                            setRemoteStream(event.streams[0]);
                        } else {
                            console.warn("joinCall: ontrack event fired without streams[0].", event);
                        }
                    };

                    const callRoomsCollectionPath = getChatTabCallRoomsCollectionPath(window.__app_id, activeChatTab);
                    const callDocRef = doc(collection(db, callRoomsCollectionPath), roomId);

                    pc.onicecandidate = async (event) => {
                        if (event.candidate) {
                            console.log("joinCall: New ICE candidate generated:", event.candidate);
                            try {
                                const currentCallDoc = (await getDoc(callDocRef)).data();
                                const currentCandidates = currentCallDoc?.iceCandidates || [];
                                await setDoc(callDocRef, {
                                    iceCandidates: [...currentCandidates, { candidate: event.candidate.toJSON(), senderId: userId }]
                                }, { merge: true });
                                console.log("joinCall: Sent ICE candidate to Firestore.");
                            } catch (e) {
                                console.error("joinCall: Error sending ICE candidate to Firestore:", e.name, e.message, e.stack);
                            }
                        } else {
                            console.log("joinCall: ICE gathering complete.");
                        }
                    };

                    console.log("joinCall: Setting remote description from offer received from room data.");
                    await pc.setRemoteDescription(new RTCSessionDescription(offerData)); // Use the offer passed from the room list
                    console.log("joinCall: Remote description set from offer.");

                    console.log("joinCall: Creating SDP answer...");
                    const answer = await pc.createAnswer();
                    console.log("joinCall: SDP answer created.");
                    await pc.setLocalDescription(answer);

                            className: "ml-3 px-6 py-3 bg-purple-600 text-white font-semibold rounded-xl shadow-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 transition duration-200"
                        },
                        "Unban Users"
                    )
                )
            );
        }

        // Render the App component into the root div
        ReactDOM.render(
            React.createElement(App, null),
            document.getElementById('root')
        );
    </script>
</body>
</html>
