<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website Chat</title>
    <!-- Include Tailwind CSS CDN directly -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Optional: Basic styling for the body */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }
        /* Custom CSS for scrollbar (for better aesthetics) */
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Modal Overlay Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 0.75rem; /* rounded-xl */
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1); /* shadow-lg */
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            position: relative;
        }
        /* Video call specific styles */
        .video-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin: auto;
            background-color: #333;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: auto;
            background-color: black;
            border-radius: 0.5rem;
        }
        .video-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background-color: #222;
            border-bottom-left-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
        }
        .video-controls button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .video-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
    <!-- Import React and ReactDOM from CDN as global variables -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
</head>
<body>
    <!-- This is the root div where your React application will be mounted -->
    <div id="root"></div>

    <script type="module">
        // ====================================================================================
        // IMPORTANT: FIREBASE CONFIGURATION
        // Your actual Firebase project's configuration, as provided by you.
        // ====================================================================================
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyAanqUBydalRrZhHeAesq9kvsoVow-ApU0",
            authDomain: "chatv1-5432a.firebaseapp.com",
            projectId: "chatv1-5432a",
            storageBucket: "chatv1-5432a.firebasestorage.app",
            messagingSenderId: "131388808210",
            appId: "1:131388808210:web:7c71c7bc57fcbba1c40ccb",
            measurementId: "G-THYHQJS7B9"
        });
        // Set __app_id to your Firebase projectId for Firestore pathing
        window.__app_id = "chatv1-5432a";
        window.__initial_auth_token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Log the Firebase config as a JSON string and then parsed object for debugging
        console.log("Firebase config string on load:", window.__firebase_config);
        let parsedFirebaseConfig;
        try {
            parsedFirebaseConfig = JSON.parse(window.__firebase_config);
            console.log("Parsed Firebase config object:", parsedFirebaseConfig);
        } catch (e) {
            console.error("Error parsing Firebase config JSON:", e);
            parsedFirebaseConfig = {}; // Ensure it's an empty object if parsing fails
        }

        // ====================================================================================
        // IMPORTANT: FIREBASE AUTHENTICATION AND FIRESTORE RULES
        // To resolve "auth/configuration-not-found" errors (Authentication setup issue)
        // and "Missing or insufficient permissions" (Firestore rules issues):
        //
        // 1. **CRITICAL: ENABLE ANONYMOUS AUTHENTICATION IN FIREBASE CONSOLE**
        //    This app now exclusively uses anonymous sign-in. If this method is not enabled,
        //    Firebase Auth will fail to initialize.
        //    Steps:
        //    a. Go to your Firebase Project Console: https://console.firebase.google.com/
        //    b. Select your project ("chatv1-5432a").
        //    c. In the left navigation bar, under "Build", click on "Authentication".
        //    d. Go to the "Sign-in method" tab.
        //    e. Find "Anonymous" in the list and click the pencil icon to edit it.
        //    f. Toggle the "Enable" button to ON.
        //    g. Click "Save".
        //
        // 2. **SET UP FIRESTORE SECURITY RULES (UPDATED FOR CHAT TABS AND CALLS)**
        //    This resolves "Missing or insufficient permissions" errors.
        //    Steps:
        //    a. Go to your Firebase Project Console: https://console.firebase.google.com/
        //    b. Select your project ("chatv1-5432a").
        //    c. In the left navigation bar, under "Build", click on "Firestore Database".
        //    d. Go to the "Rules" tab.
        //    e. **REPLACE** the existing rules with the following, then click "Publish":
        //
        //    rules_version = '2';
        //    service cloud.firestore {
        //      match /databases/{database}/documents {
        //        // Rules for chat messages within specific chat tabs
        //        // {chatName} will be 'main', 'games', or 'memes'
        //        match /artifacts/{appId}/public/data/chats/{chatName}/messages/{document=**} {
        //          allow read, write: if request.auth != null; // Allows any authenticated user
        //        }
        //
        //        // Rules for banned users within specific chat tabs
        //        match /artifacts/{appId}/public/data/chats/{chatName}/banned_users/{userId} {
        //          allow read: if request.auth != null; // Any authenticated user can read the banned list
        //          allow create, delete: if request.auth != null;
        //        }
        //
        //        // NEW: Rules for video call signaling data
        //        // {chatName} refers to the active chat tab being used as a call ID
        //        match /artifacts/{appId}/public/data/calls/{chatName} {
        //          allow read, write: if request.auth != null; // Allows any authenticated user to exchange call data
        //        }
        //      }
        //    }
        //    Remember to click "Publish" after making changes to your rules.
        //
        // NOTE: Firebase Storage rules are no longer needed as file upload functionality has been removed.
        // ====================================================================================


        // Import Firebase modules from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";


        // Main App component for the chat application (inlined)
        function App() {
            // State variables
            const [db, setDb] = React.useState(null);
            const [auth, setAuth] = React.useState(null);
            const [userId, setUserId] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [newMessage, setNewMessage] = React.useState('');
            const [isAuthReady, setIsAuthReady] = React.useState(false);
            const [userName, setUserName] = React.useState(localStorage.getItem('chatUserName') || '');
            const [nameInput, setNameInput] = React.useState('');
            const [isAdmin, setIsAdmin] = React.useState(userName === 'admin'); // Track admin status
            const [showAdminPasswordScreen, setShowAdminPasswordScreen] = React.useState(false);
            const [bannedUsers, setBannedUsers] = React.useState([]); // State for banned user IDs
            const [showUnbanPage, setShowUnbanPage] = React.useState(false); // State for unban page visibility
            const [activeChatTab, setActiveChatTab] = React.useState(localStorage.getItem('activeChatTab') || null);

            const [isLoading, setIsLoading] = React.useState(true); // Loading state

            // Video call states
            const [localStream, setLocalStream] = React.useState(null);
            const [remoteStream, setRemoteStream] = React.useState(null);
            const [peerConnection, setPeerConnection] = React.useState(null);
            const [inCall, setInCall] = React.useState(false); // True if a call is active (connecting or connected)
            const [callInitiated, setCallInitiated] = React.useState(false); // True if *this user* initiated the call
            const [callOfferReceived, setCallOfferReceived] = React.useState(false); // True if an offer is waiting to be answered
            const [isVideoEnabled, setIsVideoEnabled] = React.useState(true); // NEW: State for video toggle


            // Initialize Firebase and handle authentication
            React.useEffect(() => {
                try {
                    const app = initializeApp(parsedFirebaseConfig);
                    const firestoreDb = getFirestore(app);
                    const firebaseAuth = getAuth(app);

                    setDb(firestoreDb);
                    setAuth(firebaseAuth);

                    signInAnonymously(firebaseAuth)
                        .then((userCredential) => {
                            console.log("Signed in anonymously:", userCredential.user.uid);
                        })
                        .catch(error => {
                            console.error("Error signing in anonymously:", error);
                            setIsLoading(false);
                        });

                    const unsubscribeAuth = onAuthStateChanged(firebaseAuth, (user) => {
                        if (user) {
                            setUserId(user.uid);
                        } else {
                            setUserId(crypto.randomUUID());
                        }
                        setIsAuthReady(true);
                        setIsLoading(false);
                        console.log("Auth state changed: User ID:", user?.uid || 'anonymous', "isAuthReady:", true);
                    });

                    return () => unsubscribeAuth();
                } catch (error) {
                    console.error("Failed to initialize Firebase app or auth:", error);
                    setIsLoading(false);
                }
            }, []);

            // Set up real-time listener for messages from Firestore (depends on activeChatTab)
            React.useEffect(() => {
                if (db && isAuthReady && activeChatTab) {
                    const chatCollectionRef = collection(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/messages`);
                    const q = query(chatCollectionRef);

                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        let fetchedMessages = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        fetchedMessages = fetchedMessages.filter(msg => !bannedUsers.includes(msg.userId));
                        fetchedMessages.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
                        setMessages(fetchedMessages);
                    }, (error) => {
                        console.error("Error fetching messages:", error);
                    });

                    return () => unsubscribe();
                } else {
                    setMessages([]);
                }
            }, [db, isAuthReady, bannedUsers, activeChatTab]);

            // Set up real-time listener for banned users from Firestore (depends on activeChatTab)
            React.useEffect(() => {
                if (db && isAuthReady && activeChatTab) {
                    const bannedUsersCollectionRef = collection(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/banned_users`);
                    const q = query(bannedUsersCollectionRef);

                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const fetchedBannedUsers = snapshot.docs.map(doc => doc.id);
                        setBannedUsers(fetchedBannedUsers);
                        console.log("Fetched Banned Users:", fetchedBannedUsers);
                    }, (error) => {
                        console.error("Error fetching banned users:", error);
                    });

                    return () => unsubscribe();
                } else {
                    setBannedUsers([]);
                }
            }, [db, isAuthReady, activeChatTab]);

            // Effect for WebRTC signaling via Firestore
            React.useEffect(() => {
                if (!db || !isAuthReady || !activeChatTab || !userId) return;

                const callDocRef = doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`);

                const unsubscribeCallSignaling = onSnapshot(callDocRef, async (snapshot) => {
                    const callData = snapshot.data();
                    if (!callData) {
                        // Call document deleted, means call ended or never started.
                        if (inCall) {
                            console.log("Call document removed by other party, ending call.");
                            endCall(false); // End call, but don't delete doc again as other side did it
                        }
                        setCallOfferReceived(false);
                        return;
                    }

                    // Process offer
                    // Only process if we are not already in a call, haven't initiated one, and haven't received an offer yet
                    if (callData.offer && callData.offer.type === 'offer' && !inCall && !callInitiated && !callOfferReceived) {
                        setCallOfferReceived(true);
                        console.log("Call offer received. Caller ID:", callData.callerId);
                        // If a peerConnection is not yet established for answering (e.g. from a previous failed attempt), instantiate it
                        if (!peerConnection) {
                             try {
                                 const pc = new RTCPeerConnection({
                                     iceServers: [
                                         { urls: 'stun:stun.l.google.com:19302' },
                                     ]
                                 });
                                 setPeerConnection(pc);

                                 // Listen for remote tracks (important for answerer to get remote video)
                                 pc.ontrack = (event) => {
                                     if (event.streams && event.streams[0]) {
                                         console.log("Remote stream received (answerer setup):", event.streams[0]);
                                         setRemoteStream(event.streams[0]);
                                     } else {
                                         console.warn("ontrack event fired without streams[0]. (answerer setup)", event);
                                     }
                                 };

                                 // Gather ICE candidates (important for answerer to send candidates back)
                                 pc.onicecandidate = async (event) => {
                                     if (event.candidate) {
                                         console.log("New ICE candidate generated (answerer setup):", event.candidate);
                                         await setDoc(callDocRef, {
                                             iceCandidates: (await getDoc(callDocRef)).data()?.iceCandidates ? [...(await getDoc(callDocRef)).data().iceCandidates, { candidate: event.candidate.toJSON(), senderId: userId }] : [{ candidate: event.candidate.toJSON(), senderId: userId }]
                                         }, { merge: true });
                                         console.log("Sent ICE candidate to Firestore (answerer setup).");
                                     }
                                 };
                                 // Now process the offer
                                 console.log("Setting remote description from received offer (answerer setup)...");
                                 await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
                                 console.log("Remote description set from received offer (answerer setup).");
                             } catch (err) {
                                 console.error("Error setting up PeerConnection for incoming offer:", err.name, err.message, err.stack);
                                 setCallOfferReceived(false); // Reset to allow retrying
                             }
                        }
                    }

                    // Process answer if we initiated the call and are waiting for an answer
                    if (callData.answer && callData.answer.type === 'answer' && peerConnection && peerConnection.remoteDescription?.type !== 'answer' && callData.answererId !== userId) {
                        try {
                            console.log("Attempting to set remote description from answer.");
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.answer));
                            setInCall(true); // Call is now connected
                            console.log("Call answer received and set.");
                        } catch (e) {
                            console.error("Error setting remote description from answer:", e.name, e.message, e.stack);
                        }
                    }

                    // Process ICE candidates
                    if (callData.iceCandidates && peerConnection) {
                        for (const candidate of callData.iceCandidates) {
                            // Ensure candidate is from the other peer and has not been added yet (basic check)
                            if (candidate.senderId !== userId && !peerConnection.remoteDescription?.candidates?.some(c => c.candidate === candidate.candidate.candidate)) {
                                const iceCandidate = new RTCIceCandidate(candidate.candidate);
                                try {
                                    await peerConnection.addIceCandidate(iceCandidate);
                                    console.log("Added ICE candidate:", iceCandidate);
                                } catch (e) {
                                    console.error("Error adding ICE candidate:", e.name, e.message, e.stack);
                                }
                            }
                        }
                    }
                }, (error) => {
                    console.error("Error listening to call signaling:", error.name, error.message, error.stack);
                });

                return () => {
                    unsubscribeCallSignaling();
                    // Cleanup call document if this user initiated it and disconnects
                    if (callInitiated && db && activeChatTab) {
                        const callDocRef = doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`);
                        deleteDoc(callDocRef).catch(e => console.error("Error cleaning up call doc on unmount:", e));
                    }
                };
            }, [db, isAuthReady, activeChatTab, userId, peerConnection, inCall, callInitiated, callOfferReceived]); // Dependencies for signaling effect

            // Function to send a new message
            const sendMessage = async () => {
                if (bannedUsers.includes(userId)) {
                    alert('You are banned from sending messages in this chat.');
                    setNewMessage('');
                    return;
                }
                if (inCall) { // Disable chat input if in call
                    alert('Please end the video call to send chat messages.');
                    return;
                }

                if (newMessage.trim() === '' || !db || !userId || !activeChatTab) return;

                try {
                    await addDoc(collection(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/messages`), {
                        text: newMessage,
                        userId: userId,
                        userName: userName || 'Anonymous',
                        timestamp: serverTimestamp()
                    });
                    setNewMessage('');
                } catch (error) {
                    console.error("Error sending message:", error);
                }
            };

            // Function to start a video call
            const startCall = async () => {
                if (!db || !isAuthReady || !userId || !activeChatTab) {
                    console.error("Cannot start call: Firebase not ready or tab not selected.");
                    return;
                }
                if (bannedUsers.includes(userId)) {
                    alert('You are banned from starting calls in this chat.');
                    return;
                }
                if (inCall) {
                    console.warn("Already in a call.");
                    return;
                }
                if (callInitiated) { // Prevent multiple initiation clicks
                    console.warn("Call already being initiated. Please wait.");
                    return;
                }
                if (callOfferReceived) { // If an offer is already pending, try to answer it instead
                    console.log("Incoming call offer detected. Attempting to answer instead of initiating new call.");
                    answerCall(); // Route to answerCall if an offer is present
                    return;
                }

                setCallInitiated(true); // Indicate this user is initiating
                console.log("startCall: Attempting to get user media. Video Enabled:", isVideoEnabled);

                let stream;
                let pc;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: isVideoEnabled, audio: true }); // Use isVideoEnabled
                    console.log("startCall: Local stream obtained successfully.");
                    setLocalStream(stream);

                    pc = new RTCPeerConnection({
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' }, // Google's public STUN server
                        ]
                    });
                    console.log("startCall: RTCPeerConnection created.");
                    setPeerConnection(pc); // Set state here

                    // Add local tracks to peer connection
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                    console.log("startCall: Local tracks added to peer connection.");


                    // Listen for remote tracks
                    pc.ontrack = (event) => {
                        if (event.streams && event.streams[0]) {
                            console.log("startCall: Remote stream received:", event.streams[0]);
                            setRemoteStream(event.streams[0]);
                        } else {
                            console.warn("startCall: ontrack event fired without streams[0].", event);
                        }
                    };

                    // Gather ICE candidates
                    const callDocRef = doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`);
                    pc.onicecandidate = async (event) => {
                        if (event.candidate) {
                            console.log("startCall: New ICE candidate generated:", event.candidate);
                            try {
                                const currentCallDoc = (await getDoc(callDocRef)).data();
                                const currentCandidates = currentCallDoc?.iceCandidates || [];
                                await setDoc(callDocRef, {
                                    iceCandidates: [...currentCandidates, { candidate: event.candidate.toJSON(), senderId: userId }]
                                }, { merge: true });
                                console.log("startCall: Sent ICE candidate to Firestore.");
                            } catch (e) {
                                console.error("startCall: Error sending ICE candidate to Firestore:", e.name, e.message, e.stack);
                            }
                        } else {
                            console.log("startCall: ICE gathering complete.");
                        }
                    };

                    // Create offer
                    console.log("startCall: Creating SDP offer...");
                    const offer = await pc.createOffer();
                    console.log("startCall: SDP offer created.");
                    await pc.setLocalDescription(offer);
                    console.log("startCall: Local description set (offer).");

                    // Set 'inCall' to true now that local stream is ready and offer is being sent
                    setInCall(true);

                    // Set call data in Firestore. Clear previous call data.
                    await setDoc(callDocRef, {
                        offer: offer,
                        callerId: userId,
                        answer: null, // Ensure old answer is cleared
                        iceCandidates: [], // Start with an empty array for new candidates
                        isVideoCall: isVideoEnabled // NEW: Store whether it's a video call
                    }, { merge: true });
                    console.log("startCall: Call offer sent to Firestore.");

                } catch (error) {
                    console.error("startCall: Error during call process:", error.name, error.message, error.stack);
                    alert(`Failed to start video call: ${error.name || 'Error'}. Please check your console for more details and ensure camera/mic permissions are granted.`);
                    // Clean up if an error occurs during initiation
                    if (stream) stream.getTracks().forEach(track => track.stop());
                    if (pc) pc.close();
                    setLocalStream(null);
                    setRemoteStream(null);
                    setPeerConnection(null);
                    setInCall(false);
                    setCallInitiated(false);
                    setCallOfferReceived(false); // Reset in case offer was pending from a failed previous attempt
                    // Attempt to clean up call document in Firestore if it was partially created
                    if (db && activeChatTab) {
                        try {
                            await deleteDoc(doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`));
                            console.log("startCall: Cleaned up failed call document.");
                        } catch (e) {
                            console.error("startCall: Error cleaning up failed call document:", e);
                        }
                    }
                }
            };

            // Function to answer an incoming call
            const answerCall = async () => {
                if (!db || !isAuthReady || !userId || !activeChatTab) {
                    console.error("answerCall: Cannot answer call: Firebase not ready or tab not selected.");
                    return;
                }
                if (bannedUsers.includes(userId)) {
                    alert('You are banned from answering calls in this chat.');
                    return;
                }
                if (inCall) {
                    console.warn("answerCall: Already in a call.");
                    return;
                }
                if (!callOfferReceived && !peerConnection) { // Ensure there's an offer or a peerConnection from the listener
                    console.warn("answerCall: No call offer currently received to answer or peer connection not setup by listener.");
                    alert("No incoming call detected or connection issue. Please try again.");
                    return;
                }

                setInCall(true);
                setCallOfferReceived(false); // Reset offer received state
                console.log("answerCall: Attempting to get user media for answering call. Video Enabled:", isVideoEnabled);

                let stream;
                let pc = peerConnection; // Use existing peerConnection from listener if available
                try {
                    // Request media based on current isVideoEnabled state
                    stream = await navigator.mediaDevices.getUserMedia({ video: isVideoEnabled, audio: true }); // Use isVideoEnabled
                    console.log("answerCall: Local stream obtained for answering call.");
                    setLocalStream(stream);

                    // If peerConnection was not set by the signaling listener, create it now
                    if (!pc) {
                        console.log("answerCall: PeerConnection not set by listener, creating it now.");
                        pc = new RTCPeerConnection({
                            iceServers: [
                                { urls: 'stun:stun.l.google.com:19302' },
                            ]
                        });
                        setPeerConnection(pc);

                        // Set up event handlers if this is a new PC instance
                        pc.ontrack = (event) => {
                            if (event.streams && event.streams[0]) {
                                console.log("answerCall: Remote stream received (new PC):", event.streams[0]);
                                setRemoteStream(event.streams[0]);
                            }
                        };
                        const callDocRef = doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`);
                        pc.onicecandidate = async (event) => {
                            if (event.candidate) {
                                console.log("answerCall: New ICE candidate generated (new PC):", event.candidate);
                                try {
                                    const currentCallDoc = (await getDoc(callDocRef)).data();
                                    const currentCandidates = currentCallDoc?.iceCandidates || [];
                                    await setDoc(callDocRef, {
                                        iceCandidates: [...currentCandidates, { candidate: event.candidate.toJSON(), senderId: userId }]
                                    }, { merge: true });
                                    console.log("answerCall: Sent ICE candidate to Firestore (new PC).");
                                } catch (e) {
                                    console.error("answerCall: Error sending ICE candidate to Firestore (new PC):", e.name, e.message, e.stack);
                                }
                            }
                        };
                    }


                    // Add local tracks to peer connection
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                    console.log("answerCall: Local tracks added to peer connection for answering.");

                    const callDocRef = doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`);
                    const callData = (await getDoc(callDocRef)).data();
                    if (!callData || !callData.offer) {
                        console.error("answerCall: No valid offer to answer, call might have ended.");
                        endCall();
                        return;
                    }

                    console.log("answerCall: Setting remote description from offer...");
                    // Only set remote description if it hasn't been set yet by the signaling listener
                    if (pc.remoteDescription?.type !== 'offer') {
                         await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
                         console.log("answerCall: Remote description set from offer.");
                    } else {
                         console.log("answerCall: Remote description already set to offer by listener.");
                    }


                    console.log("answerCall: Creating SDP answer...");
                    const answer = await pc.createAnswer();
                    console.log("answerCall: SDP answer created.");
                    await pc.setLocalDescription(answer);
                    console.log("answerCall: Local description set (answer).");

                    // Set answer in Firestore.
                    await setDoc(callDocRef, { answer: answer, answererId: userId }, { merge: true });
                    console.log("answerCall: Call answer sent to Firestore.");

                    // Add any existing ICE candidates from the offerer that arrived before our PC was ready
                    if (callData.iceCandidates) {
                        console.log("answerCall: Adding pre-existing ICE candidates from offerer.");
                        for (const candidate of callData.iceCandidates) {
                            if (candidate.senderId !== userId) { // Only add candidates from the other peer
                                try {
                                    await pc.addIceCandidate(new RTCIceCandidate(candidate.candidate));
                                    console.log("answerCall: Added pre-existing ICE candidate during answer.");
                                } catch (e) {
                                    console.error("answerCall: Error adding pre-existing ICE candidate during answer:", e.name, e.message, e.stack);
                                }
                            }
                        }
                    }

                } catch (error) {
                    console.error("answerCall: Error during call process:", error.name, error.message, error.stack);
                    alert(`Failed to answer video call: ${error.name || 'Error'}. Please check your console for more details and ensure camera/mic permissions are granted.`);
                    // Clean up
                    if (stream) stream.getTracks().forEach(track => track.stop());
                    if (pc) pc.close();
                    setLocalStream(null);
                    setRemoteStream(null);
                    setPeerConnection(null);
                    setInCall(false);
                    setCallInitiated(false);
                    setCallOfferReceived(false);
                    // No need to delete call doc here, as the caller should manage it.
                }
            };

            // Function to end the current call
            const endCall = async (deleteDocFromFirestore = true) => {
                console.log("endCall: Attempting to end call. Delete doc:", deleteDocFromFirestore);

                // Stop local tracks
                if (localStream) {
                    localStream.getTracks().forEach(track => {
                        console.log("endCall: Stopping local track:", track);
                        track.stop();
                    });
                }
                // Stop remote tracks (if they exist and are not already stopped)
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => {
                        console.log("endCall: Stopping remote track:", track);
                        track.stop();
                    });
                }
                // Close peer connection
                if (peerConnection) {
                    console.log("endCall: Closing peer connection.");
                    peerConnection.close();
                }

                // Reset states
                setLocalStream(null);
                setRemoteStream(null);
                setPeerConnection(null);
                setInCall(false);
                setCallInitiated(false);
                setCallOfferReceived(false);
                setIsVideoEnabled(true); // Reset video to enabled for next call

                // Only delete the Firestore document if explicitly requested (e.g., user clicked "End Call" on initiating side)
                if (deleteDocFromFirestore && db && activeChatTab) {
                    try {
                        console.log(`endCall: Deleting call document for ${activeChatTab}.`);
                        await deleteDoc(doc(db, `artifacts/${window.__app_id}/public/data/calls/${activeChatTab}`));
                        console.log("endCall: Call document deleted from Firestore.");
                    } catch (e) {
                        console.error("endCall: Error deleting call document:", e.name, e.message, e.stack);
                    }
                }
                console.log("endCall: Call ended successfully.");
            };


            // Function to delete a message (only for admin)
            const deleteMessage = async (messageId) => {
                if (!db || !isAdmin || !activeChatTab) {
                    console.warn("Permission denied: Only admin can delete messages.");
                    return;
                }
                try {
                    const messageRef = doc(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/messages`, messageId);
                    await deleteDoc(messageRef);
                    console.log(`Message ${messageId} deleted successfully from ${activeChatTab} chat.`);
                } catch (error) {
                    console.error("Error deleting message:", error);
                }
            };

            // Function to ban a user (only for admin)
            const banUser = async (targetUserId) => {
                if (!db || !isAdmin || !activeChatTab) {
                    console.warn("Permission denied: Only admin can ban users.");
                    return;
                }
                if (targetUserId === userId) {
                    alert("You cannot ban yourself.");
                    return;
                }
                try {
                    const bannedUserRef = doc(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/banned_users`, targetUserId);
                    await setDoc(bannedUserRef, { bannedAt: serverTimestamp() });
                    alert(`User ${targetUserId} has been banned from ${activeChatTab} chat.`);
                    console.log(`User ${targetUserId} banned successfully from ${activeChatTab} chat.`);
                } catch (error) {
                    console.error("Error banning user:", error);
                }
            };

            // Function to unban a user (only for admin)
            const unbanUser = async (targetUserId) => {
                if (!db || !isAdmin || !activeChatTab) {
                    console.warn("Permission denied: Only admin can unban users.");
                    return;
                }
                try {
                    const bannedUserRef = doc(db, `artifacts/${window.__app_id}/public/data/chats/${activeChatTab}/banned_users`, targetUserId);
                    await deleteDoc(bannedUserRef);
                    alert(`User ${targetUserId} has been unbanned from ${activeChatTab} chat.`);
                    console.log(`User ${targetUserId} unbanned successfully from ${activeChatTab} chat.`);
                } catch (error) {
                    console.error("Error unbanning user:", error);
                }
            };

            // Handle key press for all input stages
            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    if (!activeChatTab) {
                        console.log("Please select a chat tab.");
                    } else if (!userName) {
                        setChatUserName();
                    } else if (showAdminPasswordScreen) {
                        handleAdminPassword();
                    } else if (!inCall) { // Only send message if not in call
                        sendMessage();
                    }
                }
            };

            // Function to handle initial name setting or admin first attempt
            const setChatUserName = () => {
                if (nameInput.trim() === 'admin') {
                    setShowAdminPasswordScreen(true);
                    setNameInput('');
                } else if (nameInput.trim() !== '') {
                    setUserName(nameInput.trim());
                    localStorage.setItem('chatUserName', nameInput.trim());
                    setIsAdmin(false);
                    setShowAdminPasswordScreen(false);
                }
            };

            // Function to handle admin password confirmation
            const handleAdminPassword = () => {
                const adminPassword = '69$@';
                if (nameInput.trim() === adminPassword) {
                    setUserName('admin');
                    localStorage.setItem('chatUserName', 'admin');
                    setIsAdmin(true);
                    setShowAdminPasswordScreen(false);
                    setNameInput('');
                    alert('Admin access granted!');
                } else {
                    setUserName('');
                    localStorage.removeItem('chatUserName');
                    setIsAdmin(false);
                    setShowAdminPasswordScreen(false);
                    setNameInput('');
                    alert('Incorrect password. Please enter your name again to start chatting or re-attempt admin login.');
                }
            };

            // Helper to set active chat tab and store in localStorage
            const selectChatTab = (tabName) => {
                setActiveChatTab(tabName);
                localStorage.setItem('activeChatTab', tabName);
                setMessages([]);
                setBannedUsers([]);
                // Also end any active call when changing tabs
                if (inCall) endCall(true); // Ensure Firestore doc is deleted
            };

            // Render loading screen if Firebase is not yet initialized
            if (isLoading) {
                return React.createElement(
                    "div",
                    { className: "flex flex-col items-center justify-center h-screen bg-gray-100 font-inter" },
                    React.createElement("p", { className: "text-lg text-gray-700" }, "Loading chat...")
                );
            }

            // Conditional rendering: Show tab selection, name input, admin password, or unban page
            if (!activeChatTab) {
                return React.createElement(
                    "div",
                    {
                        className: "flex flex-col items-center justify-center h-screen bg-gray-100 font-inter p-4"
                    },
                    React.createElement(
                        "h2",
                        { className: "text-2xl font-bold text-gray-800 mb-6" },
                        "Select a Chat Room"
                    ),
                    React.createElement(
                        "div",
                        { className: "flex flex-col space-y-4 w-full max-w-xs" },
                        React.createElement(
                            "button",
                            {
                                onClick: () => selectChatTab('main'),
                                className: "px-8 py-3 bg-blue-600 text-white font-semibold rounded-xl shadow-md hover:bg-blue-700 transition duration-200"
                            },
                            "Main Chat"
                        ),
                        React.createElement(
                            "button",
                            {
                                onClick: () => selectChatTab('games'),
                                className: "px-8 py-3 bg-green-600 text-white font-semibold rounded-xl shadow-md hover:bg-green-700 transition duration-200"
                            },
                            "Games Chat"
                        ),
                        React.createElement(
                            "button",
                            {
                                onClick: () => selectChatTab('memes'),
                                className: "px-8 py-3 bg-purple-600 text-white font-semibold rounded-xl shadow-md hover:bg-purple-700 transition duration-200"
                            },
                            "Memes Chat"
                        )
                    )
                );
            }
            else if (!userName || showAdminPasswordScreen) {
                return React.createElement(
                    "div",
                    {
                        className: "flex flex-col items-center justify-center h-screen bg-gray-100 font-inter p-4"
                    },
                    React.createElement(
                        "h2",
                        {
                            className: "text-2xl font-bold text-gray-800 mb-6"
                        },
                        showAdminPasswordScreen ? "Enter Admin Password" : `Welcome to the ${activeChatTab} Chat!`
                        ),
                    React.createElement(
                        "p",
                        {
                            className: "text-gray-600 mb-4"
                        },
                        showAdminPasswordScreen ? "Please enter the admin password to confirm administrator privileges." : "Please enter your name to start chatting."
                    ),
                    React.createElement(
                        "input",
                        {
                            type: showAdminPasswordScreen ? "password" : "text",
                            value: nameInput,
                            onChange: e => setNameInput(e.target.value),
                            onKeyPress: handleKeyPress,
                            placeholder: showAdminPasswordScreen ? "Admin Password" : "Your Name",
                            className: "p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 w-full max-w-sm mb-4"
                        }
                    ),
                    React.createElement(
                        "button",
                        {
                            onClick: showAdminPasswordScreen ? handleAdminPassword : setChatUserName,
                            className: "px-8 py-3 bg-blue-600 text-white font-semibold rounded-xl shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200"
                        },
                        showAdminPasswordScreen ? "Confirm Password" : "Start Chatting"
                    )
                );
            }

            // Conditional rendering for the Unban Page Modal
            if (showUnbanPage) {
                return React.createElement(
                    "div",
                    {
                        className: "modal-overlay"
                    },
                    React.createElement(
                        "div",
                        {
                            className: "modal-content"
                        },
                        React.createElement(
                            "h2",
                            {
                                className: "text-2xl font-bold text-gray-800 mb-6 text-center"
                            },
                            `Banned Users in ${activeChatTab} Chat`
                        ),
                        bannedUsers.length === 0 ?
                            React.createElement(
                                "p",
                                { className: "text-center text-gray-500" },
                                "No users currently banned in this chat."
                            ) :
                            React.createElement(
                                "ul",
                                { className: "space-y-3" },
                                bannedUsers.map(bannedId =>
                                    React.createElement(
                                        "li",
                                        {
                                            key: bannedId,
                                            className: "flex items-center justify-between bg-gray-100 p-3 rounded-lg shadow-sm"
                                        },
                                        React.createElement(
                                            "span",
                                            { className: "font-medium text-gray-700 break-all" },
                                            bannedId
                                        ),
                                        React.createElement(
                                            "button",
                                            {
                                                onClick: () => unbanUser(bannedId),
                                                className: "ml-4 px-4 py-2 bg-green-500 text-white rounded-xl hover:bg-green-600 transition duration-200"
                                            },
                                            "Unban"
                                        )
                                    )
                                )
                            ),
                        React.createElement(
                            "button",
                            {
                                onClick: () => setShowUnbanPage(false),
                                className: "mt-8 px-6 py-3 bg-blue-600 text-white font-semibold rounded-xl shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 w-full"
                            },
                            "Back to Chat"
                        )
                    )
                );
            }

            // Main chat application rendering (now full screen)
            return React.createElement(
                "div",
                {
                    className: "flex flex-col h-screen antialiased bg-gray-100 text-gray-900 font-inter w-full"
                },
                React.createElement( // Tab Selection at the top of the chat
                    "div",
                    { className: "flex justify-around bg-white p-3 rounded-t-lg shadow-md mb-4" },
                    React.createElement(
                        "button",
                        {
                            onClick: () => selectChatTab('main'),
                            className: `px-4 py-2 rounded-lg font-semibold transition duration-200 ${activeChatTab === 'main' ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`
                        },
                        "Main Chat"
                    ),
                    React.createElement(
                        "button",
                        {
                            onClick: () => selectChatTab('games'),
                            className: `px-4 py-2 rounded-lg font-semibold transition duration-200 ${activeChatTab === 'games' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`
                        },
                        "Games Chat"
                    ),
                    React.createElement(
                        "button",
                        {
                            onClick: () => selectChatTab('memes'),
                            className: `px-4 py-2 rounded-lg font-semibold transition duration-200 ${activeChatTab === 'memes' ? 'bg-purple-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`
                        },
                        "Memes Chat"
                    )
                ),
                userId && React.createElement(
                    "div",
                    {
                        className: "bg-blue-500 text-white p-3 rounded-t-lg shadow-md mb-4 text-center"
                    },
                    React.createElement(
                        "span",
                        {
                            className: "font-semibold"
                        },
                        "Your User ID: "
                    ),
                    React.createElement(
                        "span",
                        {
                            className: "break-all"
                        },
                        userId
                    ),
                    React.createElement(
                        "span",
                        {
                            className: "ml-4 font-semibold"
                        },
                        " | Your Name: "
                    ),
                    React.createElement(
                        "span",
                        {
                            className: "font-semibold"
                        },
                        userName
                    ),
                     React.createElement(
                        "button",
                        {
                            onClick: () => {
                                setUserName('');
                                localStorage.removeItem('chatUserName');
                                localStorage.removeItem('activeChatTab');
                                setIsAdmin(false);
                                setNewMessage('');
                                setMessages([]);
                                setShowAdminPasswordScreen(false);
                                setShowUnbanPage(false);
                                setActiveChatTab(null);
                                if (inCall) endCall(true); // End call when changing name/tab
                            },
                            className: "ml-4 px-3 py-1 bg-blue-700 text-white text-xs rounded-full hover:bg-blue-800 transition duration-200"
                        },
                        "Change Name / Tab"
                    )
                ),

                // Video call UI takes precedence when inCall is true
                inCall ? (
                    React.createElement(
                        "div",
                        { className: "flex-1 flex flex-col items-center justify-center bg-gray-900 p-4 rounded-lg shadow-md" },
                        React.createElement(
                            "div",
                            { className: "video-container" },
                            React.createElement("video", {
                                ref: (videoElement) => {
                                    if (videoElement && localStream) videoElement.srcObject = localStream;
                                },
                                autoPlay: true,
                                muted: true, // Mute local video
                                className: `w-full max-h-[30vh] object-contain rounded-lg ${localStream && localStream.getVideoTracks().length === 0 ? 'hidden' : ''}` // Hide if no video track
                            }),
                            React.createElement("video", {
                                ref: (videoElement) => {
                                    if (videoElement && remoteStream) videoElement.srcObject = remoteStream;
                                },
                                autoPlay: true,
                                className: `w-full max-h-[50vh] object-contain rounded-lg ${remoteStream && remoteStream.getVideoTracks().length === 0 ? 'hidden' : ''}` // Hide if no video track
                            }),
                            React.createElement(
                                "div",
                                { className: "video-controls" },
                                React.createElement(
                                    "button",
                                    {
                                        onClick: () => endCall(true), // Pass true to delete doc
                                        className: "bg-red-600 text-white hover:bg-red-700"
                                    },
                                    "End Call"
                                )
                            )
                        ),
                        React.createElement(
                            "p",
                            { className: "text-white mt-4" },
                            callInitiated ? "Calling..." : (callOfferReceived ? "Incoming call..." : "Connecting...")
                        )
                    )
                ) : ( // Show chat UI when not in call
                    React.createElement(
                        "div",
                        {
                            className: "flex-1 bg-white rounded-lg shadow-md p-4 overflow-y-auto mb-4 custom-scrollbar"
                        },
                        messages.length === 0 ?
                            React.createElement(
                                "div",
                                {
                                    className: "text-center text-gray-500 mt-10"
                                },
                                "No messages yet. Start the conversation!"
                            ) :
                            messages.map(msg => {
                                const isCurrentUser = msg.userId === userId;
                                const messageBubbleBaseClasses = "rounded-xl p-3 max-w-[80%] break-words shadow-sm flex flex-col";
                                const messageBubbleUserClasses = isCurrentUser
                                    ? "bg-blue-600 text-white rounded-br-none"
                                    : "bg-gray-200 text-gray-800 rounded-bl-none";
                                const messageBubbleCombinedClasses = `${messageBubbleBaseClasses} ${messageBubbleUserClasses}`;

                                return React.createElement(
                                    "div",
                                    {
                                        key: msg.id,
                                        className: `flex mb-3 ${isCurrentUser ? 'justify-end' : 'justify-start'}`
                                    },
                                    React.createElement(
                                        "div",
                                        {
                                            className: messageBubbleCombinedClasses
                                        },
                                        React.createElement(
                                            "div",
                                            {
                                                className: "font-bold text-xs mb-1"
                                            },
                                            isCurrentUser ? 'You' : (msg.userName || msg.userId)
                                        ),
                                        React.createElement(
                                            "p",
                                            { className: "text-sm" },
                                            msg.text
                                        ),
                                        React.createElement(
                                            "div",
                                            {
                                                className: "flex justify-between items-center mt-1"
                                            },
                                            msg.timestamp && React.createElement(
                                                "div",
                                                {
                                                    className: "text-right text-xs opacity-75" + (isCurrentUser ? " text-white" : " text-gray-600")
                                                },
                                                new Date(msg.timestamp.toMillis()).toLocaleTimeString()
                                            ),
                                            isAdmin && React.createElement(
                                                "div",
                                                {
                                                    className: "flex ml-2"
                                                },
                                                React.createElement(
                                                    "button",
                                                    {
                                                        onClick: () => deleteMessage(msg.id),
                                                        className: "px-2 py-1 bg-red-500 text-white text-xs rounded-full hover:bg-red-600 transition duration-200 mr-1"
                                                    },
                                                    "Delete"
                                                ),
                                                React.createElement(
                                                    "button",
                                                    {
                                                        onClick: () => banUser(msg.userId),
                                                        className: "px-2 py-1 bg-yellow-500 text-white text-xs rounded-full hover:bg-yellow-600 transition duration-200"
                                                    },
                                                    "Ban"
                                                )
                                            )
                                        )
                                    )
                                );
                            })
                    )
                ),
                React.createElement(
                    "div",
                    {
                        className: "flex items-center space-x-3 bg-white p-4 rounded-b-lg shadow-md mt-auto"
                    },
                    // Video call controls and checkbox
                    !inCall && React.createElement(
                        "div",
                        { className: "flex items-center space-x-3" }, // Align items vertically
                        React.createElement(
                            "button",
                            {
                                onClick: startCall,
                                className: "px-6 py-3 bg-green-600 text-white font-semibold rounded-xl shadow-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed",
                                disabled: !isAuthReady || bannedUsers.includes(userId) || callInitiated
                            },
                            callInitiated ? "Calling..." : (callOfferReceived ? "Incoming Call" : "Start Video Call")
                        ),
                        React.createElement( // Video toggle checkbox
                            "div",
                            { className: "flex items-center" },
                            React.createElement("input", {
                                type: "checkbox",
                                id: "video-toggle",
                                checked: isVideoEnabled,
                                onChange: (e) => {
                                    setIsVideoEnabled(e.target.checked);
                                    console.log("Video Enabled:", e.target.checked);
                                },
                                className: "h-5 w-5 text-green-600 rounded focus:ring-green-500"
                            }),
                            React.createElement(
                                "label",
                                { htmlFor: "video-toggle", className: "ml-2 text-gray-700 font-medium" },
                                "Enable Video"
                            )
                        )
                    ),
                    !inCall && React.createElement(
                        "input",
                        {
                            type: "text",
                            value: newMessage,
                            onChange: e => setNewMessage(e.target.value),
                            onKeyPress: handleKeyPress,
                            placeholder: `Type your message in ${activeChatTab} chat...`,
                            className: "flex-1 p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 ml-3", // Added ml-3 for spacing
                            disabled: !isAuthReady || bannedUsers.includes(userId)
                        }
                    ),
                    !inCall && React.createElement(
                        "button",
                        {
                            onClick: sendMessage,
                            className: "px-6 py-3 bg-blue-600 text-white font-semibold rounded-xl shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed",
                            disabled: !isAuthReady || newMessage.trim() === '' || bannedUsers.includes(userId)
                        },
                        "Send"
                    ),
                    isAdmin && React.createElement(
                        "button",
                        {
                            onClick: () => setShowUnbanPage(true),
                            className: "ml-3 px-6 py-3 bg-purple-600 text-white font-semibold rounded-xl shadow-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 transition duration-200"
                        },
                        "Unban Users"
                    )
                )
            );
        }

        // Render the App component into the root div
        ReactDOM.render(
            React.createElement(App, null),
            document.getElementById('root')
        );
    </script>
</body>
</html>
