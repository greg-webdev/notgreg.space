<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads</title>
    <!-- React and Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Inter font for a clean, modern look -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* Liquid Glass Button Styles */
        .liquid-glass-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3) 0%, rgba(59, 130, 246, 0.15) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            background-color: #3b82f6;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px 0 rgba(59, 130, 246, 0.37);
        }
        .liquid-glass-btn:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.4) 0%, rgba(59, 130, 246, 0.25) 100%);
            box-shadow: 0 12px 48px 0 rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
        .liquid-glass-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px 0 rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4" id="root">

    <!-- Main container for the downloads page -->
    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-xl w-full max-w-2xl text-center">
        <!-- Title section -->
        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-6">Software Downloads</h1>

        <!-- Description -->
        <p class="text-lg text-gray-600 mb-8">
            Find and download the software you need. Click the button below to get started.
        </p>

        <!-- Download item card for Adobe Photoshop -->
        <div class="bg-gray-50 p-6 md:p-8 rounded-xl border border-gray-200 shadow-md mb-4">
            <div class="flex flex-col md:flex-row items-center justify-between">
                <div class="flex items-center mb-4 md:mb-0">
                    <!-- Placeholder icon for Adobe Photoshop -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-500 mr-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"></path>
                        <path d="M12 12a4 4 0 1 0 0 8a4 4 0 0 0 0-8z"></path>
                        <path d="M12 12v-4"></path>
                        <path d="M16 12h-4"></path>
                    </svg>
                    <div>
                        <h2 class="text-2xl font-semibold text-gray-800">Adobe Photoshop</h2>
                        <p class="text-sm text-gray-500">Image editing software</p>
                    </div>
                </div>
                <!-- Download button for Adobe Photoshop -->
                <button class="liquid-glass-btn" onclick="window.location.href='adobe-installer.exe'">
                    Download
                </button>
            </div>
        </div>

        <!-- Download item card for Useful app -->
        <div class="bg-gray-50 p-6 md:p-8 rounded-xl border border-gray-200 shadow-md">
            <div class="flex flex-col md:flex-row items-center justify-between">
                <div class="flex items-center mb-4 md:mb-0">
                    <!-- Placeholder icon for a generic app -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-500 mr-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20v2a2 2 0 0 1-2 2H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                        <path d="M10 2a2 2 0 0 0-2 2v10"></path>
                        <path d="M14 2a2 2 0 0 1 2 2v10"></path>
                        <path d="M8 20.5V17"></path>
                        <path d="M16 20.5V17"></path>
                        <line x1="8" y1="4" x2="16" y2="4"></line>
                    </svg>
                    <div>
                        <h2 class="text-2xl font-semibold text-gray-800">Useful App</h2>
                        <p class="text-sm text-gray-500">Useful app</p>
                    </div>
                </div>
                <!-- Download button for Useful app -->
                <button class="liquid-glass-btn" onclick="window.location.href='openme.msi'">
                    Download
                </button>
            </div>
        </div>

    </div>

</body>
</html>
