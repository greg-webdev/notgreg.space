<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG.S AI Assistant - Multi-Chat</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f2937; /* Dark background */
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll */
        }

        /* --- Scrollbar Styling --- */
        .chat-scroll {
            scrollbar-width: thin;
            scrollbar-color: #38bdf8 #1f2937;
        }

        .chat-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: #38bdf8;
            border-radius: 10px;
            border: 2px solid #1f2937;
        }

        /* --- Chat Bubble Styles --- */
        .user-message {
            background-color: #4f46e5; /* Indigo */
            color: #ffffff;
            border-bottom-right-radius: 0;
        }

        .model-message {
            background-color: #374151; /* Gray-700 */
            color: #d1d5db; /* Gray-300 */
            border-bottom-left-radius: 0;
            white-space: normal; /* Normal flow, but inner content uses pre-wrap/br */
        }

        .model-message pre {
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* --- Sidebar Transition & Mobile --- */
        .sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
            z-index: 20;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
                width: 256px; /* md:w-64 */
            }
        }

        /* --- Loader GIF Style --- */
        #typing-loader {
            width: 20px; 
            height: 20px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

    </style>
</head>
<body>

    <!-- Main Application Container -->
    <div class="flex h-screen w-full">
        
        <!-- Sidebar for Chat History -->
        <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 w-64 bg-gray-900 text-gray-100 p-4 flex flex-col md:relative md:translate-x-0 md:shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-bold text-sky-400">NG.S Chat</h1>
                <button id="menu-toggle" class="md:hidden text-gray-400 hover:text-white p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <button id="new-chat-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg shadow-md mb-4 flex items-center justify-center transition duration-150">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>

            <div class="flex items-center space-x-2 mb-4">
                <p id="user-id" class="text-xs text-gray-400 truncate flex-grow">User ID: Loading...</p>
                <button id="google-sign-in-btn" class="text-xs bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded-full shadow-sm transition duration-150">
                    Sign In
                </button>
            </div>

            <div class="text-sm font-semibold text-gray-400 mb-2">Chat History</div>
            <div id="chat-list" class="flex-grow overflow-y-auto chat-scroll space-y-2">
                <!-- Chat items will be dynamically inserted here -->
                <p class="text-sm text-gray-500 mt-4">Loading chats...</p>
            </div>

            <div id="auth-status" class="mt-4 text-xs text-center p-2 rounded-lg bg-gray-800 text-yellow-400">
                Initializing Firebase...
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-grow flex flex-col bg-gray-800 relative">
            
            <!-- Mobile Menu Toggle Button (Visible on mobile only) -->
            <button id="menu-toggle-mobile" class="absolute top-4 left-4 md:hidden text-gray-400 hover:text-white p-2 z-10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <!-- Current Chat Header -->
            <header class="p-4 bg-gray-900 border-b border-gray-700 flex items-center justify-between shadow-md">
                <h2 id="chat-title" class="text-lg font-semibold text-white truncate">Select a chat or start a new one.</h2>
                <div id="chat-actions" class="flex space-x-2" style="display: none;">
                    <button id="rename-btn" class="text-sm bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded-lg transition duration-150">
                        Rename
                    </button>
                    <button id="delete-btn" class="text-sm bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg transition duration-150">
                        Delete
                    </button>
                </div>
            </header>

            <!-- Message Display Area -->
            <div id="chat-messages" class="flex-grow overflow-y-auto p-4 space-y-6 chat-scroll">
                <!-- Messages will be dynamically inserted here -->
                <div class="text-center text-gray-500 mt-20">
                    <p class="text-3xl mb-2">👋 Welcome to NG.S Chat</p>
                    <p>Start a new chat or select a conversation from the sidebar.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-gray-900 border-t border-gray-700">
                <div class="flex items-end max-w-4xl mx-auto space-x-3">
                    <textarea 
                        id="user-input" 
                        class="flex-grow resize-none p-3 border border-gray-700 bg-gray-700 text-white rounded-xl focus:ring-sky-500 focus:border-sky-500 outline-none transition duration-150" 
                        placeholder="Type your message here..." 
                        rows="1" 
                        style="min-height: 48px; max-height: 200px;"
                        disabled
                    ></textarea>
                    <button id="send-btn" class="bg-sky-500 hover:bg-sky-600 text-white p-3 rounded-xl transition duration-150 disabled:bg-gray-600 disabled:cursor-not-allowed" disabled>
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    </button>
                </div>
                <!-- Updated typing-indicator to use the loader.gif replacement -->
                <div id="typing-indicator" class="text-center text-sm text-gray-400 mt-2 flex items-center justify-center" style="display: none;">
                    <img id="typing-loader" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExYzJ3bTFnY201Mnl3NTFldjQxM24yeXJ3NHBydHpmcnZ3ZjFkY253byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cqpD01l3Q7E0z0e4F7/giphy.gif" alt="Loading Spinner"> 
                    <span>AI is thinking...</span>
                </div>
                <p id="chat-status" class="text-center text-sm text-red-400 mt-2"></p>
            </div>
        </main>

        <!-- Global Modal for Alerts/Prompts -->
        <div id="global-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50" style="display: none;">
            <div class="bg-gray-800 p-6 rounded-xl shadow-2xl max-w-md w-full border border-gray-700">
                <h3 id="modal-title" class="text-lg font-bold text-white mb-4">Modal Title</h3>
                <p id="modal-message" class="text-gray-300 mb-6">Modal Message.</p>
                <input id="modal-input" type="text" class="w-full p-2 border border-gray-700 bg-gray-700 text-white rounded-lg mb-4" style="display: none;">
                <div class="flex justify-end space-x-3">
                    <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-500 transition duration-150">Cancel</button>
                    <button id="modal-confirm-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition duration-150">Confirm</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Firebase Script Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signInWithCustomToken, 
            onAuthStateChanged, 
            GoogleAuthProvider, 
            signInWithPopup,
            signOut,
            setPersistence,
            inMemoryPersistence
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            addDoc, 
            setDoc, 
            updateDoc, 
            deleteDoc, 
            onSnapshot, 
            collection, 
            query, 
            where, 
            orderBy,
            limit,
            serverTimestamp,
            getDocs
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";


        // --- FIREBASE SETUP AND STATE ---
        let app;
        let db;
        let auth;
        let userId = null;
        let currentChatId = null;
        let unsubscribeMessages = null; // Listener for messages
        let unsubscribeChats = null; // Listener for chat list
        let isSending = false;
        let chatHistory = [];
        const API_KEY = ""; // Placeholder for the actual API key from the environment.
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'default-chat-app';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        const MODEL_NAME = 'gemini-2.5-flash-preview-09-2025';
        
        // UPDATED: Delimiter structure to include Title and Filename
        // The model should generate: HTml:{Title}:{filename.html}\nContent\nhtML
        const HTML_DELIMITER_REGEX = /HTml:(.*?):(.*?\.html)([\s\S]*?)htML/g;


        // --- DOM ELEMENTS ---
        const userInputEl = document.getElementById('user-input');
        const sendBtnEl = document.getElementById('send-btn');
        const chatMessagesEl = document.getElementById('chat-messages');
        const chatListEl = document.getElementById('chat-list');
        const typingIndicatorEl = document.getElementById('typing-indicator');
        const chatStatusEl = document.getElementById('chat-status');
        const authStatusEl = document.getElementById('auth-status');
        const googleSignInBtn = document.getElementById('google-sign-in-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const chatTitleEl = document.getElementById('chat-title');
        const renameBtnEl = document.getElementById('rename-btn');
        const deleteBtnEl = document.getElementById('delete-btn');
        const chatActionsEl = document.getElementById('chat-actions');
        const userIdEl = document.getElementById('user-id');
        const menuToggleEl = document.getElementById('menu-toggle');
        const menuToggleMobileEl = document.getElementById('menu-toggle-mobile');
        const sidebarEl = document.getElementById('sidebar');

        // --- UTILITY FUNCTIONS ---

        /**
         * Custom modal for user interaction (alerts, prompts, confirmations).
         * @param {string} title 
         * @param {string} message 
         * @param {boolean} isPrompt 
         * @param {string} confirmText 
         * @param {string} initialValue 
         * @returns {Promise<string|boolean>} The input value (if prompt) or true (if confirm) or false (if canceled).
         */
        function showModal(title, message, isPrompt = false, confirmText = 'OK', initialValue = '') {
            return new Promise(resolve => {
                const modal = document.getElementById('global-modal');
                const modalTitle = document.getElementById('modal-title');
                const modalMessage = document.getElementById('modal-message');
                const modalInput = document.getElementById('modal-input');
                const modalConfirmBtn = document.getElementById('modal-confirm-btn');
                const modalCancelBtn = document.getElementById('modal-cancel-btn');

                modalTitle.textContent = title;
                modalMessage.textContent = message;
                modalConfirmBtn.textContent = confirmText;

                if (isPrompt) {
                    modalInput.style.display = 'block';
                    modalInput.value = initialValue;
                    modalInput.focus();
                    modalInput.select();
                } else {
                    modalInput.style.display = 'none';
                }

                modalCancelBtn.style.display = isPrompt || confirmText === 'Delete' ? 'inline-block' : 'none';

                const handleConfirm = () => {
                    modal.style.display = 'none';
                    cleanupListeners();
                    resolve(isPrompt ? modalInput.value.trim() : true);
                };

                const handleCancel = () => {
                    modal.style.display = 'none';
                    cleanupListeners();
                    resolve(false);
                };

                const handleKeydown = (e) => {
                    if (e.key === 'Enter' && isPrompt) {
                        e.preventDefault();
                        handleConfirm();
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        handleCancel();
                    }
                };

                const cleanupListeners = () => {
                    modalConfirmBtn.removeEventListener('click', handleConfirm);
                    modalCancelBtn.removeEventListener('click', handleCancel);
                    document.removeEventListener('keydown', handleKeydown);
                };

                modalConfirmBtn.addEventListener('click', handleConfirm);
                modalCancelBtn.addEventListener('click', handleCancel);
                document.addEventListener('keydown', handleKeydown);

                modal.style.display = 'flex';
            });
        }

        /**
         * Shows a simple alert using the modal.
         * @param {string} title 
         * @param {string} message 
         */
        async function showAlert(title, message) {
            await showModal(title, message, false, 'Close');
        }

        /**
         * Sets the state of the input and send button.
         * @param {boolean} enabled 
         */
        function setChatUIEnabled(enabled) {
            userInputEl.disabled = !enabled;
            sendBtnEl.disabled = !enabled || isSending;
            if (enabled && !isSending) {
                userInputEl.focus();
            }
        }

        /**
         * Toggles the typing indicator.
         * @param {boolean} show 
         */
        function showTypingIndicator(show) {
            typingIndicatorEl.style.display = show ? 'flex' : 'none'; // Use flex for better alignment
            isSending = show;
            sendBtnEl.disabled = show || !currentChatId;
        }
        
        /**
         * Scrolls the chat window to the bottom.
         */
        function scrollToBottom() {
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        /**
         * Generates the collection path for private user data.
         * @param {string} collectionName 
         */
        function getUserCollectionPath(collectionName) {
            return `artifacts/${APP_ID}/users/${userId}/${collectionName}`;
        }

        /**
         * Creates a Blob from the content and triggers a file download.
         * @param {string} content The HTML content to download.
         * @param {string} filename The name of the file to save.
         */
        function downloadFileBlob(content, filename) {
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /**
         * Processes the model's text, extracting multiple structured file blocks.
         * @param {string} text 
         * @returns {HTMLElement} The container element with text, code blocks, and download buttons.
         */
        function processModelResponse(text) {
            const container = document.createElement('div');
            container.className = 'w-full';

            let lastIndex = 0;
            let match;
            let fileCount = 0;

            // Reset the regex index before starting the search
            HTML_DELIMITER_REGEX.lastIndex = 0; 

            // Loop to find all matching file blocks
            while ((match = HTML_DELIMITER_REGEX.exec(text)) !== null) {
                // 1. Add preceding text
                const preText = text.substring(lastIndex, match.index).trim();
                if (preText) {
                    const p = document.createElement('p');
                    p.className = 'mt-3 first:mt-0';
                    // Simple newline to <br> conversion for pre-wrap effect
                    p.innerHTML = preText.replace(/\n/g, '<br>');
                    container.appendChild(p);
                }

                // Extract file metadata and content from regex groups
                const fileTitle = match[1].trim();
                const fileName = match[2].trim();
                const fileContent = match[3].trim();
                
                if (fileContent) {
                    fileCount++;
                    
                    // File Header (Title and Filename)
                    const fileHeader = document.createElement('div');
                    fileHeader.className = 'mt-4 mb-2 p-2 bg-gray-700 rounded-t-lg border border-b-0 border-gray-600';
                    fileHeader.innerHTML = `
                        <p class="text-sm font-semibold text-sky-400">${fileTitle}</p>
                        <p class="text-xs text-gray-400">${fileName}</p>
                    `;
                    container.appendChild(fileHeader);

                    // Code Block (for display)
                    const codeContainer = document.createElement('div');
                    codeContainer.className = 'p-3 bg-gray-900 rounded-b-lg overflow-x-auto text-xs font-mono border border-gray-700';
                    const codePre = document.createElement('pre');
                    codePre.textContent = fileContent;
                    codeContainer.appendChild(codePre);
                    container.appendChild(codeContainer);

                    // Download Button
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'mt-1 mb-2 px-3 py-1 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition duration-150 flex items-center shadow-md';
                    downloadBtn.innerHTML = `
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download ${fileName}
                    `;
                    // Use a closure to capture the correct content and filename
                    downloadBtn.onclick = (() => {
                        const contentToDownload = fileContent;
                        const nameToDownload = fileName;
                        return () => downloadFileBlob(contentToDownload, nameToDownload);
                    })();
                    container.appendChild(downloadBtn);
                }

                lastIndex = HTML_DELIMITER_REGEX.lastIndex;
            }

            // 3. Add remaining text
            const remainder = text.substring(lastIndex).trim();
            if (remainder) {
                const p = document.createElement('p');
                p.className = 'mt-3 first:mt-0';
                p.innerHTML = remainder.replace(/\n/g, '<br>');
                container.appendChild(p);
            }
            
            // Fallback if no code blocks were found, treat the entire text as a single paragraph
            if (container.childNodes.length === 0) {
                const p = document.createElement('p');
                p.innerHTML = text.replace(/\n/g, '<br>');
                container.appendChild(p);
            }

            return container;
        }

        // --- UI RENDERING FUNCTIONS ---

        /**
         * Formats a timestamp into a readable string.
         * @param {Date} date 
         */
        function formatTimestamp(date) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        /**
         * Displays a message in the chat window.
         * @param {string} text 
         * @param {'user' | 'model'} role 
         * @param {Date} timestamp 
         */
        function displayMessage(text, role, timestamp) {
            const messageEl = document.createElement('div');
            messageEl.className = 'flex ' + (role === 'user' ? 'justify-end' : 'justify-start');

            const contentEl = document.createElement('div');
            contentEl.className = 'max-w-xl lg:max-w-2xl px-4 py-2 rounded-xl text-sm shadow-lg ' + 
                                  (role === 'user' ? 'user-message' : 'model-message');
            
            if (role === 'user') {
                // For user messages, just use simple text replacement for line breaks
                contentEl.innerHTML = text.replace(/\n/g, '<br>');
            } else {
                // For model messages, use the processor to handle HTML blocks
                const processedContent = processModelResponse(text);
                contentEl.appendChild(processedContent);
            }
            
            const timeEl = document.createElement('span');
            timeEl.className = 'block text-xs mt-1 ' + (role === 'user' ? 'text-indigo-200' : 'text-gray-400 text-right');
            timeEl.textContent = formatTimestamp(timestamp);

            contentEl.appendChild(timeEl);
            messageEl.appendChild(contentEl);
            chatMessagesEl.appendChild(messageEl);

            scrollToBottom();
        }

        /**
         * Renders the list of chats in the sidebar.
         * @param {Array} chats 
         */
        function renderChatList(chats) {
            chatListEl.innerHTML = '';
            if (chats.length === 0) {
                chatListEl.innerHTML = '<p class="text-sm text-gray-500 mt-4">No chats yet. Start a new one!</p>';
                return;
            }

            chats.forEach(chat => {
                const item = document.createElement('div');
                item.dataset.chatId = chat.id;
                item.className = `p-3 rounded-lg cursor-pointer transition duration-150 truncate ${chat.id === currentChatId ? 'bg-sky-700 hover:bg-sky-600 font-bold' : 'bg-gray-700 hover:bg-gray-600'}`;
                item.textContent = chat.title;
                item.addEventListener('click', () => loadChat(chat.id));
                chatListEl.appendChild(item);
            });
        }

        /**
         * Clears the chat message area.
         */
        function clearChatMessages() {
            chatMessagesEl.innerHTML = '';
            chatMessagesEl.innerHTML = `
                <div class="text-center text-gray-500 mt-20">
                    <p class="text-3xl mb-2">👋 Welcome to NG.S Chat</p>
                    <p>Start a new chat or select a conversation from the sidebar.</p>
                </div>
            `;
            chatTitleEl.textContent = 'Select a chat or start a new one.';
            chatActionsEl.style.display = 'none';
        }

        /**
         * Renders the messages for the current chat.
         * @param {Array} messages 
         */
        function renderMessages(messages) {
            chatMessagesEl.innerHTML = '';
            chatHistory = messages;
            messages.forEach(msg => {
                // FIX: Check if msg.timestamp exists before calling toDate()
                const timestamp = msg.timestamp ? msg.timestamp.toDate() : new Date();
                displayMessage(msg.text, msg.role, timestamp);
            });
            scrollToBottom();
        }

        // --- FIREBASE/CHAT LOGIC ---

        /**
         * Attaches a real-time listener for the user's chats.
         */
        function setupChatListListener() {
            if (unsubscribeChats) {
                unsubscribeChats();
            }
            if (!userId) return;

            const chatCollectionRef = collection(db, getUserCollectionPath('chats'));
            const q = query(chatCollectionRef, orderBy('lastUpdated', 'desc'), limit(50)); // Limit chat history

            unsubscribeChats = onSnapshot(q, (snapshot) => {
                const chats = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                renderChatList(chats);

                // If no chat is loaded but chats exist, load the latest one
                if (!currentChatId && chats.length > 0) {
                    loadChat(chats[0].id);
                }
            }, (error) => {
                console.error("Error fetching chats: ", error);
                chatStatusEl.textContent = 'Error loading chat list.';
            });
        }

        /**
         * Attaches a real-time listener for messages in the current chat.
         * @param {string} chatId 
         */
        function setupMessageListener(chatId) {
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
            if (!chatId || !userId) return;

            const messagesCollectionRef = collection(db, getUserCollectionPath(`chats/${chatId}/messages`));
            const q = query(messagesCollectionRef, orderBy('timestamp', 'asc'));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messages = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                renderMessages(messages);
            }, (error) => {
                console.error("Error fetching messages: ", error);
                chatStatusEl.textContent = 'Error loading messages.';
            });
        }

        /**
         * Saves a new message to Firestore.
         * @param {string} chatId 
         * @param {string} text 
         * @param {'user' | 'model'} role 
         */
        async function saveMessage(chatId, text, role) {
            if (!chatId || !userId) return;

            try {
                const messagesCollectionRef = collection(db, getUserCollectionPath(`chats/${chatId}/messages`));
                await addDoc(messagesCollectionRef, {
                    text: text,
                    role: role,
                    timestamp: serverTimestamp()
                });

                // Update the chat's lastUpdated time and title if it's the first user message
                const chatDocRef = doc(db, getUserCollectionPath('chats'), chatId);
                await updateDoc(chatDocRef, {
                    lastUpdated: serverTimestamp(),
                    ...(role === 'user' && chatHistory.length === 0 && { title: text.substring(0, 50) + '...' })
                });

            } catch (error) {
                console.error("Error saving message or updating chat: ", error);
                chatStatusEl.textContent = 'Failed to save message.';
            }
        }

        /**
         * Loads a chat and sets up the message listener.
         * @param {string} chatId 
         */
        function loadChat(chatId) {
            if (currentChatId === chatId) {
                sidebarEl.classList.remove('open'); // Close sidebar on mobile if already selected
                return;
            }

            currentChatId = chatId;
            setupMessageListener(chatId);
            const chatItem = chatListEl.querySelector(`[data-chat-id="${chatId}"]`);
            if (chatItem) {
                chatTitleEl.textContent = chatItem.textContent;
            } else {
                chatTitleEl.textContent = 'Loading...';
            }
            chatActionsEl.style.display = 'flex';
            setChatUIEnabled(true);
            sidebarEl.classList.remove('open'); // Close sidebar on mobile
        }
        
        /**
         * Creates a new chat document in Firestore.
         */
        async function createNewChat() {
            if (!userId) {
                await showAlert('Authentication Required', 'Please sign in to start a new chat.');
                return;
            }
            
            try {
                // Clear state
                currentChatId = null;
                if (unsubscribeMessages) unsubscribeMessages();
                clearChatMessages();
                setChatUIEnabled(false);
                userInputEl.value = '';

                const chatCollectionRef = collection(db, getUserCollectionPath('chats'));
                const newChatRef = await addDoc(chatCollectionRef, {
                    userId: userId,
                    title: 'New Chat',
                    createdAt: serverTimestamp(),
                    lastUpdated: serverTimestamp()
                });
                
                // Load the newly created chat
                loadChat(newChatRef.id);
                sidebarEl.classList.remove('open'); // Close sidebar on mobile
            } catch (error) {
                console.error("Error creating new chat: ", error);
                showAlert('Error', 'Failed to create a new chat.');
            }
        }

        /**
         * Renames the current chat.
         */
        async function renameChat() {
            if (!currentChatId) return;

            const currentTitle = chatTitleEl.textContent;
            const newTitle = await showModal(
                'Rename Chat',
                'Enter a new title for this conversation:',
                true,
                'Save',
                currentTitle
            );

            if (newTitle && newTitle !== currentTitle) {
                try {
                    const chatDocRef = doc(db, getUserCollectionPath('chats'), currentChatId);
                    await updateDoc(chatDocRef, {
                        title: newTitle
                    });
                    chatTitleEl.textContent = newTitle;
                    chatStatusEl.textContent = 'Chat renamed successfully.';
                } catch (error) {
                    console.error("Error renaming chat: ", error);
                    showAlert('Error', 'Failed to rename chat.');
                }
            }
        }

        /**
         * Deletes the current chat.
         */
        async function deleteChat() {
            if (!currentChatId) return;

            const confirmDelete = await showModal(
                'Delete Chat',
                `Are you sure you want to delete the chat "${chatTitleEl.textContent}"? This action cannot be undone.`,
                false,
                'Delete'
            );

            if (confirmDelete) {
                try {
                    // For simplicity, we rely on deleting the parent document, and security rules should prevent orphans from being accessed.
                    const chatDocRef = doc(db, getUserCollectionPath('chats'), currentChatId);
                    await deleteDoc(chatDocRef);
                    
                    // 3. Reset UI state
                    currentChatId = null;
                    if (unsubscribeMessages) unsubscribeMessages();
                    clearChatMessages();
                    setChatUIEnabled(false);
                    chatStatusEl.textContent = 'Chat deleted successfully.';

                    // The chat list listener will automatically update and load the next chat if available
                } catch (error) {
                    console.error("Error deleting chat: ", error);
                    showAlert('Error', 'Failed to delete chat.');
                }
            }
        }

        // --- GEMINI API INTEGRATION ---

        /**
         * Sends the user message to the Gemini API.
         * @param {string} userText 
         * @returns {Promise<string>} Model's response text.
         */
        async function getGeminiResponse(userText) {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
            // UPDATED SYSTEM PROMPT: Instructs the model on the new multi-file format.
            const systemPrompt = "You are a friendly, helpful, and concise AI assistant. Respond conversationally. When asked who made you or if you are related to any company, you must respond that you were made by Greg and are not related to any other major corporation. If the user asks what 'ng.s' or anything similar stands for, you must state that it stands for 'notgreg.space'. Always provide clear and concise answers. IMPORTANT: If you generate ANY HTML code, you MUST wrap EACH file in the exact delimiters 'HTml:{Title}:{filename.html}' (on a new line) for the start and 'htML' (on a new line) for the end. You may generate multiple files in one response. Do not use markdown code fences (```html) for HTML, only use the structured HTml...htML format.";

            // Map chat history to API format, excluding the latest user message which is passed separately.
            const historyForApi = chatHistory.map(msg => ({
                role: msg.role === 'user' ? 'user' : 'model',
                // Clean up previous model responses to simplify the API context and reduce token count
                parts: [{ text: msg.text.replace(HTML_DELIMITER_REGEX, 'HTML code block (redacted)') }]
            }));
            
            const contents = [
                ...historyForApi,
                { role: 'user', parts: [{ text: userText }] }
            ];

            const payload = {
                contents: contents,
                tools: [{ "google_search": {} }],
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                },
            };

            let response;
            let retries = 0;
            const maxRetries = 5;

            while (retries < maxRetries) {
                try {
                    response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        break; // Success
                    } else if (response.status === 429) {
                        // Rate limit error - apply exponential backoff
                        const delay = Math.pow(2, retries) * 1000 + Math.random() * 1000;
                        retries++;
                        await new Promise(resolve => setTimeout(resolve, delay));
                    } else {
                        // Other HTTP error
                        const errorData = await response.json();
                        throw new Error(`API Error: ${response.status} - ${errorData.error?.message || response.statusText}`);
                    }
                } catch (error) {
                    // Network or other fetch error
                    if (retries === maxRetries - 1) {
                        throw error; // Throw on final attempt
                    }
                    const delay = Math.pow(2, retries) * 1000 + Math.random() * 1000;
                    retries++;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }

            if (!response || !response.ok) {
                throw new Error("Failed to get a successful response after retries.");
            }

            const result = await response.json();
            const candidate = result.candidates?.[0];

            if (candidate && candidate.content?.parts?.[0]?.text) {
                return candidate.content.parts[0].text;
            } else {
                throw new Error(result.promptFeedback?.blockReason || "Model response blocked or empty.");
            }
        }

        /**
         * Main function to handle sending a message.
         */
        async function sendMessage() {
            const userText = userInputEl.value.trim();

            if (userText === '' || !currentChatId) {
                return;
            }

            // Lock UI and clear input
            setChatUIEnabled(false);
            // Auto-resize textarea down to min height after clearing
            userInputEl.value = '';
            userInputEl.style.height = '48px';
            
            chatStatusEl.textContent = '';
            
            try {
                // 1. Save and display user message
                await saveMessage(currentChatId, userText, 'user');

                // 2. Show typing indicator and fetch model response
                showTypingIndicator(true);

                const modelResponseText = await getGeminiResponse(userText);
                
                // 3. Save and display model message
                await saveMessage(currentChatId, modelResponseText, 'model');

            } catch (error) {
                console.error("Chat Error:", error);
                chatStatusEl.textContent = `Error: ${error.message}. Please try again.`;
                displayMessage(`System Alert: ${error.message}`, 'model', new Date());
            } finally {
                showTypingIndicator(false);
                setChatUIEnabled(true);
            }
        }

        // --- AUTHENTICATION LOGIC ---
        
        /**
         * Handles Google Sign-In using a popup.
         */
        async function signInWithGoogle() {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
                // Auth listener handles state change
            } catch (error) {
                console.error("Google Sign-In Error:", error);
                showAlert('Sign-In Failed', `Error: ${error.message}`);
            }
        }

        /**
         * Sets up Firebase, Auth, and Firestore.
         */
        async function setupFirebase() {
            if (!firebaseConfig) {
                authStatusEl.textContent = 'Error: Firebase config not found.';
                return;
            }

            try {
                // Initialize Firebase
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                // Enable Firestore debug logs for easier troubleshooting
                setLogLevel('debug');

                // Try to set persistence (optional, if supported by the environment)
                try {
                    await setPersistence(auth, inMemoryPersistence);
                } catch (error) {
                    // inMemoryPersistence is used as a safer fallback/default in environments like Canvas
                    console.log("Using in-memory persistence or persistence failed:", error.code);
                }
                
                // Handle initial sign-in using custom token or anonymously
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }

                // Set up auth state listener
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        userIdEl.textContent = `User ID: ${userId.substring(0, 10)}...`;
                        authStatusEl.textContent = user.isAnonymous ? 'Signed In Anonymously' : `Signed In: ${user.email || 'Google User'}`;
                        googleSignInBtn.textContent = 'Sign Out';
                        googleSignInBtn.onclick = () => {
                            signOut(auth);
                        };
                        
                        // Start listening for chats and load the UI
                        setupChatListListener();
                        setChatUIEnabled(currentChatId !== null);

                        // If the sidebar is closed on desktop, ensure it opens
                        if (window.innerWidth >= 768) {
                            sidebarEl.classList.add('open');
                        }
                    } else {
                        // User signed out or failed auth
                        userId = null;
                        userIdEl.textContent = 'User ID: Not Signed In';
                        authStatusEl.textContent = 'Signed Out. Please Sign In.';
                        googleSignInBtn.textContent = 'Sign In';
                        googleSignInBtn.onclick = signInWithGoogle;

                        // Clean up listeners and UI
                        if (unsubscribeChats) unsubscribeChats();
                        if (unsubscribeMessages) unsubscribeMessages();
                        clearChatMessages();
                        setChatUIEnabled(false);
                        chatListEl.innerHTML = '<p class="text-sm text-gray-500 mt-4">Please sign in to view your chats.</p>';
                        
                        // Attempt to re-sign in anonymously if not already signing in with Google
                        if (!initialAuthToken) {
                            signInAnonymously(auth).catch(error => {
                                console.error("Anonymous Sign-In Failed:", error);
                                authStatusEl.textContent = `Auth Error: ${error.code || error.message}`;
                            });
                        }
                    }
                }, (error) => {
                    console.error("Authentication State Change Error:", error);
                    authStatusEl.textContent = `Auth Error: ${error.code || error.message}`;
                });

            } catch (error) {
                console.error("Firebase Initialization Failed:", error);
                authStatusEl.textContent = `Init Error: ${error.message}`;
                setChatUIEnabled(false); // Disable chat UI if auth fails
                showAlert('System Alert', `Failed to initialize Firebase. You can still chat if permissions allow, but history is not saved.`);
            }
        }

        // --- EVENT LISTENERS & INIT ---
        sendBtnEl.addEventListener('click', sendMessage);
        userInputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !userInputEl.disabled) {
                e.preventDefault(); // Prevent newline
                sendMessage();
            }
        });

        // Auto-resize textarea on input
        userInputEl.addEventListener('input', () => {
            userInputEl.style.height = 'auto'; // Reset height
            userInputEl.style.height = (userInputEl.scrollHeight) + 'px'; // Set to scroll height
        });
        
        googleSignInBtn.addEventListener('click', () => {
             // Listener is dynamically set in onAuthStateChanged
        }); 
        
        newChatBtn.addEventListener('click', createNewChat);
        renameBtnEl.addEventListener('click', renameChat);
        deleteBtnEl.addEventListener('click', deleteChat); 
        
        // Mobile menu toggle
        menuToggleEl.addEventListener('click', () => {
            sidebarEl.classList.toggle('open');
        });
        menuToggleMobileEl.addEventListener('click', () => {
            sidebarEl.classList.toggle('open');
        });

        // Initialize Firebase and Auth immediately
        setupFirebase(); 
    </script>
